<!DOCTYPE html>
<!-- talkbridge · 2026-04-06 -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<title>TalkBridge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Lora:wght@500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0a0a0a;--surface:#161616;--surface2:#222;
  --teal:#2E8B8B;--teal-bright:#3FC1C1;
  --text:#e8e4df;--text-dim:#888;--text-muted:#555;
  --red:#e74c3c;--green:#2ecc71;
  --radius:14px;--controls-h:76px;
}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:"DM Sans",sans-serif;color:var(--text);}

/* ═══ LOBBY ═══ */
.lobby{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;z-index:10;background:var(--bg);transition:opacity .3s;overflow-y:auto;}
.lobby.hidden{opacity:0;pointer-events:none;}
.lobby-card{width:min(100%,380px);display:flex;flex-direction:column;gap:16px;}
.lobby-brand{font-family:"Lora",serif;font-size:32px;font-weight:600;color:var(--teal-bright);text-align:center;letter-spacing:-0.5px;}
.lobby-sub{font-size:13px;color:var(--text-dim);text-align:center;margin-top:-8px;}
.lobby-label{font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:-8px;}
.lobby-input{width:100%;background:var(--surface);color:var(--text);border:1.5px solid var(--surface2);border-radius:10px;padding:12px 14px;font-size:15px;font-family:"DM Sans",sans-serif;outline:none;}
.lobby-input:focus{border-color:var(--teal);}
.lobby-input::placeholder{color:var(--text-muted);}
.lobby-select{width:100%;background:var(--surface);color:var(--text);border:1.5px solid var(--surface2);border-radius:10px;padding:12px 14px;font-size:15px;font-family:"DM Sans",sans-serif;outline:none;-webkit-appearance:none;appearance:none;cursor:pointer;}
.lobby-select:focus{border-color:var(--teal);}
.lobby-btn{width:100%;background:var(--teal);color:#fff;border:none;border-radius:12px;padding:14px;font-size:16px;font-weight:600;cursor:pointer;font-family:"DM Sans",sans-serif;transition:opacity .15s;margin-top:4px;}
.lobby-btn:hover{opacity:.85;}
.lobby-btn:disabled{opacity:.4;cursor:default;}
.lobby-btn.secondary{background:var(--surface2);color:var(--text);}
.lobby-btn.secondary:hover{background:var(--teal);color:#fff;opacity:1;}
.lobby-link-box{background:var(--surface);border:1.5px solid var(--surface2);border-radius:10px;padding:12px;word-break:break-all;font-size:11px;color:var(--teal-bright);margin-bottom:12px;cursor:pointer;}
.lobby-link-row{display:flex;gap:8px;}
.lobby-link-btn{flex:1;background:var(--surface2);color:var(--text);border:none;border-radius:10px;padding:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:"DM Sans",sans-serif;}
.lobby-link-btn:hover{background:var(--teal);color:#fff;}
.lobby-preview{width:min(100%,280px);aspect-ratio:16/9;border-radius:var(--radius);overflow:hidden;background:var(--surface);margin:0 auto 8px;}
.lobby-preview video{width:100%;height:100%;object-fit:cover;transform:scaleX(-1);}
.recent-rooms{margin-top:6px;display:flex;flex-direction:column;gap:8px;}
.recent-title{font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.6px;}
.recent-item{background:var(--surface);border:1px solid var(--surface2);border-radius:10px;padding:10px 12px;}
.recent-item-top{display:flex;align-items:center;gap:8px;}
.recent-open{flex:1;min-width:0;background:none;border:none;color:var(--text);text-align:left;cursor:pointer;font:inherit;font-size:14px;font-weight:500;}
.recent-open small{display:block;color:var(--text-dim);font-size:11px;}
.recent-actions{display:flex;gap:6px;margin-top:8px;}
.recent-act{flex:1;background:rgba(255,255,255,.06);color:var(--text-dim);border:none;border-radius:8px;padding:6px;font-size:11px;font-weight:600;cursor:pointer;font-family:"DM Sans",sans-serif;}
.recent-act:hover{background:var(--teal);color:#fff;}
.recent-act.danger{color:var(--red);}
.recent-act.danger:hover{background:var(--red);color:#fff;}

/* Lobby footer buttons */
.lobby-footer{display:flex;gap:8px;margin-top:4px;}
.lobby-footer-btn{flex:1;background:none;border:1px solid var(--surface2);border-radius:8px;color:var(--text-dim);padding:8px;font-size:12px;cursor:pointer;font-family:"DM Sans",sans-serif;}
.lobby-footer-btn:hover{background:var(--surface2);color:var(--text);}

/* ═══ JOINING SCREEN ═══ */
.joining-screen{position:fixed;inset:0;background:var(--bg);z-index:20;display:none;align-items:center;justify-content:center;flex-direction:column;gap:16px;}
.joining-screen.show{display:flex;}
.joining-spinner{width:40px;height:40px;border:3px solid var(--surface2);border-top-color:var(--teal-bright);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.joining-label{font-size:14px;color:var(--text-dim);}

/* ═══ LOG OVERLAY ═══ */
.log-overlay{position:fixed;inset:0;background:rgba(0,0,0,.96);z-index:50;display:none;flex-direction:column;}
.log-overlay.show{display:flex;}
.log-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--surface2);flex-shrink:0;gap:8px;flex-wrap:wrap;}
.log-title{font-family:"Lora",serif;font-size:17px;color:var(--teal-bright);}
.log-actions{display:flex;gap:6px;flex-wrap:wrap;}
.log-btn{background:var(--surface2);color:var(--text);border:none;border-radius:8px;padding:7px 12px;font-size:12px;font-weight:600;cursor:pointer;font-family:"DM Sans",sans-serif;}
.log-btn:hover{background:var(--teal);color:#fff;}
.log-body{flex:1;overflow-y:auto;padding:10px 16px 20px;font-family:monospace;font-size:11px;line-height:1.7;color:#aaa;}
.log-row{border-bottom:1px solid rgba(255,255,255,.03);padding:1px 0;}
.log-row .ts{color:#555;}
.log-row .ev{color:var(--teal-bright);}
.log-row.error .ev{color:#e74c3c;}
.log-row.warn .ev{color:#f39c12;}
.log-row.ok .ev{color:#2ecc71;}

/* Transcript viewer (lobby side) */
.room-transcript-overlay{position:fixed;inset:0;background:rgba(0,0,0,.94);z-index:50;display:none;flex-direction:column;}
.room-transcript-overlay.show{display:flex;}

/* ═══ CALL SCREEN ═══ */
.call{position:fixed;inset:0;background:#000;z-index:5;display:none;flex-direction:column;}
.call.active{display:flex;}
.call-videos{flex:1;position:relative;background:#000;overflow:hidden;min-height:0;transition:flex-basis .26s ease;}
#remote-video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;background:#000;cursor:pointer;}
#local-video{position:absolute;top:12px;right:12px;width:min(26%,140px);aspect-ratio:16/9;border-radius:10px;object-fit:cover;transform:scaleX(-1);border:2px solid rgba(255,255,255,.2);box-shadow:0 4px 20px rgba(0,0,0,.5);z-index:3;background:var(--surface);cursor:pointer;}
.call-videos.swapped #local-video{inset:0;width:100%;height:100%;border-radius:0;border:none;box-shadow:none;z-index:1;}
.call-videos.swapped #remote-video{inset:auto;top:12px;right:12px;width:min(26%,140px);height:auto;aspect-ratio:16/9;border-radius:10px;border:2px solid rgba(255,255,255,.2);box-shadow:0 4px 20px rgba(0,0,0,.5);z-index:3;background:var(--surface);}
.no-video-placeholder{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:48px;color:var(--text-muted);z-index:1;}
.solo-banner{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:2;text-align:center;pointer-events:none;}
.solo-banner-text{background:rgba(0,0,0,.6);color:var(--text-dim);font-size:13px;padding:8px 18px;border-radius:20px;backdrop-filter:blur(6px);}

/* Subtitles */
.subtitle-area{position:absolute;bottom:0;left:0;right:0;z-index:4;padding:16px 20px max(16px,env(safe-area-inset-bottom));pointer-events:none;display:flex;flex-direction:column;align-items:center;gap:6px;background:linear-gradient(transparent,rgba(0,0,0,.7) 40%);}
.subtitle-line{max-width:92%;padding:6px 16px;border-radius:8px;font-size:16px;line-height:1.45;text-align:center;animation:subIn .25s ease-out;word-break:break-word;}
.subtitle-line.partner{background:rgba(0,0,0,.65);color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.5);}
.subtitle-line.mine{background:rgba(46,139,139,.25);color:rgba(255,255,255,.7);font-size:13px;}
.subtitle-line.mine-translation{background:rgba(63,193,193,.25);color:#fff;font-size:14px;}
.subtitle-line.partner-source{background:rgba(255,255,255,.08);color:rgba(255,255,255,.72);font-size:13px;}
.subtitle-line.interim{opacity:.5;font-style:italic;}
@keyframes subIn{from{transform:translateY(8px);opacity:0;}}
.subtitle-line.fading{animation:subOut .5s ease-in forwards;}
@keyframes subOut{to{opacity:0;transform:translateY(-4px);}}

/* Controls */
.call-controls{display:flex;align-items:center;justify-content:center;gap:16px;padding:12px 16px max(12px,env(safe-area-inset-bottom));background:rgba(0,0,0,.85);z-index:5;flex-shrink:0;}
.ctrl-btn{width:52px;height:52px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s,transform .1s;background:rgba(255,255,255,.12);color:#fff;}
.ctrl-btn:hover{background:rgba(255,255,255,.2);}
.ctrl-btn:active{transform:scale(.93);}
.ctrl-btn.off{background:rgba(231,76,60,.2);color:var(--red);}
.ctrl-btn.end-call{background:var(--red);color:#fff;width:60px;height:52px;border-radius:26px;}
.ctrl-btn.end-call:hover{background:#c0392b;}
.ctrl-btn.small{width:40px;height:40px;}
.ctrl-btn.small svg{width:18px;height:18px;}

/* Badges */
.lang-badge{position:absolute;z-index:4;background:rgba(0,0,0,.58);border:1px solid rgba(255,255,255,.14);color:#fff;font-size:11px;font-weight:700;padding:4px 9px;border-radius:999px;letter-spacing:.02em;backdrop-filter:blur(4px);}
.remote-lang-badge{top:12px;left:50%;transform:translateX(-50%);}
.local-lang-badge{bottom:14px;right:12px;max-width:min(26%,140px);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;z-index:5;}
@keyframes pulse{50%{opacity:.4;}}

/* Toast */
#toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(255,255,255,.15);backdrop-filter:blur(12px);color:#fff;font-size:13px;font-weight:600;padding:10px 20px;border-radius:22px;z-index:100;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* Transcript drawer — inside .call */
.transcript-overlay{position:relative;left:auto;right:auto;bottom:auto;top:auto;background:rgba(0,0,0,.6);border-top:0 solid rgba(255,255,255,.08);backdrop-filter:blur(10px);z-index:6;display:flex;flex-direction:column;height:0;overflow:hidden;transition:height .26s ease,border-top-width .2s ease;}
.call.transcript-open .transcript-overlay{height:25vh;border-top-width:1px;}
.transcript-sheet{width:100%;display:flex;flex-direction:column;overflow:hidden;max-height:inherit;}
.transcript-sheet-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid rgba(255,255,255,.07);flex-shrink:0;gap:8px;flex-wrap:wrap;}
.transcript-sheet-title{font-family:"Lora",serif;font-size:15px;font-weight:600;white-space:nowrap;}
.transcript-sheet-actions{display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end;}
.transcript-sheet-btn{background:rgba(255,255,255,.1);color:var(--text);border:none;border-radius:8px;padding:5px 9px;font-size:11px;font-weight:600;cursor:pointer;font-family:"DM Sans",sans-serif;white-space:nowrap;}
.transcript-sheet-btn:hover{background:var(--teal);color:#fff;}
.transcript-sheet-body{flex:1;overflow-y:auto;padding:8px 14px 14px;}
.transcript-entry{padding:6px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:13px;line-height:1.5;}
.transcript-entry-who{font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.04em;}
.transcript-entry-who.mine{color:var(--teal);}
.transcript-entry-text{color:var(--text-dim);}
.transcript-entry-translation{color:var(--text);margin-top:2px;}

/* ═══ RESPONSIVE ═══ */
@media(min-width:768px){
  .lobby-card{width:420px;}
  #local-video{width:min(20%,200px);}
  .call-videos.swapped #remote-video{width:min(20%,200px);}
  .local-lang-badge{max-width:min(20%,200px);}
  .call-controls{gap:20px;padding:14px 24px;}
  .ctrl-btn{width:56px;height:56px;}
  .ctrl-btn.end-call{width:68px;height:56px;}
  .subtitle-line{font-size:18px;max-width:80%;}
  :root{--controls-h:84px;}
}
@media(max-height:500px) and (orientation:landscape){
  #local-video{width:min(18%,110px);top:8px;right:8px;}
  .call-videos.swapped #remote-video{width:min(18%,110px);top:8px;right:8px;}
  .local-lang-badge{max-width:min(18%,110px);bottom:8px;right:8px;}
  .remote-lang-badge{top:8px;}
  .call-controls{gap:10px;padding:8px 12px;}
  .ctrl-btn{width:44px;height:44px;}
  .ctrl-btn.small{width:34px;height:34px;}
  .ctrl-btn.end-call{width:52px;height:44px;}
  .subtitle-line{font-size:13px;padding:4px 12px;}
  :root{--controls-h:60px;}
  .call.transcript-open .transcript-overlay{height:38vh;}
}
@media(max-width:400px){
  .call-controls{gap:10px;}
  .ctrl-btn{width:46px;height:46px;}
  .ctrl-btn.end-call{width:54px;height:46px;}
  .subtitle-line{font-size:14px;}
}
</style>
</head>
<body>

<!-- ═══ LOBBY ═══ -->
<div class="lobby" id="lobby">
  <div class="lobby-card">
    <div class="lobby-brand">TalkBridge</div>
    <div class="lobby-sub">Video call with live subtitles</div>

    <div id="lobby-setup">
      <div style="display:flex;flex-direction:column;gap:12px;">
        <div>
          <div class="lobby-label" style="margin-bottom:6px;">Room name (optional)</div>
          <input class="lobby-input" id="room-name" placeholder="e.g. English ↔ Thai session" maxlength="60">
        </div>
        <div>
          <div class="lobby-label" style="margin-bottom:6px;">I speak</div>
          <select class="lobby-select" id="my-lang"></select>
        </div>
        <div>
          <div class="lobby-label" style="margin-bottom:6px;">They speak</div>
          <select class="lobby-select" id="their-lang"></select>
        </div>
        <button class="lobby-btn" id="create-btn" onclick="createRoom()" disabled>Start a room</button>
      </div>
      <div class="recent-rooms" id="recent-rooms" style="display:none;">
        <div class="recent-title">Recent rooms</div>
        <div id="recent-rooms-list"></div>
      </div>
      <div class="lobby-footer">
        <button class="lobby-footer-btn" onclick="openLogPanel()">🪲 Debug log</button>
      </div>
    </div>

    <div id="lobby-waiting" style="display:none;">
      <div class="lobby-preview"><video id="preview-video" autoplay muted playsinline></video></div>
      <div style="font-size:14px;color:var(--text-dim);text-align:center;margin-bottom:10px;" id="room-name-display"></div>
      <div class="lobby-link-box" id="lobby-link" onclick="copyLink()">—</div>
      <div class="lobby-link-row">
        <button class="lobby-link-btn" onclick="copyLink()">Copy link</button>
        <button class="lobby-link-btn" onclick="shareLink()">Share</button>
      </div>
      <button class="lobby-btn" style="margin-top:12px;" onclick="enterSolo()">Enter room now (solo / test)</button>
      <button class="lobby-btn secondary" style="margin-top:8px;" onclick="backToSetup()">← Back</button>
      <div style="margin-top:12px;font-size:12px;color:var(--text-muted);text-align:center;">Or wait for partner to join via link…</div>
    </div>
  </div>
</div>

<!-- Joining screen -->
<div class="joining-screen" id="joining-screen">
  <div class="joining-spinner"></div>
  <div class="joining-label" id="joining-label">Joining call…</div>
</div>

<!-- ═══ LOG OVERLAY ═══ -->
<div class="log-overlay" id="log-overlay">
  <div class="log-header">
    <span class="log-title">🪲 Debug Log</span>
    <div class="log-actions">
      <button class="log-btn" onclick="copyLog()">Copy log</button>
      <button class="log-btn" onclick="clearLog()">Clear</button>
      <button class="log-btn" onclick="closeLogPanel()">✕ Close</button>
    </div>
  </div>
  <div class="log-body" id="log-body"></div>
</div>

<!-- Room transcript viewer (from lobby) -->
<div class="log-overlay" id="room-tr-overlay">
  <div class="log-header">
    <span class="log-title" id="room-tr-title">Transcript</span>
    <div class="log-actions">
      <button class="log-btn" onclick="copyRoomTranscript()">Copy</button>
      <button class="log-btn" onclick="closeRoomTranscript()">✕ Close</button>
    </div>
  </div>
  <div class="log-body" id="room-tr-body" style="font-family:'DM Sans',sans-serif;font-size:13px;"></div>
</div>

<!-- ═══ CALL ═══ -->
<div class="call" id="call-screen">
  <div class="call-videos">
    <video id="remote-video" autoplay playsinline onclick="toggleVideoFocus()"></video>
    <video id="local-video" autoplay muted playsinline onclick="toggleVideoFocus()"></video>
    <div class="no-video-placeholder" id="no-video-msg">👤</div>
    <div class="solo-banner" id="solo-banner" style="display:none;">
      <div class="solo-banner-text">Solo / test mode — waiting for partner</div>
    </div>
    <div class="lang-badge remote-lang-badge" id="remote-lang-badge">Partner: —</div>
    <div class="lang-badge local-lang-badge" id="local-lang-badge">You: —</div>
    <div class="subtitle-area" id="subtitle-area"></div>
  </div>

  <div class="transcript-overlay" id="transcript-overlay">
    <div class="transcript-sheet">
      <div class="transcript-sheet-header">
        <span class="transcript-sheet-title">Transcript</span>
        <div class="transcript-sheet-actions">
          <button class="transcript-sheet-btn" onclick="copyTranscript()">Copy</button>
          <button class="transcript-sheet-btn" onclick="exportTranscriptTxt()">TXT</button>
          <button class="transcript-sheet-btn" onclick="exportPhrasebook()">Phrasebook↓</button>
          <button class="transcript-sheet-btn" onclick="toggleTranscript()">✕</button>
        </div>
      </div>
      <div class="transcript-sheet-body" id="transcript-body">
        <div style="color:var(--text-muted);font-size:13px;font-style:italic;">Transcript will appear here.</div>
      </div>
    </div>
  </div>

  <div class="call-controls">
    <button class="ctrl-btn small" onclick="toggleTranscript()" title="Transcript">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
    </button>
    <button class="ctrl-btn" id="mic-btn" onclick="toggleMic()" title="Mute/unmute">
      <svg id="mic-icon-on" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
      <svg id="mic-icon-off" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/><line x1="2" y1="22" x2="22" y2="2" stroke="#e74c3c" stroke-width="2.5"/></svg>
    </button>
    <button class="ctrl-btn end-call" onclick="hangUp()" title="End call">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M10.68 13.31a16 16 0 0 0 3.41 2.6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6A19.79 19.79 0 0 1 2.12 4.11 2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 2.59 3.4z" transform="rotate(135 12 12)"/></svg>
    </button>
    <button class="ctrl-btn" id="cam-btn" onclick="toggleCam()" title="Camera">
      <svg id="cam-icon-on" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>

// ═══ UTILITIES ═══
function toast(m){var el=document.getElementById('toast');el.textContent=m;el.classList.add('show');clearTimeout(toast._t);toast._t=setTimeout(function(){el.classList.remove('show')},2500)}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,8)}
function escHtml(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML}

function logDebug(event,detail,level){
  var row={ts:new Date().toISOString(),event:event,detail:detail||{},level:level||'info'};
  debugLog.push(row);
  if(debugLog.length>500)debugLog.shift();
  var cls='log-row '+(level||'info');
  var body=document.getElementById('log-body');
  if(body){

    div.innerHTML='<span class="ts">'+row.ts.slice(11,23)+'</span> <span class="ev">'+escHtml(event)+'</span> '+escHtml(JSON.stringify(detail||{}));
    body.appendChild(div);
    body.scrollTop=body.scrollHeight;
  }
}

function detectLang(text,fb){
  var t=(text||'').trim();if(!t)return fb||'en';
  if(/[฀-๿]/.test(t))return'th';if(/[぀-ヿ]/.test(t))return'ja';
  if(/[一-鿿]/.test(t))return'zh';if(/[가-힯]/.test(t))return'ko';
  if(/[؀-ۿ]/.test(t))return'ar';
  return fb||'en';
}
function getLangMeta(code){
  var c=(code||'').toLowerCase();
  for(var i=0;i<LANGS.length;i++){if(LANGS[i].code===c)return LANGS[i]}
  return{code:c||'?',label:(c||'?').toUpperCase(),flag:'🌐'};
}
function formatLangTag(code){var m=getLangMeta(code);return m.flag+' '+m.label;}
function normalizeTranscriptText(text){return (text||'').replace(/\s+/g,' ').trim();}

function translate(text,from,to){
  if(!text||!from||!to||from===to)return Promise.resolve(text);
  var key=from+'|'+to+'|'+text;
  if(trCache.has(key))return Promise.resolve(trCache.get(key));
  logDebug('translate_req',{from:from,to:to,text:text.slice(0,40)});
  return fetch('https://api.mymemory.translated.net/get?q='+encodeURIComponent(text)+'&langpair='+from+'|'+to)
    .then(function(r){return r.json()}).then(function(d){
      if(d&&d.responseStatus===200&&d.responseData){
        var tr=d.responseData.translatedText;
        if(tr&&tr.indexOf('MYMEMORY')<0){trCache.set(key,tr);logDebug('translate_ok',{result:tr.slice(0,40)},'ok');return tr}
      }
      logDebug('translate_fail',{status:d&&d.responseStatus},'warn');
      return text;
    }).catch(function(e){logDebug('translate_error',{msg:String(e)},'error');return text});
}

function encodeInvite(p){try{return btoa(unescape(encodeURIComponent(JSON.stringify(p)))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'')}catch(_){return''}}
function decodeInvite(s){if(!s)return null;try{var b=s.replace(/-/g,'+').replace(/_/g,'/');while(b.length%4)b+='=';return JSON.parse(decodeURIComponent(escape(atob(b))))}catch(_){return null}}
function buildInviteUrl(){
  var payload={r:room.id,ml:room.myLang,tl:room.theirLang,n:room.name||''};
  return location.href.split('?')[0].split('#')[0]+'#j='+encodeInvite(payload);

function saveCurrentRoomToRecent(){
  if(!room.id||!room.myLang||!room.theirLang)return;
  var url=buildInviteUrl();
  var rows=getRecentRooms().filter(function(r){return r.id!==room.id});
  var m1=getLangMeta(room.myLang),m2=getLangMeta(room.theirLang);

    id:room.id,
    name:room.name||(m1.flag+' '+m1.label+' ↔ '+m2.flag+' '+m2.label),
    myLang:room.myLang,theirLang:room.theirLang,

// ═══ RELAY ═══
function connectRelay(){
  if(ws)try{ws.close()}catch(_){}
  logDebug('relay_connecting',{room:room.id,role:room.role});
  ws=new WebSocket(RELAY_WS+'?app='+encodeURIComponent(RELAY_APP)+'&session='+encodeURIComponent(room.id)+'&client='+encodeURIComponent(deviceId));
  ws.onopen=function(){
    logDebug('relay_open',{},'ok');
    updateConn('connected');
    relaySend({type:'hello',lang:room.myLang,targetLang:room.theirLang,role:room.role});
    startHeartbeat();
  };
  ws.onmessage=function(e){try{handleRelay(JSON.parse(e.data))}catch(_){}};
  var _ws=ws;
  ws.onclose=function(e){
    if(ws!==_ws)return; // stale socket, ignore
    logDebug('relay_close',{code:e.code,reason:e.reason},'warn');
    updateConn('disconnected');
    stopHeartbeat();
    clearTimeout(wsReconnectTimer);wsReconnectTimer=null;
    var canReconnect=!!room.id&&(lobbyState===LOBBY_STATE.waiting||lobbyState===LOBBY_STATE.call);
    if(canReconnect){
      wsReconnectTimer=setTimeout(function(){
        wsReconnectTimer=null;
        if(room.id&&(lobbyState===LOBBY_STATE.waiting||lobbyState===LOBBY_STATE.call))connectRelay();
      },2000);
    }
  };
  ws.onerror=function(e){logDebug('relay_error',{msg:String(e)},'error');};
}
function relaySend(msg){
  if(!ws||ws.readyState!==1)return;
  msg.session=room.id;msg.from=deviceId;msg.ts=Date.now();msg.seq=++seq;
  try{ws.send(JSON.stringify(msg))}catch(_){}
}
function startHeartbeat(){stopHeartbeat();hbTimer=setInterval(function(){relaySend({type:'ping',transient:true})},HEARTBEAT_MS)}
function stopHeartbeat(){if(hbTimer){clearInterval(hbTimer);hbTimer=null}}

function handleRelay(d){
  if(!d||d.from===deviceId)return;
  logDebug('relay_rx',{type:d.type,from:(d.from||'').slice(-6)});
  if(d.type==='hello'){
    if(lobbyState===LOBBY_STATE.waiting){room.solo=false;enterCall();}
    return;
  }
  if(d.type==='ping'){relaySend({type:'pong',transient:true});updateConn('connected');return}
  if(d.type==='pong'){updateConn('connected');return}
  if(d.type==='webrtc-signal'){handleSignal(d);return}
  if(d.type==='subtitle'){
    if(d.sourceText&&d.sourceText!==d.text)showSubtitle(d.sourceText,'partner-source');
    showSubtitle(d.text,'partner');
    addTranscriptEntry('partner',d.sourceText,d.text,d.sourceLang,d.targetLang,d.subtitleSeq);
    return;
  }
  if(d.type==='subtitle-update'){
    if(d.text&&d.sourceText&&d.text!==d.sourceText)showSubtitle(d.text,'partner');
    patchTranscriptEntry('partner',d.subtitleSeq,d.text,d.sourceLang,d.targetLang);
    return;
  }
  if(d.type==='hangup'){toast('Partner left the call');cleanUp();return}
}

function updateConn(state){
  logDebug('conn_state',{state:state});
}

function clearSpeechFirstFinalTimer(){
  if(speechFirstFinalTimer){
    clearTimeout(speechFirstFinalTimer);
    speechFirstFinalTimer=null;
  }
}

function maybeToastSpeechTimeout(){
  if(speechFirstFinalWarned)return;
  speechFirstFinalWarned=true;
  logDebug('speech_first_final_timeout_suppressed_toast',{reason:'no_transcript_first_final_timeout'},'warn');
}

function resetSpeechRetryState(reason){
  speechRetryCount=0;
  speechStableStartedAt=Date.now();
  speechFinalStable=false;
  if(speechRetryTimer){clearTimeout(speechRetryTimer);speechRetryTimer=null}
  logDebug('speech_retry_reset',{reason:reason||'unknown'});
}
function scheduleSpeechRestart(gen,why){
  if(speechRetryTimer){clearTimeout(speechRetryTimer);speechRetryTimer=null}
  if(!micOn||!room.id||!document.getElementById('call-screen').classList.contains('active'))return;
  var delay=120;
  speechRetryCount++;
  logDebug('speech_restart_scheduled',{why:why,delay:delay,retryCount:speechRetryCount},'warn');
  speechRetryTimer=setTimeout(function(){
    speechRetryTimer=null;
    if(gen!==speechSessionGen)return;
    if(micOn&&room.id&&!recognizing&&document.getElementById('call-screen').classList.contains('active'))startSubtitles();
  },delay);
}

// ═══ ENTER CALL ═══
async function enterCall(){
  resetSpeechRetryState('enter_call');
  // Acquire video-only stream if not already held
  if(!videoStream){
    try{
      videoStream=await navigator.mediaDevices.getUserMedia({video:true,audio:false});
      logDebug('video_acquired',{video:videoStream.getVideoTracks().length},'ok');
    }catch(e){logDebug('video_fail',{msg:String(e)},'error');toast('Camera permission needed');return}
  }
  // Load any prior transcript for this room
  var saved=loadTranscriptFromStorage();
  transcript=saved.length?saved:[];
  logDebug('transcript_loaded',{entries:transcript.length});

  document.getElementById('lobby').classList.add('hidden');
  if(!callHistoryPushed){
    history.pushState({tbView:'call'},'',location.href);
    callHistoryPushed=true;
  }
  document.getElementById('call-screen').classList.add('active');
  lobbyState=LOBBY_STATE.call;
  document.getElementById('local-video').srcObject=videoStream;
  var videos=document.querySelector('.call-videos');
  if(videos)videos.classList.remove('swapped');
  syncMicUi();
  syncCamUi();
  updateLanguageBadges();

  // Solo mode banner
  var sb=document.getElementById('solo-banner');
  if(sb)sb.style.display=room.solo?'':'none';

  document.getElementById('transcript-overlay').classList.remove('show');
  document.getElementById('call-screen').classList.remove('transcript-open');

  logDebug('call_entered',{solo:room.solo,myLang:room.myLang,theirLang:room.theirLang,speechRecAvail:!!SpeechRec});

  if(!ws||ws.readyState!==1)connectRelay();
  if(!room.solo)setupPeerConnection();
  if(micOn)startSubtitles();
  relaySend({type:'hello',lang:room.myLang,targetLang:room.theirLang,role:room.role});
}

// ═══ WebRTC ═══
function setupPeerConnection(){
  if(pc)return;
  pc=new RTCPeerConnection({iceServers:[{urls:'stun:stun.l.google.com:19302'}]});
  logDebug('pc_created',{});
  if(videoStream)videoStream.getVideoTracks().forEach(function(t){pc.addTrack(t,videoStream)});
  pc.onicecandidate=function(e){
    if(e.candidate)relaySend({type:'webrtc-signal',transient:true,signal:{candidate:e.candidate}});
  };
  pc.ontrack=function(e){
    remoteStream=e.streams[0]||new MediaStream();
    if(!e.streams[0])remoteStream.addTrack(e.track);
    document.getElementById('remote-video').srcObject=remoteStream;
    document.getElementById('no-video-msg').style.display='none';
    var sb=document.getElementById('solo-banner');if(sb)sb.style.display='none';
    logDebug('pc_ontrack',{kind:e.track&&e.track.kind},'ok');
  };
  pc.onnegotiationneeded=async function(){
    try{
      makingOffer=true;
      await pc.setLocalDescription(await pc.createOffer());
      logDebug('pc_offer_sent',{});
      relaySend({type:'webrtc-signal',transient:true,signal:{description:pc.localDescription}});
    }catch(e){logDebug('pc_offer_err',{msg:String(e)},'error');}
    finally{makingOffer=false}
  };
  pc.onconnectionstatechange=function(){
    logDebug('pc_conn_state',{state:pc.connectionState});
    if(pc.connectionState==='connected')updateConn('connected');
    if(pc.connectionState==='failed'||pc.connectionState==='disconnected')updateConn('disconnected');
  };
  pc.onsignalingstatechange=function(){logDebug('pc_sig_state',{state:pc.signalingState});};
  pc.oniceconnectionstatechange=function(){logDebug('pc_ice_state',{state:pc.iceConnectionState});};
}

async function handleSignal(d){
  if(!d.signal)return;
  if(!pc)setupPeerConnection();
  try{
    if(d.signal.description){
      var desc=d.signal.description;
      var polite=deviceId>d.from;
      var ready=!makingOffer&&(pc.signalingState==='stable'||isSettingRemoteAnswerPending);
      var collision=desc.type==='offer'&&!ready;
      ignoreOffer=!polite&&collision;
      logDebug('signal_desc',{type:desc.type,polite:polite,collision:collision,sigState:pc.signalingState});
      if(ignoreOffer)return;
      isSettingRemoteAnswerPending=desc.type==='answer';
      await pc.setRemoteDescription(desc);
      isSettingRemoteAnswerPending=false;
      if(desc.type==='offer'){
        await pc.setLocalDescription(await pc.createAnswer());
        logDebug('pc_answer_sent',{});
        relaySend({type:'webrtc-signal',transient:true,signal:{description:pc.localDescription}});
      }
    }else if(d.signal.candidate){
      try{await pc.addIceCandidate(d.signal.candidate);logDebug('ice_candidate_added',{});}
      catch(err){if(!ignoreOffer){logDebug('ice_candidate_err',{msg:String(err)},'error');}}
    }
  }catch(err){
    isSettingRemoteAnswerPending=false;
    logDebug('signal_error',{msg:String(err)},'error');
  }
}

// ═══ SUBTITLES ═══
// Keep recognition as continuous to reduce pauses splitting speech unexpectedly.
function startSubtitles(){
  if(!SpeechRec){
    logDebug('speech_unavail',{},'error');
    toast('Live transcript is unavailable on this browser');
    return;
  }
  if(recognizing){logDebug('speech_already_running',{});return}
  if(!micOn){logDebug('speech_skipped_muted',{});return}
  var locale=TTS_LOCALE[room.myLang]||room.myLang;
  logDebug('speech_start',{lang:room.myLang,locale:locale});
  var gen=++speechSessionGen;
  recognizer=new SpeechRec();
  recognizer.lang=locale;
  recognizer.interimResults=true;
  recognizer.continuous=true;
  recognizer.maxAlternatives=1;
  var currentInterimEl=null;
  var latestInterimText='';

  function commitFinalTranscript(finalText){
    finalText=normalizeTranscriptText(finalText);
    if(!finalText)return;
    var finalNow=Date.now();
    if(finalText===speechLastFinalText&&finalNow-speechLastFinalAt<2500){
      logDebug('speech_final_dedup',{text:finalText.slice(0,60)},'warn');
      return;
    }
    speechLastFinalText=finalText;
    speechLastFinalAt=finalNow;
    speechLastInterimText='';
    latestInterimText='';
    speechSawFinal=true;
    speechFirstFinalWarned=false;
    clearSpeechFirstFinalTimer();
    if(!speechFinalStable){
      speechFinalStable=true;
      resetSpeechRetryState('first_final');
    }
    logDebug('speech_final',{text:finalText.slice(0,60)},'ok');
    if(currentInterimEl){currentInterimEl.remove();currentInterimEl=null}
    var srcLang=detectLang(finalText,room.myLang);
    var tgtLang=room.theirLang;
    var subtitleSeq=++localSubtitleSeq;
    showSubtitle(finalText,'mine');
    relaySend({type:'subtitle',subtitleSeq:subtitleSeq,text:finalText,sourceText:finalText,sourceLang:srcLang,targetLang:tgtLang,provisional:true});
    addTranscriptEntry('me',finalText,finalText,srcLang,tgtLang,subtitleSeq);
    translate(finalText,srcLang,tgtLang).then(function(translated){
      translated=normalizeTranscriptText(translated)||finalText;
      if(translated!==finalText){
        relaySend({type:'subtitle-update',subtitleSeq:subtitleSeq,text:translated,sourceText:finalText,sourceLang:srcLang,targetLang:tgtLang});
        showSubtitle(translated,'mine-translation');
        patchTranscriptEntry('me',subtitleSeq,translated,srcLang,tgtLang);
      }
    });
  }

  recognizer.onstart=function(){
    if(gen!==speechSessionGen)return;
    recognizing=true;
    speechSawFinal=false;
    resetSpeechRetryState('onstart');
    clearSpeechFirstFinalTimer();
    speechFirstFinalTimer=setTimeout(function(){
      speechFirstFinalTimer=null;
      if(!speechSawFinal&&recognizing&&micOn&&room.id&&document.getElementById('call-screen').classList.contains('active')){
        logDebug('speech_first_final_timeout',{timeoutSec:4},'warn');
        maybeToastSpeechTimeout();
      }
    },4000);
    logDebug('speech_recognizing',{},'ok');
  };

  recognizer.onresult=function(e){
    if(gen!==speechSessionGen)return;
    var finalText='',interimText='';
    for(var i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal)finalText+=e.results[i][0].transcript;
      else interimText+=e.results[i][0].transcript;
    }
    finalText=normalizeTranscriptText(finalText);
    interimText=normalizeTranscriptText(interimText);
    if(!finalText&&!interimText)return;
    logDebug('speech_result',{interim:interimText.slice(0,40),final:finalText.slice(0,40)});
    if(interimText&&!finalText){
      var now=Date.now();
      if(interimText!==speechLastInterimText&&now-speechLastInterimAt>80){
        speechLastInterimText=interimText;
        speechLastInterimAt=now;
        latestInterimText=interimText;
        if(!currentInterimEl)currentInterimEl=showSubtitle(interimText,'mine interim');
        else currentInterimEl.textContent=interimText;
      }
    }
    if(finalText){
      commitFinalTranscript(finalText);
    }else if(interimText){
      latestInterimText=interimText;
    }
  };

  recognizer.onnomatch=function(){logDebug('speech_nomatch',{},'warn');};

  recognizer.onend=function(){
    if(gen!==speechSessionGen)return;
    if(!speechSawFinal&&latestInterimText){
      logDebug('speech_promote_interim_on_end',{text:latestInterimText.slice(0,60)},'warn');
      commitFinalTranscript(latestInterimText);
    }
    recognizing=false;currentInterimEl=null;
    clearSpeechFirstFinalTimer();
    logDebug('speech_end',{micOn:micOn});
    if(micOn&&room.id&&document.getElementById('call-screen').classList.contains('active')){
      scheduleSpeechRestart(gen,'onend');
    }
  };

  recognizer.onerror=function(e){
    if(gen!==speechSessionGen)return;
    recognizing=false;currentInterimEl=null;
    clearSpeechFirstFinalTimer();
    logDebug('speech_error',{error:e.error},'error');
    if(e.error==='not-allowed')toast('Mic permission needed');
    else if(e.error==='network')toast('Speech: network error');
    else if(e.error==='audio-capture')toast('Transcript cannot start: microphone capture is unavailable.');
    if(e.error!=='not-allowed'&&micOn&&room.id){
      scheduleSpeechRestart(gen,'onerror:'+e.error);
    }
  };

  try{recognizer.start();}
  catch(e){
    logDebug('speech_start_err',{msg:String(e)},'error');
    toast('Transcript cannot start on this device right now.');
  }
}

function stopSubtitles(){
  speechSessionGen++;
  if(speechRetryTimer){clearTimeout(speechRetryTimer);speechRetryTimer=null}
  if(recognizer){try{recognizer.stop()}catch(_){}}
  recognizer=null;recognizing=false;
  speechLastInterimText='';
  speechStableStartedAt=0;
  speechFinalStable=false;
  clearSpeechFirstFinalTimer();
  logDebug('speech_stopped',{});
}

function showSubtitle(text,cls){
  var area=document.getElementById('subtitle-area');
  var el=document.createElement('div');
  el.className='subtitle-line '+cls;el.textContent=text;
  area.appendChild(el);
  var lines=area.querySelectorAll('.subtitle-line:not(.interim):not(.fading)');
  while(lines.length>MAX_VISIBLE_SUBS){lines[0].remove();lines=area.querySelectorAll('.subtitle-line:not(.interim):not(.fading)')}
  if(cls.indexOf('interim')<0){
    var linger=cls.indexOf('translation')>=0?TRANSLATED_SUBTITLE_LINGER_MS:SUBTITLE_LINGER_MS;
    setTimeout(function(){el.classList.add('fading');setTimeout(function(){el.remove()},500)},linger);
  }
  return el;
}

// ═══ TRANSCRIPT ═══
function addTranscriptEntry(who,sourceText,translatedText,srcLang,tgtLang,subtitleSeq){
  sourceText=normalizeTranscriptText(sourceText);
  translatedText=normalizeTranscriptText(translatedText);
  if(!sourceText&&!translatedText)return;
  if(!translatedText)translatedText=sourceText;
  var prev=transcript.length?transcript[transcript.length-1]:null;
  var now=Date.now();
  var shouldMerge=prev&&prev.who===who&&now-prev.ts<2200&&sourceText&&sourceText!==prev.sourceText&&!/[.!?]\s*$/.test(prev.sourceText||'');
  if(shouldMerge){
    prev.sourceText=normalizeTranscriptText((prev.sourceText||'')+' '+sourceText);
    prev.translatedText=prev.sourceText;
    if(srcLang)prev.srcLang=srcLang;
    if(tgtLang)prev.tgtLang=tgtLang;
    if(subtitleSeq&&prev.subtitleSeq!==subtitleSeq){
      if(!Array.isArray(prev.mergedSubtitleSeqs))prev.mergedSubtitleSeqs=[];
      if(prev.subtitleSeq!=null&&prev.mergedSubtitleSeqs.indexOf(prev.subtitleSeq)<0)prev.mergedSubtitleSeqs.push(prev.subtitleSeq);
      if(prev.mergedSubtitleSeqs.indexOf(subtitleSeq)<0)prev.mergedSubtitleSeqs.push(subtitleSeq);
    }
    prev.ts=now;
    saveTranscriptToStorage();
    var ovMerge=document.getElementById('transcript-overlay');
    if(ovMerge&&ovMerge.classList.contains('show'))renderTranscript();
    return;
  }
  if(prev&&prev.who===who&&prev.sourceText===sourceText&&prev.translatedText===translatedText&&now-prev.ts<5000)return;
  var entry={who:who,sourceText:sourceText,translatedText:translatedText,srcLang:srcLang,tgtLang:tgtLang,subtitleSeq:subtitleSeq||null,ts:Date.now()};
  transcript.push(entry);
  var trimmed=false;
  if(transcript.length>MAX_TRANSCRIPT_ENTRIES){transcript.splice(0,transcript.length-MAX_TRANSCRIPT_ENTRIES);trimmed=true;}
  saveTranscriptToStorage();
  var ov=document.getElementById('transcript-overlay');
  if(!ov||!ov.classList.contains('show'))return;
  if(trimmed||transcript.length<=1)renderTranscript();
  else appendTranscriptEntry(entry);
}

function transcriptEntryMatchesSeq(entry,subtitleSeq){
  if(entry.subtitleSeq===subtitleSeq)return true;
  return Array.isArray(entry.mergedSubtitleSeqs)&&entry.mergedSubtitleSeqs.indexOf(subtitleSeq)>=0;
}

function patchTranscriptEntry(who,subtitleSeq,newTranslatedText,srcLang,tgtLang){
  newTranslatedText=normalizeTranscriptText(newTranslatedText);
  if(!newTranslatedText)return;
  for(var i=transcript.length-1;i>=0;i--){
    var entry=transcript[i];
    if(entry.who===who&&transcriptEntryMatchesSeq(entry,subtitleSeq)){
      if(entry.translatedText===newTranslatedText)return;
      entry.translatedText=newTranslatedText;
      if(srcLang)entry.srcLang=srcLang;
      if(tgtLang)entry.tgtLang=tgtLang;
      entry.ts=Date.now();
      saveTranscriptToStorage();
      var ov=document.getElementById('transcript-overlay');
      if(ov&&ov.classList.contains('show'))renderTranscript();
      return;
    }
  }
  addTranscriptEntry(who,newTranslatedText,newTranslatedText,srcLang,tgtLang,subtitleSeq);
}

function toggleTranscript(){
  var ov=document.getElementById('transcript-overlay');
  var call=document.getElementById('call-screen');
  var showing=ov.classList.toggle('show');
  call.classList.toggle('transcript-open',showing);
  if(showing)renderTranscript();
}

function renderTranscriptEntryHtml(e){
  var ts=new Date(e.ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  var who=e.who==='me'?'You':'Partner';
  var sameLang=(!e.translatedText)||(e.sourceText===e.translatedText);
  return '<div class="transcript-entry">'
    +'<div class="transcript-entry-who '+(e.who==='me'?'mine':'')+'">'+who+' · '+(e.srcLang||'').toUpperCase()+' · '+ts+'</div>'
    +'<div class="transcript-entry-text">'+escHtml(e.sourceText)+'</div>'
    +(sameLang?'':'<div class="transcript-entry-translation">→ '+escHtml(e.translatedText)+'</div>')
    +'</div>';
}
function appendTranscriptEntry(entry){
  var body=document.getElementById('transcript-body');
  if(!body)return;
  var nearBottom=(body.scrollHeight-body.scrollTop-body.clientHeight)<40;
  var placeholder=body.querySelector('.transcript-empty');
  if(placeholder)placeholder.remove();
  body.insertAdjacentHTML('beforeend',renderTranscriptEntryHtml(entry));
  var entries=body.querySelectorAll('.transcript-entry');
  while(entries.length>MAX_TRANSCRIPT_RENDER){entries[0].remove();entries=body.querySelectorAll('.transcript-entry')}
  if(nearBottom)body.scrollTop=body.scrollHeight;
}
function renderTranscript(){
  var body=document.getElementById('transcript-body');
  if(!body)return;
  if(!transcript.length){
    body.innerHTML='<div class="transcript-empty" style="color:var(--text-muted);font-size:13px;font-style:italic;">No transcript yet. Speak to see entries appear.</div>';
    return;
  }
  var visible=transcript.slice(-MAX_TRANSCRIPT_RENDER);
  body.innerHTML=visible.map(renderTranscriptEntryHtml).join('');
  body.scrollTop=body.scrollHeight;
}

function copyTranscript(){
  if(!transcript.length){toast('No transcript');return}
  var text=transcript.map(function(e){
    var ts=new Date(e.ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'});
    return '['+ts+'] '+(e.who==='me'?'You':'Partner')+': '+e.sourceText+(e.translatedText&&e.translatedText!==e.sourceText?' → '+e.translatedText:'');
  }).join('\n');
  if(navigator.clipboard)navigator.clipboard.writeText(text).then(function(){toast('Copied')});
}

function exportTranscriptTxt(){
  if(!transcript.length){toast('No transcript');return}
  var text='TalkBridge Transcript\n'+(room.name?room.name+'\n':'')+new Date().toLocaleString()+'\n\n'+
    transcript.map(function(e){
      var ts=new Date(e.ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'});
      return '['+ts+'] '+(e.who==='me'?'You':'Partner')+' ('+((e.srcLang||'?').toUpperCase())+'): '+e.sourceText+
        (e.translatedText&&e.translatedText!==e.sourceText?'\n → ('+((e.tgtLang||'?').toUpperCase())+'): '+e.translatedText:'');
    }).join('\n\n');
  var blob=new Blob([text],{type:'text/plain'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;
  a.download='talkbridge-'+new Date().toISOString().slice(0,10)+'.txt';a.click();
  setTimeout(function(){URL.revokeObjectURL(url)},0);
  toast('TXT exported');
}

function exportPhrasebook(){
  if(!transcript.length){toast('No transcript');return}
  var now=Date.now();
  var catId='tb-'+(room.id||'session').slice(-8);
  var cards=transcript
    .filter(function(e){return e.sourceText&&e.translatedText&&e.sourceText!==e.translatedText})
    .map(function(e){
      return{
        id:uid(),catalogIds:[catId],
        sourceLang:e.srcLang||room.myLang,targetLang:e.tgtLang||room.theirLang,
        source:e.sourceText,target:e.translatedText,
        notes:'',tags:['talkbridge'],
        backtranslate:{sourceLang:e.tgtLang||room.theirLang,targetLang:e.srcLang||room.myLang,
          inputText:e.translatedText,resultText:'',verdict:'',
          contentHash:e.sourceText+'||'+e.translatedText,updatedAt:e.ts},
        clarifyChain:[],
        savedBy:e.who==='me'?'Me (TalkBridge)':'Partner (TalkBridge)',
        createdAt:e.ts,updatedAt:e.ts
      };
    });
  if(!cards.length){toast('No translated phrases to export');return}
  var payload={
    type:'phrasebook',cards:cards,
    catalogs:[{id:catId,name:'TalkBridge '+(room.name||new Date(now).toLocaleDateString()),emoji:'🎙️',desc:'From TalkBridge call',createdAt:now}],
    tags:['talkbridge'],exportedAt:now
  };
  var blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;
  a.download='talkbridge-phrasebook-'+new Date(now).toISOString().slice(0,10)+'.json';a.click();
  setTimeout(function(){URL.revokeObjectURL(url)},0);
  toast('Phrasebook exported');
}

// ═══ CONTROLS ═══
function toggleMic(){
  micOn=!micOn;
  logDebug('mic_toggle',{micOn:micOn});
  resetSpeechRetryState('mic_toggle');
  if(micOn)startSubtitles();
  else{
    speechFirstFinalWarned=false;
    stopSubtitles();
  }
  syncMicUi();
}
function toggleCam(){
  if(!videoStream)return;
  camOn=!camOn;
  videoStream.getVideoTracks().forEach(function(t){t.enabled=camOn});
  syncCamUi();
}
function toggleVideoFocus(){
  var remote=document.getElementById('remote-video');
  if(!remote||!remote.srcObject){return}
  document.querySelector('.call-videos').classList.toggle('swapped');
}
function hangUp(){relaySend({type:'hangup'});cleanUp();}

function cleanUp(){
  logDebug('cleanup_start',{room:room.id});
  resetSpeechRetryState('cleanup');
  clearTimeout(wsReconnectTimer);wsReconnectTimer=null;
  saveTranscriptToStorage();
  stopSubtitles();
  if(videoStream){videoStream.getTracks().forEach(function(t){t.stop()});videoStream=null}
  if(pc){pc.close();pc=null}
  var rid=room.id;room.id=null;room.solo=false;
  stopHeartbeat();
  speechFirstFinalWarned=false;
  if(ws){try{ws.close()}catch(_){}}ws=null;
  document.getElementById('call-screen').classList.remove('active');
  document.getElementById('call-screen').classList.remove('transcript-open');
  document.getElementById('lobby').classList.remove('hidden');
  setLobbyState(LOBBY_STATE.setup);
  document.getElementById('transcript-overlay').classList.remove('show');
  document.getElementById('subtitle-area').innerHTML='';
  document.getElementById('no-video-msg').style.display='';
  var videos=document.querySelector('.call-videos');
  if(videos)videos.classList.remove('swapped');
  remoteStream=null;transcript=[];
  micOn=true;camOn=true;syncMicUi();syncCamUi();
  callHistoryPushed=false;
  renderRecentRooms();
  logDebug('cleanup_done',{room:rid},'ok');
}

// ═══ INIT ═══
populateLangs();
renderRecentRooms();
syncMicUi();
syncCamUi();
logDebug('app_init',{deviceId:deviceId,ua:navigator.userAgent,speechRec:!!SpeechRec,tls:location.protocol==='https:'||location.hostname==='localhost'},'ok');

var hp=new URLSearchParams((location.hash||'').replace(/^#/,''));
var inv=hp.get('j');
if(inv){
  var payload=decodeInvite(inv);
  if(payload&&payload.r)handleInviteHash(payload);
}

window.addEventListener('popstate',function(){
  if(lobbyState===LOBBY_STATE.call&&room.id){
    hangUp();
    history.pushState({tbView:'lobby'},'',location.href);
    return;
  }
  if(lobbyState===LOBBY_STATE.waiting&&room.role==='creator')setLobbyState(LOBBY_STATE.setup);
});
window.addEventListener('pagehide',function(){
  if(room.id){saveTranscriptToStorage();relaySend({type:'hangup',reason:'pagehide'});}
});
document.addEventListener('visibilitychange',function(){
  logDebug('visibility',{state:document.visibilityState});
});
