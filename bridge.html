<!DOCTYPE html>
<!-- talkbridge · 2026-04-09 · clean rebuild: Media→Transport→Transcribe→Translate -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<title>TalkBridge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Lora:wght@500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0a0a0a;--surface:#161616;--surface2:#222;
  --teal:#2E8B8B;--teal-bright:#3FC1C1;
  --text:#e8e4df;--text-dim:#888;--text-muted:#555;
  --red:#e74c3c;--green:#2ecc71;
  --radius:14px;
}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:"DM Sans",sans-serif;color:var(--text);}
.lobby{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;z-index:10;background:var(--bg);transition:opacity .3s;overflow-y:auto;}
.lobby.hidden{opacity:0;pointer-events:none;}
.lobby-card{width:min(100%,380px);display:flex;flex-direction:column;gap:16px;}
.lobby-brand{font-family:"Lora",serif;font-size:32px;font-weight:600;color:var(--teal-bright);text-align:center;letter-spacing:-0.5px;}
.lobby-sub{font-size:13px;color:var(--text-dim);text-align:center;margin-top:-8px;}
.lobby-label{font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:-8px;}
.lobby-input{width:100%;background:var(--surface);color:var(--text);border:1.5px solid var(--surface2);border-radius:10px;padding:12px 14px;font-size:15px;font-family:"DM Sans",sans-serif;outline:none;}
.lobby-input:focus{border-color:var(--teal);}
.lobby-input::placeholder{color:var(--text-muted);}
.lobby-select{width:100%;background:var(--surface);color:var(--text);border:1.5px solid var(--surface2);border-radius:10px;padding:12px 14px;font-size:15px;font-family:"DM Sans",sans-serif;outline:none;-webkit-appearance:none;appearance:none;cursor:pointer;}
.lobby-select:focus{border-color:var(--teal);}
.lobby-btn{width:100%;background:var(--teal);color:#fff;border:none;border-radius:12px;padding:14px;font-size:16px;font-weight:600;cursor:pointer;font-family:"DM Sans",sans-serif;transition:opacity .15s;margin-top:4px;}
.lobby-btn:hover{opacity:.85;}
.lobby-btn:disabled{opacity:.4;cursor:default;}
.lobby-btn.secondary{background:var(--surface2);color:var(--text);}
.lobby-btn.secondary:hover{background:var(--teal);color:#fff;opacity:1;}
.lobby-link-box{background:var(--surface);border:1.5px solid var(--surface2);border-radius:10px;padding:12px;word-break:break-all;font-size:11px;color:var(--teal-bright);margin-bottom:12px;cursor:pointer;}
.lobby-link-row{display:flex;gap:8px;}
.lobby-link-btn{flex:1;background:var(--surface2);color:var(--text);border:none;border-radius:10px;padding:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:"DM Sans",sans-serif;}
.lobby-link-btn:hover{background:var(--teal);color:#fff;}
.lobby-preview{width:min(100%,280px);aspect-ratio:16/9;border-radius:var(--radius);overflow:hidden;background:var(--surface);margin:0 auto 8px;}
.lobby-preview video{width:100%;height:100%;object-fit:cover;transform:scaleX(-1);}
.recent-rooms{margin-top:6px;display:flex;flex-direction:column;gap:8px;}
.recent-title{font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.6px;}
.recent-item{background:var(--surface);border:1px solid var(--surface2);border-radius:10px;padding:10px 12px;}
.recent-item-top{display:flex;align-items:center;gap:8px;}
.recent-open{flex:1;min-width:0;background:none;border:none;color:var(--text);text-align:left;cursor:pointer;font:inherit;font-size:14px;font-weight:500;}
.recent-open small{display:block;color:var(--text-dim);font-size:11px;}
.recent-actions{display:flex;gap:6px;margin-top:8px;}
.recent-act{flex:1;background:rgba(255,255,255,.06);color:var(--text-dim);border:none;border-radius:8px;padding:6px;font-size:11px;font-weight:600;cursor:pointer;font-family:"DM Sans",sans-serif;}
.recent-act:hover{background:var(--teal);color:#fff;}
.recent-act.danger{color:var(--red);}
.recent-act.danger:hover{background:var(--red);color:#fff;}
.lobby-footer{display:flex;gap:8px;margin-top:4px;}
.lobby-footer-btn{flex:1;background:none;border:1px solid var(--surface2);border-radius:8px;color:var(--text-dim);padding:8px;font-size:12px;cursor:pointer;font-family:"DM Sans",sans-serif;}
.lobby-footer-btn:hover{background:var(--surface2);color:var(--text);}
.joining-screen{position:fixed;inset:0;background:var(--bg);z-index:20;display:none;align-items:center;justify-content:center;flex-direction:column;gap:16px;}
.joining-screen.show{display:flex;}
.joining-spinner{width:40px;height:40px;border:3px solid var(--surface2);border-top-color:var(--teal-bright);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.joining-label{font-size:14px;color:var(--text-dim);}
.log-overlay{position:fixed;inset:0;background:rgba(0,0,0,.96);z-index:50;display:none;flex-direction:column;}
.log-overlay.show{display:flex;}
.log-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--surface2);flex-shrink:0;gap:8px;flex-wrap:wrap;}
.log-title{font-family:"Lora",serif;font-size:17px;color:var(--teal-bright);}
.log-actions{display:flex;gap:6px;flex-wrap:wrap;}
.log-btn{background:var(--surface2);color:var(--text);border:none;border-radius:8px;padding:7px 12px;font-size:12px;font-weight:600;cursor:pointer;font-family:"DM Sans",sans-serif;}
.log-btn:hover{background:var(--teal);color:#fff;}
.log-body{flex:1;overflow-y:auto;padding:10px 16px 20px;font-family:monospace;font-size:11px;line-height:1.7;color:#aaa;}
.log-row{border-bottom:1px solid rgba(255,255,255,.03);padding:1px 0;}
.log-row .ts{color:#555;}.log-row .ev{color:var(--teal-bright);}
.log-row.error .ev{color:#e74c3c;}.log-row.warn .ev{color:#f39c12;}.log-row.ok .ev{color:#2ecc71;}
.call{position:fixed;inset:0;background:#000;z-index:5;display:none;flex-direction:column;}
.call.active{display:flex;}
.call-videos{position:relative;background:#000;overflow:hidden;flex:1;min-height:0;}
#remote-video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;background:#000;z-index:1;}
#local-video{position:absolute;top:8px;right:8px;width:min(24%,120px);aspect-ratio:16/9;border-radius:8px;object-fit:cover;transform:scaleX(-1);border:2px solid rgba(255,255,255,.2);box-shadow:0 2px 12px rgba(0,0,0,.5);z-index:3;background:var(--surface);}
.no-video-placeholder{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:48px;color:var(--text-muted);z-index:1;}
.solo-banner{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:2;text-align:center;pointer-events:none;}
.solo-banner-text{background:rgba(0,0,0,.6);color:var(--text-dim);font-size:13px;padding:8px 18px;border-radius:20px;backdrop-filter:blur(6px);}
.subtitle-area{position:absolute;bottom:0;left:0;right:0;z-index:4;padding:8px 14px 10px;pointer-events:none;display:flex;flex-direction:column;align-items:center;gap:4px;background:linear-gradient(transparent,rgba(0,0,0,.6) 40%);}
.subtitle-line{max-width:94%;padding:4px 12px;border-radius:6px;font-size:14px;line-height:1.35;text-align:center;word-break:break-word;}
.subtitle-line.partner{background:rgba(0,0,0,.6);color:#fff;}
.subtitle-line.mine{background:rgba(46,139,139,.2);color:rgba(255,255,255,.65);font-size:12px;}
.partner-speaking-indicator{position:absolute;right:12px;bottom:56px;z-index:5;min-width:34px;height:24px;border-radius:999px;background:rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.2);color:#fff;display:none;align-items:center;justify-content:center;font-size:18px;font-weight:700;line-height:1;backdrop-filter:blur(4px);}
.partner-speaking-indicator.show{display:flex;animation:pulseSpeak .9s ease-in-out infinite alternate;}
@keyframes pulseSpeak{from{opacity:.55;transform:scale(.98)}to{opacity:1;transform:scale(1.03)}}
.call-transcript{position:relative;flex:0 0 30%;min-height:0;max-height:45%;overflow-y:auto;background:var(--bg);border-top:1px solid var(--surface2);padding:0 12px;transition:flex-basis .2s ease;}
.call-transcript-header{display:flex;align-items:center;justify-content:flex-start;padding:8px 0;position:sticky;top:0;background:var(--bg);z-index:1;gap:8px;}
.call-transcript-title{font-size:12px;font-weight:700;color:var(--text-dim);letter-spacing:.3px;}
.call-transcript-actions{display:flex;gap:6px;}
.call-transcript-btn{width:24px;height:24px;display:flex;align-items:center;justify-content:center;background:transparent;color:#8f959d;border:1px solid rgba(255,255,255,.18);border-radius:7px;cursor:pointer;padding:0;}
.call-transcript-btn:hover{background:rgba(255,255,255,.06);color:#b6bcc3;border-color:rgba(255,255,255,.26);}
.call-transcript-btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.call.transcript-collapsed .chevron-down{display:none;}
.call:not(.transcript-collapsed) .chevron-right{display:none;}
.transcript-more-indicator{position:absolute;right:6px;top:50%;transform:translateY(-50%);z-index:3;width:22px;height:22px;border-radius:999px;background:rgba(46,139,139,.2);color:var(--teal-bright);border:1px solid rgba(63,193,193,.35);display:none;align-items:center;justify-content:center;font-size:14px;font-weight:700;pointer-events:none;}
.transcript-more-indicator.show{display:flex;}
.call.transcript-collapsed .call-transcript{flex:0 0 32px;max-height:32px;overflow:hidden;}
.call.transcript-collapsed #transcript-body{display:none;}
.call-videos.swapped #remote-video{top:8px;right:8px;left:auto;bottom:auto;width:min(24%,120px);height:auto;aspect-ratio:16/9;border-radius:8px;border:2px solid rgba(255,255,255,.2);box-shadow:0 2px 12px rgba(0,0,0,.5);z-index:3;}
.call-videos.swapped #local-video{inset:0;width:100%;height:100%;border-radius:0;border:none;box-shadow:none;z-index:1;}
.tr-entry{padding:6px 0;}
.tr-bubble{border:1px solid rgba(255,255,255,.14);border-radius:12px;overflow:hidden;background:rgba(255,255,255,.02);}
.tr-head{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:6px 10px;border-bottom:1px solid rgba(255,255,255,.08);font-size:11px;}
.tr-who{font-weight:700;color:var(--text-dim);}
.tr-who.mine{color:var(--teal-bright);}
.tr-time{font-size:10px;color:var(--text-muted);font-variant-numeric:tabular-nums;}
.tr-body{display:grid;grid-template-columns:1fr 1px 1fr;}
.tr-col{padding:8px 10px;display:flex;flex-direction:column;gap:6px;min-width:0;}
.tr-divider{background:rgba(255,255,255,.08);}
.tr-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;color:var(--text-muted);}
.tr-text{font-size:13px;line-height:1.4;color:var(--text);word-break:break-word;}
.tr-col.source .tr-text{color:var(--text-dim);}
.tr-tts{border:none;background:transparent;color:#8f959d;cursor:pointer;padding:0;display:flex;align-items:center;gap:4px;font-size:10px;line-height:1;}
.tr-tts:hover{color:#c4ccd4;}
.tr-tts svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.tr-empty{color:var(--text-muted);font-size:12px;font-style:italic;padding:12px 0;}
.call-controls{display:flex;align-items:center;justify-content:center;gap:14px;padding:8px 16px max(8px,env(safe-area-inset-bottom));background:var(--surface);flex-shrink:0;}
.ctrl-btn{width:48px;height:48px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s,transform .1s;background:rgba(255,255,255,.1);color:#fff;}
.ctrl-btn:hover{background:rgba(255,255,255,.18);}
.ctrl-btn:active{transform:scale(.93);}
.ctrl-btn.off{background:rgba(231,76,60,.2);color:var(--red);}
.ctrl-btn.end-call{background:var(--red);color:#fff;width:56px;height:48px;border-radius:24px;}
.ctrl-btn.end-call:hover{background:#c0392b;}
#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(255,255,255,.15);backdrop-filter:blur(12px);color:#fff;font-size:13px;font-weight:600;padding:10px 20px;border-radius:22px;z-index:100;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
@media(min-width:768px){
  .lobby-card{width:420px;}
  #local-video{width:min(18%,160px);}
  .call-controls{gap:20px;padding:10px 24px;}
  .ctrl-btn{width:54px;height:54px;}
  .ctrl-btn.end-call{width:64px;height:54px;}
  .subtitle-line{font-size:16px;max-width:80%;}
  .call-transcript{flex-basis:28%;}
}
@media(max-height:500px) and (orientation:landscape){
  .call-transcript{flex-basis:34%;}
  #local-video{width:min(16%,90px);top:6px;right:6px;}
  .call-controls{gap:10px;padding:6px 12px;}
  .ctrl-btn{width:40px;height:40px;}
  .ctrl-btn.end-call{width:48px;height:40px;}
  .subtitle-line{font-size:12px;padding:3px 8px;}
}
@media(max-width:400px){
  .call-controls{gap:10px;}
  .ctrl-btn{width:44px;height:44px;}
  .ctrl-btn.end-call{width:52px;height:44px;}
}
</style>
</head>
<body>

<div class="lobby" id="lobby">
  <div class="lobby-card">
    <div class="lobby-brand">TalkBridge</div>
    <div class="lobby-sub">Video call with live subtitles</div>
    <div id="lobby-setup">
      <div style="display:flex;flex-direction:column;gap:12px;">
        <div><div class="lobby-label" style="margin-bottom:6px;">Room name (optional)</div>
        <input class="lobby-input" id="room-name" placeholder="e.g. English ↔ Thai session" maxlength="60"></div>
        <div><div class="lobby-label" style="margin-bottom:6px;">I speak</div>
        <select class="lobby-select" id="my-lang"></select></div>
        <div><div class="lobby-label" style="margin-bottom:6px;">They speak</div>
        <select class="lobby-select" id="their-lang"></select></div>
        <button class="lobby-btn" id="create-btn" onclick="createRoom()" disabled>Start a room</button>
      </div>
      <div class="recent-rooms" id="recent-rooms" style="display:none;">
        <div class="recent-title">Recent rooms</div>
        <div id="recent-rooms-list"></div>
      </div>
      <div class="lobby-footer">
        <button class="lobby-footer-btn" onclick="openLog()">🪲 Debug log</button>
      </div>
    </div>
    <div id="lobby-waiting" style="display:none;">
      <div class="lobby-preview"><video id="preview-video" autoplay muted playsinline></video></div>
      <div style="font-size:14px;color:var(--text-dim);text-align:center;margin-bottom:10px;" id="room-name-display"></div>
      <div class="lobby-link-box" id="lobby-link" onclick="copyLink()">—</div>
      <div class="lobby-link-row">
        <button class="lobby-link-btn" onclick="copyLink()">Copy link</button>
        <button class="lobby-link-btn" onclick="shareLink()">Share</button>
      </div>
      <button class="lobby-btn secondary" style="margin-top:8px;" onclick="backToSetup()">← Back</button>
    </div>
  </div>
</div>

<div class="joining-screen" id="joining-screen">
  <div class="joining-spinner"></div>
  <div class="joining-label">Joining call…</div>
</div>

<div class="log-overlay" id="log-overlay">
  <div class="log-header">
    <span class="log-title">🪲 Debug Log</span>
    <div class="log-actions">
      <button class="log-btn" onclick="copyLogText()">Copy</button>
      <button class="log-btn" onclick="clearLogText()">Clear</button>
      <button class="log-btn" onclick="closeLog()">✕ Close</button>
    </div>
  </div>
  <div class="log-body" id="log-body"></div>
</div>

<div class="log-overlay" id="room-tr-overlay">
  <div class="log-header">
    <span class="log-title" id="room-tr-title">Transcript</span>
    <div class="log-actions">
      <button class="log-btn" onclick="copyRoomTr()">Copy</button>
      <button class="log-btn" onclick="closeRoomTr()">✕ Close</button>
    </div>
  </div>
  <div class="log-body" id="room-tr-body" style="font-family:'DM Sans',sans-serif;font-size:13px;"></div>
</div>

<div class="call" id="call-screen">
  <div class="call-videos" id="call-videos">
    <video id="remote-video" autoplay playsinline></video>
    <video id="local-video" autoplay muted playsinline></video>
    <div class="no-video-placeholder" id="no-video-msg">👤</div>
    <div class="solo-banner" id="solo-banner" style="display:none;"><div class="solo-banner-text">Waiting for partner…</div></div>
    <div class="partner-speaking-indicator" id="partner-speaking-indicator" aria-hidden="true">…</div>
    <div class="subtitle-area" id="subtitle-area"></div>
  </div>
  <div class="call-controls">
    <button class="ctrl-btn" id="mic-btn" onclick="toggleMic()" title="Mute/unmute">
      <svg id="mic-on" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
      <svg id="mic-off" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/><line x1="2" y1="22" x2="22" y2="2" stroke="#e74c3c" stroke-width="2.5"/></svg>
    </button>
    <button class="ctrl-btn end-call" onclick="hangUp()" title="End call">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M10.68 13.31a16 16 0 0 0 3.41 2.6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6A19.79 19.79 0 0 1 2.12 4.11 2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 2.59 3.4z" transform="rotate(135 12 12)"/></svg>
    </button>
    <button class="ctrl-btn" id="cam-btn" onclick="toggleCam()" title="Camera">
      <svg id="cam-on" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
      <svg id="cam-off" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/><line x1="2" y1="22" x2="22" y2="2" stroke="#e74c3c" stroke-width="2.5"/></svg>
    </button>
  </div>
  <div class="call-transcript" id="call-transcript">
    <div class="call-transcript-header">
      <div class="call-transcript-actions">
        <button class="call-transcript-btn" id="transcript-toggle-btn" onclick="toggleTranscript()" title="Collapse transcript" aria-label="Collapse transcript" aria-expanded="true">
          <svg class="chevron-down" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>
          <svg class="chevron-right" viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg>
        </button>
        <button class="call-transcript-btn" id="transcript-tts-toggle" onclick="toggleTranscriptTts()" title="TTS off" aria-pressed="false">
          <svg class="tts-on" viewBox="0 0 24 24"><path d="M4 10h4l5-4v12l-5-4H4z"/><path d="M16 9a4 4 0 0 1 0 6"/><path d="M18 7a7 7 0 0 1 0 10"/></svg>
          <svg class="tts-off" viewBox="0 0 24 24"><path d="M4 10h4l5-4v12l-5-4H4z"/><line x1="3" y1="21" x2="21" y2="3" stroke="#e74c3c" stroke-width="2.5"/></svg>
        </button>
        <button class="call-transcript-btn" onclick="shareLink()" title="Share invite">
          <svg viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.8 10.8l6.4-3.6M8.8 13.2l6.4 3.6"/></svg>
        </button>
        <button class="call-transcript-btn" onclick="copyTr()" title="Copy transcript">
          <svg viewBox="0 0 24 24"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10"/></svg>
        </button>
        <button class="call-transcript-btn" onclick="exportTxt()" title="Download transcript">
          <svg viewBox="0 0 24 24"><path d="M12 3v11"/><path d="M8 10l4 4 4-4"/><path d="M4 20h16"/></svg>
        </button>
      </div>
      <span class="call-transcript-title" id="transcript-ribbon-title">Transcript</span>
    </div>
    <div id="transcript-body"><div class="tr-empty">Speak to see transcript here.</div></div>
    <div class="transcript-more-indicator" id="transcript-more-indicator" aria-hidden="true">↓</div>
  </div>
</div>

<script>
'use strict';

// ═══════════════════════════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════════════════════════
var RELAY_WS='wss://talk-signal.myacctfortracking.workers.dev/signal';
var RELAY_APP='talk-say-v1';
var HEARTBEAT_MS=25000,SUB_LINGER=5000,MAX_TR=300,DEDUP_MS=4000;
var RK='tb_recent_rooms',TP='tb_transcript_',RL=12;
var LANGS=[
  {code:'en',label:'English',flag:'🇺🇸'},{code:'th',label:'Thai',flag:'🇹🇭'},
  {code:'es',label:'Spanish',flag:'🇪🇸'},{code:'ja',label:'Japanese',flag:'🇯🇵'},
  {code:'ko',label:'Korean',flag:'🇰🇷'},{code:'zh',label:'Chinese (Mandarin)',flag:'🇨🇳'},
  {code:'ar',label:'Arabic',flag:'🇸🇦'},{code:'hi',label:'Hindi',flag:'🇮🇳'},
  {code:'ru',label:'Russian',flag:'🇷🇺'},{code:'fr',label:'French',flag:'🇫🇷'},
  {code:'de',label:'German',flag:'🇩🇪'},{code:'it',label:'Italian',flag:'🇮🇹'},
  {code:'pt',label:'Portuguese',flag:'🇧🇷'},{code:'vi',label:'Vietnamese',flag:'🇻🇳'},
  {code:'id',label:'Indonesian',flag:'🇮🇩'},{code:'ms',label:'Malay',flag:'🇲🇾'},
  {code:'fil',label:'Filipino',flag:'🇵🇭'},{code:'nl',label:'Dutch',flag:'🇳🇱'},
  {code:'sv',label:'Swedish',flag:'🇸🇪'},{code:'pl',label:'Polish',flag:'🇵🇱'},
  {code:'tr',label:'Turkish',flag:'🇹🇷'}
];
var TTS_LOCALE={en:'en-US',th:'th-TH',ja:'ja-JP',ko:'ko-KR',zh:'zh-CN',ar:'ar-SA',hi:'hi-IN',ru:'ru-RU',fr:'fr-FR',de:'de-DE',es:'es-ES',it:'it-IT',pt:'pt-BR',vi:'vi-VN',id:'id-ID',ms:'ms-MY',fil:'fil-PH',nl:'nl-NL',sv:'sv-SE',pl:'pl-PL',tr:'tr-TR'};

// ═══════════════════════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════════════════════
function $(id){return document.getElementById(id)}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,8)}
function esc(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
function norm(s){return(s||'').replace(/\s+/g,' ').trim()}
function gL(c){c=(c||'').toLowerCase();for(var i=0;i<LANGS.length;i++)if(LANGS[i].code===c)return LANGS[i];return{code:c||'?',label:(c||'?').toUpperCase(),flag:'🌐'}}
function detectLang(t,fb){t=(t||'').trim();if(!t)return fb||'en';if(/[฀-๿]/.test(t))return'th';if(/[぀-ヿ]/.test(t))return'ja';if(/[一-鿿]/.test(t))return'zh';if(/[가-힯]/.test(t))return'ko';if(/[؀-ۿ]/.test(t))return'ar';return fb||'en'}
function toast(m){var e=$('toast');e.textContent=m;e.classList.add('show');clearTimeout(toast._t);toast._t=setTimeout(function(){e.classList.remove('show')},2500)}

var _debugLog=[];
function log(ev,d,l){
  var r={ts:new Date().toISOString(),ev:ev,d:d||{},l:l||'info'};
  _debugLog.push(r);if(_debugLog.length>500)_debugLog.shift();
  var b=$('log-body');if(!b)return;
  var div=document.createElement('div');div.className='log-row '+(l||'info');
  div.innerHTML='<span class="ts">'+r.ts.slice(11,23)+'</span> <span class="ev">'+esc(ev)+'</span> '+esc(JSON.stringify(d||{}));
  b.appendChild(div);b.scrollTop=b.scrollHeight;
}
function openLog(){log('log_open',{speech:!!SpeechRec});$('log-overlay').classList.add('show')}
function closeLog(){$('log-overlay').classList.remove('show')}
function clearLogText(){_debugLog=[];$('log-body').innerHTML='';toast('Cleared')}
function copyLogText(){var t=_debugLog.map(function(r){return r.ts+' ['+r.ev+'] '+JSON.stringify(r.d)}).join('\n');if(navigator.clipboard)navigator.clipboard.writeText(t).then(function(){toast('Copied')})}

// ═══════════════════════════════════════════════════════════════════
// MODULE: MEDIA
// Owns the single getUserMedia call. All other modules receive the
// stream from here — nothing else calls getUserMedia.
// Mute gates track.enabled only; does not affect SpeechRecognition.
// ═══════════════════════════════════════════════════════════════════
var Media=(function(){
  var _stream=null;

  function init(){
    if(_stream)return Promise.resolve(_stream);
    return navigator.mediaDevices.getUserMedia({audio:true,video:true})
      .then(function(s){
        _stream=s;
        log('media_init',{tracks:s.getTracks().map(function(t){return t.kind+':'+t.readyState})},'ok');
        return s;
      });
  }

  function stream(){return _stream;}

  // Mute audio track — CC (SpeechRecognition) is unaffected
  function muteAudio(muted){
    if(_stream)_stream.getAudioTracks().forEach(function(t){t.enabled=!muted;});
  }

  function muteVideo(muted){
    if(_stream)_stream.getVideoTracks().forEach(function(t){t.enabled=!muted;});
  }

  function stop(){
    if(_stream){_stream.getTracks().forEach(function(t){t.stop();});_stream=null;}
    log('media_stop',{});
  }

  return {init:init,stream:stream,muteAudio:muteAudio,muteVideo:muteVideo,stop:stop};
})();

// ═══════════════════════════════════════════════════════════════════
// MODULE: TRANSLATE
// Pure text-in/text-out. Cache only, no side effects.
// ═══════════════════════════════════════════════════════════════════
var Translate=(function(){
  var _cache=new Map();

  function text(t,from,to){
    if(!t||!from||!to||from===to)return Promise.resolve(t);
    var k=from+'|'+to+'|'+t;
    if(_cache.has(k))return Promise.resolve(_cache.get(k));
    return fetch('https://api.mymemory.translated.net/get?q='+encodeURIComponent(t)+'&langpair='+from+'|'+to)
      .then(function(r){return r.json()})
      .then(function(d){
        if(d&&d.responseStatus===200&&d.responseData){
          var out=d.responseData.translatedText;
          if(out&&out.indexOf('MYMEMORY')<0){_cache.set(k,out);return out;}
        }
        return t;
      }).catch(function(){return t;});
  }

  return {text:text};
})();

// ═══════════════════════════════════════════════════════════════════
// MODULE: TRANSCRIBE
// Receives stream from Media. Uses finals only — no interim results.
// Handles restart/backoff independently. Fires onFinal(text, lang).
// Knows nothing about Transport, UI, or translation.
// ═══════════════════════════════════════════════════════════════════
var SpeechRec=window.SpeechRecognition||window.webkitSpeechRecognition;
var Transcribe=(function(){
  var _active=false,_lang='en',_gen=0;
  var _rec=null,_recognizing=false;
  var _restartTimer=null,_backoff=500,_endBurst=[],_blockedUntil=0;
  var _recentFinals=[];
  var _onFinalCb=null;

  function onFinal(fn){_onFinalCb=fn;}

  function start(lang){
    if(!SpeechRec){toast('Live CC unavailable');return;}
    _lang=lang||'en';
    _active=true;
    _recentFinals=[];_endBurst=[];_backoff=500;_blockedUntil=0;
    log('transcribe_start',{lang:_lang});
    _attempt();
  }

  function stop(){
    _active=false;
    _gen++;
    if(_restartTimer){clearTimeout(_restartTimer);_restartTimer=null;}
    if(_rec)try{_rec.stop();}catch(_){}
    _rec=null;_recognizing=false;
    log('transcribe_stop',{});
  }

  function _isDupe(text){
    var now=Date.now(),lo=text.toLowerCase();
    _recentFinals=_recentFinals.filter(function(f){return now-f.t<DEDUP_MS;});
    for(var i=0;i<_recentFinals.length;i++){
      var p=_recentFinals[i].s;
      if(p===lo)return true;
      if(p.length>5&&lo.length>5&&(p.indexOf(lo)>=0||lo.indexOf(p)>=0))return true;
    }
    return false;
  }

  function _record(text){
    _recentFinals.push({s:text.toLowerCase(),t:Date.now()});
    if(_recentFinals.length>5)_recentFinals.shift();
  }

  function _schedule(delay){
    if(_restartTimer)clearTimeout(_restartTimer);
    _restartTimer=setTimeout(function(){
      _restartTimer=null;
      if(_active&&!_recognizing&&Date.now()>=_blockedUntil)_attempt();
    },delay);
  }

  function _attempt(){
    if(!SpeechRec||!_active||_recognizing||Date.now()<_blockedUntil)return;
    var gen=++_gen;
    var locale=TTS_LOCALE[_lang]||_lang||'en-US';
    _rec=new SpeechRec();
    _rec.lang=locale;
    _rec.interimResults=false;  // finals only — eliminates stutter/duplication
    _rec.continuous=true;
    _rec.maxAlternatives=1;

    _rec.onstart=function(){
      if(gen!==_gen)return;
      _recognizing=true;_backoff=500;_endBurst=[];
      log('transcribe_active',{locale:locale},'ok');
    };

    _rec.onresult=function(e){
      if(gen!==_gen)return;
      var text='';
      for(var i=e.resultIndex;i<e.results.length;i++){
        if(e.results[i].isFinal)text+=e.results[i][0].transcript;
      }
      text=norm(text);
      if(!text)return;
      if(_isDupe(text)){log('transcribe_dedup',{t:text.slice(0,40)},'warn');return;}
      _record(text);
      log('transcribe_final',{t:text.slice(0,60)},'ok');
      if(_onFinalCb)_onFinalCb(text,_lang);
    };

    _rec.onend=function(){
      if(gen!==_gen)return;
      _recognizing=false;_rec=null;
      if(!_active)return;
      var now=Date.now();
      _endBurst=_endBurst.filter(function(t){return now-t<8000;});
      _endBurst.push(now);
      if(_endBurst.length>=5){
        _blockedUntil=now+20000;
        log('transcribe_blocked',{sec:20},'warn');
        _schedule(20000);
        return;
      }
      _backoff=Math.min(_backoff*1.4,4000);
      _schedule(Math.max(1500,_backoff));
    };

    _rec.onerror=function(e){
      if(gen!==_gen)return;
      _recognizing=false;_rec=null;
      if(e.error==='not-allowed'||e.error==='service-not-allowed'){
        _blockedUntil=Date.now()+15000;
        toast('Mic permission needed');
        log('transcribe_denied',{},'error');
        return;
      }
      log('transcribe_err',{e:e.error},'warn');
      if(_active)_schedule(2000);
    };

    try{_rec.start();}catch(e){
      _recognizing=false;_rec=null;
      log('transcribe_start_fail',{e:String(e)},'error');
      if(_active)_schedule(1000);
    }
  }

  return {start:start,stop:stop,onFinal:onFinal};
})();

// ═══════════════════════════════════════════════════════════════════
// MODULE: TRANSPORT
// Owns WebSocket relay + WebRTC peer connection.
// Receives stream from Media. Implements perfect negotiation for
// glare handling. Fires callbacks to UI layer only.
// ═══════════════════════════════════════════════════════════════════
var Transport=(function(){
  var _ws=null,_pc=null,_room=null,_stream=null;
  var _makingOffer=false,_ignoreOffer=false;
  var _seq=0,_hbTimer=null,_reconnTimer=null;
  var _remoteStream=null;
  var _deviceId=localStorage.getItem('tb_dev')||(function(){
    var id=crypto.randomUUID();localStorage.setItem('tb_dev',id);return id;
  })();

  var _cbRemoteStream=null,_cbConnected=null,_cbDisconnected=null,_cbMessage=null;

  function onRemoteStream(fn){_cbRemoteStream=fn;}
  function onConnected(fn){_cbConnected=fn;}
  function onDisconnected(fn){_cbDisconnected=fn;}
  function onMessage(fn){_cbMessage=fn;}
  function deviceId(){return _deviceId;}

  function init(room,stream){
    _room=room;
    _stream=stream;
    _connectWS();
  }

  function send(msg){
    if(!_ws||_ws.readyState!==1)return;
    msg.session=_room.id;msg.from=_deviceId;msg.ts=Date.now();msg.seq=++_seq;
    try{_ws.send(JSON.stringify(msg));}catch(_){}
  }

  function _connectWS(){
    if(_ws)try{_ws.close();}catch(_){}
    var ws=new WebSocket(RELAY_WS+'?app='+encodeURIComponent(RELAY_APP)+'&session='+encodeURIComponent(_room.id)+'&client='+encodeURIComponent(_deviceId));
    _ws=ws;
    ws.onopen=function(){
      log('transport_ws_open',{role:_room.role},'ok');
      send({type:'hello',lang:_room.myLang,targetLang:_room.theirLang,role:_room.role});
      _startHB();
      // Setup WebRTC only after relay confirmed open — prevents offer-before-relay race
      if(!_pc)_setupPC();
    };
    ws.onmessage=function(e){try{_onMsg(JSON.parse(e.data));}catch(_){}};
    ws.onclose=function(ev){
      if(_ws!==ws)return;
      log('transport_ws_close',{code:ev.code},'warn');
      _stopHB();
      clearTimeout(_reconnTimer);
      if(_room&&_room.id)_reconnTimer=setTimeout(_connectWS,2000);
    };
    ws.onerror=function(){log('transport_ws_err',{},'error');};
  }

  function _startHB(){_stopHB();_hbTimer=setInterval(function(){send({type:'ping',transient:true});},HEARTBEAT_MS);}
  function _stopHB(){if(_hbTimer){clearInterval(_hbTimer);_hbTimer=null;}}

  function _onMsg(d){
    if(!d||d.from===_deviceId)return;
    if(d.type==='ping'){send({type:'pong',transient:true});return;}
    if(d.type==='pong')return;
    if(d.type==='webrtc-signal'){_handleSig(d);return;}
    if(d.type==='hangup'){if(_cbDisconnected)_cbDisconnected('hangup');return;}
    if(_cbMessage)_cbMessage(d);
  }

  function _setupPC(){
    _pc=new RTCPeerConnection({iceServers:[{urls:'stun:stun.l.google.com:19302'}]});

    // Add all tracks from the unified Media stream (audio + video together)
    if(_stream)_stream.getTracks().forEach(function(t){_pc.addTrack(t,_stream);});

    // onnegotiationneeded fires once for all tracks
    _pc.onnegotiationneeded=async function(){
      try{
        _makingOffer=true;
        log('transport_offer_start',{sig:_pc.signalingState});
        await _pc.setLocalDescription(await _pc.createOffer());
        send({type:'webrtc-signal',transient:true,signal:{description:_pc.localDescription}});
        log('transport_offer_sent',{},'ok');
      }catch(e){log('transport_offer_err',{e:String(e)},'error');}
      finally{_makingOffer=false;}
    };

    _pc.onicecandidate=function(e){
      if(e.candidate){
        log('transport_ice_cand',{type:e.candidate.type});
        send({type:'webrtc-signal',transient:true,signal:{candidate:e.candidate}});
      }else{
        log('transport_ice_gather_done',{});
      }
    };

    _pc.oniceconnectionstatechange=function(){
      var s=_pc.iceConnectionState;
      log('transport_ice_state',{state:s},s==='connected'?'ok':s==='failed'?'error':'info');
    };

    _pc.onconnectionstatechange=function(){
      var s=_pc.connectionState;
      log('transport_conn_state',{state:s},s==='connected'?'ok':s==='failed'?'error':'info');
      if(s==='connected'&&_cbConnected)_cbConnected();
      if((s==='failed'||s==='disconnected')&&_cbDisconnected)_cbDisconnected(s);
    };

    _pc.ontrack=function(e){
      log('transport_track',{kind:e.track.kind,state:e.track.readyState},'ok');
      if(!_remoteStream)_remoteStream=new MediaStream();
      var src=e.streams&&e.streams[0]?e.streams[0].getTracks():[e.track];
      src.forEach(function(t){
        if(!_remoteStream.getTracks().some(function(x){return x.id===t.id;})){
          _remoteStream.addTrack(t);
        }
        // Refresh display whenever track state changes
        t.onunmute=t.onmute=t.onended=function(){if(_cbRemoteStream)_cbRemoteStream(_remoteStream);};
      });
      if(_cbRemoteStream)_cbRemoteStream(_remoteStream);
    };
  }

  // Perfect negotiation — handles glare correctly on both sides
  async function _handleSig(d){
    if(!d.signal)return;
    if(!_pc)_setupPC();
    log('transport_sig_recv',{type:d.signal.description?d.signal.description.type:'candidate',sig:_pc.signalingState});
    try{
      if(d.signal.description){
        var desc=d.signal.description;
        // Polite peer (higher deviceId) yields; impolite peer ignores incoming offer during glare
        var polite=_deviceId>d.from;
        var collision=desc.type==='offer'&&(_makingOffer||_pc.signalingState!=='stable');
        _ignoreOffer=!polite&&collision;
        if(_ignoreOffer){log('transport_sig_ignored',{reason:'glare-impolite'});return;}
        if(collision){
          // Polite peer: rollback own offer, accept theirs
          await Promise.all([
            _pc.setLocalDescription({type:'rollback'}),
            _pc.setRemoteDescription(desc)
          ]);
        }else{
          await _pc.setRemoteDescription(desc);
        }
        if(desc.type==='offer'){
          await _pc.setLocalDescription(await _pc.createAnswer());
          send({type:'webrtc-signal',transient:true,signal:{description:_pc.localDescription}});
          log('transport_answer_sent',{},'ok');
        }
      }else if(d.signal.candidate){
        try{await _pc.addIceCandidate(d.signal.candidate);}catch(_){}
      }
    }catch(e){log('transport_sig_err',{e:String(e)},'error');}
  }

  function hangup(){
    send({type:'hangup'});
    _teardown();
  }

  function _teardown(){
    _stopHB();
    clearTimeout(_reconnTimer);
    if(_pc){_pc.close();_pc=null;}
    if(_ws){try{_ws.close();}catch(_){}_ws=null;}
    _remoteStream=null;_room=null;_stream=null;
    log('transport_teardown',{});
  }

  function reset(){_teardown();}

  return {init:init,send:send,hangup:hangup,reset:reset,deviceId:deviceId,
          onRemoteStream:onRemoteStream,onConnected:onConnected,
          onDisconnected:onDisconnected,onMessage:onMessage};
})();

function trKey(id){return TP+(id||room.id)}
function saveTr(){if(room.id)try{localStorage.setItem(trKey(),JSON.stringify(transcript));}catch(_){}}

}

// ═══════════════════════════════════════════════════════════════════
// TTS (read-back)
// ═══════════════════════════════════════════════════════════════════
function speakText(text,lang){
  text=norm(text);if(!text||!window.speechSynthesis)return;
  window.speechSynthesis.cancel();

}

// ═══════════════════════════════════════════════════════════════════
// TRANSCRIPT DOM
// ═══════════════════════════════════════════════════════════════════
function trHtml(e){
  var lang=e.srcLang||room.myLang||'en';
  var locale=TTS_LOCALE[lang]||'en-US';
  var ts=new Date(e.ts).toLocaleTimeString(locale,{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  var speaker=e.who==='me'?'You':'Partner';
  var label=speaker+' · '+gL(lang).label;
  var tgtLabel=gL(e.tgtLang||room.theirLang||lang).label;
  var src=e.sourceText||'';var tgt=e.translatedText||src;
  return '<div class="tr-entry"><div class="tr-bubble"><div class="tr-head"><div class="tr-who '+(e.who==='me'?'mine':'')+'">'+esc(label)+'</div><div class="tr-time">'+esc(ts)+'</div></div><div class="tr-body"><div class="tr-col source"><div class="tr-label">'+esc(gL(lang).label)+'</div><div class="tr-text">'+esc(src)+'</div><button class="tr-tts" onclick="speakText('+JSON.stringify(src)+','+JSON.stringify(lang)+')"><svg viewBox="0 0 24 24"><path d="M4 10h4l5-4v12l-5-4H4z"/><path d="M16 9a4 4 0 0 1 0 6"/></svg></button></div><div class="tr-divider"></div><div class="tr-col"><div class="tr-label">'+esc(tgtLabel)+'</div><div class="tr-text">'+esc(tgt)+'</div><button class="tr-tts" onclick="speakText('+JSON.stringify(tgt)+','+JSON.stringify(e.tgtLang||room.theirLang||lang)+')"><svg viewBox="0 0 24 24"><path d="M4 10h4l5-4v12l-5-4H4z"/><path d="M16 9a4 4 0 0 1 0 6"/></svg></button></div></div></div></div>';
}
function appendTrDom(entry){
  var b=$('transcript-body'),w=$('call-transcript');if(!b)return;
  var em=b.querySelector('.tr-empty');if(em)em.remove();
  var near=transcriptNearBottom();
  b.insertAdjacentHTML('beforeend',trHtml(entry));
  if(near)w.scrollTop=w.scrollHeight;
}
function renderTr(){
  var b=$('transcript-body');if(!b)return;
  if(!transcript.length){b.innerHTML='<div class="tr-empty">Speak to see transcript here.</div>';return;}
  b.innerHTML=transcript.slice(-120).map(trHtml).join('');
  $('call-transcript').scrollTop=$('call-transcript').scrollHeight;
}
function addTr(who,src,tr,sL,tL,ss){
  src=norm(src);tr=norm(tr)||src;if(!src)return;
  var prev=transcript.length?transcript[transcript.length-1]:null;
  if(prev&&prev.who===who&&prev.sourceText===src&&Date.now()-prev.ts<5000)return;
  var entry={who:who,sourceText:src,translatedText:tr,srcLang:sL,tgtLang:tL,subtitleSeq:ss||null,ts:Date.now()};
  transcript.push(entry);
  if(transcript.length>MAX_TR)transcript.splice(0,transcript.length-MAX_TR);
  saveTr();appendTrDom(entry);
  if(transcriptTtsOn&&src)speakText(src,sL||room.myLang);
}
function patchTr(who,ss,newTr,sL,tL){
  newTr=norm(newTr);if(!newTr)return;
  for(var i=transcript.length-1;i>=0;i--){
    if(transcript[i].who===who&&transcript[i].subtitleSeq===ss){
      if(transcript[i].translatedText===newTr)return;
      transcript[i].translatedText=newTr;transcript[i].ts=Date.now();
      saveTr();renderTr();return;
    }
  }
  addTr(who,newTr,newTr,sL,tL,ss);
}
function copyTr(){
  if(!transcript.length){toast('No transcript');return;}
  var t=transcript.map(function(e){var ts=new Date(e.ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'});return '['+ts+'] '+(e.who==='me'?'You':'Partner')+': '+e.sourceText+(e.translatedText&&e.translatedText!==e.sourceText?' → '+e.translatedText:'');}).join('\n');
  if(navigator.clipboard)navigator.clipboard.writeText(t).then(function(){toast('Copied');});
}
function exportTxt(){
  if(!transcript.length){toast('No transcript');return;}
  var t='TalkBridge Transcript\n'+(room.name?room.name+'\n':'')+new Date().toLocaleString()+'\n\n'+
    transcript.map(function(e){var ts=new Date(e.ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'});return '['+ts+'] '+(e.who==='me'?'You':'Partner')+' ('+((e.srcLang||'?').toUpperCase())+'): '+e.sourceText+(e.translatedText&&e.translatedText!==e.sourceText?'\n → ('+((e.tgtLang||'?').toUpperCase())+'): '+e.translatedText:'');}).join('\n\n');
  var blob=new Blob([t],{type:'text/plain'});var u=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=u;a.download='talkbridge-'+new Date().toISOString().slice(0,10)+'.txt';
  a.click();setTimeout(function(){URL.revokeObjectURL(u);},0);toast('Exported');
}
function toggleTranscript(){
  transcriptCollapsed=!transcriptCollapsed;
  $('call-screen').classList.toggle('transcript-collapsed',transcriptCollapsed);
  syncTranscriptBtn();
}
function swapVideos(){$('call-videos').classList.toggle('swapped');}

// ═══════════════════════════════════════════════════════════════════
// INVITE LINK
// ═══════════════════════════════════════════════════════════════════
function encInv(p){try{return btoa(unescape(encodeURIComponent(JSON.stringify(p)))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');}catch(_){return'';}}
function decInv(s){if(!s)return null;try{var b=s.replace(/-/g,'+').replace(/_/g,'/');while(b.length%4)b+='=';return JSON.parse(decodeURIComponent(escape(atob(b))));}catch(_){return null;}}
function invUrl(){return location.href.split('?')[0].split('#')[0]+'#j='+encInv({r:room.id,ml:room.myLang,tl:room.theirLang,n:room.name||''});}
function copyLink(){var u=invUrl();if(navigator.clipboard)navigator.clipboard.writeText(u).then(function(){toast('Link copied');});}
function shareLink(){var u=invUrl();if(navigator.share)navigator.share({title:'TalkBridge',url:u}).catch(function(){});else copyLink();}

// ═══════════════════════════════════════════════════════════════════
// REMOTE VIDEO — called by Transport.onRemoteStream
// ═══════════════════════════════════════════════════════════════════
function showRemoteStream(remoteStream){
  var rv=$('remote-video');
  if(rv.srcObject!==remoteStream)rv.srcObject=remoteStream;
  var tracks=remoteStream.getTracks();
  var hasVideo=tracks.some(function(t){return t.kind==='video'&&t.readyState==='live';});
  var hasAny=tracks.some(function(t){return t.readyState==='live';});
  if(hasAny){
    rv.muted=true; // muted first — required by autoplay policy
    rv.play().then(function(){rv.muted=false;}).catch(function(e){log('remote_play_err',{e:String(e)},'warn');});
    $('solo-banner').style.display='none';
  }
  $('no-video-msg').style.display=hasVideo?'none':'';
}

// ═══════════════════════════════════════════════════════════════════
// TRANSPORT MESSAGE HANDLER — relay messages from partner
// ═══════════════════════════════════════════════════════════════════
function onRelayMessage(d){
  if(d.type==='hello'){
    $('solo-banner').style.display='none';
    return;
  }
  if(d.type==='subtitle'){
    markPartnerTalking();
    if(d.text&&d.targetLang===room.myLang)showSub(d.text,'partner');
    addTr('partner',d.sourceText,d.text,d.sourceLang,d.targetLang,d.subtitleSeq);
    return;
  }
  if(d.type==='subtitle-update'){
    markPartnerTalking();
    if(d.text&&d.targetLang===room.myLang)showSub(d.text,'partner');
    patchTr('partner',d.subtitleSeq,d.text,d.sourceLang,d.targetLang);
    return;
  }
}

// ═══════════════════════════════════════════════════════════════════
// TRANSCRIBE → TRANSLATE → BROADCAST pipeline
// Wired here in the UI layer — modules know nothing about each other
// ═══════════════════════════════════════════════════════════════════
Transcribe.onFinal(function(text,lang){
  var src=detectLang(text,room.myLang);
  var tgt=room.theirLang;
  var ss=++localSubSeq;
  showSub(text,'mine');
  Transport.send({type:'subtitle',subtitleSeq:ss,text:text,sourceText:text,sourceLang:src,targetLang:tgt});
  addTr('me',text,text,src,tgt,ss);
  Translate.text(text,src,tgt).then(function(tr){
    tr=norm(tr)||text;
    if(tr!==text){
      Transport.send({type:'subtitle-update',subtitleSeq:ss,text:tr,sourceText:text,sourceLang:src,targetLang:tgt});
      patchTr('me',ss,tr,src,tgt);
    }
  });
});

// ═══════════════════════════════════════════════════════════════════
// CALL ENTRY & EXIT
// ═══════════════════════════════════════════════════════════════════
async function enterCall(){
  // Step 1: Media — one stream, shared by all modules
  var stream;
  try{stream=await Media.init();}
  catch(e){toast('Camera/mic access required');log('media_fail',{e:String(e)},'error');return;}

  // Step 2: Show local video immediately
  $('local-video').srcObject=stream;
  $('preview-video').srcObject=stream;

  // Step 3: Show call UI
  transcript=loadTr()||[];
  $('lobby').classList.add('hidden');
  if(!callHistoryPushed){history.pushState({tbView:'call'},'',location.href);callHistoryPushed=true;}
  $('call-screen').classList.add('active');
  $('solo-banner').style.display='';
  $('no-video-msg').style.display='';
  renderTr();syncMic();syncCam();syncTranscriptBtn();syncTtsBtn();
  $('lobby-link').textContent=invUrl();

  // Step 4: Transcribe — starts immediately, works in solo mode
  Transcribe.start(room.myLang);

  // Step 5: Transport — relay + WebRTC (setupPC happens inside ws.onopen)
  Transport.onRemoteStream(showRemoteStream);
  Transport.onConnected(function(){log('app_peer_connected',{},'ok');});
  Transport.onDisconnected(function(reason){
    if(reason==='hangup')toast('Partner left');
    else log('app_peer_disconnected',{reason:reason},'warn');
  });
  Transport.onMessage(onRelayMessage);
  Transport.init(room,stream);
}

function cleanUp(){
  saveTr();
  Transcribe.stop();
  Transport.hangup();
  Media.stop();
  if(window.speechSynthesis)window.speechSynthesis.cancel();
  $('call-screen').classList.remove('active','transcript-collapsed');
  $('lobby').classList.remove('hidden');
  $('subtitle-area').innerHTML='';
  $('no-video-msg').style.display='';
  $('partner-speaking-indicator').classList.remove('show');
  clearTimeout(partnerSpeakTimer);
  var rv=$('remote-video');rv.srcObject=null;rv.muted=true;
  transcript=[];micOn=true;camOn=true;transcriptCollapsed=false;transcriptTtsOn=false;
  callHistoryPushed=false;room={id:null,myLang:'',theirLang:'',role:null,name:'',solo:false};
  localSubSeq=0;syncMic();syncCam();syncTranscriptBtn();syncTtsBtn();
  renderRecent();
}

function hangUp(){cleanUp();}

// ═══════════════════════════════════════════════════════════════════
// CONTROLS
// ═══════════════════════════════════════════════════════════════════
function toggleMic(){
  micOn=!micOn;
  Media.muteAudio(!micOn); // only gates WebRTC audio track; CC unaffected
  syncMic();
}
function toggleCam(){
  camOn=!camOn;
  Media.muteVideo(!camOn);
  syncCam();
}

// ═══════════════════════════════════════════════════════════════════
// LOBBY
// ═══════════════════════════════════════════════════════════════════
function populateLangs(){
  ['my-lang','their-lang'].forEach(function(id){
    var s=$(id);
    s.innerHTML='<option value="" disabled selected>Select language…</option>'+
      LANGS.map(function(l){return'<option value="'+l.code+'">'+l.flag+' '+l.label+'</option>';}).join('');
    s.onchange=syncBtn;
  });
  syncBtn();
}
function syncBtn(){$('create-btn').disabled=!($('my-lang').value&&$('their-lang').value);}

async function createRoom(){
  room.myLang=$('my-lang').value;room.theirLang=$('their-lang').value;
  room.name=($('room-name').value||'').trim();
  if(!room.myLang||!room.theirLang){toast('Select both languages');return;}
  room.id=uid();room.role='creator';room.solo=false;
  saveRecent();
  await enterCall();
}

function handleHash(p){
  if(!p||!p.r)return;
  $('joining-screen').classList.add('show');
  room.id=p.r;room.myLang=p.tl;room.theirLang=p.ml;room.name=p.n||'';room.role='joiner';room.solo=false;
  saveRecent();
  enterCall().then(function(){$('joining-screen').classList.remove('show');})
    .catch(function(){$('joining-screen').classList.remove('show');history.replaceState({},'',location.pathname);});
  history.replaceState({},'',location.pathname);
}

function backToSetup(){Media.stop();$('lobby-setup').style.display='';$('lobby-waiting').style.display='none';}

async function reuseRoom(id){
  var rec=getRecent().find(function(r){return r.id===id;});if(!rec)return;
  room.id=rec.id;room.myLang=rec.myLang;room.theirLang=rec.theirLang;room.role='creator';room.name=rec.name||'';room.solo=false;
  $('my-lang').value=rec.myLang;$('their-lang').value=rec.theirLang;$('room-name').value=rec.name||'';syncBtn();
  saveRecent();
  await enterCall();
}

function viewRoomTr(id){
  var rec=getRecent().find(function(r){return r.id===id;});
  var entries=loadTr(id);viewingRoomId=id;
  $('room-tr-title').textContent=(rec&&rec.name?rec.name:'Room')+' — Transcript';
  var b=$('room-tr-body');
  if(!entries.length){b.innerHTML='<div style="color:var(--text-muted);padding:16px;font-style:italic;">No transcript saved.</div>';}
  else{b.innerHTML=entries.map(function(e){
    var ts=new Date(e.ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'});
    var w=e.who==='me'?'You':'Partner';var wc=e.who==='me'?'color:var(--teal-bright)':'color:var(--text-dim)';
    var s=e.sourceText===e.translatedText;
    return '<div style="padding:8px 0;border-bottom:1px solid rgba(255,255,255,.05)"><div style="font-size:10px;font-weight:700;text-transform:uppercase;'+wc+'">'+w+' · '+(e.srcLang||'').toUpperCase()+' · '+ts+'</div><div style="color:var(--text-dim);margin-top:2px">'+esc(e.sourceText)+'</div>'+(s?'':'<div style="color:var(--text);margin-top:2px">→ '+esc(e.translatedText)+'</div>')+'</div>';
  }).join('');}
  $('room-tr-overlay').classList.add('show');
}
function closeRoomTr(){$('room-tr-overlay').classList.remove('show');}
function copyRoomTr(){
  var entries=loadTr(viewingRoomId);if(!entries.length){toast('No transcript');return;}
  var t=entries.map(function(e){var ts=new Date(e.ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'});return '['+ts+'] '+(e.who==='me'?'You':'Partner')+': '+e.sourceText+(e.translatedText!==e.sourceText?' → '+e.translatedText:'');}).join('\n');
  if(navigator.clipboard)navigator.clipboard.writeText(t).then(function(){toast('Copied');});
}

function renderRecent(){
  var w=$('recent-rooms'),l=$('recent-rooms-list'),rows=getRecent();
  w.style.display=rows.length?'':'none';
  l.innerHTML=rows.map(function(r){
    var t=new Date(r.ts).toLocaleString();var h=!!loadTr(r.id).length;
    return '<div class="recent-item"><div class="recent-item-top"><button class="recent-open jr" data-id="'+esc(r.id)+'">'+esc(r.name)+'<small>'+esc(t)+'</small></button></div><div class="recent-actions"><button class="recent-act jr" data-id="'+esc(r.id)+'">▶ Reopen</button>'+(h?'<button class="recent-act jv" data-id="'+esc(r.id)+'">📄 Transcript</button>':'')+'<button class="recent-act danger jd" data-id="'+esc(r.id)+'">✕ Delete</button></div></div>';
  }).join('');
  l.querySelectorAll('.jr').forEach(function(b){b.onclick=function(){reuseRoom(b.dataset.id);};});
  l.querySelectorAll('.jv').forEach(function(b){b.onclick=function(){viewRoomTr(b.dataset.id);};});
  l.querySelectorAll('.jd').forEach(function(b){b.onclick=function(){delRecent(b.dataset.id);};});
}

// ═══════════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════════
populateLangs();renderRecent();syncMic();syncCam();syncTranscriptBtn();syncTtsBtn();

$('call-transcript').addEventListener('scroll',function(){
  var ind=$('transcript-more-indicator');
  if(ind)ind.classList.toggle('show',!transcriptNearBottom());
});
$('local-video').addEventListener('click',swapVideos);
$('remote-video').addEventListener('click',swapVideos);

// Handle join link
var hp=new URLSearchParams((location.hash||'').replace(/^#/,''));
var inv=hp.get('j');
if(inv){var p=decInv(inv);if(p&&p.r)handleHash(p);}

window.addEventListener('popstate',function(){
  if($('call-screen').classList.contains('active')&&room.id){hangUp();history.pushState({},'',location.href);}
});
window.addEventListener('visibilitychange',function(){
  if(!document.hidden&&room.id&&$('call-screen').classList.contains('active')){
    Transcribe.stop();Transcribe.start(room.myLang);
  }
});
window.addEventListener('pagehide',function(){
  if(room.id){saveTr();Transport.send({type:'hangup',reason:'pagehide'});}
  Transcribe.stop();Media.stop();
});
</script>
