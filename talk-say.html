<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Talk + Say</title>
  <style>
    :root {
      --cream:#faf8f4; --paper:#f2ede4; --ink:#1a1714; --ink-dim:#6f665e; --teal:#1d6b66; --red:#c0392b; --green:#228b52;
      --border:#e5ddd2;
    }
    *{box-sizing:border-box} body{margin:0;background:var(--cream);font-family:"DM Sans",system-ui,sans-serif;color:var(--ink)}
    .app{max-width:560px;margin:0 auto;padding:12px 12px calc(84px + env(safe-area-inset-bottom));min-height:100dvh}
    .screen{display:none}.screen.active{display:block}
    .card{background:#fff;border:1px solid var(--border);border-radius:16px;padding:14px;margin-bottom:10px}
    h1,h2,h3{font-family:"Lora",Georgia,serif;margin:0}.muted{color:var(--ink-dim);font-size:13px}
    .stack{display:flex;flex-direction:column;gap:8px}.row{display:flex;gap:8px;align-items:center}.between{justify-content:space-between}
    input,select,textarea,button{font:inherit;border:1px solid #d8cec2;border-radius:12px;min-height:44px;padding:10px 12px;background:#fff;width:100%}
    button{cursor:pointer;font-weight:600}.btn-primary{background:var(--teal);color:#fff;border-color:transparent}.btn-danger{background:#fff;color:var(--red);border-color:#efc4bc}
    .chip{display:inline-flex;align-items:center;gap:6px;border-radius:999px;background:#eee4d7;padding:4px 10px;font-size:12px;border:1px solid #e2d5c8}
    .chat{max-height:45dvh;overflow:auto;background:#fff;border:1px solid var(--border);border-radius:12px;padding:10px}
    .bubble{padding:8px 10px;border-radius:12px;margin-bottom:8px;max-width:95%}.me{background:#e5f6f4;margin-left:auto}.them{background:#f2ede4}
    .mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;letter-spacing:2px}.hidden{display:none!important}
    .tabbar{position:fixed;left:50%;transform:translateX(-50%);bottom:0;width:min(560px,100%);display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:8px 12px calc(8px + env(safe-area-inset-bottom));border-top:1px solid var(--border);background:#fffcf8}
    .tabbar .active{background:var(--teal);color:#fff}
    .session-row,.catalog-row,.card-row{border:1px solid var(--border);background:#fff;border-radius:12px;padding:10px}
    .small-btn{min-height:34px;padding:6px 10px;width:auto}
    .toast{position:fixed;left:50%;transform:translateX(-50%);bottom:96px;background:#1f1f1f;color:#fff;padding:8px 12px;border-radius:10px;display:none;z-index:20}
  </style>
</head>
<body>
  <div class="app">
    <section id="talk-home" class="screen active">
      <div class="card stack">
        <h1>Talk</h1>
        <div class="muted">Live bilingual conversation</div>
        <button class="btn-primary" onclick="go('talk-start')">Start a chat</button>
        <button onclick="go('talk-join')">Join a session</button>
      </div>
      <div class="card">
        <div class="row between"><h3>Recent sessions</h3><span id="session-count" class="muted">0</span></div>
        <div id="recent-list" class="stack" style="margin-top:8px"></div>
      </div>
    </section>

    <section id="talk-start" class="screen">
      <div class="card stack">
        <div class="row between"><h2>Start a chat</h2><button class="small-btn" onclick="go('talk-home')">← Back</button></div>
        <input id="start-name" maxlength="30" placeholder="Your name" />
        <select id="start-my-lang"></select>
        <select id="start-partner-lang"></select>
        <button class="btn-primary" onclick="createSession()">Create session</button>
      </div>
    </section>

    <section id="talk-code" class="screen">
      <div class="card stack">
        <div class="row between"><h2>Share code</h2><button class="small-btn" onclick="go('talk-home')">← Home</button></div>
        <div class="muted">Share this code with your partner.</div>
        <div id="session-code-view" class="card mono" style="text-align:center;font-size:28px;color:var(--teal)"></div>
        <div class="row">
          <button onclick="copyCode()">Copy code</button>
          <button onclick="shareCode()">Share</button>
        </div>
        <button class="btn-primary" onclick="openActiveChat()">Open chat</button>
      </div>
    </section>

    <section id="talk-join" class="screen">
      <div class="card stack">
        <div class="row between"><h2>Join a session</h2><button class="small-btn" onclick="go('talk-home')">← Back</button></div>
        <input id="join-name" maxlength="30" placeholder="Your name" />
        <select id="join-my-lang"></select>
        <input id="join-code" maxlength="6" class="mono" placeholder="A3K9M2" />
        <button class="btn-primary" onclick="joinSession()">Join session</button>
      </div>
    </section>

    <section id="talk-chat" class="screen">
      <div class="card stack">
        <div class="row between"><h2 id="chat-title">Chat</h2><button class="small-btn" onclick="go('talk-home')">← Back</button></div>
        <div class="row">
          <span id="status-chip" class="chip">Waiting</span>
          <span id="lang-chip" class="chip">—</span>
        </div>
        <div id="chat-list" class="chat"></div>
        <div class="row">
          <button class="small-btn" onclick="insertFromSayPicker()">📚 Phrase</button>
          <textarea id="chat-input" rows="2" placeholder="Type message"></textarea>
        </div>
        <div class="row">
          <button class="btn-primary" onclick="sendMessage()">Send</button>
          <button onclick="attemptReconnect()">Reconnect</button>
        </div>
      </div>
    </section>

    <section id="say-home" class="screen">
      <div class="card stack">
        <h1>Say</h1>
        <div class="muted">Catalogs and phrase cards</div>
        <div class="row">
          <input id="catalog-name" placeholder="New catalog name" />
          <button class="small-btn" onclick="addCatalog()">Create</button>
        </div>
      </div>
      <div id="catalog-list" class="stack"></div>
      <div id="card-manager" class="card stack hidden">
        <div class="row between"><h3 id="card-manager-title">Cards</h3><button class="small-btn" onclick="closeCatalog()">Close</button></div>
        <div class="row">
          <input id="new-source" placeholder="Source phrase" />
          <input id="new-target" placeholder="Translation" />
        </div>
        <div class="row">
          <input id="new-tags" placeholder="tags: food, polite" />
          <button class="small-btn" onclick="addCard()">Add card</button>
        </div>
        <div id="card-list" class="stack"></div>
      </div>
    </section>
  </div>

  <div id="toast" class="toast"></div>
  <nav class="tabbar">
    <button id="tab-talk" class="active" onclick="switchTab('talk')">💬 Talk</button>
    <button id="tab-say" onclick="switchTab('say')">📚 Say</button>
  </nav>

<script>
const LANGS = ['English','Thai','Spanish','French','German','Italian','Japanese','Korean','Chinese','Vietnamese','Portuguese'];
const LS = {
  onboarded:'ts_onboarded', sessions:'talk_sessions', active:'talk_active_id', cards:'say_cards', catalogs:'say_catalogs',
  msgs:id => `talk_msg_${id}`, bus:code => `talk_bus_${code}`
};
const app = {
  tab:'talk', activeCatalogId:null,
  sessions: lsR(LS.sessions, []), catalogs: lsR(LS.catalogs, []), cards: lsR(LS.cards, []),
  activeSessionId: localStorage.getItem(LS.active) || null,
  myPeerId: crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}_${Math.random().toString(36).slice(2)}`,
  pollTimer:null
};

function lsR(key,fallback){ try { const raw=localStorage.getItem(key); return raw?JSON.parse(raw):fallback; } catch { return fallback; } }
function lsW(key,val){ localStorage.setItem(key, JSON.stringify(val)); }
function uid(){ return `${Date.now()}_${Math.random().toString(36).slice(2,8)}`; }
function code6(){ const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; return Array.from({length:6},()=>c[Math.floor(Math.random()*c.length)]).join(''); }
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.style.display='block'; clearTimeout(toast._id); toast._id=setTimeout(()=>t.style.display='none',1800); }
function esc(s){ return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function saveAll(){ lsW(LS.sessions,app.sessions); lsW(LS.catalogs,app.catalogs); lsW(LS.cards,app.cards); if(app.activeSessionId) localStorage.setItem(LS.active, app.activeSessionId); }
function go(id){ document.querySelectorAll('.screen').forEach(x=>x.classList.remove('active')); document.getElementById(id).classList.add('active'); }
function switchTab(tab){ app.tab=tab; document.getElementById('tab-talk').classList.toggle('active',tab==='talk'); document.getElementById('tab-say').classList.toggle('active',tab==='say'); go(tab==='talk'?'talk-home':'say-home'); render(); }
function activeSession(){ return app.sessions.find(s=>s.sessionId===app.activeSessionId); }

function seed(){
  if (!app.catalogs.length) app.catalogs.push({id:'cat-talk',name:'From Talk',createdAt:Date.now(),isDefault:true});
  if (!localStorage.getItem(LS.onboarded)) localStorage.setItem(LS.onboarded, '1');
  saveAll();
}
function fillLangs(){
  ['start-my-lang','start-partner-lang','join-my-lang'].forEach(id=>{ document.getElementById(id).innerHTML=LANGS.map(l=>`<option>${l}</option>`).join(''); });
  document.getElementById('start-partner-lang').value='Thai';
}

function createSession(){
  const myName = document.getElementById('start-name').value.trim() || 'Me';
  const myLang = document.getElementById('start-my-lang').value || 'English';
  const partnerLang = document.getElementById('start-partner-lang').value || 'Thai';
  const s = {sessionId:uid(),sessionCode:code6(),myName,myLang,partnerLang,partnerName:'Waiting for partner…',isInitiator:true,createdAt:Date.now(),lastActivity:Date.now(),lastSeenAt:0,status:'waiting',peerId:app.myPeerId};
  app.sessions = [s, ...app.sessions.filter(x=>x.sessionId!==s.sessionId)];
  app.activeSessionId=s.sessionId; saveAll();
  document.getElementById('session-code-view').textContent=s.sessionCode;
  go('talk-code'); startPolling(); render();
}

function joinSession(){
  const code = document.getElementById('join-code').value.toUpperCase().replace(/[^A-Z0-9]/g,'').slice(0,6);
  if (code.length!==6) return toast('Enter a valid 6-character code.');
  const myName = document.getElementById('join-name').value.trim() || 'Me';
  const myLang = document.getElementById('join-my-lang').value || 'English';
  let s = app.sessions.find(x=>x.sessionCode===code && !x.isInitiator);
  if (!s){ // PRD §3.5.2: dedup join sessions by code for non-initiators.
    s = {sessionId:uid(),sessionCode:code,myName,myLang,partnerLang:'Unknown',partnerName:'Waiting for partner…',isInitiator:false,createdAt:Date.now(),lastActivity:Date.now(),lastSeenAt:0,status:'connecting',peerId:app.myPeerId};
    app.sessions.unshift(s);
  } else {
    s.myName = myName; s.myLang = myLang;
  }
  app.activeSessionId=s.sessionId; saveAll();
  sendBus(s.sessionCode,{type:'hello',fromPeer:app.myPeerId,name:myName,myLang,sessionId:s.sessionId});
  openActiveChat(); startPolling();
}

function copyCode(){ const c=(activeSession()||{}).sessionCode||document.getElementById('session-code-view').textContent; navigator.clipboard?.writeText(c).then(()=>toast('Code copied')).catch(()=>toast('Copy failed')); }
async function shareCode(){
  const s=activeSession(); if(!s) return toast('No active session.');
  const text=`Join my Talk session\nCode: ${s.sessionCode}`;
  if (navigator.share){ try { await navigator.share({title:'Talk session',text}); } catch { /* user dismissed */ } }
  else { await navigator.clipboard?.writeText(text); toast('Share text copied'); }
}
function openActiveChat(){ if(!activeSession()) return toast('No active session selected.'); go('talk-chat'); renderChat(); startPolling(); render(); }

function pullBus(code){ return lsR(LS.bus(code), []); }
function writeBus(code,list){ lsW(LS.bus(code), list.slice(-400)); }
function sendBus(code,packet){ const bus=pullBus(code); bus.push({...packet,packetId:uid(),at:Date.now()}); writeBus(code,bus); }

function processPackets(session){
  const packets = pullBus(session.sessionCode);
  session.readAt ||= 0;
  const newPackets = packets.filter(p => p.at > session.readAt && p.fromPeer !== app.myPeerId);
  if (!newPackets.length) return;
  newPackets.forEach(p => {
    session.lastSeenAt = Date.now();
    if (p.type === 'hello' && session.isInitiator) {
      session.partnerName = p.name || 'Partner';
      session.partnerLang = p.myLang || session.partnerLang;
      session.status = 'connected';
      sendBus(session.sessionCode,{type:'hello_ack',fromPeer:app.myPeerId,name:session.myName,myLang:session.myLang});
    } else if (p.type === 'hello_ack' && !session.isInitiator) {
      session.partnerName = p.name || 'Partner';
      session.partnerLang = p.myLang || session.partnerLang;
      session.status = 'connected';
    } else if (p.type === 'message') {
      const msg = p.msg || {};
      if (!msg.id || !msg.text) return;
      const existing = lsR(LS.msgs(session.sessionId), []);
      if (existing.some(m => m.id===msg.id)) return;
      existing.push({id:msg.id,from:'them',text:msg.text,translated:msg.translated||'',timestamp:msg.timestamp||Date.now()});
      lsW(LS.msgs(session.sessionId), existing.slice(-300));
      session.lastActivity = Date.now();
      session.status = 'connected';
    }
  });
  session.readAt = newPackets[newPackets.length-1].at;
}

function startPolling(){
  clearInterval(app.pollTimer);
  app.pollTimer = setInterval(() => {
    const s=activeSession(); if (!s) return;
    processPackets(s);
    if (s.status==='connected' && s.lastSeenAt && Date.now()-s.lastSeenAt>45000) s.status='reconnecting';
    saveAll();
    if (document.getElementById('talk-chat').classList.contains('active')) renderChat();
    render();
  }, 1200);
}

async function sendMessage(){
  const s=activeSession(); if(!s) return toast('Select a session first.');
  const input=document.getElementById('chat-input'); const text=input.value.trim();
  if (!text) return toast('Message is empty.');
  if (!['connected','reconnecting','connecting','waiting'].includes(s.status)) s.status='connecting';
  const translated = `[${s.partnerLang || 'Partner'}] ${text}`;
  const msg={id:uid(),from:'me',text,translated,timestamp:Date.now()};
  const list=lsR(LS.msgs(s.sessionId),[]); list.push(msg); lsW(LS.msgs(s.sessionId), list.slice(-300));
  sendBus(s.sessionCode,{type:'message',fromPeer:app.myPeerId,msg:{id:msg.id,text:msg.text,translated:`[${s.myLang}] ${text}`,timestamp:msg.timestamp}});
  s.lastActivity=Date.now(); if (s.status!=='connected') s.status='connecting';
  input.value=''; saveAll(); renderChat(); render();
}

function attemptReconnect(){
  const s=activeSession(); if(!s) return;
  s.status='connecting';
  sendBus(s.sessionCode,{type:'hello',fromPeer:app.myPeerId,name:s.myName,myLang:s.myLang});
  saveAll(); render(); toast('Reconnect signal sent');
}

function renderChat(){
  const s=activeSession(), box=document.getElementById('chat-list');
  if(!s){ box.innerHTML='<div class="muted">No active session.</div>'; return; }
  document.getElementById('chat-title').textContent = `${esc(s.myName)} ↔ ${esc(s.partnerName)}`;
  document.getElementById('lang-chip').textContent = `${esc(s.myLang)} → ${esc(s.partnerLang || 'Unknown')}`;
  const st=document.getElementById('status-chip'); st.textContent=s.status||'waiting'; st.style.background=(s.status==='connected')?'#e6f7ee':'#f7ece7'; st.style.color=(s.status==='connected')? 'var(--green)' : 'var(--red)';
  const msgs=lsR(LS.msgs(s.sessionId),[]);
  box.innerHTML = msgs.length ? msgs.map(m=>`<div class="bubble ${m.from==='me'?'me':'them'}"><div>${esc(m.text)}</div><div class="muted">${esc(m.translated||'')}</div></div>`).join('') : '<div class="muted">No messages yet.</div>';
  box.scrollTop=box.scrollHeight;
}

function addCatalog(){
  const input=document.getElementById('catalog-name'); const name=input.value.trim();
  if (!name) return toast('Catalog name required.');
  app.catalogs.unshift({id:uid(),name,createdAt:Date.now(),isDefault:false});
  input.value=''; saveAll(); render(); toast('Catalog created');
}
function deleteCatalog(id){
  if (!confirm('Delete this catalog? Cards will be removed from it.')) return;
  app.catalogs = app.catalogs.filter(c=>c.id!==id);
  app.cards = app.cards.map(c=>({...c,catalogIds:(c.catalogIds||[]).filter(cid=>cid!==id)})).filter(c=>(c.catalogIds||[]).length);
  if (app.activeCatalogId===id) app.activeCatalogId=null;
  saveAll(); render();
}
function openCatalog(id){ app.activeCatalogId=id; document.getElementById('card-manager').classList.remove('hidden'); render(); }
function closeCatalog(){ app.activeCatalogId=null; document.getElementById('card-manager').classList.add('hidden'); render(); }
function tagsFromInput(val){ return [...new Set(val.split(',').map(x=>x.trim().toLowerCase()).filter(Boolean))]; }
function addCard(){
  const source=document.getElementById('new-source').value.trim();
  const target=document.getElementById('new-target').value.trim();
  if (!source && !target) return toast('Add source or translation first.');
  if (!app.activeCatalogId) return toast('Open a catalog first.');
  const s=activeSession();
  const card={id:uid(),source,target,sourceLang:s?.myLang||'English',targetLang:s?.partnerLang||'Thai',tags:tagsFromInput(document.getElementById('new-tags').value),catalogIds:[app.activeCatalogId],usage:0,lastUsedAt:null,createdAt:Date.now(),updatedAt:Date.now()};
  app.cards.unshift(card); ['new-source','new-target','new-tags'].forEach(id=>document.getElementById(id).value=''); saveAll(); render(); toast('Card saved');
}
function updateCard(id){
  const src=document.getElementById(`src-${id}`).value.trim(); const tgt=document.getElementById(`tgt-${id}`).value.trim();
  const tags=tagsFromInput(document.getElementById(`tag-${id}`).value);
  const c=app.cards.find(x=>x.id===id); if(!c) return;
  c.source=src; c.target=tgt; c.tags=tags; c.updatedAt=Date.now(); saveAll(); render(); toast('Card updated');
}
function deleteCard(id){ if(!confirm('Delete this card?')) return; app.cards=app.cards.filter(c=>c.id!==id); saveAll(); render(); }
function useCardInTalk(id){
  const c=app.cards.find(x=>x.id===id); if(!c) return;
  const s=activeSession(); if(!s) return toast('No active Talk session.');
  const input=document.getElementById('chat-input'); switchTab('talk'); openActiveChat(); input.value=(input.value?`${input.value} `:'')+(c.target||c.source||'');
  c.usage=(c.usage||0)+1; c.lastUsedAt=Date.now(); saveAll(); render(); toast('Phrase inserted in Talk');
}
function insertFromSayPicker(){
  const ids = app.activeCatalogId ? [app.activeCatalogId] : app.catalogs.map(c=>c.id);
  const pick = app.cards.find(c => (c.catalogIds||[]).some(id=>ids.includes(id)) && (c.target||c.source));
  if (!pick) return toast('No phrase cards available. Add cards in Say first.');
  document.getElementById('chat-input').value = pick.target || pick.source;
  pick.usage=(pick.usage||0)+1; pick.lastUsedAt=Date.now(); saveAll(); render(); toast('Inserted first available phrase');
}

function render(){
  const recent=document.getElementById('recent-list');
  document.getElementById('session-count').textContent=String(app.sessions.length);
  recent.innerHTML = app.sessions.length ? app.sessions.map(s=>`<button class="session-row row between" onclick="app.activeSessionId='${s.sessionId}';saveAll();openActiveChat()"><span><strong>${esc(s.partnerName)}</strong><div class="muted">${esc(s.myLang)} → ${esc(s.partnerLang||'Unknown')}</div></span><span class="chip mono">${esc(s.sessionCode)}</span></button>`).join('') : '<div class="muted">No saved sessions yet.</div>';

  const catList=document.getElementById('catalog-list');
  catList.innerHTML = app.catalogs.map(c=>`<div class="catalog-row row between"><button class="small-btn" style="flex:1;text-align:left" onclick="openCatalog('${c.id}')"><strong>${esc(c.name)}</strong><div class="muted">${(app.cards.filter(card=>(card.catalogIds||[]).includes(c.id)).length)} cards</div></button><button class="small-btn" onclick="deleteCatalog('${c.id}')">Delete</button></div>`).join('') || '<div class="card muted">No catalogs yet.</div>';

  const m=document.getElementById('card-manager');
  if (!app.activeCatalogId){ m.classList.add('hidden'); return; }
  const catalog=app.catalogs.find(c=>c.id===app.activeCatalogId);
  if (!catalog){ app.activeCatalogId=null; m.classList.add('hidden'); return; }
  m.classList.remove('hidden');
  document.getElementById('card-manager-title').textContent=`Cards · ${catalog.name}`;
  const cardList=document.getElementById('card-list');
  const cards=app.cards.filter(c=>(c.catalogIds||[]).includes(catalog.id));
  cardList.innerHTML = cards.length ? cards.map(c=>`<div class="card-row stack"><input id="src-${c.id}" value="${esc(c.source)}" placeholder="Source"/><input id="tgt-${c.id}" value="${esc(c.target)}" placeholder="Translation"/><input id="tag-${c.id}" value="${esc((c.tags||[]).join(', '))}" placeholder="tags"/><div class="row"><button class="small-btn" onclick="updateCard('${c.id}')">Save</button><button class="small-btn" onclick="useCardInTalk('${c.id}')">Use in Talk</button><button class="small-btn" onclick="deleteCard('${c.id}')">Delete</button></div></div>`).join('') : '<div class="muted">No cards in this catalog yet.</div>';
}

seed(); fillLangs(); startPolling(); render();
window.addEventListener('storage', (e)=>{ if ([LS.sessions,LS.cards,LS.catalogs,LS.active].includes(e.key)) { app.sessions=lsR(LS.sessions,[]); app.cards=lsR(LS.cards,[]); app.catalogs=lsR(LS.catalogs,[]); app.activeSessionId=localStorage.getItem(LS.active); render(); } const s=activeSession(); if (s && e.key===LS.bus(s.sessionCode)) { processPackets(s); renderChat(); render(); } });
</script>
</body>
</html>
