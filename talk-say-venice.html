<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talk + Say</title>
    <style>
        @font-face {
            font-family: 'Lora';
            src: url('https://fonts.gstatic.com/s/lora/v12/5aU19eY4t1tAaCfGfjB6.woff2') format('woff2');
            font-weight: normal;
            font-style: normal;
        }

        @font-face {
            font-family: 'DM Sans';
            src: url('https://fonts.gstatic.com/s/dmsans/v12/5aU19eY4t1tAaCfGfjB6.woff2') format('woff2');
            font-weight: normal;
            font-style: normal;
        }

        @font-face {
            font-family: 'Noto Sans Thai';
            src: url('https://fonts.gstatic.com/s/notosansthai/v12/5aU19eY4t1tAaCfGfjB6.woff2') format('woff2');
            font-weight: normal;
            font-style: normal;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: #FAF8F4;
            color: #1A1714;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: 'Lora', serif;
        }

        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: linear-gradient(135deg, #1D6B66, #FAF8F4);
            color: white;
            text-align: center;
            padding: 20px;
        }

        .header h1 {
            font-size: 36px;
            margin: 0;
        }

        .header p {
            font-size: 14px;
            color: #1A1714;
        }

        .action-buttons {
            padding: 20px;
        }

        .action-buttons button {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: none;
            border-radius: 8px;
            font-size: 16px;
        }

        .action-buttons .primary {
            background-color: #1D6B66;
            color: white;
        }

        .action-buttons .secondary {
            background-color: #F2EDE4;
            color: #1A1714;
        }

        .recent-sessions {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .recent-sessions .session-card {
            background-color: #F2EDE4;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
        }

        .recent-sessions .session-card .avatar {
            width: 40px;
            height: 40px;
            background-color: #1D6B66;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            margin-right: 10px;
        }

        .recent-sessions .session-card .info {
            flex: 1;
        }

        .recent-sessions .session-card .info h3 {
            font-size: 14px;
            font-weight: bold;
            margin: 0;
        }

        .recent-sessions .session-card .info p {
            font-size: 12px;
            color: #1A1714;
        }

        .recent-sessions .session-card .badge {
            background-color: #F2EDE4;
            border-radius: 12px;
            padding: 2px 8px;
            font-size: 12px;
            color: #1A1714;
        }

        .settings-fab {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background-color: white;
            border: 2px solid #1A1714;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .chat-screen {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .chat-header {
            display: flex;
            align-items: center;
            padding: 10px;
            background-color: #1D6B66;
            color: white;
        }

        .chat-header button {
            background: none;
            border: none;
            color: white;
            font-size: 20px;
            margin-right: 10px;
        }

        .chat-header .partner-name {
            font-size: 16px;
            font-weight: bold;
        }

        .chat-header .language-chip {
            background-color: #E0F7FA;
            color: #1D6B66;
            border-radius: 12px;
            padding: 2px 8px;
            font-size: 11px;
            margin-left: 10px;
        }

        .chat-header .connection-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background-color: grey;
            margin-left: 10px;
        }

        .chat-header .connection-label {
            font-size: 12px;
            color: #1A1714;
            margin-left: 5px;
        }

        .chat-engine-badge {
            padding: 5px;
            font-size: 10px;
            text-align: center;
            background-color: #E0F7FA;
            color: #1D6B66;
        }

        .message-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            gap: 6px;
        }

        .message-card {
            max-width: 82%;
            border-radius: 18px;
            padding: 10px;
            position: relative;
        }

        .message-card.mine {
            background-color: #1D6B66;
            color: white;
            align-self: flex-end;
        }

        .message-card.theirs {
            background-color: #F2EDE4;
            color: #1A1714;
            align-self: flex-start;
        }

        .message-card footer {
            font-size: 10px;
            opacity: 0.6;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .message-card footer .clarify {
            background-color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .composer-bar {
            display: flex;
            align-items: center;
            padding: 10px;
            background-color: #FAF8F4;
            border-top: 1px solid #E0F7FA;
        }

        .composer-bar input {
            flex: 1;
            border: 1px solid #1D6B66;
            border-radius: 22px;
            padding: 10px;
            font-size: 16px;
        }

        .composer-bar button {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background-color: #1D6B66;
            color: white;
            font-size: 20px;
            margin-left: 10px;
        }

        .say-screen {
            padding: 20px;
        }

        .say-screen h1 {
            font-size: 36px;
            margin: 0 0 10px;
        }

        .say-screen p {
            font-size: 14px;
            color: #1A1714;
            margin: 0 0 20px;
        }

        .catalog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        .catalog-card {
            background-color: #F2EDE4;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
        }

        .catalog-card h2 {
            font-size: 15px;
            font-weight: bold;
            margin: 0 0 5px;
        }

        .catalog-card p {
            font-size: 12px;
            color: #1A1714;
            margin: 0;
        }

        .catalog-card .pin {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 12px;
        }

        .catalog-card .emoji {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .card-list {
            margin-top: 20px;
        }

        .card-item {
            background-color: #F2EDE4;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-item .favorite {
            background-color: #C4600A;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: white;
            margin-right: 10px;
        }

        .card-item .source {
            flex: 1;
            font-size: 14px;
        }

        .card-item .target {
            font-size: 13px;
            color: #1A1714;
        }

        .card-item .tts {
            background-color: #1A1714;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: white;
            margin-left: 10px;
        }

        .card-item .chevron {
            background-color: #1A1714;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: white;
            transform: rotate(90deg);
            transition: transform 0.3s;
        }

        .card-item.expanded .chevron {
            transform: rotate(180deg);
        }

        .card-item.expanded .details {
            display: block;
        }

        .details {
            display: none;
            margin-top: 10px;
        }

        .details .field {
            margin-bottom: 10px;
        }

        .details .field label {
            font-size: 11px;
            color: #1A1714;
            display: block;
            margin-bottom: 5px;
        }

        .details .field input, .details .field textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #1A1714;
            border-radius: 4px;
            font-size: 14px;
        }

        .details .field textarea {
            height: 100px;
        }

        .details .priority {
            display: flex;
            justify-content: space-between;
        }

        .details .priority button {
            padding: 5px 10px;
            border: 1px solid #1A1714;
            border-radius: 4px;
            font-size: 12px;
        }

        .details .priority button.active {
            background-color: #1D6B66;
            color: white;
        }

        .details .meta {
            font-size: 11px;
            color: #1A1714;
        }

        .details .actions {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
        }

        .details .actions button {
            padding: 5px 10px;
            border: 1px solid #1A1714;
            border-radius: 4px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <div class="header">
            <h1>Talk</h1>
            <p>Live bilingual conversation</p>
        </div>
        <div class="action-buttons">
            <button class="primary" onclick="startChat()">Start a chat</button>
            <button class="secondary" onclick="joinSession()">Join a session</button>
            <button class="secondary" onclick="openSay()">Open Say →</button>
        </div>
        <div class="recent-sessions" id="recentSessions">
            <!-- Recent sessions will be dynamically added here -->
        </div>
        <button class="settings-fab" onclick="openSettings()">⚙</button>
    </div>

    <div class="chat-screen" id="chatScreen">
        <div class="chat-header">
            <button onclick="backToHome()">←</button>
            <span class="partner-name" id="partnerName"></span>
            <span class="language-chip" id="languageChip"></span>
            <span class="connection-dot" id="connectionDot"></span>
            <span class="connection-label" id="connectionLabel"></span>
            <button onclick="openSessionMenu()">⋮</button>
        </div>
        <div class="chat-engine-badge" id="engineBadge"></div>
        <div class="message-list" id="messageList"></div>
        <div class="composer-bar">
            <button id="voiceButton">🎤</button>
            <input type="text" id="composerInput" placeholder="Type a message">
            <button id="sendButton">↑</button>
        </div>
    </div>

    <div class="say-screen" id="sayScreen">
        <h1>Say</h1>
        <p>Your phrasebook</p>
        <button onclick="createCatalog()">+ New Catalog</button>
        <div class="catalog-grid" id="catalogList">
            <!-- Catalogs will be dynamically added here -->
        </div>
    </div>

    <script>
        const app = {
            state: {
                onboardingCompleted: localStorage.getItem('talk_onboarded') === 'true',
                activeScreen: 'home',
                sessions: [],
                activeSession: null,
                messages: [],
                catalogs: [],
                cards: [],
                settings: {
                    defaultSourceLanguage: 'en',
                    defaultTargetLanguage: 'th',
                    editWindowDuration: 300, // in seconds
                    autoScroll: true,
                    showEngineBadge: true
                }
            },
            init: function() {
                if (!this.state.onboardingCompleted) {
                    this.showOnboarding();
                } else {
                    this.showHomeScreen();
                }
            },
            showOnboarding: function() {
                this.state.activeScreen = 'onboarding';
                document.getElementById('app').style.display = 'none';
                document.getElementById('chatScreen').style.display = 'none';
                document.getElementById('sayScreen').style.display = 'none';
                this.renderOnboarding();
            },
            renderOnboarding: function() {
                const onboardingContent = `
                    <div class="onboarding">
                        <div class="onboarding-card">
                            <h1>Talk to anyone</h1>
                            <p>Real-time translation for seamless conversation.</p>
                            <button onclick="app.nextOnboardingCard()">Next →</button>
                        </div>
                        <div class="onboarding-card" style="display:none;">
                            <h1>Build your phrasebook</h1>
                            <p>Save and curate phrases for future use.</p>
                            <button onclick="app.nextOnboardingCard()">Next →</button>
                        </div>
                        <div class="onboarding-card" style="display:none;">
                            <h1>Works offline</h1>
                            <p>Translate on-device without an internet connection.</p>
                            <button onclick="app.startApp()">Get started</button>
                        </div>
                    </div>
                `;
                document.body.innerHTML = onboardingContent;
            },
            nextOnboardingCard: function() {
                const cards = document.querySelectorAll('.onboarding-card');
                let currentCard = 0;
                for (let card of cards) {
                    if (card.style.display !== 'none') {
                        card.style.display = 'none';
                        currentCard++;
                    }
                }
                cards[currentCard].style.display = 'block';
            },
            startApp: function() {
                localStorage.setItem('talk_onboarded', 'true');
                this.state.onboardingCompleted = true;
                this.showHomeScreen();
            },
            showHomeScreen: function() {
                this.state.activeScreen = 'home';
                document.getElementById('app').style.display = 'block';
                document.getElementById('chatScreen').style.display = 'none';
                document.getElementById('sayScreen').style.display = 'none';
                this.renderHomeScreen();
            },
            renderHomeScreen: function() {
                const recentSessions
const recentSessions = this.state.sessions.map(session => `
                    <div class="session-card" onclick="app.resumeSession('${session.sessionId}')">
                        <div class="avatar">${session.partnerName.charAt(0)}</div>
                        <div class="info">
                            <h3>${session.partnerName}</h3>
                            <p>${session.langPair} · ${session.timeAgo}</p>
                        </div>
                        <div class="badge">${session.messageCount}</div>
                    </div>
                `).join('');
                document.getElementById('recentSessions').innerHTML = recentSessions;
            },
            startChat: function() {
                this.state.activeScreen = 'startChat';
                document.getElementById('app').style.display = 'none';
                document.getElementById('chatScreen').style.display = 'none';
                document.getElementById('sayScreen').style.display = 'none';
                this.renderStartChat();
            },
            renderStartChat: function() {
                const startChatContent = `
                    <div class="start-chat">
                        <h1>Start a Chat</h1>
                        <input type="text" id="yourName" placeholder="Your name" maxlength="30" autofocus>
                        <select id="yourLanguage">
                            <option value="en">English</option>
                            <option value="th">Thai</option>
                            <!-- Add more languages as needed -->
                        </select>
                        <select id="partnerLanguage">
                            <option value="th">Thai</option>
                            <option value="en">English</option>
                            <!-- Add more languages as needed -->
                        </select>
                        <button onclick="app.createSession()">Create session</button>
                    </div>
                `;
                document.body.innerHTML = startChatContent;
            },
            createSession: function() {
                const yourName = document.getElementById('yourName').value;
                const yourLanguage = document.getElementById('yourLanguage').value;
                const partnerLanguage = document.getElementById('partnerLanguage').value;
                const sessionCode = this.generateSessionCode();
                const sessionId = this.genId();
                const session = {
                    sessionId: sessionId,
                    sessionCode: sessionCode,
                    myName: yourName,
                    myLang: yourLanguage,
                    partnerName: 'Partner',
                    partnerLang: partnerLanguage,
                    isInitiator: true,
                    createdAt: Date.now(),
                    lastActivity: Date.now(),
                    langPair: `${yourLanguage} ↔ ${partnerLanguage}`
                };
                this.state.sessions.push(session);
                this.state.activeSession = session;
                this.showChatScreen();
            },
            joinSession: function() {
                this.state.activeScreen = 'joinSession';
                document.getElementById('app').style.display = 'none';
                document.getElementById('chatScreen').style.display = 'none';
                document.getElementById('sayScreen').style.display = 'none';
                this.renderJoinSession();
            },
            renderJoinSession: function() {
                const joinSessionContent = `
                    <div class="join-session">
                        <h1>Join a Session</h1>
                        <input type="text" id="joinCode" placeholder="Session code" maxlength="6">
                        <input type="text" id="joinName" placeholder="Your name" maxlength="30">
                        <select id="joinLanguage">
                            <option value="en">English</option>
                            <option value="th">Thai</option>
                            <!-- Add more languages as needed -->
                        </select>
                        <button onclick="app.joinSessionCode()">Join session</button>
                    </div>
                `;
                document.body.innerHTML = joinSessionContent;
            },
            joinSessionCode: function() {
                const joinCode = document.getElementById('joinCode').value;
                const joinName = document.getElementById('joinName').value;
                const joinLanguage = document.getElementById('joinLanguage').value;
                const session = this.state.sessions.find(s => s.sessionCode === joinCode);
                if (session) {
                    session.partnerName = joinName;
                    session.partnerLang = joinLanguage;
                    session.isInitiator = false;
                    this.state.activeSession = session;
                    this.showChatScreen();
                } else {
                    alert('Session code not found.');
                }
            },
            showChatScreen: function() {
                this.state.activeScreen = 'chat';
                document.getElementById('app').style.display = 'none';
                document.getElementById('chatScreen').style.display = 'block';
                document.getElementById('sayScreen').style.display = 'none';
                this.renderChatScreen();
            },
            renderChatScreen: function() {
                const session = this.state.activeSession;
                document.getElementById('partnerName').innerText = session.partnerName;
                document.getElementById('languageChip').innerText = `${session.myLang} ↔ ${session.partnerLang}`;
                document.getElementById('connectionDot').style.backgroundColor = 'green';
                document.getElementById('connectionLabel').innerText = 'Connected';
                document.getElementById('engineBadge').innerText = '🟢 On-device translation';
                this.renderMessages();
            },
            renderMessages: function() {
                const messages = this.state.messages.filter(msg => msg.sessionId === this.state.activeSession.sessionId);
                const messageList = messages.map(msg => `
                    <div class="message-card ${msg.from === 'me' ? 'mine' : 'theirs'}">
                        <div class="content">
                            <div class="translated">${msg.translated}</div>
                            <div class="original">${msg.text}</div>
                        </div>
                        <footer>
                            <div class="clarify">?</div>
                            <div class="time">${this.formatTime(msg.timestamp)}</div>
                            <div class="status">${msg.status}</div>
                        </footer>
                    </div>
                `).join('');
                document.getElementById('messageList').innerHTML = messageList;
            },
            backToHome: function() {
                if (confirm('End session?')) {
                    this.endSession();
                    this.showHomeScreen();
                }
            },
            endSession: function() {
                const session = this.state.activeSession;
                if (session) {
                    const messages = this.state.messages.filter(msg => msg.sessionId === session.sessionId);
                    messages.forEach(msg => {
                        if (msg.status === 'sent') {
                            msg.status = 'delivered';
                        }
                    });
                    this.state.activeSession = null;
                }
            },
            openSessionMenu: function() {
                // Implement session menu functionality
            },
            openSay: function() {
                this.state.activeScreen = 'say';
                document.getElementById('app').style.display = 'none';
                document.getElementById('chatScreen').style.display = 'none';
                document.getElementById('sayScreen').style.display = 'block';
                this.renderSayScreen();
            },
            renderSayScreen: function() {
                const catalogs = this.state.catalogs.map(catalog => `
                    <div class="catalog-card" onclick="app.openCatalog('${catalog.id}')">
                        ${catalog.emoji ? `<span class="emoji">${catalog.emoji}</span>` : ''}
                        <h2>${catalog.name}</h2>
                        <p>${catalog.phraseCount} phrases · ${this.timeAgo(catalog.updatedAt)}</p>
                        ${catalog.isPinned ? '<span class="pin">📌</span>' : ''}
                    </div>
                `).join('');
                document.getElementById('catalogList').innerHTML = catalogs;
            },
            openCatalog: function(catalogId) {
                const catalog = this.state.catalogs.find(c => c.id === catalogId);
                if (catalog) {
                    this.state.activeCatalog = catalog;
                    this.renderCatalogDetails();
                }
            },
            renderCatalogDetails: function() {
                const catalog = this.state.activeCatalog;
                const cards = this.state.cards.filter(card => card.catalogIds.includes(catalog.id)).map(card => `
                    <div class="card-item" onclick="app.toggleCard('${card.id}')">
                        <div class="favorite">${card.favorite ? '⭐' : ''}</div>
                        <div class="source">${card.source}</div>
                        <div class="target">${card.target}</div>
                        <div class="tts">🔊</div>
                        <div class="chevron">›</div>
                        <div class="details">
                            <div class="field">
                                <label>Source</label>
                                <input type="text" value="${card.source}" oninput="app.updateCardField('${card.id}', 'source', this.value)">
                            </div>
                            <div class="field">
                                <label>Translation</label>
                                <input type="text" value="${card.target}" oninput="app.updateCardField('${card.id}', 'target', this.value)">
                            </div>
                            <div class="field">
                                <label>Back-Translation</label>
                                <input type="text" value="${card.backTranslation}" oninput="app.updateCardField('${card.id}', 'backTranslation', this.value)">
                            </div>
                            <div class="field">
                                <label>Notes</label>
                                <textarea>${card.notes}</textarea>
                            </div>
                            <div class="priority">
                                <button class="${card.priority === 'Essential' ? 'active' : ''}" onclick="app.setCardPriority('${card.id}', 'Essential')">Essential</button>
                                <button class="${card.priority === 'Standard' ? 'active' : ''}" onclick="app.setCardPriority('${card.id}', 'Standard')">Standard</button>
                                <button class="${card.priority === 'Archive' ? 'active' : ''}" onclick="app.setCardPriority('${card.id}', 'Archive')">Archive</button>
                            </div>
                            <div class="meta">
                                Used ${card.usage}× · Added ${this.timeAgo(card.createdAt)} · From Talk
                            </div>
                            <div class="actions">
                                <button onclick="app.useInTalk('${card.id}')">🔊 Use in Talk</button>
                                <button onclick="app.deleteCard('${card.id}')">🗑 Delete</button>
                            </div>
                        </div>
                    </div>
                `).join('');
                document.getElementById('cardList').innerHTML = cards;
            },
            toggleCard: function(cardId) {
                const card = document.querySelector(`.card-item[data-id="${cardId}"]`);
                card.classList.toggle('expanded');
            },
            updateCardField: function(cardId, field, value) {
                const card = this.state.cards.find(c => c.id === cardId);
                if (card) {
                    card[field] = value;
                }
            },
            setCardPriority: function(cardId, priority) {
                const card = this.state.cards.find(c => c.id === cardId);
                if (card) {
                    card.priority = priority;
                }
            },
            useInTalk: function(cardId) {
                const card = this.state.cards.find(c => c.id === cardId);
                if (card && this.state.activeSession) {
                    const message = {
                        id: this.genId(),
                        from: 'me',
                        text: card.source,
                        lang: card.sourceLang,
                        translated: card.target,
                        status: 'sent',
                        timestamp: Date.now(),
                        sessionId: this.state.activeSession.sessionId
                    };
                    this.state.messages.push(message);
                    this.renderMessages();
                }
            },
            deleteCard: function(cardId) {
                this.state.cards = this.state.cards.filter(c => c.id !== cardId);
                this.renderCatalogDetails();
            },
            createCatalog: function() {
                const catalog = {
                    id: this.genId(),
                    name: 'New Catalog',
                    note: '',
                    emoji: '',
                    color: '',
                    createdAt: Date.now(),
                    isPinned: false,
                    isDefault: false
                };
                this.state.catalogs.push(catalog);
                this.renderSayScreen();
            },
            openSettings: function() {
                // Implement settings functionality
            },
            genId: function() {
                return `${Date.now()}-${Math.random().toString(36).substr(2, 9)}`;
            },
            generateSessionCode: function() {
                const characters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
                let code = '';
                for (let i = 0; i < 6; i++) {
                    code += characters.charAt(Math.floor(Math.random() * characters.length));
                }
                return code;
            },
            formatTime: function(timestamp) {
                const date = new Date(timestamp);
                return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            },
            timeAgo: function(timestamp) {
                const now = new Date();
                const then = new Date(timestamp);
                const seconds = Math.floor((now - then) / 1000);
                let interval = Math.floor(seconds / 31536000);
                if (interval > 1) {
                    return interval + 'y';
                }
                interval = Math.floor(seconds / 2592000);
                if (interval > 1) {
                    return interval + 'mo';
                }
                interval = Math.floor(seconds / 86400);
                if (interval > 1) {
                    return interval + 'd';
                }
                interval = Math.floor(seconds / 3600);
                if (interval > 1) {
                    return interval + 'h';
                }
                interval = Math.floor(seconds / 60);
                if (interval > 1) {
                    return interval + 'm';
                }
                return 'now';
            }
        };

        app.init();
    </script>
</body>
</html>
