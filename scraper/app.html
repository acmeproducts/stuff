
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OC Scraper</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f0f2f5;min-height:100vh}
  .w{max-width:1200px;margin:0 auto;padding:20px}
  header{text-align:center;padding:30px 0;color:#333}
  header h1{font-size:34px;margin-bottom:6px}
  .nav{display:flex;gap:10px;justify-content:center;margin-bottom:20px;flex-wrap:wrap}
  .nav button{padding:12px 24px;border:none;border-radius:25px;cursor:pointer;background:#ddd;font-weight:600;transition:.2s}
  .nav button.active{background:#4f46e5;color:#fff}
  .sec{display:none;background:#fff;border-radius:14px;padding:28px;margin-bottom:20px;box-shadow:0 4px 20px rgba(0,0,0,.08)}
  .sec.active{display:block;animation:fade .4s ease}
  @keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  h2{color:#4f46e5;margin-bottom:20px;font-size:22px}
  .field{margin-bottom:16px}
  .field label{display:block;font-weight:600;margin-bottom:6px;color:#444;font-size:14px}
  .field input,.field textarea{width:100%;padding:12px;border:1px solid #ddd;border-radius:10px;font-size:14px}
  .field textarea{min-height:340px;font-family:monospace;font-size:12px;resize:vertical}
  .btn{display:inline-block;padding:10px 20px;border:none;border-radius:20px;cursor:pointer;font-size:14px;font-weight:600;margin:4px;transition:.2s}
  .btn-p{background:#4f46e5;color:#fff}.btn-g{background:#16a34a;color:#fff}.btn-s{background:#6b7280;color:#fff}.btn-d{background:#dc2626;color:#fff}
  .btn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.15)}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .item{padding:14px;background:#f8fafc;border-radius:10px;margin-bottom:10px;border-left:4px solid #cbd5e1}
  .item.ok{border-left-color:#16a34a;background:#f0fdf4}
  .item.err{border-left-color:#dc2626;background:#fef2f2}
  .item.run{border-left-color:#4f46e5;background:#eef2ff}
  .badges{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
  .badge{padding:8px 16px;border-radius:20px;font-size:14px;font-weight:500;background:#4f46e5;color:#fff}
  .badge.g{background:#16a34a}
  .tabs{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
  .tab{padding:10px 18px;border:2px solid #e5e7eb;background:#fff;border-radius:25px;cursor:pointer;font-weight:600;font-size:14px}
  .tab.active{background:#4f46e5;color:#fff;border-color:#4f46e5}
  .q{width:100%;padding:12px 18px;border:2px solid #e5e7eb;border-radius:25px;font-size:15px;margin-bottom:16px}
  .q:focus{outline:none;border-color:#4f46e5}
  .tw{overflow-x:auto;border-radius:12px;border:1px solid #e5e7eb}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{background:#4f46e5;color:#fff;padding:12px;text-align:left;cursor:pointer;white-space:nowrap}
  th:hover{background:#4338ca}
  td{padding:10px 12px;border-bottom:1px solid #e5e7eb}
  tr:hover{background:#f8fafc}
  .src{display:inline-block;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:700}
  .src-cd{background:#dbeafe;color:#1e40af}.src-g9{background:#f3e8ff;color:#7c3aed}.src-ta{background:#dcfce7;color:#166534}
  .erow{margin-top:20px;padding-top:20px;border-top:1px solid #e5e7eb;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .toast{position:fixed;bottom:20px;right:20px;padding:14px 22px;border-radius:10px;color:#fff;font-weight:600;box-shadow:0 10px 30px rgba(0,0,0,.2);animation:si .3s ease;z-index:1000}
  .toast.e{background:#dc2626}
  @keyframes si{from{transform:translateX(100%)}to{transform:translateX(0)}}
  .hid{display:none}
</style>
</head>
<body>
<div class="w">
  <header><h1>OC Scraper</h1></header>
  <nav class="nav">
    <button class="active" onclick="go('cfg')">Configure</button>
    <button onclick="go('rules')">Rules JSON</button>
    <button onclick="go('exec')">Execute</button>
    <button onclick="go('view')">View Data</button>
  </nav>

  <section id="s-cfg" class="sec active">
    <h2>Configure</h2>
    <div class="field"><label>Worker URL</label><input type="text" id="wurl" value="https://site-scraper.myacctfortracking.workers.dev"></div>
    <div class="field"><label>Rules JSON URL</label><input type="text" id="rurl" placeholder="https://raw.githubusercontent.com/.../rules.json"></div>
    <button class="btn btn-p" onclick="saveCfg()">Save</button>
    <button class="btn btn-s" onclick="loadRulesUrl()">Load Rules</button>
  </section>

  <section id="s-rules" class="sec">
    <h2>Rules JSON</h2>
    <p style="color:#555;margin-bottom:12px">Paste, edit, import, or export your scraping rules.</p>
    <div class="field"><textarea id="tarea" placeholder='{"sources":{"cakdolls-oc":{"url":"..."}}}'></textarea></div>
    <button class="btn btn-p" onclick="saveRules()">Save Rules</button>
    <button class="btn btn-g" onclick="copyRules()">Copy</button>
    <button class="btn btn-s" onclick="exportRules()">Export JSON</button>
    <button class="btn btn-s" onclick="document.getElementById('fin').click()">Import JSON</button>
    <input type="file" id="fin" class="hid" accept=".json" onchange="importRules(this)">
  </section>

  <section id="s-exec" class="sec">
    <h2>Execute</h2>
    <div class="badges"><span class="badge">Sources: <b id="bsrc">0</b></span><span class="badge g">Records: <b id="brec">0</b></span></div>
    <button class="btn btn-p" id="goBtn" onclick="run()" style="font-size:16px;padding:16px 36px">Start Scraping</button>
    <div id="pro" style="margin-top:20px"></div>
  </section>

  <section id="s-view" class="sec">
    <h2>Results</h2>
    <div class="tabs" id="tabs"></div>
    <input type="text" class="q" id="q" placeholder="Search..." oninput="doFilter()">
    <div class="tw"><table><thead><tr><th onclick="sort('name')">Name</th><th onclick="sort('age')">Age</th><th onclick="sort('height')">Height</th><th onclick="sort('weight')">Weight</th><th>Terms</th><th>Location</th><th onclick="sort('source')">Source</th></tr></thead><tbody id="tbody"><tr><td colspan="7" style="text-align:center;padding:40px;color:#888">No data yet.</td></tr></tbody></table></div>
    <div class="erow"><span id="vcount">0 records</span><button class="btn btn-s" onclick="ex('json')">JSON</button><button class="btn btn-s" onclick="ex('csv')">CSV</button><button class="btn btn-g" onclick="ex('sqlite')">SQLite</button><button class="btn btn-d" onclick="clr()">Clear</button></div>
  </section>
</div>
<script>
/* STATE */
let DB=null, ALL=[], VIEW=[], RULES=null, CFG={}, filt='all', sortCol='name', sortAsc=true;

/* INIT */
window.onload=()=>{
  initSqlJs({locateFile:f=>`https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/${f}`}).then(SQL=>{
    DB=new SQL.Database();
    DB.run(`CREATE TABLE IF NOT EXISTS models(id INTEGER PRIMARY KEY,source TEXT,name TEXT,age INTEGER,height TEXT,weight TEXT,terms TEXT,location TEXT,profile_url TEXT UNIQUE,date_first_seen TEXT DEFAULT CURRENT_DATE)`);
    loadData(); restore();
  });
};

function restore(){
  try{CFG=JSON.parse(localStorage.getItem('sCfg')||'{}');}catch(e){CFG={};}
  document.getElementById('wurl').value=CFG.w||'https://site-scraper.myacctfortracking.workers.dev';
  if(CFG.r)document.getElementById('rurl').value=CFG.r;
  const s=localStorage.getItem('sRules');
  if(s){RULES=JSON.parse(s);document.getElementById('tarea').value=s;updSrc();}
}

/* NAV */
function go(id){
  document.querySelectorAll('.sec').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById('s-'+id).classList.add('active');
  event.target.classList.add('active');
  if(id==='view'){loadData();mkTabs();doFilter();}
}

/* CFG */
function saveCfg(){CFG.w=document.getElementById('wurl').value.trim();CFG.r=document.getElementById('rurl').value.trim();localStorage.setItem('sCfg',JSON.stringify(CFG));toast('Saved');}
async function loadRulesUrl(){
  let u=document.getElementById('rurl').value.trim();if(!u)return toast('Enter URL','e');
  u=u.replace('github.com','raw.githubusercontent.com').replace('/blob/','/');document.getElementById('rurl').value=u;
  try{const r=await fetch(u,{cache:'no-cache'});RULES=await r.json();const t=JSON.stringify(RULES,null,2);localStorage.setItem('sRules',t);document.getElementById('tarea').value=t;updSrc();toast('Loaded');}catch(e){toast('Fail: '+e.message,'e');}
}

/* RULES TAB */
function saveRules(){try{const t=document.getElementById('tarea').value;RULES=JSON.parse(t);localStorage.setItem('sRules',t);updSrc();toast('Saved');}catch(e){toast('Bad JSON: '+e.message,'e');}}
function copyRules(){navigator.clipboard.writeText(document.getElementById('tarea').value);toast('Copied');}
function exportRules(){const b=new Blob([document.getElementById('tarea').value],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='rules.json';a.click();}
function importRules(inp){const f=inp.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{document.getElementById('tarea').value=e.target.result;saveRules();};r.readAsText(f);}
function updSrc(){const n=RULES&&RULES.sources?Object.keys(RULES.sources).filter(k=>RULES.sources[k].enabled!==false).length:0;document.getElementById('bsrc').textContent=n;}

/* EXECUTE */
async function run(){
  if(!RULES||!RULES.sources)return toast('Load rules','e');
  if(!CFG.w)return toast('Set worker URL','e');
  const btn=document.getElementById('goBtn');btn.disabled=true;btn.textContent='Scraping...';
  const wrap=document.getElementById('pro');wrap.innerHTML='';
  const entries=Object.entries(RULES.sources).filter(([k,v])=>v.enabled!==false);
  for(const [key,src] of entries){
    const el=document.createElement('div');el.className='item run';el.innerHTML=`<b>${src.name||key}</b><br><small>${src.url}</small>`;wrap.appendChild(el);
    try{
      const proxy=CFG.w.replace(/\/$/,'')+'/?url='+encodeURIComponent(src.url);
      const r=await fetch(proxy,{cache:'no-cache'});if(!r.ok)throw new Error('HTTP '+r.status);
      const html=await r.text();if(html.length<100)throw new Error('Empty');
      const rows=parseHtml(html,src,key);let a=0,u=0;
      for(const row of rows){
        try{
          const ex=DB.exec(`SELECT date_first_seen FROM models WHERE profile_url='${esc(row.profile_url)}'`);
          const fs=(ex.length&&ex[0].values.length)?ex[0].values[0][0]:new Date().toISOString().split('T')[0];
          DB.run(`INSERT OR REPLACE INTO models(source,date_first_seen,name,age,height,weight,terms,location,profile_url)VALUES(?,?,?,?,?,?,?,?,?)`,[key,fs,row.name||'',row.age||null,row.height||'',row.weight||'',row.terms||'',row.location||'',row.profile_url]);
          (ex.length&&ex[0].values.length)?u++:a++;
        }catch(e){}
      }
      saveDb();el.className='item ok';el.innerHTML=`<b>${src.name||key}</b> — ${rows.length} parsed (${a} new, ${u} upd)`;
    }catch(err){el.className='item err';el.innerHTML=`<b>${src.name||key}</b> — ${err.message}`;}
  }
  btn.disabled=false;btn.textContent='Start Scraping';loadData();mkTabs();doFilter();
}

/* PARSER */
function parseHtml(html,src){
  const out=[],re=new RegExp(src.itemPattern,'gi'),seen=new Set();let m;
  while((m=re.exec(html))!==null){
    const slug=(m[2]||m[1]||'').toString();if(seen.has(slug))continue;seen.add(slug);
    const ctx=html.substring(m.index,m.index+(src.contextRange||1000));
    if(src.filters?.excludeContexts){if(src.filters.excludeContexts.some(x=>ctx.includes(x)))continue;}
    if(src.filters?.mustContainContexts){if(!src.filters.mustContainContexts.some(x=>ctx.includes(x)))continue;}
    const row={profile_url:m[1],slug};
    for(const[f,cfg]of Object.entries(src.fields||{})){
      let v=null;
      if(cfg.static)v=cfg.static;
      else if(cfg.fromMatch&&typeof cfg.fromMatch==='number')v=m[cfg.fromMatch]||null;
      else if(cfg.contextRegex){const mm=ctx.match(new RegExp(cfg.contextRegex,'i'));if(mm){v=mm[1]||null;if(cfg.format&&mm.length>1){v=cfg.format;for(let i=1;i<mm.length&&i<=9;i++)v=v.replace('${'+i+'}',mm[i]||'');v=v.replace(/\$\{\d\}/g,'');}}}
      if(v&&cfg.transform)v=tx(v,cfg.transform);
      if(v&&cfg.type==='integer')v=parseInt(String(v).replace(/\D/g,''),10)||null;
      row[f]=v;
    }
    out.push(row);
  }
  return out;
}
function tx(v,t){if(t==='cmToFt'){const c=parseInt(v,10);if(!isNaN(c)){const i=c/2.54;return Math.floor(i/12)+"'"+Math.round(i%12)+'"';}}if(t==='splitDash')return String(v).split(/[-–—]/)[0].trim();if(t==='trim')return String(v).trim();if(t==='removeQuotes')return String(v).replace(/["']/g,'').trim();return v;}

/* VIEW */
function loadData(){if(!DB)return;const r=DB.exec('SELECT * FROM models ORDER BY name COLLATE NOCASE');if(r.length){const c=r[0].columns;ALL=r[0].values.map(row=>{const o={};c.forEach((col,i)=>o[col]=row[i]);return o;});}else ALL=[];document.getElementById('brec').textContent=ALL.length;document.getElementById('vcount').textContent=ALL.length+' records';}
function mkTabs(){const srcs=[...new Set(ALL.map(r=>r.source))],cnt={all:ALL.length};srcs.forEach(s=>cnt[s]=ALL.filter(r=>r.source===s).length);const map={};if(RULES&&RULES.sources)Object.entries(RULES.sources).forEach(([k,v])=>map[k]=(v.name||k).split(' ')[0]);const box=document.getElementById('tabs');let h='<button class="tab '+(filt==='all'?'active':'')+'" onclick="sf(\'all\')">All ('+cnt.all+')</button>';srcs.forEach(s=>{h+='<button class="tab '+(filt===s?'active':'')+'" onclick="sf(\''+s+'\')">'+(map[s]||s)+' ('+cnt[s]+')</button>';});box.innerHTML=h;}
function sf(s){filt=s;mkTabs();doFilter();}
function doFilter(){const q=document.getElementById('q').value.trim().toLowerCase();VIEW=ALL.filter(r=>{if(filt!=='all'&&r.source!==filt)return false;if(!q)return true;return Object.values(r).some(v=>String(v||'').toLowerCase().includes(q));});sortNow();}
function sort(c){if(sortCol===c)sortAsc=!sortAsc;else{sortCol=c;sortAsc=true;}sortNow();}
function sortNow(){VIEW.sort((a,b)=>{let av=a[sortCol]??'',bv=b[sortCol]??'';const an=parseFloat(av),bn=parseFloat(bv);if(!isNaN(an)&&!isNaN(bn)&&String(av).match(/^\d/)&&String(bv).match(/^\d/))return sortAsc?an-bn:bn-an;return sortAsc?String(av).localeCompare(String(bv)):String(bv).localeCompare(String(av));});render();}
function render(){const b=document.getElementById('tbody');if(!VIEW.length){b.innerHTML='<tr><td colspan="7" style="text-align:center;padding:40px;color:#888">No matches.</td></tr>';document.getElementById('vcount').textContent='0 records';return;}document.getElementById('vcount').textContent=VIEW.length+' records';b.innerHTML=VIEW.map(r=>{const cls=r.source?.includes('cak')?'src-cd':r.source?.includes('get9')?'src-g9':'src-ta';const lbl=r.source?.split('-')[0]||r.source||'';return'<tr><td>'+es(r.name)+'</td><td>'+(r.age||'')+'</td><td>'+es(r.height)+'</td><td>'+(r.weight||'')+'</td><td>'+es(r.terms)+'</td><td>'+es(r.location)+'</td><td><span class="src '+cls+'">'+lbl+'</span></td></tr>';}).join('');}
function es(s){return String(s||'').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

/* EXPORT/CLEAR */
function ex(fmt){if(fmt==='json'){const b=new Blob([JSON.stringify(ALL,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='models.json';a.click();}else if(fmt==='csv'){const h=['source','date_first_seen','name','age','height','weight','terms','location','profile_url'];const rows=ALL.map(r=>h.map(k=>'"'+String(r[k]||'').replace(/"/g,'""')+'"').join(','));const blob=new Blob([[h.join(','),...rows].join('\n')],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='models.csv';a.click();}else if(fmt==='sqlite'){const blob=new Blob([DB.export()],{type:'application/octet-stream'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='models.db';a.click();}}
function clr(){if(!confirm('Delete all?'))return;DB.run('DELETE FROM models');saveDb();ALL=[];VIEW=[];render();mkTabs();document.getElementById('brec').textContent='0';document.getElementById('vcount').textContent='0 records';toast('Cleared');}
function saveDb(){const a=DB.export();let s='';for(let i=0;i<a.length;i++)s+=String.fromCharCode(a[i]);localStorage.setItem('sDb',btoa(s));}
function toast(msg,ty){const t=document.createElement('div');t.className='toast '+(ty||'');t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),3000);}
</script>
</body>
</html>
