<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SayIt Studio v7.1: The Unified Learning Agent</title>
<style>
:root{
  --bg:#09090b; --surface:#18181b; --surface2:#111827; --surface3:#27272a;
  --border:#27272a; --border2:#3f3f46; --text:#f4f4f5; --muted:#a1a1aa;
  --accent:#14b8a6; --accentHover:#0d9488; --ok:#22c55e; --warn:#f59e0b; --danger:#ef4444;
  --mono:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace;
  --sans:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  --headerH:60px; --footerH:38px; --sidebarW:280px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px}
body{display:flex;flex-direction:column}

/* Header & Tab Navigation */
header{height:var(--headerH);background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 12px;gap:12px;flex-shrink:0;z-index:100}
.logo{font-size:20px;font-weight:800;letter-spacing:-0.5px;white-space:nowrap}.logo span{color:var(--accent)}
header .tab-nav{display:flex;gap:4px;overflow-x:auto;scrollbar-width:none;flex:1}
header .tab-nav::-webkit-scrollbar{display:none}
.tab-btn,.btn{border:1px solid var(--border2);background:var(--surface2);color:var(--text);border-radius:12px;cursor:pointer;transition:.15s;font-weight:700}
.tab-btn{padding:0 14px;height:38px;font-size:12px;white-space:nowrap}
.tab-btn.active{background:var(--accent);color:#041414;border-color:transparent}
.btn{padding:0 16px;min-height:38px;font-size:13px;display:inline-flex;align-items:center;justify-content:center;gap:8px}
.btn-primary{background:var(--accent);color:#041414;border:none}.btn-primary:hover{background:var(--accentHover)}
.btn-icon{width:38px;height:38px;padding:0;font-size:18px;flex-shrink:0}

/* Layout Parts */
.app{flex:1;display:flex;overflow:hidden;min-height:0}
.view{display:none;width:100%;height:100%;overflow:hidden}.view.active{display:flex}
.sidebar{width:var(--sidebarW);min-width:var(--sidebarW);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;transition:.25s cubic-bezier(0.4, 0, 0.2, 1);overflow:hidden}
.sidebar.collapsed{width:0;min-width:0;border-right:none;opacity:0}
.sidebar-header{padding:16px;border-bottom:1px solid var(--border);font-weight:800;display:flex;justify-content:space-between;align-items:center}
.sidebar-content{flex:1;overflow-y:auto;padding:12px}

.main{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--bg)}
.content-area{flex:1;overflow-y:auto;padding:24px}
.split-bottom{height:40%;min-height:220px;background:var(--bg);border-top:1px solid var(--border);padding:16px;overflow-y:auto}

/* Job Cards & UI Components */
.section-title{font-size:18px;font-weight:800;margin-bottom:14px}
.list-item{padding:14px;background:var(--surface2);border:1px solid var(--border);border-radius:12px;margin-bottom:8px;cursor:pointer;transition:.1s}
.list-item.active{border-color:var(--accent);background:#0f2624}
.list-item strong{display:block;font-size:14px}
.list-item span{font-size:11px;color:var(--muted);font-family:var(--mono)}

.status-pill{width:8px;height:8px;border-radius:50%;display:inline-flex;margin-right:6px}
.status-idle{background:var(--muted)}.status-running{background:var(--warn)}.status-shipped{background:var(--ok)}

.input-group{margin-bottom:16px}.input-group label{display:block;font-size:11px;font-weight:800;color:var(--muted);margin-bottom:6px;text-transform:uppercase}
.input,.textarea,.select{width:100%;background:#09090b;border:1px solid var(--border2);border-radius:10px;padding:12px;color:var(--text);font-size:14px;outline:none}
.textarea{min-height:100px;font-family:var(--mono);line-height:1.5}
.code-block{background:#000;border:1px solid var(--border2);border-radius:12px;padding:16px;font-family:var(--mono);font-size:12px;line-height:1.6;color:#d1d5db;position:relative;overflow:auto}

.okbox{background:#052e16;color:#bbf7d0;border:1px solid #166534;padding:14px;border-radius:12px;margin:12px 0;font-size:13px;line-height:1.5}
.warnbox{background:#3a2a05;color:#fde68a;border:1px solid #92400e;padding:14px;border-radius:12px;margin:12px 0;font-size:13px}

.footer{height:var(--footerH);background:var(--surface);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:center;padding:0 16px;font-size:11px;color:var(--muted);font-family:var(--mono);gap:15px;flex-shrink:0}
#toast{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);background:var(--accent);color:#000;padding:10px 20px;border-radius:8px;font-weight:700;z-index:1000;opacity:0;pointer-events:none;transition:0.3s}
#toast.show{opacity:1;bottom:70px}
</style>
</head>
<body>

<header>
  <button class="btn btn-icon" id="toggleSidebarBtn">☰</button>
  <div class="logo">Say<span>It</span> v7.1</div>
  <nav class="tab-nav">
    <button class="tab-btn active" data-view="install">Install</button>
    <button class="tab-btn" data-view="config">Config</button>
    <button class="tab-btn" data-view="calibrate">Calibrate</button>
    <button class="tab-btn" data-view="hub">Unified Hub</button>
    <button class="tab-btn" data-view="logs">System Logs</button>
  </nav>
</header>

<div class="app">
  <!-- INSTALL -->
  <section class="view active" id="view-install">
    <aside class="sidebar">
      <div class="sidebar-header">Technical Setup</div>
      <div class="sidebar-content">
        <div class="list-item active" onclick="showInstall('java')"><strong>MainActivity.java</strong><span>The Context Courier</span></div>
        <div class="list-item" onclick="showInstall('xml')"><strong>AndroidManifest.xml</strong><span>Full Permissions</span></div>
        <div class="list-item" onclick="showInstall('guide')"><strong>Installation order</strong><span>Explicit Checklist</span></div>
        <div class="list-item" onclick="showInstall('test')"><strong>Test Bridge</strong><span>Diagnostics</span></div>
      </div>
    </aside>
    <main class="main"><div class="content-area" id="installContent"></div></main>
  </section>

  <!-- CONFIG -->
  <section class="view" id="view-config">
    <main class="main">
      <div class="content-area" style="max-width:800px; margin:0 auto">
        <div class="section-title">Shipping Registry</div>
        <div class="card" style="background:var(--surface2); padding:24px; border-radius:16px; border:1px solid var(--border)">
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px">
            <div class="input-group"><label>GitHub User</label><input type="text" class="input" id="cfgUser" placeholder="acme-dev"></div>
            <div class="input-group"><label>GitHub Repo</label><input type="text" class="input" id="cfgRepo" placeholder="sayit-apps"></div>
          </div>
          <div class="input-group"><label>GitHub PAT (Private Access Token)</label><input type="password" class="input mono" id="cfgPat"></div>
          <div class="input-group"><label>Wake word Grammar</label><input type="text" class="input" id="cfgWake" value="SayIt"></div>
          <button class="btn btn-primary" style="width:100%; height:50px" onclick="saveConfig()">Save & Secure Registry</button>
        </div>
      </div>
    </main>
  </section>

  <!-- CALIBRATE -->
  <section class="view" id="view-calibrate">
    <aside class="sidebar"><div class="sidebar-header">AI Environments</div><div class="sidebar-content" id="adapterList"></div></aside>
    <main class="main"><div class="content-area" id="calibrateEditor"></div></main>
  </section>

  <!-- UNIFIED HUB -->
  <section class="view" id="view-hub">
    <aside class="sidebar">
      <div class="sidebar-header">Job Pipeline <button class="btn btn-primary" style="padding:4px 8px; font-size:10px" onclick="addJob()">+</button></div>
      <div class="sidebar-content" id="jobList"></div>
    </aside>
    <main class="main">
      <div class="content-area" id="hubEditor"></div>
      <div class="split-bottom">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px">
          <label style="font-size:11px; font-weight:800; color:var(--muted)">DEPLOYMENT BUFFER (AUTO-CAPTURED)</label>
          <div style="display:flex; gap:8px">
            <button class="btn" style="padding:4px 8px; font-size:11px" onclick="manualSync()">Manual Sync</button>
            <button class="btn btn-primary" style="padding:4px 8px; font-size:11px" onclick="shipCurrent()">🚀 SHIP TO GITHUB</button>
          </div>
        </div>
        <textarea class="textarea mono" id="hubResponseArea" readonly placeholder="Output streams here via Learning Agent..."></textarea>
      </div>
    </main>
  </section>

  <!-- LOGS -->
  <section class="view" id="view-logs">
    <main class="main"><div class="content-area"><div class="code-block" id="systemLogs" style="height:500px"></div></div></main>
  </section>
</div>

<footer class="footer">
  <div id="footer-v">SayIt Studio v7.1</div>
  <div>|</div>
  <div id="bridge-status"><span style="color:var(--danger)">THIN CLIENT DISCONNECTED</span></div>
  <div>|</div>
  <div id="footer-ts">2026-04-06 07:15 AM</div>
</footer>

<div id="toast">Message</div>

<script>
// --- REGISTRY STATE ---
let state = {
  config: { user:'', repo:'', pat:'', wake:'SayIt', controlFile:'sayit.html' },
  adapters: [
    { id:'gemini', name:'Gemini', url:'https://gemini.google.com/app', pattern:null, status:'ready' },
    { id:'chatgpt', name:'ChatGPT', url:'https://chatgpt.com', pattern:null, status:'ready' }
  ],
  jobs: [
    { 
        id:'tictactoe', 
        name:'Tic-Tac-Toe Match', 
        file:'tictactoe.html', 
        prompt:'build a self-contained HTML5 file with inline JS that is a two-player tic-tac-toe game that will keep track of a match best two out of three', 
        response:'', 
        issues:'', 
        status:'idle' 
    }
  ],
  selectedJobId: 'tictactoe',
  selectedAdapterId: 'gemini',
  selectedInstall: 'java',
  sidebarCollapsed: false
};

// --- INITIALIZATION ---
function init() {
  const raw = localStorage.getItem('sayit_v7_state');
  if(raw) state = Object.assign(state, JSON.parse(raw));
  setupTabs();
  setupSidebarToggle();
  showInstall('java');
  renderAll();
  setupVoice();
  log("SayIt v7.1 Unified Hub Online.");
}

function save() { localStorage.setItem('sayit_v7_state', JSON.stringify(state)); renderAll(); }
function log(m) {
  const el = document.getElementById('systemLogs');
  if(el) el.innerText = `[${new Date().toLocaleTimeString()}] ${m}\n` + el.innerText;
}
function toast(m) {
  const t = document.getElementById('toast');
  t.innerText = m; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

// --- RENDERING ---
function renderAll() {
  renderJobList();
  renderHub();
  renderAdapters();
  document.querySelectorAll('.sidebar').forEach(el => el.classList.toggle('collapsed', state.sidebarCollapsed));
  const b = document.getElementById('bridge-status');
  b.innerHTML = window.AndroidHelper ? `<span style="color:var(--ok)">THIN CLIENT READY</span>` : `<span style="color:var(--danger)">THIN CLIENT DISCONNECTED</span>`;
}

function renderJobList() {
  const el = document.getElementById('jobList');
  el.innerHTML = state.jobs.map(j => `
    <div class="list-item ${state.selectedJobId === j.id ? 'active' : ''}" onclick="state.selectedJobId='${j.id}';save()">
      <span class="status-pill status-${j.status}"></span>
      <strong>${j.name}</strong><br><small>${j.file}</small>
    </div>
  `).join('');
}

function renderHub() {
  const j = state.jobs.find(x => x.id === state.selectedJobId);
  const area = document.getElementById('hubEditor');
  if(!j) return;
  area.innerHTML = `
    <div class="section-title">Workflow Hub: ${j.name}</div>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px">
      <div class="card" style="background:var(--surface2); padding:20px; border-radius:16px; border:1px solid var(--border)">
        <div class="input-group"><label>Instructions</label><textarea class="textarea" onchange="updateJob('prompt',this.value)">${j.prompt}</textarea></div>
        <button class="btn btn-primary" style="width:100%; height:54px" onclick="runAutonomousLoop()">🚀 SEND + SHIP</button>
      </div>
      <div class="card" style="background:var(--surface2); padding:20px; border-radius:16px; border:1px solid var(--border)">
        <div class="input-group"><label>Issue Log (FIX Loop)</label><textarea class="textarea" id="issueLog" placeholder="e.g. Circle colors are wrong...">${j.issues}</textarea></div>
        <div style="display:flex; gap:10px">
          <button class="btn" style="flex:1" onclick="applyFixLoop()">FIX</button>
          <button class="btn btn-danger" onclick="redoPlatformFail()">REDO</button>
        </div>
        <div class="okbox" style="margin-top:14px">Live Test Page: ${state.config.user}.github.io/${state.config.repo}/${j.file}</div>
      </div>
    </div>
  `;
  document.getElementById('hubResponseArea').value = j.response || '';
}

function renderAdapters() {
  const el = document.getElementById('adapterList');
  el.innerHTML = state.adapters.map(a => `<div class="list-item ${state.selectedAdapterId===a.id?'active' : ''}" onclick="state.selectedAdapterId='${a.id}';save()"><strong>${a.name}</strong></div>`).join('');
  const a = state.adapters.find(x => x.id === state.selectedAdapterId);
  if(a) {
    document.getElementById('calibrateEditor').innerHTML = `
        <div class="section-title">Calibration: ${a.name}</div>
        <div class="okbox">Role-Based Learning: The Agent learns the functional roles of the platform once. This ensures repeatability until the core site structure changes.</div>
        <div class="card" style="padding:20px; background:var(--surface2)">
            <p style="margin-bottom:12px">Pattern Status: ${a.pattern ? 'Calibrated' : 'Awaiting Setup'}</p>
            <button class="btn btn-primary" onclick="openUrl('${a.url}')">Open AI to Calibrate</button>
        </div>
    `;
  }
}

// --- ACTIONS ---
function updateJob(k,v) { const j = state.jobs.find(x => x.id === state.selectedJobId); if(j) j[k]=v; save(); }

function runAutonomousLoop() {
  const j = state.jobs.find(x => x.id === state.selectedJobId);
  const a = state.adapters.find(x => x.id === state.selectedAdapterId);
  if(window.AndroidHelper) {
    window.AndroidHelper.postMessage(JSON.stringify({command:"orchestrate", url:a.url, prompt:j.prompt, loop:true}));
    j.status = 'running';
    save();
    toast("Agent working...");
  } else {
    window.open(a.url, '_blank');
    toast("No Bridge: Manual Copy Required");
  }
}

function redoPlatformFail() {
    const j = state.jobs.find(x => x.id === state.selectedJobId);
    j.prompt = "resending due to prior error of incomplete answer or failed syntax. " + j.prompt;
    j.response = ''; j.status = 'running';
    save();
    runAutonomousLoop();
}

function applyFixLoop() {
    const j = state.jobs.find(x => x.id === state.selectedJobId);
    const iss = document.getElementById('issueLog').value;
    j.issues = iss;
    j.prompt = `Update code: ${j.response}. Requirement: ${iss}. Return full HTML.`;
    save();
    runAutonomousLoop();
}

async function shipCurrent() {
  const j = state.jobs.find(x => x.id === state.selectedJobId);
  if(!j.response) return toast("Buffer Empty");
  toast("Pushing...");
  const url = `https://api.github.com/repos/${state.config.user}/${state.config.repo}/contents/${j.file}`;
  const headers = {"Authorization":`token ${state.config.pat}`,"Accept":"application/vnd.github.v3+json"};
  try {
    const check = await fetch(url, {headers});
    let sha = check.ok ? (await check.json()).sha : null;
    const body = {message:`SayIt Sync: ${j.name}`, content:btoa(unescape(encodeURIComponent(j.response))), branch:"main"};
    if(sha) body.sha = sha;
    const res = await fetch(url, {method:"PUT", headers, body:JSON.stringify(body)});
    if(res.ok) { 
        j.status = 'shipped'; save();
        toast("Shipped!"); 
        window.open(`https://${state.config.user}.github.io/${state.config.repo}/${j.file}`, '_blank');
    }
  } catch(e) { toast("GitHub Error"); }
}

// --- INSTALL HELPERS ---
function showInstall(id) {
  state.selectedInstall = id;
  const el = document.getElementById('installContent');
  if(id==='java') {
    const code = `package com.sayit.v7;\nimport android.app.Activity;\nimport android.os.Bundle;\nimport android.webkit.*;\nimport android.content.*;\nimport org.json.*;\n\npublic class MainActivity extends Activity {\n    private WebView webView;\n    private String activePrompt = "";\n\n    @Override\n    protected void onCreate(Bundle savedInstanceState) {\n        super.onCreate(savedInstanceState);\n        webView = new WebView(this);\n        WebSettings s = webView.getSettings();\n        s.setJavaScriptEnabled(true);\n        s.setDomStorageEnabled(true);\n        s.setMediaPlaybackRequiresUserGesture(false);\n\n        // Required for Voice Commands\n        webView.setWebChromeClient(new WebChromeClient(){\n            @Override\n            public void onPermissionRequest(PermissionRequest r){ r.grant(r.getResources()); }\n        });\n\n        webView.setWebViewClient(new CourierClient());\n        webView.addJavascriptInterface(new AndroidHelper(), "AndroidHelper");\n        setContentView(webView);\n        webView.loadUrl("https://YOUR_USER.github.io/YOUR_REPO/sayit.html");\n    }\n\n    private class CourierClient extends WebViewClient {\n        @Override\n        public void onPageFinished(WebView view, String url) {\n            // Persistent HUD and Observer logic injected here\n        }\n    }\n\n    public class AndroidHelper {\n        @JavascriptInterface\n        public void postMessage(String json) {\n            try {\n                JSONObject obj = new JSONObject(json);\n                String cmd = obj.getString("command");\n                if(cmd.equals("orchestrate")){\n                    activePrompt = obj.getString("prompt");\n                    ClipboardManager cb = (ClipboardManager) getSystemService(CLIPBOARD_SERVICE);\n                    cb.setPrimaryClip(ClipData.newPlainText("SayIt", activePrompt));\n                    runOnUiThread(() -> webView.loadUrl(obj.getString("url")));\n                }\n                if(cmd.equals("clipboard.read")){\n                    ClipboardManager cb = (ClipboardManager) getSystemService(CLIPBOARD_SERVICE);\n                    if(cb.hasPrimaryClip()){\n                        String txt = cb.getPrimaryClip().getItemAt(0).getText().toString();\n                        runOnUiThread(() -> webView.evaluateJavascript("window.receiveEvent('clipboard:'+ \\""+txt.replace("\"", "\\\\\"")+"\\")", null));\n                    }\n                }\n            } catch(Exception e){ }\n        }\n    }\n}`;
    el.innerHTML = `<div class="section-title">MainActivity.java (Absolute Source)</div><div class="okbox">Engineered Context Courier. This is the only component that bypasses mobile clipboard restrictions.</div><div class="code-block">${code}</div>`;
  } else if(id==='xml') {
    const code = `<manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.sayit.v7">\n  <uses-permission android:name="android.permission.INTERNET" />\n  <uses-permission android:name="android.permission.RECORD_AUDIO" />\n  <application android:label="SayIt v7.1" android:usesCleartextTraffic="true">\n    <activity android:name=".MainActivity" android:exported="true">\n      <intent-filter>\n        <action android:name="android.intent.action.MAIN" />\n        <category android:name="android.intent.category.LAUNCHER" />\n      </intent-filter>\n    </activity>\n  </application>\n</manifest>`;
    el.innerHTML = `<div class="section-title">AndroidManifest.xml</div><div class="code-block">${code}</div>`;
  } else if(id==='guide') {
    el.innerHTML = `<div class="section-title">Explicit Checklist</div><div class="card" style="padding:20px; background:var(--surface2); line-height:2">
        1. <b>Build</b>: Use the Java/XML provided in AIDE.<br>
        2. <b>Host</b>: Upload this file as sayit.html to GitHub Pages.<br>
        3. <b>Config</b>: Enter your PAT in the Config tab.<br>
        4. <b>Seeded Demo</b>: Select "Tic-Tac-Toe Match" in the Hub.<br>
        5. <b>Start Loop</b>: Tap "SEND + SHIP". AI site opens.<br>
        6. <b>Learn</b>: Paste prompt manually once (calibrates agent).<br>
        7. <b>Sync</b>: Say "SayIt Ship" or use the button to push to GitHub.
    </div>`;
  } else if(id==='test') {
    el.innerHTML = `<div class="section-title">Bridge Diagnostic</div><button class="btn btn-primary" onclick="pingBridge()">📡 PING BRIDGE</button><div class="code-block" id="bridgeResult" style="margin-top:14px">Awaiting thin client signal...</div>`;
  }
}

// --- UTILS ---
function saveConfig() {
  state.config.user = document.getElementById('cfgUser').value;
  state.config.repo = document.getElementById('cfgRepo').value;
  state.config.pat = document.getElementById('cfgPat').value;
  state.config.wake = document.getElementById('cfgWake').value;
  save();
  toast("Registry Secure");
}

function setupTabs() {
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll('.tab-btn, .view').forEach(el => el.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('view-' + btn.dataset.view).classList.add('active');
      renderAll();
    };
  });
}

function setupSidebarToggle() {
  document.getElementById('toggleSidebarBtn').onclick = () => {
    state.sidebarCollapsed = !state.sidebarCollapsed;
    save();
  };
}

function setupVoice() {
  const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!Speech) return;
  const recognition = new Speech();
  recognition.continuous = true;
  recognition.onresult = (e) => {
    const text = e.results[e.results.length-1][0].transcript.trim().toLowerCase();
    log("Voice In: " + text);
    if(text.includes(state.config.wake.toLowerCase())) {
        if(text.includes("build") || text.includes("start")) runAutonomousLoop();
        if(text.includes("ship") || text.includes("deploy")) shipCurrent();
        if(text.includes("redo")) redoPlatformFail();
    }
  };
  try { recognition.start(); } catch(e) {}
}

window.receiveEvent = function(p) {
  log("Bridge Event: " + p);
  if(p.startsWith('clipboard:')) {
    const t = p.split('clipboard:')[1];
    const j = state.jobs.find(x => x.id === state.selectedJobId);
    if(j) { j.response = t; save(); toast("Buffer Synced"); }
  }
  if(p === 'helper.ready') {
    const res = document.getElementById('bridgeResult');
    if(res) res.innerText = "BRIDGE SECURE: Context Courier Connected.";
  }
};

function pingBridge() {
    if(window.AndroidHelper) window.AndroidHelper.postMessage(JSON.stringify({command:"ping"}));
    else document.getElementById('bridgeResult').innerText = "BRIDGE FAILED: No Thin Client Detected.";
}

function openUrl(url) { if(window.AndroidHelper) window.AndroidHelper.postMessage(JSON.stringify({command:"openUrl", url:url})); else window.open(url, '_blank'); }

function manualSync() { if(window.AndroidHelper) window.AndroidHelper.postMessage(JSON.stringify({command:"clipboard.read"})); else toast("No bridge available"); }

function addJob() {
    const id = Date.now().toString();
    state.jobs.push({ id, name:'New Project', file:'app.html', prompt:'', response:'', issues:'', status:'idle' });
    state.selectedJobId = id;
    save();
}

window.onload = init;
</script>
</body>
</html>
