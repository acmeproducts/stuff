<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bridge Lineage Explorer</title>
  <style>
    :root { --bg:#0b1020; --card:#121a30; --line:#2b3655; --txt:#e7ecf7; --muted:#9da9c7; --accent:#5cc8ff; }
    *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--txt);font-family:Inter,system-ui,sans-serif}
    .app{display:grid;grid-template-columns:380px 1fr;height:100vh}.left{border-right:1px solid var(--line);overflow:auto}
    .top{padding:10px;position:sticky;top:0;background:var(--bg);border-bottom:1px solid var(--line)}
    .search,.sel{width:100%;padding:8px;border:1px solid var(--line);border-radius:8px;background:#0f162b;color:var(--txt)}
    .list{padding:10px;display:flex;flex-direction:column;gap:8px}.item{padding:9px;border:1px solid var(--line);border-radius:8px;background:#0f162b;cursor:pointer}
    .item.active{border-color:var(--accent)}.muted{font-size:.87rem;color:var(--muted)}
    .pane{padding:10px}.tabs button{margin-right:6px;padding:6px 10px;border-radius:8px;border:1px solid var(--line);background:#0f162b;color:var(--txt);cursor:pointer}
    .tabs .active{border-color:var(--accent)}.card{margin-top:10px;border:1px solid var(--line);border-radius:10px;background:var(--card);padding:10px}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.frame{width:100%;height:64vh;border:1px solid var(--line);border-radius:8px;background:#fff}
  </style>
</head>
<body>
<div class="app">
  <aside class="left">
    <div class="top"><input id="omni" class="search" placeholder="Search hash, file, impacts, delta, PT time, commit message, note" /></div>
    <div class="list" id="timeline"></div>
  </aside>
  <main class="pane">
    <div class="tabs"><button id="tabDetails" class="active">Details</button><button id="tabSide">Side-by-Side</button></div>
    <section id="details" class="card"></section>
    <section id="side" class="card" style="display:none">
      <div class="row">
        <div>
          <input id="leftFilter" class="search" placeholder="Filter left selector" />
          <select id="leftSel" class="sel"></select>
          <div class="muted" id="leftMeta"></div>
          <iframe id="leftFrame" class="frame"></iframe>
        </div>
        <div>
          <input id="rightFilter" class="search" placeholder="Filter right selector" />
          <select id="rightSel" class="sel"></select>
          <div class="muted" id="rightMeta"></div>
          <iframe id="rightFrame" class="frame"></iframe>
        </div>
      </div>
    </section>
  </main>
</div>
<script>
const $ = (id) => document.getElementById(id);
const esc = (v) => String(v ?? '').replace(/[&<>\"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
let all=[], shown=[], current=null, leftOptions=[], rightOptions=[];

const blobLink = (entry) => `https://github.com/search?q=${encodeURIComponent((entry.blob_refs?.[0]?.blob)||'')}`;
const launchLink = (entry) => entry.launch_ref || '#';
const label = (entry) => `#${entry.seq} ${entry.commit_short} · ${entry.primary_filename} · ${entry.timestamp_pt}`;

function renderTimeline(){
  $('timeline').innerHTML = shown.map(e => `<div class="item ${current&&current.seq===e.seq?'active':''}" data-seq="${e.seq}"><strong>#${e.seq} ${esc(e.commit_short)}</strong><div class="muted">${esc(e.primary_filename)} · ${esc(e.timestamp_pt)}</div><div class="muted">${esc(e.commit_message)}</div><div class="muted">${esc(e.note)}</div></div>`).join('');
  $('timeline').querySelectorAll('.item').forEach(n=>n.onclick=()=>setCurrent(Number(n.dataset.seq)));
}

function setCurrent(seq){ current = shown.find(e=>e.seq===seq) || shown[0] || null; renderTimeline(); renderDetails(); }

function renderDetails(){
  if(!current){$('details').innerHTML='<div class="muted">No matching entries.</div>';return;}
  $('details').innerHTML = `<strong>Entry #${current.seq}</strong><div class="muted">${esc(current.timestamp_pt)} (${esc(current.timestamp)})</div><div><code title="${esc(current.commit_hash)}">${esc(current.commit_short)}</code> · ${esc(current.commit_message)}</div><div><strong>File</strong>: ${esc(current.primary_filename)}</div><div><strong>description_delta_from_previous</strong>: ${esc(current.description_delta_from_previous)}</div><div><strong>functional_impacts</strong>: ${esc((current.functional_impacts||[]).join(', ')||'none')}</div><div><a target="_blank" href="${blobLink(current)}">view blob</a> · <a target="_blank" href="${esc(launchLink(current))}">launch actual version</a></div>`;
}

function setSelectOptions(selId, options, frameId, metaId){
  $(selId).innerHTML = options.map(o=>`<option value="${esc(launchLink(o))}">${esc(label(o))}</option>`).join('');
  if(options[0]){
    $(frameId).src = launchLink(options[0]);
    $(metaId).innerHTML = `${esc(options[0].primary_filename)} · <a target="_blank" href="${blobLink(options[0])}">view blob</a> · <a target="_blank" href="${esc(launchLink(options[0]))}">launch actual version</a>`;
  } else { $(frameId).src = ''; $(metaId).textContent = 'No entries'; }
}

function refreshSelectors(){ leftOptions=[...shown]; rightOptions=[...shown]; setSelectOptions('leftSel',leftOptions,'leftFrame','leftMeta'); setSelectOptions('rightSel',rightOptions,'rightFrame','rightMeta'); }

function omniFilter(q){
  const n = q.toLowerCase().trim();
  shown = all.filter(e => [e.commit_hash,e.commit_short,e.primary_filename,e.commit_message,e.note,e.timestamp_pt,e.timestamp,e.description_delta_from_previous,(e.functional_impacts||[]).join(' '),JSON.stringify(e.changed_paths||[])].join(' ').toLowerCase().includes(n));
  setCurrent(shown[0]?.seq); refreshSelectors();
}

$('omni').oninput = (e)=>omniFilter(e.target.value);
$('leftFilter').oninput = (e)=>setSelectOptions('leftSel', shown.filter(x=>label(x).toLowerCase().includes(e.target.value.toLowerCase())), 'leftFrame', 'leftMeta');
$('rightFilter').oninput = (e)=>setSelectOptions('rightSel', shown.filter(x=>label(x).toLowerCase().includes(e.target.value.toLowerCase())), 'rightFrame', 'rightMeta');
$('leftSel').onchange = (e)=>$('leftFrame').src=e.target.value;
$('rightSel').onchange = (e)=>$('rightFrame').src=e.target.value;
$('tabDetails').onclick=()=>{$('tabDetails').classList.add('active');$('tabSide').classList.remove('active');$('details').style.display='block';$('side').style.display='none';};
$('tabSide').onclick=()=>{$('tabSide').classList.add('active');$('tabDetails').classList.remove('active');$('details').style.display='none';$('side').style.display='block';};

fetch('bridge-lineage-timeline-model.json', { cache:'no-store' })
  .then(r=>r.json())
  .then(data=>{ all=[...data].sort((a,b)=>b.seq-a.seq); shown=[...all]; setCurrent(shown[0]?.seq); refreshSelectors(); })
  .catch(err=>{ $('details').textContent = `Failed to load model: ${err.message}`; });
</script>
</body>
</html>
