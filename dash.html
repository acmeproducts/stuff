<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Discipline Tracker</title>
    <style>
        /* Inline CSS for styling */
        body { font-family: Arial, sans-serif; }
        .container { max-width: 800px; margin: 0 auto; }
        .investment { border: 1px solid #ccc; padding: 10px; margin-bottom: 10px; }
        .header { background-color: #f4f4f4; padding: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Financial Discipline Tracker</h1>
        </div>
        <div class="investment" id="investment1">
            <h2>Investment 1</h2>
            <p>Initial Investment: $X</p>
            <p>Expected Return: 3%</p>
            <p>Time Horizon: 18 months</p>
            <p>Additional Investment at Month 9: $Y</p>
            <p>Harvest at Month 18: Z%</p>
            <p>Remaining Run: 9 months</p>
        </div>
        <!-- Additional investments can be added here -->
    </div>
    <script>
        // Inline JavaScript for functionality
        function updateProgress(investmentId, actualReturn) {
            const investment = document.getElementById(investmentId);
            const expectedReturn = parseFloat(investment.querySelector('p:nth-child(3)').textContent.replace('Expected Return: ', '').replace('%', ''));
            const actualReturnPercent = (actualReturn / expectedReturn) * 100;
            investment.innerHTML += `<p>Actual Return: ${actualReturnPercent.toFixed(2)}%</p>`;
        }
        // Example usage
        updateProgress('investment1', 2.8); // Simulating an actual return of 2.8%
    </script>
</body>
</html>
