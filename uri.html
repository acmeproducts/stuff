<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Access Tool</title>
    <style>
        body { 
            font-family: sans-serif; 
            margin: 20px; 
            padding-bottom: 60px; 
            background: #f4f4f9; 
        }
        .container { 
            background: #fff; 
            padding: 20px; 
            border-radius: 8px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.2); 
            max-width: 600px;
            margin: 0 auto;
        }
        h2 { margin-top: 0; }
        .btn { 
            display: block; 
            width: 100%; 
            padding: 15px; 
            margin: 15px 0; 
            background: #007bff; 
            color: white; 
            text-align: center; 
            border: none; 
            border-radius: 5px; 
            font-size: 18px; 
            cursor: pointer; 
            box-sizing: border-box;
        }
        .btn:disabled { 
            background: #ccc; 
            cursor: not-allowed;
        }
        input[type="file"] { 
            display: none; 
        }
        #logArea { 
            margin-top: 20px; 
            padding: 15px; 
            background: #2b2b2b; 
            color: #a9b7c6; 
            font-family: monospace; 
            height: 200px; 
            overflow-y: auto; 
            border-radius: 5px; 
            font-size: 14px;
        }
        .footer { 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            width: 100%; 
            background: #333; 
            color: white; 
            text-align: center; 
            padding: 15px 0; 
            font-size: 14px; 
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Local File Access</h2>
        <p>Programmatic access to specific internal URIs is restricted by the browser sandbox. You must select the downloaded file manually to grant access.</p>
        
        <label for="fileInput" class="btn">1. Select Target File</label>
        <input type="file" id="fileInput">
        
        <button id="saveBtn" class="btn" disabled>2. Save File Copy</button>
        
        <div id="logArea">System ready. Awaiting manual file selection...</div>
    </div>

    <div class="footer">
        Version 2.0 | Timestamp: 2026-03-19 04:38 AM
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const saveBtn = document.getElementById('saveBtn');
        const logArea = document.getElementById('logArea');
        let currentFile = null;

        function logMessage(msg) {
            const time = new Date().toLocaleTimeString();
            logArea.innerHTML += `<br>[${time}] ${msg}`;
            logArea.scrollTop = logArea.scrollHeight;
        }

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                currentFile = e.target.files[0];
                logMessage(`File securely accessed: ${currentFile.name}`);
                logMessage(`Size: ${currentFile.size} bytes | Type: ${currentFile.type || 'unknown'}`);
                saveBtn.disabled = false;
            }
        });

        saveBtn.addEventListener('click', () => {
            if (!currentFile) return;
            
            logMessage(`Generating blob for: ${currentFile.name}...`);
            const url = URL.createObjectURL(currentFile);
            
            const a = document.createElement('a');
            a.style.display = 'none';
            a.href = url;
            a.download = `exported_${currentFile.name}`;
            
            document.body.appendChild(a);
            a.click();
            
            setTimeout(() => {
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                logMessage('Save operation executed successfully.');
            }, 150);
        });
    </script>
</body>
</html>
