<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Android URI Fetcher</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            padding: 20px;
            padding-bottom: 60px;
            box-sizing: border-box;
            background-color: #f4f4f9;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            font-size: 24px;
            color: #333;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }
        input[type="text"] {
            width: 100%;
            padding: 15px;
            margin-bottom: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 15px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 18px;
            cursor: pointer;
        }
        button:active {
            background-color: #0056b3;
        }
        #logArea {
            margin-top: 20px;
            padding: 15px;
            background-color: #2b2b2b;
            color: #a9b7c6;
            border-radius: 4px;
            min-height: 200px;
            max-height: 400px;
            overflow-y: auto;
            font-family: monospace;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-size: 14px;
        }
        .error {
            color: #ff6b68;
        }
        .success {
            color: #6a8759;
        }
        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: #333;
            color: white;
            text-align: center;
            padding: 15px 0;
            font-size: 14px;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Local URI Access & Save Tool</h1>
        <label for="uriInput">Target URI:</label>
        <input type="text" id="uriInput" value="content://media/external/downloads/1000299128">
        <button onclick="fetchAndSave()">Execute Fetch & Save</button>

        <div id="logArea">System Initialized. Awaiting execution...</div>
    </div>

    <div class="footer">
        Version 1.0 | Timestamp: 2026-03-19 04:28 AM
    </div>

    <script>
        const logArea = document.getElementById('logArea');

        function logMessage(message, type = 'info') {
            const time = new Date().toLocaleTimeString();
            let prefix = '[INFO]';
            let spanClass = '';

            if (type === 'error') {
                prefix = '[ERROR]';
                spanClass = 'class="error"';
            } else if (type === 'success') {
                prefix = '[SUCCESS]';
                spanClass = 'class="success"';
            }

            logArea.innerHTML += `\n<span ${spanClass}>${time} ${prefix} ${message}</span>`;
            logArea.scrollTop = logArea.scrollHeight;
        }

        async function fetchAndSave() {
            const uri = document.getElementById('uriInput').value;
            logMessage(`Attempting to request: ${uri}`);

            try {
                const response = await fetch(uri);
                
                if (!response.ok) {
                    throw new Error(`HTTP rejection! status: ${response.status}`);
                }
                
                logMessage('Network request successful. Parsing Blob...', 'success');
                const blob = await response.blob();
                
                logMessage(`Blob constructed successfully. Size: ${blob.size} bytes.`);
                logMessage('Preparing virtual download link...');
                
                const downloadUrl = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = downloadUrl;
                
                const fileName = uri.split('/').pop() || 'file_export.bin';
                a.download = fileName;
                
                document.body.appendChild(a);
                a.click();
                
                setTimeout(() => {
                    document.body.removeChild(a);
                    URL.revokeObjectURL(downloadUrl);
                    logMessage(`Download initiated for ${fileName}. Memory cleaned up.`, 'success');
                }, 150);

            } catch (error) {
                logMessage(error.message, 'error');
                logMessage('Note: Standard browsers block content:// URIs due to scheme restrictions. This will only function inside a properly configured Android WebView.', 'error');
            }
        }
    </script>
</body>
</html>
