<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Source Extractor</title>
    <style>
        body { 
            font-family: sans-serif; 
            margin: 0; 
            padding: 15px; 
            padding-bottom: 60px; 
            background: #f4f4f9; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            box-sizing: border-box; 
        }
        .controls { 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
            margin-bottom: 10px; 
        }
        .btn { 
            padding: 15px; 
            background: #007bff; 
            color: white; 
            border: none; 
            border-radius: 5px; 
            font-size: 16px; 
            cursor: pointer; 
            text-align: center; 
        }
        .btn:disabled { 
            background: #ccc; 
            cursor: not-allowed; 
        }
        input[type="file"] { 
            display: none; 
        }
        textarea { 
            flex-grow: 1; 
            width: 100%; 
            padding: 10px; 
            font-family: monospace; 
            font-size: 14px; 
            background: #2b2b2b; 
            color: #a9b7c6; 
            border-radius: 5px; 
            border: none; 
            resize: none; 
            box-sizing: border-box; 
            white-space: pre; 
            overflow-wrap: normal; 
            overflow-x: scroll; 
        }
        .footer { 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            width: 100%; 
            background: #333; 
            color: white; 
            text-align: center; 
            padding: 15px 0; 
            font-size: 14px; 
        }
    </style>
</head>
<body>
    <div class="controls">
        <label for="fileInput" class="btn">1. Select Target File</label>
        <input type="file" id="fileInput">
        <button id="saveBtn" class="btn" disabled>2. Save Source as .txt</button>
    </div>
    
    <textarea id="sourceOutput" readonly placeholder="Source code will render here..."></textarea>

    <div class="footer">
        Version 3.0 | Timestamp: 2026-03-19 05:40 AM
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const saveBtn = document.getElementById('saveBtn');
        const sourceOutput = document.getElementById('sourceOutput');
        let currentFileName = '';
        let fileContent = '';

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                const file = e.target.files[0];
                currentFileName = file.name;
                
                const reader = new FileReader();
                reader.onload = function(event) {
                    fileContent = event.target.result;
                    sourceOutput.value = fileContent;
                    saveBtn.disabled = false;
                };
                reader.readAsText(file);
            }
        });

        saveBtn.addEventListener('click', () => {
            if (!fileContent) return;
            
            const blob = new Blob([fileContent], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            
            a.style.display = 'none';
            a.href = url;
            a.download = `source_${currentFileName}.txt`;
            
            document.body.appendChild(a);
            a.click();
            
            setTimeout(() => {
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }, 150);
        });
    </script>
</body>
</html>
