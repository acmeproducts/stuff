<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Double Pendulum (HTML5 + JS)</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      color: #eee;
      font-family: system-ui, sans-serif;
      height: 100%;
      overflow: hidden;
    }
    #ui {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 10;
      background: rgba(0,0,0,0.5);
      padding: 8px 10px;
      border-radius: 4px;
      font-size: 14px;
    }
    #ui button {
      margin-right: 6px;
      padding: 4px 8px;
      border: 1px solid #666;
      background: #222;
      color: #eee;
      cursor: pointer;
    }
    #ui button:hover {
      background: #333;
    }
    #ui label {
      margin-left: 6px;
    }
    #canvas {
      display: block;
    }
  </style>
</head>
<body>
<div id="ui">
  <button id="pauseBtn">Pause</button>
  <button id="resumeBtn">Resume</button>
  <label>
    <input type="checkbox" id="trailChk" checked>
    Trail
  </label>
</div>
<canvas id="canvas"></canvas>

<script>
(function() {
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  const origin = { x: canvas.width / 2, y: canvas.height / 4 };

  // Physical parameters
  let m1 = 1;
  let m2 = 1;
  let L1 = canvas.height / 4;
  let L2 = canvas.height / 4;
  let g  = 1.0;          // effective gravity, tuned for visual behavior
  let damping = 0.999;   // velocity damping

  // State
  let a1 = Math.PI / 2;
  let a2 = Math.PI / 2;
  let a1_v = 0;
  let a2_v = 0;

  // Animation control
  let paused = false;
  let showTrail = true;
  let lastTime = null;

  // Trail buffer: we draw onto a separate canvas
  const trailCanvas = document.createElement('canvas');
  const trailCtx    = trailCanvas.getContext('2d');
  function resizeTrail() {
    trailCanvas.width = canvas.width;
    trailCanvas.height = canvas.height;
    trailCtx.fillStyle = 'rgba(0,0,0,1)';
    trailCtx.fillRect(0, 0, trailCanvas.width, trailCanvas.height);
  }
  resizeTrail();
  window.addEventListener('resize', resizeTrail);

  // UI wiring
  document.getElementById('pauseBtn').onclick = () => paused = true;
  document.getElementById('resumeBtn').onclick = () => {
    paused = false;
    lastTime = null;
  };
  document.getElementById('trailChk').onchange = e => {
    showTrail = e.target.checked;
    if (!showTrail) {
      trailCtx.fillStyle = 'rgba(0,0,0,1)';
      trailCtx.fillRect(0, 0, trailCanvas.width, trailCanvas.height);
    }
  };

  // Mouse interaction for dragging bobs
  let dragging = null; // 'bob1' | 'bob2' | null

  function getBobPositions() {
    const x1 = origin.x + L1 * Math.sin(a1);
    const y1 = origin.y + L1 * Math.cos(a1);
    const x2 = x1 + L2 * Math.sin(a2);
    const y2 = y1 + L2 * Math.cos(a2);
    return { x1, y1, x2, y2 };
  }

  function pointerPos(evt) {
    const rect = canvas.getBoundingClientRect();
    const x = (evt.touches ? evt.touches[0].clientX : evt.clientX) - rect.left;
    const y = (evt.touches ? evt.touches[0].clientY : evt.clientY) - rect.top;
    return { x, y };
  }

  function dist2(x1, y1, x2, y2) {
    const dx = x1 - x2;
    const dy = y1 - y2;
    return dx * dx + dy * dy;
  }

  canvas.addEventListener('mousedown', startDrag);
  canvas.addEventListener('touchstart', startDrag, { passive: false });

  function startDrag(e) {
    e.preventDefault();
    const p = pointerPos(e);
    const { x1, y1, x2, y2 } = getBobPositions();
    const r = 14;
    const r2 = r * r;

    if (dist2(p.x, p.y, x1, y1) < r2) {
      dragging = 'bob1';
      paused = true;
    } else if (dist2(p.x, p.y, x2, y2) < r2) {
      dragging = 'bob2';
      paused = true;
    } else {
      dragging = null;
    }
  }

  window.addEventListener('mousemove', drag);
  window.addEventListener('touchmove', drag, { passive: false });

  function drag(e) {
    if (!dragging) return;
    e.preventDefault();
    const p = pointerPos(e);

    if (dragging === 'bob1') {
      const dx = p.x - origin.x;
      const dy = p.y - origin.y;
      a1 = Math.atan2(dx, dy);
      a1_v = 0;
      a2_v = 0;
    } else if (dragging === 'bob2') {
      const { x1, y1 } = getBobPositions();
      const dx = p.x - x1;
      const dy = p.y - y1;
      a2 = Math.atan2(dx, dy);
      a1_v = 0;
      a2_v = 0;
    }
  }

  window.addEventListener('mouseup', endDrag);
  window.addEventListener('touchend', endDrag);

  function endDrag() {
    dragging = null;
  }

  // Physics update for double pendulum
  function step(dt) {
    const num1 = -g * (2 * m1 + m2) * Math.sin(a1);
    const num2 = -m2 * g * Math.sin(a1 - 2 * a2);
    const num3 = -2 * Math.sin(a1 - a2) * m2;
    const num4 = a2_v * a2_v * L2 + a1_v * a1_v * L1 * Math.cos(a1 - a2);
    const den  = L1 * (2 * m1 + m2 - m2 * Math.cos(2 * a1 - 2 * a2));
    const a1_a = (num1 + num2 + num3 * num4) / den;

    const num5 = 2 * Math.sin(a1 - a2);
    const num6 = a1_v * a1_v * L1 * (m1 + m2);
    const num7 = g * (m1 + m2) * Math.cos(a1);
    const num8 = a2_v * a2_v * L2 * m2 * Math.cos(a1 - a2);
    const den2 = L2 * (2 * m1 + m2 - m2 * Math.cos(2 * a1 - 2 * a2));
    const a2_a = (num5 * (num6 + num7 + num8)) / den2;

    // basic integration (semi-fixed timestep)
    const h = dt * 0.0015; // scale factor for stability
    a1_v += a1_a * h;
    a2_v += a2_a * h;

    a1_v *= damping;
    a2_v *= damping;

    a1 += a1_v * h;
    a2 += a2_v * h;
  }

  // Drawing helpers
  function drawFrame() {
    // fade trail slightly
    if (showTrail) {
      trailCtx.fillStyle = 'rgba(0,0,0,0.06)';
      trailCtx.fillRect(0, 0, trailCanvas.width, trailCanvas.height);
    }

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const { x1, y1, x2, y2 } = getBobPositions();

    // draw trail
    if (showTrail) {
      trailCtx.fillStyle = 'rgba(255,255,255,0.7)';
      trailCtx.beginPath();
      trailCtx.arc(x2, y2, 1.2, 0, Math.PI * 2);
      trailCtx.fill();

      ctx.drawImage(trailCanvas, 0, 0);
    }

    // draw rods
    ctx.lineWidth = 2;
    ctx.strokeStyle = '#aaa';
    ctx.beginPath();
    ctx.moveTo(origin.x, origin.y);
    ctx.lineTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();

    // draw origin
    ctx.fillStyle = '#f5f5f5';
    ctx.beginPath();
    ctx.arc(origin.x, origin.y, 4, 0, Math.PI * 2);
    ctx.fill();

    // draw bobs
    const r1 = 10, r2 = 12;
    ctx.fillStyle = dragging === 'bob1' ? '#ffcc00' : '#ff6666';
    ctx.beginPath();
    ctx.arc(x1, y1, r1, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = dragging === 'bob2' ? '#ffcc00' : '#66ccff';
    ctx.beginPath();
    ctx.arc(x2, y2, r2, 0, Math.PI * 2);
    ctx.fill();
  }

  function loop(timestamp) {
    if (lastTime == null) lastTime = timestamp;
    const dt = timestamp - lastTime;
    lastTime = timestamp;

    if (!paused && !dragging) {
      step(dt);
    }

    drawFrame();
    requestAnimationFrame(loop);
  }

  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
