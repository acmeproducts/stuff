
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SayIt Studio v2 Complete Package</title>
<style>
:root{
  --bg:#09090b; --surface:#18181b; --surface2:#111827; --surface3:#27272a;
  --border:#27272a; --border2:#3f3f46; --text:#f4f4f5; --muted:#a1a1aa;
  --accent:#14b8a6; --accentHover:#0d9488; --ok:#22c55e; --warn:#f59e0b; --danger:#ef4444;
  --mono:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace;
  --sans:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  --headerH:58px; --footerH:34px; --sidebarW:290px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--sans);background:var(--bg);color:var(--text);font-size:14px;height:100vh;display:flex;flex-direction:column;overflow:hidden}
header{height:var(--headerH);background:var(--surface);border-bottom:1px solid var(--border);display:grid;grid-template-columns:42px auto 1fr;gap:10px;align-items:center;padding:0 12px;flex-shrink:0}
.logo{font-size:18px;font-weight:700;white-space:nowrap}.logo span{color:var(--accent)}
header .tab-nav{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:6px;min-width:0}
.tab-btn,.icon-btn,.btn{border:1px solid var(--border2);background:var(--surface2);color:var(--text);border-radius:12px;cursor:pointer;transition:.18s;background-clip:padding-box}
.tab-btn{padding:0 6px;height:38px;font-weight:700;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tab-btn.active{background:var(--accent);color:#041414;border-color:transparent}
.icon-btn{width:38px;height:38px;font-size:17px}.icon-btn.listening{background:var(--danger);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.6}}
.btn{padding:0 12px;min-height:38px;font-size:12px;display:inline-flex;align-items:center;justify-content:center;gap:8px}
.btn:hover,.tab-btn:hover,.icon-btn:hover{background:var(--surface3)}
.btn-primary{background:var(--accent);color:#041414;border:none;font-weight:700}.btn-primary:hover{background:var(--accentHover)}
.btn-danger{background:var(--danger);color:#fff;border:none}.btn-warn{background:var(--warn);color:#111827;border:none}.btn-ok{background:var(--ok);color:#06140a;border:none}
.app{flex:1;display:flex;overflow:hidden;min-height:0}
.view{display:none;width:100%;height:100%}.view.active{display:flex}
.sidebar{width:var(--sidebarW);min-width:var(--sidebarW);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;transition:.18s}
.sidebar.collapsed{width:0;min-width:0;border-right:none;overflow:hidden;opacity:0}
.sidebar-header{padding:12px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;gap:8px}
.sidebar-content{padding:12px;overflow-y:auto;flex:1}
.main{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--bg)}
.split-top{flex:1;overflow-y:auto;padding:16px;background:var(--surface2)}
.split-bottom{height:42%;min-height:220px;overflow-y:auto;padding:16px;background:var(--bg);border-top:1px solid var(--border)}
.section-title{font-size:16px;font-weight:800;margin-bottom:10px}
.sub-title{font-size:13px;font-weight:700;margin-bottom:8px;color:var(--muted)}
.list-item{padding:12px;background:var(--surface2);border:1px solid var(--border);border-radius:12px;margin-bottom:8px;cursor:pointer}
.list-item.selected{border-color:var(--accent);background:#0f2624}.list-item:hover{border-color:var(--border2)}
.small{font-size:12px;color:var(--muted);line-height:1.45}.mono{font-family:var(--mono)}
.grid2,.grid3{display:grid;gap:14px}.grid2{grid-template-columns:1fr 1fr}.grid3{grid-template-columns:repeat(3,1fr)}
.input-group{margin-bottom:14px}.input-group label{display:block;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:6px}
.input,.textarea,.select{width:100%;border:1px solid var(--border2);background:#09090b;color:var(--text);border-radius:12px;padding:10px 12px;outline:none;font-size:13px}
.textarea{min-height:110px;resize:vertical}.textarea.short{min-height:72px}.textarea.tall{min-height:220px}.input:focus,.textarea:focus,.select:focus{border-color:var(--accent)}
.code{background:#050505;border:1px solid var(--border);border-radius:12px;padding:12px;font-family:var(--mono);font-size:12px;white-space:pre-wrap;line-height:1.5;overflow:auto}
.note{padding:12px;border-radius:12px;border:1px solid #694b07;background:#3a2a05;color:#fde68a;line-height:1.5}
.okbox{padding:12px;border-radius:12px;border:1px solid #14532d;background:#052e16;color:#bbf7d0;line-height:1.5}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.kv{display:grid;grid-template-columns:180px 1fr;gap:8px 12px}.key{font-size:12px;color:var(--muted)}.val{word-break:break-word}
.pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}.pill{padding:6px 10px;border-radius:999px;border:1px solid var(--border);background:var(--surface);font-size:12px;display:inline-flex;align-items:center;gap:8px}
.dot{width:8px;height:8px;border-radius:999px;background:var(--muted)}.dot.ok{background:var(--ok)}.dot.warn{background:var(--warn)}.dot.err{background:var(--danger)}
.footer{height:var(--footerH);background:var(--surface);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--muted);font-family:var(--mono);flex-shrink:0;padding:0 10px}
.console{background:#050505;border:1px solid var(--border);border-radius:12px;padding:12px;font-family:var(--mono);font-size:12px;line-height:1.45;white-space:pre-wrap;overflow:auto;height:100%}
.badge{display:inline-flex;align-items:center;gap:8px;padding:5px 9px;border-radius:999px;border:1px solid var(--border);font-size:11px;font-weight:700}
.badge.trained{background:#052e16;color:#bbf7d0;border-color:#166534}
.badge.partial{background:#3a2a05;color:#fde68a;border-color:#92400e}
.badge.broken{background:#450a0a;color:#fecaca;border-color:#991b1b}
.badge.placeholder{background:#1f2937;color:#e5e7eb;border-color:#374151}
.train-shell{display:grid;grid-template-columns:1.1fr .9fr;gap:16px}
.selector-palette{display:grid;grid-template-columns:1fr 1fr;gap:8px;max-height:360px;overflow:auto}
.selector-chip{padding:8px;border-radius:10px;border:1px solid var(--border2);background:#050505;font-family:var(--mono);font-size:11px;cursor:pointer;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.selector-chip:hover{border-color:var(--accent)}
.assign-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
.assign-btn{justify-content:flex-start;text-align:left;width:100%}
.status-card{padding:12px;border-radius:12px;background:var(--surface);border:1px solid var(--border)}
.control-shell{display:grid;grid-template-columns:1fr;gap:14px;max-width:980px;margin:0 auto}
.control-actions{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}
.toast{position:fixed;right:18px;bottom:18px;background:var(--accent);color:#041414;border-radius:12px;padding:10px 14px;font-weight:800;opacity:0;pointer-events:none;transform:translateY(8px);transition:.2s;z-index:20}
.toast.show{opacity:1;pointer-events:auto;transform:none}.toast.err{background:var(--danger);color:#fff}.toast.warn{background:var(--warn);color:#111827}
.modal{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.7);padding:18px;z-index:30}.modal.open{display:flex}
.modal-card{width:min(860px,100%);max-height:92vh;overflow:auto;background:var(--surface);border:1px solid var(--border2);border-radius:16px;padding:18px}
hr.sep{border:none;border-top:1px solid var(--border);margin:14px 0}
.voice-indicator{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:999px;border:1px solid var(--accent);background:rgba(20,184,166,0.1);font-size:12px;font-weight:700;color:var(--accent)}
.voice-indicator.active{background:var(--danger);color:#fff;border-color:var(--danger)}
@media (max-width:1040px){.grid2,.grid3,.train-shell,.assign-grid,.control-actions{grid-template-columns:1fr}.kv{grid-template-columns:1fr}.sidebar{width:220px;min-width:220px}header .tab-nav{grid-template-columns:repeat(4,minmax(0,1fr));grid-auto-rows:38px}header{height:auto;padding:10px 8px}}
@media (max-width:720px){.split-top,.split-bottom{padding:12px}.sidebar{width:180px;min-width:180px}}
</style>
</head>
<body>
<header>
  <button class="icon-btn" id="toggleSidebarBtn">☰</button>
  <div class="logo">Say<span>It</span> Studio</div>
  <div class="tab-nav">
    <button class="tab-btn active" data-view="install">Install</button>
    <button class="tab-btn" data-view="config">Config</button>
    <button class="tab-btn" data-view="train">Train</button>
    <button class="tab-btn" data-view="jobs">Jobs</button>
    <button class="tab-btn" data-view="run">Run</button>
    <button class="tab-btn" data-view="control">Control</button>
    <button class="tab-btn" data-view="logs">Logs</button>
  </div>
</header>
<div class="app">
  <section class="view active" id="view-install">
    <aside class="sidebar"><div class="sidebar-header"><strong>Install Package</strong></div><div class="sidebar-content" id="installNav"></div></aside>
    <main class="main"><div class="split-top" id="installTop"></div><div class="split-bottom" id="installBottom"></div></main>
  </section>
  <section class="view" id="view-config">
    <aside class="sidebar"><div class="sidebar-header"><strong>System Config</strong></div><div class="sidebar-content" id="configNav"></div></aside>
    <main class="main"><div class="split-top" id="configTop"></div><div class="split-bottom" id="configBottom"></div></main>
  </section>
  <section class="view" id="view-train">
    <aside class="sidebar"><div class="sidebar-header"><strong>AI Adapters</strong><button class="btn btn-primary" id="newAdapterBtn">New</button></div><div class="sidebar-content" id="adapterList"></div></aside>
    <main class="main"><div class="split-top" id="trainTop"></div><div class="split-bottom" id="trainBottom"></div></main>
  </section>
  <section class="view" id="view-jobs">
    <aside class="sidebar"><div class="sidebar-header"><strong>Jobs</strong><button class="btn btn-primary" id="newJobBtn">New</button></div><div class="sidebar-content" id="jobList"></div></aside>
    <main class="main"><div class="split-top" id="jobsTop"></div><div class="split-bottom" id="jobsBottom"></div></main>
  </section>
  <section class="view" id="view-run">
    <aside class="sidebar"><div class="sidebar-header"><strong>Execution</strong></div><div class="sidebar-content" id="runNav"></div></aside>
    <main class="main"><div class="split-top" id="runTop"></div><div class="split-bottom" id="runBottom"></div></main>
  </section>
  <section class="view" id="view-control">
    <aside class="sidebar"><div class="sidebar-header"><strong>Standalone Control</strong></div><div class="sidebar-content" id="controlNav"></div></aside>
    <main class="main"><div class="split-top" id="controlTop"></div><div class="split-bottom" id="controlBottom"></div></main>
  </section>
  <section class="view" id="view-logs">
    <aside class="sidebar"><div class="sidebar-header"><strong>Logs</strong></div><div class="sidebar-content" id="logsNav"></div></aside>
    <main class="main"><div class="split-top" id="logsTop"></div><div class="split-bottom" id="logsBottom"></div></main>
  </section>
</div>
<footer class="footer" id="footer"></footer>
<div class="toast" id="toast"></div>
<div class="modal" id="magicModal">
  <div class="modal-card">
    <div class="row" style="justify-content:space-between;margin-bottom:12px"><div class="section-title">Magic Trainer</div><button class="btn" onclick="closeMagic()">Close</button></div>
    <div class="grid2">
      <div class="input-group"><label>Target URL</label><input class="input mono" id="magicUrl" placeholder="https://chatgpt.com"></div>
      <div class="input-group"><label>Target Adapter</label><div class="code" id="magicTargetName">No adapter selected</div></div>
    </div>
    <div class="row" style="margin-bottom:12px"><button class="btn btn-primary" onclick="runMagicTrainer()">Analyze And Apply</button></div>
    <div class="code" id="magicOutput">Run analysis to classify the page and fill adapter fields automatically.</div>
  </div>
</div>
<script>
const APP_VERSION = 'SayIt Studio v2 Complete Package';
const STORE_KEY = 'sayit_studio_v2_complete';
const INSTALL_SECTIONS = [
  {id:'overview', title:'Overview'},
  {id:'manifest', title:'AndroidManifest.xml'},
  {id:'activity', title:'MainActivity.java'},
  {id:'pages', title:'GitHub Pages Upload'},
  {id:'go-live', title:'Go Live Checklist'}
];
const CONFIG_SECTIONS = [
  {id:'github', title:'GitHub'},
  {id:'runtime', title:'Runtime'},
  {id:'voice', title:'Voice'},
  {id:'paths', title:'Computed Paths'}
];
const RUN_SECTIONS = [
  {id:'overview', title:'Full Loop'},
  {id:'manual', title:'Manual Controls'},
  {id:'deploy', title:'GitHub Deploy'},
  {id:'status', title:'Status'}
];
const CONTROL_SECTIONS = [
  {id:'launcher', title:'Standalone Launcher'},
  {id:'voice', title:'Voice Commands'},
  {id:'monitor', title:'Monitor'}
];
const VOICE_COMMANDS = [
  {pattern:/build\s+prompt/i, action:'buildPromptNow', label:'Build Prompt'},
  {pattern:/start\s+job|run\s+full\s+job|run\s+job/i, action:'controlStart', label:'Run Full Job'},
  {pattern:/capture\s+(response|clipboard|output)/i, action:'controlCapture', label:'Capture Response'},
  {pattern:/deploy\s+(to\s+)?github|deploy\s+now/i, action:'controlDeploy', label:'Deploy to GitHub'},
  {pattern:/open\s+(result|live|app)/i, action:'controlOpenResult', label:'Open Result'},
  {pattern:/open\s+ai|open\s+surface/i, action:'openAiSurface', label:'Open AI Surface'},
  {pattern:/copy\s+prompt/i, action:'copyCurrentPrompt', label:'Copy Prompt'},
  {pattern:/fix\s+prompt/i, action:'fixPromptNow', label:'Fix Prompt'},
  {pattern:/create\s+adapter/i, action:'createAdapter', label:'Create Adapter'},
  {pattern:/create\s+job/i, action:'createJob', label:'Create Job'},
  {pattern:/validate\s+adapter/i, action:'validateAdapter', label:'Validate Adapter'},
  {pattern:/open\s+training/i, action:'openTrainingSurface', label:'Open Training Surface'},
  {pattern:/stop\s+listening|stop\s+voice/i, action:'stopVoice', label:'Stop Voice'}
];
const DEFAULT_STATE = {
  config: {
    githubUser:'YOUR_USERNAME', githubRepo:'YOUR_REPO', controlFile:'sayit-v2.html', gitBranch:'main',
    githubPat:'', apkName:'SayIt', packageName:'com.acme.sayit', launchMode:'standalone-control',
    defaultAiUrl:'https://gemini.google.com/app', wakePhrase:'start job', speechEnabled:true, voiceLanguage:'en-US', voiceAutoRestart:true
  },
  adapters: [
    makeAdapter('Gemini','https://gemini.google.com/app',['gemini.google.com']),
    makeAdapter('ChatGPT','https://chatgpt.com',['chatgpt.com']),
    makeAdapter('Claude','https://claude.ai',['claude.ai']),
    makeAdapter('Perplexity','https://www.perplexity.ai',['perplexity.ai'])
  ],
  jobs: [], logs: [], diagnostics: {helperPresent:false,lastCommand:'',lastEvent:'',lastClipboard:''},
  selectedAdapterId:null, selectedJobId:null, selectedInstall:'overview', selectedConfig:'github', selectedRun:'overview', selectedControl:'launcher', sidebarCollapsed:false
};
function makeAdapter(platform, launchUrl, hosts){
  return {
    id: uid(), platform, launchUrl, hosts: hosts||[], probeUrl: launchUrl, version:1, status:'placeholder', notes:'',
    selectors: {
      promptInput:'', sendButton:'', responseBlocks:'', latestResponse:'', copyButton:'', stopButton:'', newChatButton:'', fileInput:''
    },
    fallbacks: {promptInput:[], sendButton:[], latestResponse:[]},
    states: {ready:'', busy:'', done:'', error:''},
    actions: {
      submitPrompt:[
        {type:'focus', target:'promptInput'},
        {type:'paste', target:'promptInput'},
        {type:'click', target:'sendButton'}
      ],
      captureLatestResponse:[
        {type:'waitFor', target:'responseBlocks', timeoutMs:60000},
        {type:'read', target:'latestResponse'}
      ]
    },
    validation: {lastRun:'', ok:false, checks:[]},
    probeResults: []
  };
}
function uid(){ return Math.random().toString(36).slice(2,10)+Date.now().toString(36).slice(-4); }
function deepClone(v){ return JSON.parse(JSON.stringify(v)); }
function loadState(){
  const raw = localStorage.getItem(STORE_KEY);
  if(!raw){ const s=deepClone(DEFAULT_STATE); s.selectedAdapterId=s.adapters[0].id; return s; }
  try{
    const parsed = JSON.parse(raw);
    const state = Object.assign({}, deepClone(DEFAULT_STATE), parsed);
    state.config = Object.assign({}, DEFAULT_STATE.config, parsed.config||{});
    state.adapters = Array.isArray(parsed.adapters)&&parsed.adapters.length ? parsed.adapters : deepClone(DEFAULT_STATE.adapters);
    state.jobs = Array.isArray(parsed.jobs) ? parsed.jobs : [];
    state.logs = Array.isArray(parsed.logs) ? parsed.logs : [];
    state.diagnostics = Object.assign({}, DEFAULT_STATE.diagnostics, parsed.diagnostics||{});
    if(!state.selectedAdapterId && state.adapters[0]) state.selectedAdapterId=state.adapters[0].id;
    return state;
  }catch{
    localStorage.removeItem(STORE_KEY);
    const s=deepClone(DEFAULT_STATE); s.selectedAdapterId=s.adapters[0].id; return s;
  }
}
let state = loadState();
let currentView = 'install';
const PROXIES = {
  codetabs: u => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`,
  allorigins: u => `https://api.allorigins.win/get?url=${encodeURIComponent(u)}`,
  corsproxy: u => `https://corsproxy.io/?${encodeURIComponent(u)}`
};
let selectedProbeTarget = 'promptInput';
let recognition = null;
let voiceActive = false;

function saveState(){ localStorage.setItem(STORE_KEY, JSON.stringify(state)); renderAll(); }
function toast(msg,type='ok'){ const t=document.getElementById('toast'); t.textContent=msg; t.className='toast show'+(type==='err'?' err':type==='warn'?' warn':''); clearTimeout(t._tt); t._tt=setTimeout(()=>t.className='toast',2800); }
function esc(v){ return String(v??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;'); }
function log(type,msg,detail=''){ state.logs.unshift({ts:new Date().toLocaleString(),type,msg,detail}); if(state.logs.length>700) state.logs=state.logs.slice(0,700); state.diagnostics.lastEvent=`${type}: ${msg}`; localStorage.setItem(STORE_KEY, JSON.stringify(state)); if(currentView==='logs') renderLogs(); }
function repoUrl(){ return `https://github.com/${state.config.githubUser}/${state.config.githubRepo}`; }
function controlUrl(){ return `https://${state.config.githubUser}.github.io/${state.config.githubRepo}/${state.config.controlFile}`; }
function standaloneControlUrl(){ return `${controlUrl()}#control`; }
function jobLiveUrl(job){ return `https://${state.config.githubUser}.github.io/${state.config.githubRepo}/${job.fileName}`; }
function currentAdapter(){ return state.adapters.find(a=>a.id===state.selectedAdapterId)||null; }
function currentJob(){ return state.jobs.find(j=>j.id===state.selectedJobId)||null; }
function ensureAdapter(){ const a=currentAdapter(); if(!a){ toast('Create or select an adapter','warn'); return null; } return a; }
function ensureJob(){ const j=currentJob(); if(!j){ toast('Create or select a job','warn'); return null; } return j; }
function setView(name){ currentView=name; renderAll(); }
function selectInstall(id){ state.selectedInstall=id; renderInstall(); }
function selectConfig(id){ state.selectedConfig=id; renderConfig(); }
function selectRun(id){ state.selectedRun=id; renderRun(); }
function selectControl(id){ state.selectedControl=id; renderControl(); }
function setSelectedAdapter(id){ state.selectedAdapterId=id; saveState(); }
function setSelectedJob(id){ state.selectedJobId=id; saveState(); }
function copyText(text){ navigator.clipboard.writeText(text).then(()=>{ toast('Copied'); log('event','Copied to clipboard'); }).catch(()=>{ toast('Clipboard copy failed','err'); log('error','Clipboard copy failed'); }); }
function openUrl(url){ state.diagnostics.lastCommand='openUrl'; if(window.AndroidHelper&&typeof window.AndroidHelper.postMessage==='function'){ window.AndroidHelper.postMessage('openUrl:'+url); } else { window.open(url,'_blank'); } log('command','Open URL',url); saveDiag(); }
function saveDiag(){ localStorage.setItem(STORE_KEY, JSON.stringify(state)); }
function writeClipboard(text){ state.diagnostics.lastCommand='clipboard.write'; if(window.AndroidHelper&&typeof window.AndroidHelper.postMessage==='function'){ window.AndroidHelper.postMessage('clipboard.write:'+text); log('command','Clipboard write via helper'); } else { navigator.clipboard.writeText(text).then(()=>log('command','Clipboard write via browser')).catch(()=>log('error','Clipboard write failed')); } saveDiag(); }
function readClipboardIntoJob(){ const job=ensureJob(); if(!job) return; state.diagnostics.lastCommand='clipboard.read'; if(window.AndroidHelper&&typeof window.AndroidHelper.postMessage==='function'){ window.AndroidHelper.postMessage('clipboard.read'); log('command','Clipboard read via helper'); } else { navigator.clipboard.readText().then(text=>{ job.response=text; state.diagnostics.lastClipboard=text; log('event','Clipboard captured via browser'); saveState(); }).catch(()=>{ toast('Clipboard read failed','err'); log('error','Clipboard read failed'); }); } saveDiag(); }
window.receiveEvent = function(payload){
  if(typeof payload!=='string') return;
  state.diagnostics.lastEvent=payload;
  if(payload==='helper.ready'){ state.diagnostics.helperPresent=true; log('event','Helper ready'); saveState(); return; }
  if(payload.startsWith('clipboard:')){ const text=payload.slice('clipboard:'.length); state.diagnostics.lastClipboard=text; const job=currentJob(); if(job){ job.response=text; job.updatedAt=new Date().toLocaleString(); log('event','Clipboard captured into current job'); saveState(); } return; }
  if(payload.startsWith('notify:')){ log('event','Helper notification',payload.slice('notify:'.length)); saveState(); }
};
function pingHelper(){ state.diagnostics.lastCommand='ping'; if(window.AndroidHelper&&typeof window.AndroidHelper.postMessage==='function'){ window.AndroidHelper.postMessage('ping'); log('command','Sent helper ping'); } else { state.diagnostics.helperPresent=false; log('warn','AndroidHelper not present'); saveState(); } }
function createJob(){
  const title = prompt('Job/app name?'); if(!title) return;
  const clean = title.trim(); if(!clean) return;
  const safeName = clean.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'') || 'job';
  const job = { id:uid(), title:clean, description:'', prompt:'', response:'', issues:'', fileName:`${safeName}.html`, createdAt:new Date().toLocaleString(), updatedAt:new Date().toLocaleString(), status:'idle', lastRun:'' };
  state.jobs.unshift(job); state.selectedJobId=job.id; log('event','Created job',clean); saveState();
}
function deleteJob(){ const job=ensureJob(); if(!job) return; state.jobs=state.jobs.filter(j=>j.id!==job.id); state.selectedJobId=state.jobs[0]?.id||null; log('event','Deleted job',job.title); saveState(); }
function saveJobForm(){
  const job=ensureJob(); if(!job) return;
  job.title=document.getElementById('jobTitle').value.trim()||job.title;
  job.description=document.getElementById('jobDesc').value;
  job.prompt=document.getElementById('jobPrompt').value;
  job.response=document.getElementById('jobResponse').value;

    const doc=new DOMParser().parseFromString(html,'text/html');
    const found=new Set();
    doc.querySelectorAll('*').forEach(el=>{
      if(el.id) found.add('#'+el.id);

      const tag=el.tagName.toLowerCase();
      if(['textarea','button','form','article','main'].includes(tag)) found.add(tag);
    });
    const list=Array.from(found).filter(Boolean).slice(0,280);
    a.probeResults=list;
    a.probeUrl=url;
    resultBox.innerHTML=list.length ? list.map(s=>`<div class="selector-chip" onclick="assignSelector('${encodeURIComponent(s)}')">${esc(s)}</div>`).join('') : 'No selectors found.';

async function runMagicTrainer(){
  const a=ensureAdapter(); if(!a) return;
  const url=document.getElementById('magicUrl').value.trim() || a.probeUrl || a.launchUrl;
  if(!url){ toast('Target URL required','warn'); return; }
  const out=document.getElementById('magicOutput');
  out.textContent='Fetching and classifying DOM...';
  try{
    const res=await fetch(PROXIES.codetabs(url));
    const html=await res.text();
    const doc=new DOMParser().parseFromString(html,'text/html');
    const textareas=doc.querySelectorAll('textarea, [contenteditable="true"], div[role="textbox"]');
    const buttons=doc.querySelectorAll('button, [role="button"]');
    const articles=doc.querySelectorAll('article, main, [data-message-author-role], [role="article"]');
    const buttonByText = (terms) => Array.from(buttons).find(b=>terms.some(t=>(b.textContent||'').toLowerCase().includes(t)));
    const firstText = textareas[0];
    const sendBtn = buttonByText(['send','submit','arrow']) || buttons[0];
    const stopBtn = buttonByText(['stop','cancel']);
    const newChat = buttonByText(['new chat','new conversation','new thread']);
    if(firstText){ a.selectors.promptInput = bestSelector(firstText); }
    if(sendBtn){ a.selectors.sendButton = bestSelector(sendBtn); }
    if(articles.length){ a.selectors.responseBlocks = bestSelector(articles[0]); a.selectors.latestResponse = bestSelector(articles[articles.length-1]); }
    if(stopBtn){ a.selectors.stopButton = bestSelector(stopBtn); }
    if(newChat){ a.selectors.newChatButton = bestSelector(newChat); }
    a.probeUrl=url; a.launchUrl=a.launchUrl||url; a.hosts=[...new Set([...(a.hosts||[]), new URL(url).hostname])];
    a.status = a.selectors.promptInput && a.selectors.sendButton ? 'partial' : a.status;
    const report = {
      url,
      promptInput:a.selectors.promptInput || null,
      sendButton:a.selectors.sendButton || null,
      responseBlocks:a.selectors.responseBlocks || null,
      latestResponse:a.selectors.latestResponse || null,
      stopButton:a.selectors.stopButton || null,
      newChatButton:a.selectors.newChatButton || null
    };
    out.textContent = JSON.stringify(report,null,2);
    log('event','Magic trainer applied',a.platform); saveState();
  }catch(e){ out.textContent='Magic trainer failed: '+e.message; log('error','Magic trainer failed',e.message); toast('Magic trainer failed','err'); }
}
function bestSelector(el){
  if(el.id) return '#'+CSS.escape(el.id);
  if(el.getAttribute('data-testid')) return `[data-testid="${el.getAttribute('data-testid')}"]`;
  if(el.name) return `[name="${el.name}"]`;
  const tag=el.tagName.toLowerCase();
  const cls=[...el.classList].slice(0,2).map(c=>'.'+CSS.escape(c)).join('');
  if(cls) return tag+cls;
  if(el.getAttribute('role')) return `${tag}[role="${el.getAttribute('role')}"]`;
  return tag;
}

async function deployToGitHub(content, path, message){
  const pat=state.config.githubPat.trim(); if(!pat) throw new Error('GitHub PAT is required');
  const owner=state.config.githubUser.trim(), repo=state.config.githubRepo.trim(), branch=state.config.gitBranch.trim()||'main';
  const api=`https://api.github.com/repos/${encodeURIComponent(owner)}/${encodeURIComponent(repo)}/contents/${encodeURIComponent(path)}`;
  const headers={ 'Authorization':'token '+pat, 'Accept':'application/vnd.github+json', 'Content-Type':'application/json' };
  let sha=null;
  const existing=await fetch(`${api}?ref=${encodeURIComponent(branch)}`,{headers});
  if(existing.ok){ const data=await existing.json(); sha=data.sha; }
  const payload={message, content:btoa(unescape(encodeURIComponent(content))), branch}; if(sha) payload.sha=sha;
  const res=await fetch(api,{method:'PUT',headers,body:JSON.stringify(payload)});
  if(!res.ok){ const txt=await res.text(); throw new Error('GitHub commit failed: '+txt); }
  return res.json();
}

function setupVoice(){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){ toast('Speech recognition not supported','warn'); log('warn','Speech recognition not supported'); return; }
  recognition = new SR();
  recognition.continuous=true;
  recognition.interimResults=true;
  recognition.lang=state.config.voiceLanguage||'en-US';
  recognition.onstart = () => {
    voiceActive=true;
    document.getElementById('voiceStatus')&&(document.getElementById('voiceStatus').textContent='Listening...');
    log('event','Voice recognition started');
  };
  recognition.onresult = (event) => {
    let transcript = '';
    for(let i=event.resultIndex;i<event.results.length;i++){
      const t = event.results[i][0].transcript;
      transcript += t;
      if(event.results[i].isFinal) transcript += ' ';
    }
    transcript = transcript.trim();
    if(document.getElementById('voiceTranscript')) document.getElementById('voiceTranscript').value = transcript;
    if(event.results[event.results.length-1].isFinal){
      handleVoiceCommand(transcript);
    }
  };
  recognition.onerror = (e) => {
    voiceActive=false;
    log('error','Voice error',e.error||'unknown');
    toast('Voice error: '+(e.error||'unknown'),'err');
  };
  recognition.onend = () => {
    voiceActive=false;
    if(document.getElementById('voiceStatus')) document.getElementById('voiceStatus').textContent='Ready';
    if(state.config.voiceAutoRestart && document.getElementById('voiceAutoRestart')?.checked){
      try{ recognition.start(); }catch{}
    }
  };
}
function startVoice(){
  if(!state.config.speechEnabled){ toast('Voice is disabled in Config','warn'); return; }
  if(!recognition) setupVoice();
  if(!recognition) return;
  try{
    voiceActive=true;
    recognition.start();
    log('event','Voice listening started');
    notify('Listening...');
  }catch(e){
    toast('Voice start failed','err');
    log('error','Voice start error',e.message);
  }
}
function stopVoice(){
  voiceActive=false;
  if(recognition){
    try{
      recognition.stop();
      log('event','Voice listening stopped');
      notify('Stopped listening');
    }catch(e){
      log('error','Voice stop error',e.message);
    }
  }
}
function handleVoiceCommand(text){
  log('event','Voice command captured',text);
  for(const cmd of VOICE_COMMANDS){
    if(cmd.pattern.test(text)){
      log('event','Voice command matched',cmd.label);
      const func=window[cmd.action];
      if(typeof func==='function'){
        try{
          const result=func();
          if(result instanceof Promise) result.catch(e=>log('error','Voice action error',e.message));
          notify(`${cmd.label} executed`);
        }catch(e){
          log('error','Voice action error',e.message);
          notify(`${cmd.label} failed`,'err');
        }
      }
      return;
    }
  }
  notify('Command not recognized');
  log('warn','Voice command not recognized',text);
}
