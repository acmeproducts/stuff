<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site Bundler - DEBUG</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            padding: 40px;
            max-width: 800px;
            margin: 0 auto;
        }
        h1 { color: #58a6ff; }
        .container {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 24px;
            margin: 20px 0;
        }
        input[type="url"] {
            width: 100%;
            padding: 12px;
            background: #0d1117;
            border: 1px solid #30363d;
            color: #c9d1d9;
            border-radius: 6px;
            font-size: 14px;
            margin-bottom: 12px;
        }
        button {
            background: #238636;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            margin-right: 8px;
            margin-bottom: 8px;
        }
        button:hover { background: #2ea043; }
        button:disabled { background: #484f58; cursor: not-allowed; }
        
        #status {
            margin-top: 20px;
            padding: 16px;
            border-radius: 6px;
            display: none;
        }
        #status.visible { display: block; }
        #status.error { background: #da363320; border: 1px solid #da3633; color: #ff7b72; }
        #status.success { background: #23863620; border: 1px solid #238636; color: #3fb950; }
        #status.fetching { background: #1f6feb20; border: 1px solid #58a6ff; color: #58a6ff; }
        
        #logs {
            margin-top: 20px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 16px;
            font-family: monospace;
            font-size: 12px;
            max-height: 400px;
            overflow-y: auto;
            display: none;
        }
        #logs.visible { display: block; }
        .log-entry { margin: 2px 0; color: #8b949e; }
        .log-entry.error { color: #ff7b72; }
        .log-entry.success { color: #3fb950; }
        .log-entry.warn { color: #f0883e; }
        
        .test-section {
            margin-top: 20px;
            padding: 16px;
            background: #21262d;
            border-radius: 6px;
        }
        .test-section h3 { margin-top: 0; color: #f0883e; }
    </style>
</head>
<body>
    <h1>🔽 Site Bundler (DEBUG MODE)</h1>
    
    <div class="container">
        <label>Worker URL:</label>
        <input type="text" id="workerUrl" value="https://site-bundler.myacctfortracking.workers.dev/" readonly style="opacity: 0.7;" />
        
        <label>Target URL:</label>
        <input type="url" id="urlInput" placeholder="https://andrewmcwhae.ca/2025/06/16/perpendicular/" 
               value="https://andrewmcwhae.ca/2025/06/16/perpendicular/" />
        
        <button onclick="testWorker()">1. Test Worker Health</button>
        <button onclick="bundleSite()" id="bundleBtn">2. Bundle Site</button>
        <button onclick="setUrl('https://example.com')">Test: Example.com</button>
        
        <div id="status"></div>
        
        <div id="downloadArea" style="display: none; margin-top: 20px;">
            <a id="downloadLink" style="display: inline-block; padding: 12px 24px; background: #1f6feb; color: white; text-decoration: none; border-radius: 6px;">
                ⬇ Download Bundle
            </a>
        </div>
    </div>
    
    <div id="logs"></div>

    <script>
        const WORKER_URL = 'https://site-bundler.myacctfortracking.workers.dev/';
        
        const urlInput = document.getElementById('urlInput');
        const statusDiv = document.getElementById('status');
        const logsDiv = document.getElementById('logs');
        
        function log(msg, level = 'info') {
            const entry = document.createElement('div');
            entry.className = `log-entry ${level}`;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            logsDiv.appendChild(entry);
            logsDiv.className = 'visible';
            logsDiv.scrollTop = logsDiv.scrollHeight;
            console.log(msg);
        }
        
        function setStatus(type, msg) {
            statusDiv.className = `visible ${type}`;
            statusDiv.textContent = msg;
        }
        
        function setUrl(url) {
            urlInput.value = url;
        }
        
        // TEST 1: Health check
        async function testWorker() {
            setStatus('fetching', 'Testing worker...');
            log('Testing worker health...');
            
            try {
                const response = await fetch(WORKER_URL, {
                    method: 'GET',
                    headers: { 'Accept': 'application/json' }
                });
                
                log(`Worker responded: HTTP ${response.status}`, response.ok ? 'success' : 'warn');
                
                const data = await response.json();
                log(`Worker status: ${JSON.stringify(data)}`, 'success');
                
                setStatus('success', `✅ Worker is reachable! Status: ${data.status || 'OK'}`);
                
            } catch (error) {
                log(`Health check failed: ${error.message}`, 'error');
                log(`Error type: ${error.constructor.name}`, 'error');
                setStatus('error', `❌ Worker test failed: ${error.message}\n\nCheck:\n1. Is worker deployed?\n2. Open browser console (F12) → Network tab\n3. Try visiting ${WORKER_URL} directly`);
            }
        }
        
        // TEST 2: Actual bundle
        async function bundleSite() {
            const url = urlInput.value.trim();
            
            if (!url) {
                setStatus('error', 'Enter a URL');
                return;
            }
            
            document.getElementById('bundleBtn').disabled = true;
            setStatus('fetching', 'Bundling...');
            logsDiv.innerHTML = '';
            log(`Starting bundle: ${url}`);
            
            try {
                log(`POST ${WORKER_URL}`);
                
                const response = await fetch(WORKER_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ url: url })
                });
                
                log(`Response: HTTP ${response.status} ${response.statusText}`);
                
                const text = await response.text();
                let data;
                
                try {
                    data = JSON.parse(text);
                } catch(e) {
                    log(`Invalid JSON response: ${text.substring(0, 200)}`, 'error');
                    throw new Error('Invalid JSON from worker');
                }
                
                if (!response.ok) {
                    log(`HTTP Error: ${response.status}`, 'error');
                    log(`Response: ${JSON.stringify(data, null, 2)}`, 'error');
                    throw new Error(data.error || `HTTP ${response.status}`);
                }
                
                log(`Bundle success: ${data.success}`, data.success ? 'success' : 'warn');
                
                if (data.logs) {
                    data.logs.forEach(l => log(l));
                }
                
                if (data.success && data.html) {
                    const html = decodeURIComponent(escape(atob(data.html)));
                    log(`Decoded: ${html.length} bytes`, 'success');
                    
                    const blob = new Blob([html], { type: 'text/html' });
                    const urlObj = URL.createObjectURL(blob);
                    
                    const link = document.getElementById('downloadLink');
                    link.href = urlObj;
                    link.download = 'bundled-perpendicular.html';
                    link.textContent = `⬇ Download (${(blob.size/1024).toFixed(1)} KB)`;
                    
                    document.getElementById('downloadArea').style.display = 'block';
                    setStatus('success', `✅ Success! Bundled ${html.length} bytes`);
                } else {
                    throw new Error(data.error || 'Unknown error');
                }
                
            } catch (error) {
                log(`Bundle error: ${error.message}`, 'error');
                log(`Stack: ${error.stack?.split('\n').slice(0,3).join('\n')}`, 'error');
                setStatus('error', `Failed: ${error.message}`);
                
                if (error.message.includes('Failed to fetch')) {
                    log('', 'error');
                    log('DIAGNOSTIC: "Failed to fetch" usually means:', 'error');
                    log('1. CORS blocked the request', 'error');
                    log('2. The worker URL is wrong', 'error');
                    log('3. The worker threw an exception', 'error');
                    log('4. Cloudflare rate limited you', 'error');
                    log('', 'error');
                    log(`Try opening this in a new tab: ${WORKER_URL}`, 'warn');
                }
                
            } finally {
                document.getElementById('bundleBtn').disabled = false;
            }
        }
        
        // Auto-run health check on load
        window.onload = () => {
            log('Page loaded, worker: ' + WORKER_URL);
            testWorker();
        };
    </script>
</body>
</html>
