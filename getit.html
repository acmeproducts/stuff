<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site Bundler</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Main Container */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            gap: 2rem;
        }

        /* Input Container */
        .input-wrapper {
            width: 100%;
            max-width: 600px;
            position: relative;
            display: flex;
            gap: 0.75rem;
        }

        input[type="url"] {
            flex: 1;
            padding: 1rem 1.25rem;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            color: #f8fafc;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="url"]:focus {
            border-color: #3b82f6;
        }

        input[type="url"]::placeholder {
            color: #64748b;
        }

        .primary-btn {
            padding: 1rem 2rem;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .primary-btn:hover:not(:disabled) {
            background: #2563eb;
            transform: translateY(-1px);
        }

        .primary-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* Settings Button */
        .settings-btn {
            position: absolute;
            right: -3.5rem;
            top: 50%;
            transform: translateY(-50%);
            width: 44px;
            height: 44px;
            background: transparent;
            border: 1px solid #334155;
            border-radius: 12px;
            color: #94a3b8;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .settings-btn:hover {
            background: #1e293b;
            border-color: #3b82f6;
            color: #3b82f6;
        }

        /* Settings Panel */
        .settings-panel {
            position: absolute;
            top: calc(100% + 0.75rem);
            right: 0;
            width: 280px;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 1.25rem;
            backdrop-filter: blur(10px);
            display: none;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            z-index: 100;
        }

        .settings-panel.active {
            display: block;
        }

        .settings-title {
            font-size: 0.875rem;
            font-weight: 600;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 1rem;
        }

        .setting-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0.875rem;
        }

        .setting-item:last-child {
            margin-bottom: 0;
        }

        .setting-label {
            font-size: 0.875rem;
            color: #cbd5e1;
        }

        .setting-value {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #3b82f6;
        }

        input[type="number"] {
            width: 60px;
            padding: 0.375rem 0.5rem;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 6px;
            color: #f8fafc;
            font-size: 0.875rem;
            text-align: center;
        }

        /* Status */
        .status {
            font-size: 0.875rem;
            color: #94a3b8;
            opacity: 0;
            transition: opacity 0.3s;
            text-align: center;
            max-width: 600px;
        }

        .status.active {
            opacity: 1;
        }

        .status.error { color: #f87171; }
        .status.success { color: #4ade80; }

        /* Progress */
        .progress {
            width: 100%;
            max-width: 600px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .progress.active {
            opacity: 1;
        }

        .progress-bar {
            height: 4px;
            background: #334155;
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            width: 0%;
            transition: width 0.3s ease;
        }

        .progress-text {
            font-size: 0.75rem;
            color: #64748b;
            margin-top: 0.5rem;
            text-align: center;
        }

        /* History Section */
        .history-section {
            background: #1e293b;
            border-top: 1px solid #334155;
            max-height: 40vh;
            display: flex;
            flex-direction: column;
        }

        .history-header {
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #334155;
        }

        .history-title {
            font-size: 0.875rem;
            font-weight: 500;
            color: #94a3b8;
        }

        .history-list {
            overflow-y: auto;
            flex: 1;
            padding: 0.5rem 0;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.875rem 2rem;
            border-bottom: 1px solid #252f47;
            transition: background 0.15s;
        }

        .history-item:last-child {
            border-bottom: none;
        }

        .history-item:hover {
            background: #252f47;
        }

        .history-info {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .history-url {
            font-size: 0.875rem;
            color: #f8fafc;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .history-meta {
            font-size: 0.75rem;
            color: #64748b;
        }

        .history-actions {
            display: flex;
            gap: 0.5rem;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .history-item:hover .history-actions {
            opacity: 1;
        }

        .icon-btn {
            width: 32px;
            height: 32px;
            background: transparent;
            border: 1px solid #334155;
            border-radius: 6px;
            color: #94a3b8;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.875rem;
            transition: all 0.2s;
        }

        .icon-btn:hover {
            border-color: #3b82f6;
            color: #3b82f6;
        }

        .icon-btn.delete:hover {
            border-color: #ef4444;
            color: #ef4444;
        }

        .empty-state {
            padding: 3rem 2rem;
            text-align: center;
            color: #64748b;
            font-size: 0.875rem;
        }

        /* Result */
        .result {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 1.25rem;
            display: none;
            align-items: center;
            gap: 1rem;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        }

        .result.active {
            display: flex;
        }

        .result-text {
            font-size: 0.875rem;
        }

        /* Scrollbar */
        .history-list::-webkit-scrollbar {
            width: 8px;
        }

        .history-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .history-list::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 4px;
        }

        .history-list::-webkit-scrollbar-thumb:hover {
            background: #475569;
        }

        /* Mobile */
        @media (max-width: 768px) {
            .main {
                padding: 1rem;
                justify-content: flex-start;
                padding-top: 4rem;
            }

            .input-wrapper {
                flex-direction: column;
            }

            .settings-btn {
                position: static;
                transform: none;
                width: 100%;
                height: 44px;
            }

            .settings-panel {
                position: fixed;
                top: auto;
                bottom: 0;
                left: 0;
                right: 0;
                width: 100%;
                border-radius: 12px 12px 0 0;
                border: none;
                border-top: 1px solid #334155;
            }

            .primary-btn {
                width: 100%;
            }

            .history-actions {
                opacity: 1;
            }

            .result {
                left: 1rem;
                right: 1rem;
                bottom: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="main">
        <div class="input-wrapper">
            <input type="url" id="urlInput" placeholder="Paste URL and press Enter" autocomplete="off">
            <button class="primary-btn" id="goBtn" onclick="startBundling()">Bundle</button>
            
            <button class="settings-btn" onclick="toggleSettings()" title="Settings">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                </svg>
            </button>
            
            <div class="settings-panel" id="settingsPanel">
                <div class="settings-title">Bundle Settings</div>
                <div class="setting-item">
                    <span class="setting-label">Recursion Depth</span>
                    <div class="setting-value">
                        <input type="number" id="maxDepth" value="3" min="1" max="5">
                    </div>
                </div>
                <div class="setting-item">
                    <span class="setting-label">Inline Images</span>
                    <input type="checkbox" id="inlineImages" checked>
                </div>
                <div class="setting-item">
                    <span class="setting-label">Inline CSS</span>
                    <input type="checkbox" id="inlineCss" checked>
                </div>
                <div class="setting-item">
                    <span class="setting-label">Inline JavaScript</span>
                    <input type="checkbox" id="inlineJs" checked>
                </div>
                <div class="setting-item">
                    <span class="setting-label">Process Iframes</span>
                    <input type="checkbox" id="processIframes" checked>
                </div>
            </div>
        </div>
        
        <div class="status" id="status"></div>
        
        <div class="progress" id="progress">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="progress-text" id="progressText">Initializing...</div>
        </div>
    </div>

    <div class="history-section">
        <div class="history-header">
            <span class="history-title">History</span>
            <span class="history-title" id="historyCount">0 items</span>
        </div>
        <div class="history-list" id="historyList">
            <div class="empty-state">No bundles yet. Paste a URL to begin.</div>
        </div>
    </div>

    <div class="result" id="result">
        <span class="result-text" id="resultText">Bundle ready</span>
        <button class="primary-btn" onclick="downloadBundle()">Download</button>
    </div>

    <script>
        // State
        let currentBundle = null;
        let history = [];

        // Initialize
        function init() {
            const saved = localStorage.getItem('siteBundlerHistory');
            if (saved) {
                try {
                    history = JSON.parse(saved);
                    renderHistory();
                } catch (e) {}
            }
            document.addEventListener('click', (e) => {
                if (!e.target.closest('.settings-panel') && !e.target.closest('.settings-btn')) {
                    document.getElementById('settingsPanel').classList.remove('active');
                }
            });
        }

        function saveHistory() {
            localStorage.setItem('siteBundlerHistory', JSON.stringify(history));
        }

        function toggleSettings() {
            document.getElementById('settingsPanel').classList.toggle('active');
        }

        function renderHistory() {
            const list = document.getElementById('historyList');
            const count = document.getElementById('historyCount');
            
            count.textContent = `${history.length} item${history.length !== 1 ? 's' : ''}`;
            
            if (history.length === 0) {
                list.innerHTML = '<div class="empty-state">No bundles yet. Paste a URL to begin.</div>';
                return;
            }
            
            list.innerHTML = history.map(item => {
                const date = new Date(item.timestamp);
                return `
                    <div class="history-item">
                        <div class="history-info">
                            <div class="history-url" title="${item.url}">${item.url}</div>
                            <div class="history-meta">${date.toLocaleString()} • ${(item.size/1024).toFixed(1)} KB</div>
                        </div>
                        <div class="history-actions">
                            <button class="icon-btn" onclick="downloadHistoryItem(${item.id})">⬇</button>
                            <button class="icon-btn delete" onclick="removeFromHistory(${item.id})">✕</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function removeFromHistory(id) {
            history = history.filter(item => item.id !== id);
            saveHistory();
            renderHistory();
        }

        function downloadHistoryItem(id) {
            const item = history.find(h => h.id === id);
            if (item && item.data) {
                const blob = new Blob([Uint8Array.from(atob(item.data.split(',')[1]), c => c.charCodeAt(0))], {type: 'text/html'});
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = item.name;
                a.click();
                URL.revokeObjectURL(url);
            }
        }

        function addToHistory(url, blob) {
            const reader = new FileReader();
            reader.onloadend = () => {
                const entry = {
                    id: Date.now(),
                    url: url,
                    timestamp: new Date().toISOString(),
                    size: blob.size,
                    name: generateFilename(url),
                    data: reader.result
                };
                history.unshift(entry);
                saveHistory();
                renderHistory();
            };
            reader.readAsDataURL(blob);
        }

        function generateFilename(url) {
            try {
                const domain = new URL(url).hostname.replace(/[^a-z0-9]/gi, '_');
                return `bundled_${domain}_${Date.now()}.html`;
            } catch {
                return `bundled_${Date.now()}.html`;
            }
        }

        function resolveUrl(base, relative) {
            try {
                return new URL(relative, base).href;
            } catch {
                return relative;
            }
        }

        async function fetchWithTimeout(url, timeout) {
            const controller = new AbortController();
            setTimeout(() => controller.abort(), timeout);
            return fetch(url, {
                signal: controller.signal,
                headers: {'Accept': 'text/html'}
            });
        }

        function showStatus(msg, type = '') {
            const status = document.getElementById('status');
            status.textContent = msg;
            status.className = 'status active ' + type;
        }

        function updateProgress(text, pct) {
            document.getElementById('progressText').textContent = text;
            document.getElementById('progressFill').style.width = pct + '%';
        }

        async function startBundling() {
            const url = document.getElementById('urlInput').value.trim();
            if (!url) {
                showStatus('Enter a URL', 'error');
                return;
            }

            const btn = document.getElementById('goBtn');
            btn.disabled = true;
            btn.textContent = 'Bundling...';
            document.getElementById('result').classList.remove('active');
            document.getElementById('progress').classList.add('active');
            
            try {
                updateProgress('Fetching...', 15);
                showStatus('Fetching page...', '');
                
                const res = await fetchWithTimeout(url, 15000);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                
                let html = await res.text();
                const baseUrl = res.url || url;
                const maxDepth = parseInt(document.getElementById('maxDepth').value) || 3;
                
                html = await processHtml(html, baseUrl, 0, maxDepth);
                
                updateProgress('Finalizing...', 95);
                
                const bundled = `<!DOCTYPE html>\n<!-- Bundled from: ${baseUrl} -->\n${html}`;
                const blob = new Blob([bundled], {type: 'text/html'});
                
                currentBundle = {blob, url};
                addToHistory(url, blob);
                
                document.getElementById('result').classList.add('active');
                showStatus('Ready to download', 'success');
                
            } catch (err) {
                showStatus(err.message, 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Bundle';
                document.getElementById('progress').classList.remove('active');
            }
        }

        async function processHtml(html, baseUrl, depth, maxDepth) {
            const doc = new DOMParser().parseFromString(html, 'text/html');
            
            // CSS
            if (document.getElementById('inlineCss').checked) {
                for (const link of doc.querySelectorAll('link[rel="stylesheet"]')) {
                    const href = link.getAttribute('href');
                    if (href) {
                        try {
                            const res = await fetchWithTimeout(resolveUrl(baseUrl, href), 5000);
                            if (res.ok) {
                                const css = await res.text();
                                const style = doc.createElement('style');
                                style.textContent = css;
                                link.parentNode.replaceChild(style, link);
                            }
                        } catch (e) { link.remove(); }
                    }
                }
            }
            
            // JS
            if (document.getElementById('inlineJs').checked) {
                for (const script of doc.querySelectorAll('script[src]')) {
                    const src = script.getAttribute('src');
                    if (src && !src.includes('recaptcha')) {
                        try {
                            const res = await fetchWithTimeout(resolveUrl(baseUrl, src), 5000);
                            if (res.ok) {
                                const js = await res.text();
                                const newScript = doc.createElement('script');
                                newScript.textContent = js;
                                script.parentNode.replaceChild(newScript, script);
                            }
                        } catch (e) {}
                    }
                }
            }
            
            // Images
            if (document.getElementById('inlineImages').checked) {
                for (const img of doc.querySelectorAll('img[src]')) {
                    const src = img.getAttribute('src');
                    if (!src || src.startsWith('data:')) continue;
                    try {
                        const res = await fetchWithTimeout(resolveUrl(baseUrl, src), 3000);
                        if (res.ok) {
                            const blob = await res.blob();
                            img.src = await new Promise((res, rej) => {
                                const r = new FileReader();
                                r.onloadend = () => res(r.result);
                                r.onerror = rej;
                                r.readAsDataURL(blob);
                            });
                        }
                    } catch (e) {}
                }
            }
            
            // Iframes (recursive)
            if (document.getElementById('processIframes').checked && depth < maxDepth) {
                const iframes = doc.querySelectorAll('iframe[src]');
                for (const iframe of iframes) {
                    const src = iframe.getAttribute('src');
                    if (!src || src.includes('google') || src.includes('facebook')) continue;
                    
                    try {
                        const res = await fetchWithTimeout(resolveUrl(baseUrl, src), 5000);
                        if (res.ok) {
                            const innerHtml = await res.text();
                            const processed = await processHtml(innerHtml, res.url, depth + 1, maxDepth);
                            iframe.setAttribute('srcdoc', processed);
                            iframe.removeAttribute('src');
                        }
                    } catch (e) {}
                }
            }
            
            return doc.documentElement.outerHTML;
        }

        function downloadBundle() {
            if (!currentBundle) return;
            const url = URL.createObjectURL(currentBundle.blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = generateFilename(currentBundle.url);
            a.click();
            URL.revokeObjectURL(url);
        }

        document.getElementById('urlInput').addEventListener('keypress', e => {
            if (e.key === 'Enter') startBundling();
        });

        init();
    </script>
</body>
</html>
