<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site Bundler</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            padding: 40px 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        h1 { text-align: center; margin-bottom: 10px; }
        .subtitle { text-align: center; opacity: 0.9; margin-bottom: 30px; }
        .container {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        input {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            margin-bottom: 15px;
        }
        button {
            padding: 14px 28px;
            background: #00c9a7;
            color: #000;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-right: 10px;
            margin-bottom: 10px;
        }
        button:hover { background: #00b894; }
        button:disabled { background: #636e72; color: #fff; cursor: not-allowed; }
        .presets { margin: 15px 0; }
        .preset-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            padding: 8px 16px;
        }
        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
        }
        .status.visible { display: block; }
        .status.success { background: #00b894; }
        .status.error { background: #d63031; }
        .status.loading { background: #0984e3; }
        .download-box {
            margin-top: 20px;
            padding: 25px;
            background: #00b894;
            border-radius: 8px;
            text-align: center;
            display: none;
        }
        .download-box.visible { display: block; }
        .download-box a {
            display: inline-block;
            padding: 15px 40px;
            background: #fff;
            color: #00b894;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 16px;
        }
        .download-box a:hover { background: #f1f2f6; }
        .stats {
            margin-top: 15px;
            font-family: monospace;
            font-size: 13px;
            opacity: 0.9;
        }
        .logs {
            margin-top: 20px;
            background: #2d3436;
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 12px;
            max-height: 300px;
            overflow-y: auto;
        }
        .log-entry { margin: 3px 0; color: #b2bec3; }
        .log-error { color: #ff7675; }
        .log-success { color: #55efc4; }
        .log-warn { color: #fdcb6e; }
    </style>
</head>
<body>
    <h1>🔽 Site Bundler Pro</h1>
    <p class="subtitle">Generative Art Edition - Fully bundles iframe content</p>
    
    <div class="container">
        <input type="url" id="urlInput" value="https://andrewmcwhae.ca/2025/06/16/perpendicular/" placeholder="Enter URL..." />
        
        <div class="presets">
            <button class="preset-btn" onclick="setUrl('https://andrewmcwhae.ca/2025/06/16/perpendicular/')">Perpendicular Art</button>
            <button class="preset-btn" onclick="setUrl('https://example.com')">Test</button>
            <button class="preset-btn" onclick="document.getElementById('urlInput').value=''">Clear</button>
        </div>
        
        <button onclick="bundle()" id="bundleBtn">Bundle Site</button>
        <button onclick="toggleLogs()" style="background: #74b9ff; color: white;">Show/Hide Logs</button>
        
        <div id="status" class="status"></div>
        
        <div id="downloadBox" class="download-box">
            <h3 style="margin-bottom: 10px;">✅ Bundle Complete!</h3>
            <a id="downloadLink" href="#" download="bundled-site.html">⬇ Download HTML</a>
            <div id="stats" class="stats"></div>
        </div>
        
        <div id="logs" class="logs" style="display: none;"></div>
    </div>

    <script>
        const WORKER_URL = 'https://site-bundler.myacctfortracking.workers.dev/';
        
        function setUrl(url) {
            document.getElementById('urlInput').value = url;
        }
        
        function log(msg, type = 'info') {
            const div = document.getElementById('logs');
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            entry.textContent = msg;
            div.appendChild(entry);
            div.scrollTop = div.scrollHeight;
            console.log(msg);
        }
        
        function toggleLogs() {
            const l = document.getElementById('logs');
            l.style.display = l.style.display === 'none' ? 'block' : 'none';
        }
        
        function setStatus(msg, type) {
            const s = document.getElementById('status');
            s.textContent = msg;
            s.className = `status visible ${type}`;
        }
        
        async function bundle() {
            const url = document.getElementById('urlInput').value.trim();
            if (!url) return alert('Enter a URL');
            
            const btn = document.getElementById('bundleBtn');
            document.getElementById('downloadBox').classList.remove('visible');
            document.getElementById('logs').innerHTML = '';
            document.getElementById('logs').style.display = 'block';
            btn.disabled = true;
            setStatus('Bundling... (this may take 30+ seconds)', 'loading');
            
            log(`Starting: ${url}`);
            
            try {
                const res = await fetch(WORKER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url })
                });
                
                log(`Response: HTTP ${res.status}`);
                const data = await res.json();
                
                if (!res.ok || !data.success) throw new Error(data.error || 'Failed');
                
                // Show logs
                if (data.logs) data.logs.forEach(l => {
                    const type = l.includes('[ERROR]') || l.includes('[FAIL]') ? 'error' :
                                l.includes('[OK]') || l.includes('Complete') ? 'success' :
                                l.includes('[SKIP]') ? 'warn' : 'info';
                    log(l, type);
                });
                
                // Decode and create download
                const html = decodeURIComponent(escape(atob(data.html)));
                const blob = new Blob([html], { type: 'text/html' });
                const objUrl = URL.createObjectURL(blob);
                
                document.getElementById('downloadLink').href = objUrl;
                document.getElementById('stats').innerHTML = `
                    Original: ${html.length.toLocaleString()} bytes<br>
                    Base64: ${data.html.length.toLocaleString()} chars<br>
                    Final: ${(blob.size/1024/1024).toFixed(2)} MB
                `;
                
                document.getElementById('downloadBox').classList.add('visible');
                setStatus('✅ Success! Download ready below', 'success');
                log(`Complete: ${html.length} bytes`, 'success');
                
            } catch (err) {
                setStatus(`❌ Error: ${err.message}`, 'error');
                log(`FATAL: ${err.message}`, 'error');
            } finally {
                btn.disabled = false;
            }
        }
        
        // Enter key support
        document.getElementById('urlInput').addEventListener('keypress', e => {
            if (e.key === 'Enter') bundle();
        });
    </script>
</body>
</html>
