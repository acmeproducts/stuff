<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site Bundler - Art Edition</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 0 auto; padding: 40px 20px; background: #1a1a2e; color: #eaeaea; }
        h1 { color: #e94560; }
        input { width: 100%; padding: 12px; margin: 10px 0; font-size: 16px; }
        button { padding: 12px 24px; margin: 10px 5px 10px 0; cursor: pointer; background: #0f3460; color: white; border: none; border-radius: 4px; }
        button:hover { background: #16213e; }
        button.primary { background: #e94560; }
        .status { margin: 20px 0; padding: 15px; border-radius: 4px; }
        .status.success { background: #16c79a; color: #000; }
        .status.error { background: #e94560; }
        .status.loading { background: #0f3460; }
        #download { display: none; margin-top: 20px; padding: 20px; background: #16c79a; text-align: center; border-radius: 8px; }
        #download a { color: #000; font-weight: bold; font-size: 18px; text-decoration: none; }
        .logs { background: #0f3460; padding: 15px; margin-top: 20px; font-family: monospace; font-size: 12px; max-height: 300px; overflow-y: auto; }
        .log-success { color: #16c79a; }
        .log-error { color: #e94560; }
        .log-warn { color: #ffb800; }
    </style>
</head>
<body>
    <h1>🎨 Site Bundler - Generative Art Edition</h1>
    <p>Smart mode extracts iframe content and makes it the primary display</p>
    
    <input type="url" id="url" value="https://andrewmcwhae.ca/2025/06/16/perpendicular/" />
    
    <div>
        <button class="primary" onclick="bundle('smart')">Smart Bundle (Extract Art)</button>
        <button onclick="bundle('full')">Full Bundle (Everything)</button>
        <button onclick="document.getElementById('url').value='https://andrewmcwhae.ca/2025/06/16/perpendicular/'">Perpendicular</button>
    </div>
    
    <div id="status"></div>
    
    <div id="download">
        <a id="link" href="#" download>⬇ Download</a>
        <div id="stats"></div>
    </div>
    
    <div id="logs" class="logs" style="display: none;"></div>

    <script>
        const WORKER = 'https://site-bundler.myacctfortracking.workers.dev/';
        
        function log(msg, type = 'info') {
            const div = document.createElement('div');
            div.className = `log-${type}`;
            div.textContent = msg;
            const logs = document.getElementById('logs');
            logs.appendChild(div);
            logs.style.display = 'block';
            logs.scrollTop = logs.scrollHeight;
        }
        
        async function bundle(mode) {
            const url = document.getElementById('url').value;
            if (!url) return alert('Enter URL');
            
            document.getElementById('status').className = 'status loading';
            document.getElementById('status').textContent = mode === 'smart' ? 'Extracting generative art...' : 'Bundling everything...';
            document.getElementById('download').style.display = 'none';
            document.getElementById('logs').innerHTML = '';
            
            try {
                const res = await fetch(WORKER, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url, mode })
                });
                
                const data = await res.json();
                
                if (data.logs) {
                    data.logs.forEach(l => {
                        const type = l.includes('[EXTRACT]') ? 'success' : 
                                    l.includes('[FAIL]') || l.includes('[ERROR]') ? 'error' :
                                    l.includes('[SKIP]') ? 'warn' : 'info';
                        log(l, type);
                    });
                }
                
                if (!data.success) throw new Error(data.error);
                
                const html = decodeURIComponent(escape(atob(data.html)));
                
                // Auto-detect if we need to extract just the art
                if (mode === 'smart' && data.extractedIframes && data.extractedIframes.length > 0) {
                    // Option: Create a clean version with just the art
                    const artIframe = data.extractedIframes[0]; // Usually the main content
                    const cleanHtml = `<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Perpendicular - Standalone</title>
<style>
body { margin: 0; padding: 0; overflow: hidden; }
canvas { display: block; }
</style>
</head>
<body>
${artIframe.bundled}
</body>
</html>`;
                    
                    const blob = new Blob([cleanHtml], {type: 'text/html'});
                    const objUrl = URL.createObjectURL(blob);
                    document.getElementById('link').href = objUrl;
                    document.getElementById('link').download = 'perpendicular-standalone.html';
                    document.getElementById('stats').innerHTML = `
                        Mode: Smart Extract<br>
                        Art size: ${(artIframe.size/1024/1024).toFixed(2)} MB<br>
                        Final size: ${(blob.size/1024/1024).toFixed(2)} MB
                    `;
                } else {
                    const blob = new Blob([html], {type: 'text/html'});
                    const objUrl = URL.createObjectURL(blob);
                    document.getElementById('link').href = objUrl;
                    document.getElementById('link').download = 'bundled-site.html';
                    document.getElementById('stats').innerHTML = `Size: ${(blob.size/1024/1024).toFixed(2)} MB`;
                }
                
                document.getElementById('status').className = 'status success';
                document.getElementById('status').textContent = '✅ Success!';
                document.getElementById('download').style.display = 'block';
                
            } catch (err) {
                document.getElementById('status').className = 'status error';
                document.getElementById('status').textContent = '❌ ' + err.message;
                log('FATAL: ' + err.message, 'error');
            }
        }
    </script>
</body>
</html>
