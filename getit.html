<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Site Bundler</title>
    <style>
        body { font-family: sans-serif; max-width: 700px; margin: 50px auto; padding: 20px; background: #0d1117; color: #c9d1d9; }
        input { width: 100%; padding: 12px; margin: 10px 0; font-size: 16px; background: #21262d; border: 1px solid #30363d; color: #c9d1d9; }
        button { padding: 12px 24px; background: #238636; color: white; border: none; border-radius: 6px; cursor: pointer; margin-right: 10px; }
        button:hover { background: #2ea043; }
        button:disabled { background: #484f58; }
        #status { margin: 20px 0; padding: 15px; border-radius: 6px; display: none; }
        #status.error { background: #da363320; border: 1px solid #da3633; display: block; }
        #status.success { background: #23863620; border: 1px solid #238636; display: block; }
        #status.loading { background: #1f6feb20; border: 1px solid #58a6ff; display: block; }
        #download { display: none; margin-top: 20px; text-align: center; }
        #download a { display: inline-block; padding: 15px 40px; background: #238636; color: white; text-decoration: none; border-radius: 8px; font-size: 18px; }
        #logs { margin-top: 20px; background: #0d1117; border: 1px solid #30363d; padding: 15px; font-family: monospace; font-size: 12px; max-height: 400px; overflow-y: auto; display: none; }
        .log-line { margin: 2px 0; color: #8b949e; }
        .log-ok { color: #56d364; }
        .log-err { color: #f85149; }
    </style>
</head>
<body>
    <h1>🔽 Site Bundler</h1>
    
    <input type="url" id="url" value="https://andrewmcwhae.ca/2025/06/16/perpendicular/" placeholder="URL to bundle..." />
    
    <div>
        <button onclick="bundle()">Bundle</button>
        <button onclick="setUrl('https://andrewmcwhae.ca/2025/06/16/perpendicular/')" style="background:#1f6feb">Perpendicular</button>
        <button onclick="document.getElementById('logs').style.display='block'">Show Logs</button>
    </div>
    
    <div id="status"></div>
    
    <div id="download">
        <a id="link" href="#" download="bundled.html">⬇ Download</a>
    </div>
    
    <div id="logs"></div>

    <script>
        const WORKER = 'https://site-bundler.myacctfortracking.workers.dev/';
        
        function setUrl(u) { document.getElementById('url').value = u; }
        
        function log(msg, ok) {
            const d = document.createElement('div');
            d.className = ok ? 'log-ok' : 'log-line';
            d.textContent = msg;
            document.getElementById('logs').appendChild(d);
        }
        
        async function bundle() {
            const url = document.getElementById('url').value;
            if (!url) return;
            
            const btn = document.querySelector('button');
            const status = document.getElementById('status');
            const download = document.getElementById('download');
            
            btn.disabled = true;
            status.className = 'loading';
            status.textContent = 'Bundling... (may take 30-60s for large sites)';
            status.style.display = 'block';
            download.style.display = 'none';
            document.getElementById('logs').innerHTML = '';
            
            try {
                const res = await fetch(WORKER, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({url})
                });
                
                const text = await res.text();
                let data;
                try { data = JSON.parse(text); } catch(e) { throw new Error('Invalid response: ' + text.slice(0,100)); }
                
                if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
                if (!data.success) throw new Error(data.error);
                
                if (data.logs) data.logs.forEach(l => log(l, l.includes('[OK]') || l.includes('Complete')));
                
                const html = decodeURIComponent(escape(atob(data.html)));
                const blob = new Blob([html], {type: 'text/html'});
                const objUrl = URL.createObjectURL(blob);
                
                document.getElementById('link').href = objUrl;
                document.getElementById('link').download = 'bundled-' + url.replace(/[^a-z0-9]/gi, '-').slice(0,30) + '.html';
                document.getElementById('link').textContent = `⬇ Download (${(blob.size/1024/1024).toFixed(2)} MB)`;
                
                status.className = 'success';
                status.textContent = '✅ Success!';
                download.style.display = 'block';
                
            } catch(err) {
                status.className = 'error';
                status.textContent = '❌ ' + err.message;
                log('FATAL: ' + err.message, false);
            } finally {
                btn.disabled = false;
            }
        }
        
        document.getElementById('url').addEventListener('keypress', e => { if(e.key==='Enter') bundle(); });
    </script>
</body>
</html>
