<!DOCTYPE html>
<!-- STT Test Harness · Deepgram vs Speechmatics · April 2026 -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>STT Test Harness</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0c0c0f;--surface:#131318;--border:#1e1e28;--border2:#2a2a38;
  --teal:#00e5b4;--teal-dim:rgba(0,229,180,.12);--teal-mid:rgba(0,229,180,.35);
  --orange:#ff6b35;--orange-dim:rgba(255,107,53,.12);--orange-mid:rgba(255,107,53,.35);
  --text:#e8e6f0;--text-dim:#6b6880;--text-mid:#9b99aa;
  --green:#00c97a;--red:#ff4455;--yellow:#ffd060;
}
html,body{height:100%;background:var(--bg);font-family:'JetBrains Mono',monospace;color:var(--text);overflow:hidden;}

/* ── LAYOUT ── */
/* Fixed header + fixed setup bar + remaining split between two panels */
.header{position:fixed;top:0;left:0;right:0;height:48px;z-index:20;background:var(--bg);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 20px;}
.logo{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;letter-spacing:-0.5px;}
.logo span{color:var(--teal);}
.status-pill{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text-dim);background:var(--surface);border:1px solid var(--border2);border-radius:999px;padding:4px 12px;}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--text-dim);transition:background .3s;}
.status-dot.live{background:var(--green);box-shadow:0 0 6px var(--green);}

/* Setup bar — fixed below header */
.setup-bar{position:fixed;top:48px;left:0;right:0;z-index:19;background:var(--surface);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.key-label{font-size:10px;color:var(--text-dim);white-space:nowrap;}
.key-input{background:var(--bg);color:var(--text);border:1px solid var(--border2);border-radius:6px;padding:6px 10px;font-size:11px;font-family:'JetBrains Mono',monospace;width:220px;outline:none;}
.key-input:focus{border-color:var(--teal);}
.key-input.sm{width:220px;}
.proxy-input{background:var(--bg);color:var(--text);border:1px solid var(--border2);border-radius:6px;padding:6px 10px;font-size:11px;font-family:'JetBrains Mono',monospace;width:280px;outline:none;}
.proxy-input:focus{border-color:var(--orange);}
.btn-save{background:var(--teal-dim);color:var(--teal);border:1px solid var(--teal-mid);border-radius:6px;padding:6px 14px;font-size:11px;font-family:'JetBrains Mono',monospace;cursor:pointer;font-weight:700;}
.btn-save:hover{background:var(--teal);color:#000;}

/* Main area — two columns, fills remaining height */
.main{position:fixed;top:0;left:0;right:0;bottom:0;display:grid;grid-template-columns:1fr 1fr;padding-top:calc(48px + 57px);/* header + setup bar */}
.panel{display:flex;flex-direction:column;overflow:hidden;border-right:1px solid var(--border);}
.panel:last-child{border-right:none;}

.panel-header{padding:10px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.provider-name{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;display:flex;align-items:center;gap:7px;}
.badge{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:3px 7px;border-radius:4px;}
.dg .badge{background:var(--teal-dim);color:var(--teal);border:1px solid var(--teal-mid);}
.sm .badge{background:var(--orange-dim);color:var(--orange);border:1px solid var(--orange-mid);}
.lang-select{background:var(--surface);color:var(--text);border:1px solid var(--border2);border-radius:6px;padding:4px 8px;font-size:11px;font-family:'JetBrains Mono',monospace;cursor:pointer;outline:none;}

.prompt-area{padding:10px 16px;border-bottom:1px solid var(--border);flex-shrink:0;}
.prompt-label{font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim);margin-bottom:6px;}
.prompt-phrase{font-size:12px;line-height:1.6;color:var(--yellow);padding:8px 12px;background:rgba(255,208,96,.05);border:1px solid rgba(255,208,96,.15);border-radius:7px;}
.prompt-phrase em{display:block;font-style:italic;font-size:10px;color:var(--text-dim);margin-top:3px;}

.transcript-area{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:6px;min-height:0;}
.tr-empty{color:var(--text-dim);font-size:11px;font-style:italic;}
.tr-entry{padding:8px 12px;border-radius:7px;font-size:12px;line-height:1.6;word-break:break-word;}
.tr-entry.final{background:rgba(255,255,255,.03);border:1px solid var(--border2);}
.tr-entry.partial{color:var(--text-dim);font-style:italic;border:1px solid transparent;}
.tr-meta{font-size:9px;color:var(--text-dim);margin-top:3px;display:flex;gap:8px;}
.lang-tag{color:var(--teal);}
.sm .lang-tag{color:var(--orange);}

/* Controls — always visible at bottom of each panel */
.controls{padding:10px 16px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0;background:var(--bg);}
.btn{border:none;border-radius:7px;padding:8px 16px;font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;cursor:pointer;transition:opacity .15s;letter-spacing:.03em;}
.btn-start{background:var(--teal);color:#000;}
.btn-stop{background:var(--red);color:#fff;}
.btn-clear{background:var(--surface);color:var(--text-dim);border:1px solid var(--border2);}
.btn:disabled{opacity:.3;cursor:default;}
.timer{font-size:11px;color:var(--text-dim);margin-left:auto;font-variant-numeric:tabular-nums;}

/* phrase nav — fixed bottom */
.phrase-nav{position:fixed;bottom:0;left:0;right:0;z-index:20;height:44px;background:var(--surface);border-top:1px solid var(--border);display:flex;align-items:center;gap:14px;padding:0 20px;}
.btn-next{background:var(--teal-dim);color:var(--teal);border:1px solid var(--teal-mid);border-radius:7px;padding:6px 18px;font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;cursor:pointer;}
.btn-next:hover{background:var(--teal);color:#000;}
.phrase-counter{font-size:11px;color:var(--text-dim);}
.nav-hint{font-size:10px;color:var(--text-dim);margin-left:auto;}

/* Recalc main padding when setup bar might wrap */
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

@media(max-width:600px){
  .main{grid-template-columns:1fr;grid-template-rows:1fr 1fr;}
  .panel{border-right:none;border-bottom:1px solid var(--border);}
}
</style>
</head>
<body>

<div class="header">
  <div class="logo">STT <span>TEST</span></div>
  <div class="status-pill"><div class="status-dot" id="mic-dot"></div><span id="mic-label">mic idle</span></div>
</div>

<div class="setup-bar" id="setup-bar">
  <span class="key-label">DG key</span>
  <input class="key-input" id="dg-key-input" type="password" placeholder="Deepgram API key">
  <span class="key-label" style="margin-left:4px;">SM key</span>
  <input class="key-input sm" id="sm-key-input" type="password" placeholder="Speechmatics API key">
  <span class="key-label" style="margin-left:4px;color:var(--orange);">SM proxy URL</span>
  <input class="proxy-input" id="proxy-input" placeholder="https://sm-jwt-proxy.YOUR_ACCOUNT.workers.dev/jwt">
  <button class="btn-save" onclick="saveKeys()">Save</button>
</div>

<div class="main">

  <!-- DEEPGRAM -->
  <div class="panel dg">
    <div class="panel-header">
      <div class="provider-name">Deepgram <span class="badge">Nova-3</span></div>
      <select class="lang-select" id="dg-lang" onchange="onLangChange('dg',this.value)"></select>
    </div>
    <div class="prompt-area">
      <div class="prompt-label">Say this phrase</div>
      <div class="prompt-phrase" id="dg-prompt">—</div>
    </div>
    <div class="transcript-area" id="dg-transcript"><div class="tr-empty">Transcript appears here.</div></div>
    <div class="controls">
      <button class="btn btn-start" id="dg-start" onclick="startDG()" disabled>▶ Start</button>
      <button class="btn btn-stop" id="dg-stop" onclick="stopDG()" disabled>■ Stop</button>
      <button class="btn btn-clear" onclick="clearPanel('dg')">Clear</button>
      <span class="timer" id="dg-timer">0:00</span>
    </div>
  </div>

  <!-- SPEECHMATICS -->
  <div class="panel sm">
    <div class="panel-header">
      <div class="provider-name">Speechmatics <span class="badge">Enhanced</span></div>
      <select class="lang-select" id="sm-lang" onchange="onLangChange('sm',this.value)"></select>
    </div>
    <div class="prompt-area">
      <div class="prompt-label">Say this phrase</div>
      <div class="prompt-phrase" id="sm-prompt">—</div>
    </div>
    <div class="transcript-area" id="sm-transcript"><div class="tr-empty">Transcript appears here.</div></div>
    <div class="controls">
      <button class="btn btn-start" id="sm-start" onclick="startSM()" disabled>▶ Start</button>
      <button class="btn btn-stop" id="sm-stop" onclick="stopSM()" disabled>■ Stop</button>
      <button class="btn btn-clear" onclick="clearPanel('sm')">Clear</button>
      <span class="timer" id="sm-timer">0:00</span>
    </div>
  </div>

</div>

<div class="phrase-nav">
  <button class="btn-next" onclick="nextPhrase()">Next phrase →</button>
  <span class="phrase-counter" id="phrase-counter">Phrase 1 / 5</span>
  <span class="nav-hint">Pick a language per panel · hit Start · speak · compare</span>
</div>

<script>
'use strict';

// ── LANGUAGES + PHRASES ──────────────────────────────────────────────────────
var LANGS=[
  {code:'en',label:'English 🇺🇸',dgCode:'en-US',smCode:'en',phrases:[
    {text:'The quick brown fox jumps over the lazy dog.',note:'Classic pangram'},
    {text:'What time does the next train leave for Bangkok?',note:'Travel question'},
    {text:'I would like two coffees and a glass of water please.',note:'Ordering'},
    {text:'The weather is quite hot and humid today.',note:'Weather'},
    {text:'Can you recommend a good restaurant nearby?',note:'Recommendation'},
  ]},
  {code:'th',label:'Thai 🇹🇭',dgCode:'th',smCode:'th',phrases:[
    {text:'สวัสดีครับ ผมชื่อจอห์น มาจากอเมริกา',note:'Hello, my name is John, I\'m from America'},
    {text:'ขอโทษครับ ห้องน้ำอยู่ที่ไหนครับ',note:'Excuse me, where is the bathroom?'},
    {text:'อาหารอร่อยมากครับ ขอบคุณครับ',note:'The food is very delicious, thank you'},
    {text:'ผมอยากไปเที่ยวเชียงใหม่ ต้องนั่งรถไฟกี่ชั่วโมงครับ',note:'I want to go to Chiang Mai, how many hours by train?'},
    {text:'วันนี้อากาศร้อนมาก ขอน้ำเย็นสักแก้วได้ไหมครับ',note:'Today is very hot, may I have a cold glass of water?'},
  ]},
  {code:'zh',label:'Chinese 🇨🇳',dgCode:'zh-CN',smCode:'cmn',phrases:[
    {text:'你好，我叫约翰，我来自美国。',note:'Hello, my name is John, I\'m from America'},
    {text:'请问最近的地铁站在哪里？',note:'Excuse me, where is the nearest subway station?'},
    {text:'这个菜单有英文版本吗？',note:'Do you have an English menu?'},
    {text:'我想买一张去上海的火车票。',note:'I want to buy a train ticket to Shanghai'},
    {text:'今天天气怎么样？外面冷吗？',note:'How is the weather today? Is it cold outside?'},
  ]},
  {code:'ms',label:'Malay 🇲🇾',dgCode:'ms',smCode:'ms',phrases:[
    {text:'Selamat pagi, nama saya John, saya datang dari Amerika.',note:'Good morning, my name is John, I\'m from America'},
    {text:'Boleh tolong tunjukkan saya jalan ke stesen bas?',note:'Can you show me the way to the bus station?'},
    {text:'Saya nak memesan nasi lemak dan teh tarik satu.',note:'I want to order nasi lemak and one teh tarik'},
    {text:'Berapa harga bilik hotel untuk satu malam?',note:'How much is a hotel room for one night?'},
    {text:'Cuaca hari ini panas sangat, sama macam biasa di Malaysia.',note:'The weather is very hot today, just like usual in Malaysia'},
  ]},
  {code:'vi',label:'Vietnamese 🇻🇳',dgCode:'vi',smCode:'vi',phrases:[
    {text:'Xin chào, tên tôi là John, tôi đến từ Mỹ.',note:'Hello, my name is John, I\'m from America'},
    {text:'Cho tôi hỏi đường đến bến xe buýt ở đâu?',note:'Can I ask where the bus stop is?'},
    {text:'Tôi muốn gọi một tô phở và một ly cà phê sữa đá.',note:'I want a bowl of pho and an iced milk coffee'},
    {text:'Giá vé máy bay từ Hà Nội đến thành phố Hồ Chí Minh là bao nhiêu?',note:'Flight price from Hanoi to Ho Chi Minh City?'},
    {text:'Hôm nay trời mưa, tôi cần mua một cái ô.',note:'It\'s raining today, I need to buy an umbrella'},
  ]},
  {code:'es',label:'Spanish 🇪🇸',dgCode:'es',smCode:'es',phrases:[
    {text:'Hola, me llamo John y vengo de Estados Unidos.',note:'Hello, my name is John and I come from the United States'},
    {text:'¿Puede decirme dónde está la estación de tren más cercana?',note:'Can you tell me where the nearest train station is?'},
    {text:'Quisiera pedir dos cafés con leche y agua, por favor.',note:'I\'d like two lattes and water please'},
    {text:'¿Cuánto cuesta la habitación doble para esta noche?',note:'How much is a double room for tonight?'},
    {text:'El tiempo está muy bonito hoy, ideal para pasear.',note:'The weather is very nice today, perfect for a walk'},
  ]},
  {code:'fil',label:'Tagalog 🇵🇭',dgCode:'fil',smCode:'fil',phrases:[
    {text:'Magandang umaga, ang pangalan ko ay John, galing ako sa Amerika.',note:'Good morning, my name is John, I\'m from America'},
    {text:'Saan po ang pinakamalapit na palengke?',note:'Where is the nearest market?'},
    {text:'Gusto ko pong mag-order ng adobo at isang baso ng tubig.',note:'I\'d like to order adobo and a glass of water'},
    {text:'Magkano po ang pamasahe papuntang Maynila?',note:'How much is the fare to Manila?'},
    {text:'Mainit ngayon, gusto ko ng malamig na buko juice.',note:'It\'s hot today, I want cold coconut juice'},
  ]},
  {code:'ko',label:'Korean 🇰🇷',dgCode:'ko',smCode:'ko',phrases:[
    {text:'안녕하세요, 제 이름은 존이고 미국에서 왔습니다.',note:'Hello, my name is John and I\'m from America'},
    {text:'가장 가까운 지하철역이 어디 있나요?',note:'Where is the nearest subway station?'},
    {text:'비빔밥 하나와 된장찌개 하나 주세요.',note:'One bibimbap and one doenjang jjigae please'},
    {text:'서울에서 부산까지 KTX로 얼마나 걸려요?',note:'How long from Seoul to Busan by KTX?'},
    {text:'오늘 날씨가 좋네요, 한강에서 산책하고 싶어요.',note:'The weather is nice today, I want to walk along the Han River'},
  ]},
];

// ── STATE ────────────────────────────────────────────────────────────────────
var KEYS={dg:'',sm:'',proxy:''};
var currentLangIdx={dg:0,sm:0};
var currentPhraseIdx=0;
var TOTAL_PHRASES=5;
var dgActive=false,smActive=false;
var dgWs=null,smWs=null,dgAudio=null,smAudio=null;
var sharedStream=null,sharedCtx=null;
var timers={dg:null,sm:null};
var micCount=0;

// ── SETUP BAR HEIGHT ─────────────────────────────────────────────────────────
function adjustLayout(){
  var bar=document.getElementById('setup-bar');
  var h=bar.offsetHeight;
  document.querySelector('.main').style.paddingTop=(48+h)+'px';
}
window.addEventListener('resize',adjustLayout);

// ── KEYS ─────────────────────────────────────────────────────────────────────
function saveKeys(){
  KEYS.dg=(document.getElementById('dg-key-input').value||'').trim();
  KEYS.sm=(document.getElementById('sm-key-input').value||'').trim();
  KEYS.proxy=(document.getElementById('proxy-input').value||'').trim();
  if(KEYS.dg)localStorage.setItem('stt_dg',KEYS.dg);
  if(KEYS.sm)localStorage.setItem('stt_sm',KEYS.sm);
  if(KEYS.proxy)localStorage.setItem('stt_proxy',KEYS.proxy);
  updateBtns();
  alert('Keys saved.');
}
function loadKeys(){
  KEYS.dg=localStorage.getItem('stt_dg')||'';
  KEYS.sm=localStorage.getItem('stt_sm')||'';
  KEYS.proxy=localStorage.getItem('stt_proxy')||'';
  if(KEYS.dg)document.getElementById('dg-key-input').value=KEYS.dg;
  if(KEYS.sm)document.getElementById('sm-key-input').value=KEYS.sm;
  if(KEYS.proxy)document.getElementById('proxy-input').value=KEYS.proxy;
  updateBtns();
}
function updateBtns(){
  document.getElementById('dg-start').disabled=!KEYS.dg||dgActive;
  document.getElementById('sm-start').disabled=!KEYS.sm||!KEYS.proxy||smActive;
  document.getElementById('dg-stop').disabled=!dgActive;
  document.getElementById('sm-stop').disabled=!smActive;
}

// ── LANG / PHRASES ────────────────────────────────────────────────────────────
function populateSelects(){
  ['dg','sm'].forEach(function(p){
    var s=document.getElementById(p+'-lang');
    s.innerHTML=LANGS.map(function(l,i){return'<option value="'+i+'">'+l.label+'</option>';}).join('');
  });
}
function onLangChange(p,idx){currentLangIdx[p]=parseInt(idx);updatePrompt(p);}
function updatePrompt(p){
  var lang=LANGS[currentLangIdx[p]];
  var ph=lang.phrases[currentPhraseIdx]||lang.phrases[0];
  document.getElementById(p+'-prompt').innerHTML=esc(ph.text)+'<em>'+esc(ph.note)+'</em>';
}
function nextPhrase(){
  currentPhraseIdx=(currentPhraseIdx+1)%TOTAL_PHRASES;
  updatePrompt('dg');updatePrompt('sm');
  document.getElementById('phrase-counter').textContent='Phrase '+(currentPhraseIdx+1)+' / '+TOTAL_PHRASES;
}
function clearPanel(p){
  document.getElementById(p+'-transcript').innerHTML='<div class="tr-empty">Transcript appears here.</div>';
}

// ── TRANSCRIPT DOM ────────────────────────────────────────────────────────────
function appendTr(p,text,isFinal,lang){
  if(!text||!text.trim())return;
  var el=document.getElementById(p+'-transcript');
  var empty=el.querySelector('.tr-empty');if(empty)empty.remove();
  var prev=el.querySelector('.tr-entry.partial');
  if(!isFinal&&prev){prev.querySelector('span')?prev.querySelector('span').textContent=text:prev.textContent=text;return;}
  if(prev)prev.remove();
  var div=document.createElement('div');
  div.className='tr-entry '+(isFinal?'final':'partial');
  if(isFinal){
    div.innerHTML='<span>'+esc(text)+'</span><div class="tr-meta"><span class="lang-tag">'+esc(lang||'')+'</span><span>✓ final</span></div>';
  }else{
    div.innerHTML='<span>'+esc(text)+'</span>';
  }
  el.appendChild(div);
  el.scrollTop=el.scrollHeight;
}
function esc(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}

// ── MIC + TIMER ───────────────────────────────────────────────────────────────
function setMic(on){
  micCount=on?micCount+1:Math.max(0,micCount-1);
  var live=micCount>0;
  document.getElementById('mic-dot').className='status-dot'+(live?' live':'');
  document.getElementById('mic-label').textContent=live?'mic live':'mic idle';
}
function startTimer(p){
  var t0=Date.now();
  timers[p]=setInterval(function(){
    var s=Math.floor((Date.now()-t0)/1000);
    document.getElementById(p+'-timer').textContent=Math.floor(s/60)+':'+(s%60<10?'0':'')+s%60;
  },500);
}
function stopTimer(p){clearInterval(timers[p]);timers[p]=null;document.getElementById(p+'-timer').textContent='0:00';}

// ── AUDIO ─────────────────────────────────────────────────────────────────────
async function getStream(){
  if(sharedStream&&sharedStream.active)return sharedStream;
  sharedStream=await navigator.mediaDevices.getUserMedia({audio:{sampleRate:16000,channelCount:1,echoCancellation:true,noiseSuppression:true},video:false});
  return sharedStream;
}
function getCtx(){
  if(!sharedCtx||sharedCtx.state==='closed')sharedCtx=new(window.AudioContext||window.webkitAudioContext)({sampleRate:16000});
  return sharedCtx;
}
function makePCMPipe(stream,onData){
  var ctx=getCtx();
  var src=ctx.createMediaStreamSource(stream);
  var proc=ctx.createScriptProcessor(4096,1,1);
  proc.onaudioprocess=function(e){
    var f=e.inputBuffer.getChannelData(0);
    var b=new Int16Array(f.length);
    for(var i=0;i<f.length;i++){var s=Math.max(-1,Math.min(1,f[i]));b[i]=s<0?s*0x8000:s*0x7FFF;}
    onData(b.buffer);
  };
  src.connect(proc);proc.connect(ctx.destination);
  return {stop:function(){try{src.disconnect();proc.disconnect();}catch(_){}}};
}

// ── DEEPGRAM ──────────────────────────────────────────────────────────────────
async function startDG(){
  if(dgActive||!KEYS.dg)return;
  var lang=LANGS[currentLangIdx.dg];
  try{
    var stream=await getStream();
    var url='wss://api.deepgram.com/v1/listen'
      +'?api_key='+encodeURIComponent(KEYS.dg)
      +'&model=nova-3'
      +'&language='+encodeURIComponent(lang.dgCode)
      +'&encoding=linear16&sample_rate=16000&channels=1'
      +'&interim_results=true&punctuate=true&endpointing=400';
    dgWs=new WebSocket(url);
    dgWs.onopen=function(){
      dgActive=true;updateBtns();setMic(true);startTimer('dg');
      dgAudio=makePCMPipe(stream,function(buf){if(dgWs&&dgWs.readyState===1)dgWs.send(buf);});
    };
    dgWs.onmessage=function(e){
      try{
        var d=JSON.parse(e.data);
        var alt=d.channel&&d.channel.alternatives&&d.channel.alternatives[0];
        if(alt&&alt.transcript)appendTr('dg',alt.transcript,!!d.is_final,lang.label);
      }catch(_){}
    };
    dgWs.onclose=function(){cleanDG();};
    dgWs.onerror=function(){appendTr('dg','[connection error]',true,'ERR');cleanDG();};
  }catch(e){alert('Mic error: '+e.message);}
}
function stopDG(){
  if(dgWs&&dgWs.readyState===1){try{dgWs.send(JSON.stringify({type:'CloseStream'}));}catch(_){}dgWs.close();}
  else cleanDG();
}
function cleanDG(){
  dgActive=false;
  if(dgAudio){dgAudio.stop();dgAudio=null;}
  dgWs=null;setMic(false);stopTimer('dg');updateBtns();
}

// ── SPEECHMATICS ──────────────────────────────────────────────────────────────
async function startSM(){
  if(smActive||!KEYS.sm||!KEYS.proxy)return;
  var lang=LANGS[currentLangIdx.sm];
  try{
    // Get JWT via proxy (proxy holds no keys — client sends its own key in the request body)
    var jwtResp=await fetch(KEYS.proxy,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({key:KEYS.sm})
    });
    if(!jwtResp.ok)throw new Error('JWT fetch failed: '+jwtResp.status);
    var jwtData=await jwtResp.json();
    var jwt=jwtData.key_value;
    if(!jwt)throw new Error('No key_value in JWT response');

    var stream=await getStream();
    smWs=new WebSocket('wss://eu2.rt.speechmatics.com/v2?jwt='+encodeURIComponent(jwt));
    smWs.onopen=function(){
      smWs.send(JSON.stringify({
        message:'StartRecognition',
        audio_format:{type:'raw',encoding:'pcm_s16le',sample_rate:16000},
        transcription_config:{language:lang.smCode,enable_partials:true,max_delay:2,
          punctuation_overrides:{permitted_marks:['.','!','?',',']}}
      }));
    };
    smWs.onmessage=function(e){
      try{
        var d=JSON.parse(e.data);
        if(d.message==='RecognitionStarted'){
          smActive=true;updateBtns();setMic(true);startTimer('sm');
          smAudio=makePCMPipe(stream,function(buf){if(smWs&&smWs.readyState===1)smWs.send(buf);});
        }else if(d.message==='AddPartialTranscript'){
          if(d.metadata&&d.metadata.transcript)appendTr('sm',d.metadata.transcript,false,lang.label);
        }else if(d.message==='AddTranscript'){
          if(d.metadata&&d.metadata.transcript)appendTr('sm',d.metadata.transcript,true,lang.label);
        }else if(d.message==='Error'){
          appendTr('sm','[SM Error: '+(d.reason||d.type)+']',true,'ERR');cleanSM();
        }
      }catch(_){}
    };
    smWs.onclose=function(){cleanSM();};
    smWs.onerror=function(){appendTr('sm','[connection error]',true,'ERR');cleanSM();};
  }catch(e){alert('SM error: '+e.message);cleanSM();}
}
function stopSM(){
  if(smWs&&smWs.readyState===1){
    try{smWs.send(JSON.stringify({message:'EndOfStream',last_seq_no:0}));}catch(_){}
    setTimeout(function(){if(smWs)smWs.close();},600);
  }else cleanSM();
}
function cleanSM(){
  smActive=false;
  if(smAudio){smAudio.stop();smAudio=null;}
  smWs=null;setMic(false);stopTimer('sm');updateBtns();
}

// ── INIT ──────────────────────────────────────────────────────────────────────
populateSelects();
loadKeys();
updatePrompt('dg');updatePrompt('sm');
updateBtns();
adjustLayout();
</script>
