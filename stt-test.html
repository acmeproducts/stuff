<!DOCTYPE html>
<!-- STT Test Harness · Deepgram vs Speechmatics · April 2026 -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>STT Test Harness</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0c0c0f;--surface:#131318;--border:#1e1e28;--border2:#2a2a38;
  --teal:#00e5b4;--teal-dim:rgba(0,229,180,.12);--teal-mid:rgba(0,229,180,.35);
  --orange:#ff6b35;--orange-dim:rgba(255,107,53,.12);
  --text:#e8e6f0;--text-dim:#6b6880;--text-mid:#9b99aa;
  --green:#00c97a;--red:#ff4455;--yellow:#ffd060;
}
html,body{height:100%;background:var(--bg);font-family:'JetBrains Mono',monospace;color:var(--text);overflow-x:hidden;}

/* ── HEADER ── */
.header{padding:20px 24px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px;}
.logo{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;letter-spacing:-0.5px;}
.logo span{color:var(--teal);}
.status-pill{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text-dim);background:var(--surface);border:1px solid var(--border2);border-radius:999px;padding:5px 12px;}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--text-dim);transition:background .3s;}
.status-dot.live{background:var(--green);box-shadow:0 0 6px var(--green);}
.status-dot.err{background:var(--red);}

/* ── LAYOUT ── */
.main{display:grid;grid-template-columns:1fr 1fr;height:calc(100vh - 57px);}
.panel{display:flex;flex-direction:column;overflow:hidden;}
.panel:first-child{border-right:1px solid var(--border);}

.panel-header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.provider-name{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px;}
.provider-name .badge{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:3px 8px;border-radius:4px;}
.dg .badge{background:var(--teal-dim);color:var(--teal);border:1px solid var(--teal-mid);}
.sm .badge{background:var(--orange-dim);color:var(--orange);border:1px solid rgba(255,107,53,.35);}
.lang-select{background:var(--surface);color:var(--text);border:1px solid var(--border2);border-radius:6px;padding:5px 10px;font-size:11px;font-family:'JetBrains Mono',monospace;cursor:pointer;outline:none;}
.lang-select:focus{border-color:var(--teal);}

/* ── PROMPT AREA ── */
.prompt-area{padding:14px 20px;border-bottom:1px solid var(--border);flex-shrink:0;}
.prompt-label{font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim);margin-bottom:8px;}
.prompt-phrase{font-size:13px;line-height:1.6;color:var(--yellow);padding:10px 14px;background:rgba(255,208,96,.05);border:1px solid rgba(255,208,96,.15);border-radius:8px;min-height:48px;word-break:break-word;}
.prompt-phrase em{display:block;font-style:italic;font-size:11px;color:var(--text-dim);margin-top:4px;}

/* ── TRANSCRIPT AREA ── */
.transcript-area{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:8px;}
.tr-empty{color:var(--text-dim);font-size:12px;font-style:italic;padding-top:8px;}
.tr-entry{padding:10px 14px;border-radius:8px;font-size:13px;line-height:1.6;border:1px solid var(--border2);word-break:break-word;}
.tr-entry.final{background:rgba(255,255,255,.03);border-color:var(--border2);}
.tr-entry.partial{color:var(--text-dim);background:transparent;border-color:transparent;font-style:italic;}
.tr-entry .tr-meta{font-size:10px;color:var(--text-dim);margin-top:4px;display:flex;gap:8px;}
.tr-entry .lang-tag{color:var(--teal);font-weight:600;}

/* ── CONTROLS ── */
.controls{padding:14px 20px;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0;}
.btn{border:none;border-radius:8px;padding:9px 18px;font-size:12px;font-weight:600;font-family:'JetBrains Mono',monospace;cursor:pointer;transition:all .15s;letter-spacing:.02em;}
.btn-start{background:var(--teal);color:#000;}
.btn-start:hover{opacity:.85;}
.btn-stop{background:var(--red);color:#fff;}
.btn-stop:hover{opacity:.85;}
.btn-clear{background:var(--surface);color:var(--text-dim);border:1px solid var(--border2);}
.btn-clear:hover{color:var(--text);border-color:var(--border);}
.btn:disabled{opacity:.3;cursor:default;}
.timer{font-size:12px;color:var(--text-dim);margin-left:auto;font-variant-numeric:tabular-nums;}

/* ── BOTTOM BAR ── */
.bottom-bar{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);padding:10px 24px;display:flex;align-items:center;gap:12px;z-index:10;}
.btn-next{background:var(--teal-dim);color:var(--teal);border:1px solid var(--teal-mid);border-radius:8px;padding:8px 20px;font-size:12px;font-weight:700;font-family:'JetBrains Mono',monospace;cursor:pointer;letter-spacing:.04em;transition:all .15s;}
.btn-next:hover{background:var(--teal);color:#000;}
.phrase-counter{font-size:11px;color:var(--text-dim);}
.key-form{display:flex;align-items:center;gap:8px;margin-left:auto;}
.key-input{background:var(--bg);color:var(--text);border:1px solid var(--border2);border-radius:6px;padding:6px 12px;font-size:11px;font-family:'JetBrains Mono',monospace;width:260px;outline:none;}
.key-input:focus{border-color:var(--teal);}
.key-label{font-size:10px;color:var(--text-dim);white-space:nowrap;}
.btn-save-key{background:var(--surface);color:var(--teal);border:1px solid var(--teal-mid);border-radius:6px;padding:6px 12px;font-size:11px;font-family:'JetBrains Mono',monospace;cursor:pointer;}

/* ── LOG ── */
.log-row{font-size:10px;padding:2px 0;border-bottom:1px solid rgba(255,255,255,.03);}
.log-row.err{color:var(--red);}
.log-row.ok{color:var(--green);}
.log-row.warn{color:var(--yellow);}

/* scrollbar */
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

@media(max-width:640px){
  .main{grid-template-columns:1fr;grid-template-rows:1fr 1fr;}
  .panel:first-child{border-right:none;border-bottom:1px solid var(--border);}
}
</style>
</head>
<body>

<div class="header">
  <div class="logo">STT <span>TEST</span></div>
  <div class="status-pill"><div class="status-dot" id="mic-dot"></div><span id="mic-label">mic idle</span></div>
</div>

<div class="main" style="padding-bottom:54px;">

  <!-- DEEPGRAM -->
  <div class="panel dg">
    <div class="panel-header">
      <div class="provider-name">Deepgram <span class="badge">Nova-3</span></div>
      <select class="lang-select" id="dg-lang" onchange="onLangChange('dg',this.value)"></select>
    </div>
    <div class="prompt-area">
      <div class="prompt-label">Say this phrase</div>
      <div class="prompt-phrase" id="dg-prompt">Select a language to begin.</div>
    </div>
    <div class="transcript-area" id="dg-transcript"><div class="tr-empty">Transcript will appear here.</div></div>
    <div class="controls">
      <button class="btn btn-start" id="dg-start" onclick="startDG()" disabled>▶ Start</button>
      <button class="btn btn-stop" id="dg-stop" onclick="stopDG()" disabled>■ Stop</button>
      <button class="btn btn-clear" onclick="clearPanel('dg')">Clear</button>
      <span class="timer" id="dg-timer">0:00</span>
    </div>
  </div>

  <!-- SPEECHMATICS -->
  <div class="panel sm">
    <div class="panel-header">
      <div class="provider-name">Speechmatics <span class="badge">Enhanced</span></div>
      <select class="lang-select" id="sm-lang" onchange="onLangChange('sm',this.value)"></select>
    </div>
    <div class="prompt-area">
      <div class="prompt-label">Say this phrase</div>
      <div class="prompt-phrase" id="sm-prompt">Select a language to begin.</div>
    </div>
    <div class="transcript-area" id="sm-transcript"><div class="tr-empty">Transcript will appear here.</div></div>
    <div class="controls">
      <button class="btn btn-start" id="sm-start" onclick="startSM()" disabled>▶ Start</button>
      <button class="btn btn-stop" id="sm-stop" onclick="stopSM()" disabled>■ Stop</button>
      <button class="btn btn-clear" onclick="clearPanel('sm')">Clear</button>
      <span class="timer" id="sm-timer">0:00</span>
    </div>
  </div>

</div>

<!-- BOTTOM BAR -->
<div class="bottom-bar">
  <button class="btn-next" onclick="nextPhrase()">Next phrase →</button>
  <span class="phrase-counter" id="phrase-counter">—</span>
  <div class="key-form">
    <span class="key-label">DG key:</span>
    <input class="key-input" id="dg-key-input" type="password" placeholder="Deepgram API key" style="width:190px;">
    <span class="key-label" style="margin-left:6px;">SM key:</span>
    <input class="key-input" id="sm-key-input" type="password" placeholder="Speechmatics API key" style="width:190px;">
    <button class="btn-save-key" onclick="saveKeys()">Save</button>
  </div>
</div>

<script>
'use strict';

// ── PHRASES ─────────────────────────────────────────────────────────────────
// Real native phrases across all target languages + English for baseline
var LANGS = [
  {
    code:'en', label:'English 🇺🇸', dgCode:'en-US', smCode:'en',
    phrases:[
      {text:'The quick brown fox jumps over the lazy dog.', note:'Classic pangram'},
      {text:'What time does the next train leave for Bangkok?', note:'Travel'},
      {text:'I would like to order two coffees and a glass of water please.', note:'Ordering'},
      {text:'The weather today is quite hot and humid, typical for this time of year.', note:'Weather'},
      {text:'Can you recommend a good restaurant nearby?', note:'Recommendation'},
    ]
  },
  {
    code:'th', label:'Thai 🇹🇭', dgCode:'th', smCode:'th',
    phrases:[
      {text:'สวัสดีครับ ผมชื่อจอห์น มาจากอเมริกา', note:'Hello, my name is John, I\'m from America'},
      {text:'ขอโทษครับ ห้องน้ำอยู่ที่ไหนครับ', note:'Excuse me, where is the bathroom?'},
      {text:'อาหารอร่อยมากครับ ขอบคุณครับ', note:'The food is very delicious, thank you'},
      {text:'ผมอยากไปเที่ยวเชียงใหม่ ต้องนั่งรถไฟกี่ชั่วโมงครับ', note:'I want to visit Chiang Mai, how many hours by train?'},
      {text:'วันนี้อากาศร้อนมาก ขอน้ำเย็นสักแก้วได้ไหมครับ', note:'Today is very hot, can I have a glass of cold water?'},
    ]
  },
  {
    code:'zh', label:'Chinese 🇨🇳', dgCode:'zh-CN', smCode:'cmn',
    phrases:[
      {text:'你好，我叫约翰，我来自美国。', note:'Hello, my name is John, I\'m from America'},
      {text:'请问最近的地铁站在哪里？', note:'Excuse me, where is the nearest subway station?'},
      {text:'这个菜单有英文版本吗？', note:'Do you have an English menu?'},
      {text:'我想买一张去上海的火车票。', note:'I want to buy a train ticket to Shanghai'},
      {text:'今天天气怎么样？外面冷吗？', note:'How is the weather today? Is it cold outside?'},
    ]
  },
  {
    code:'ms', label:'Malay 🇲🇾', dgCode:'ms', smCode:'ms',
    phrases:[
      {text:'Selamat pagi, nama saya John, saya datang dari Amerika.', note:'Good morning, my name is John, I\'m from America'},
      {text:'Boleh tolong tunjukkan saya jalan ke stesen bas?', note:'Can you show me the way to the bus station?'},
      {text:'Saya nak memesan nasi lemak dan teh tarik satu.', note:'I want to order nasi lemak and one teh tarik'},
      {text:'Berapa harga bilik hotel untuk satu malam?', note:'How much is a hotel room for one night?'},
      {text:'Cuaca hari ini panas sangat, sama macam biasa di Malaysia.', note:'Today\'s weather is very hot, just like usual in Malaysia'},
    ]
  },
  {
    code:'vi', label:'Vietnamese 🇻🇳', dgCode:'vi', smCode:'vi',
    phrases:[
      {text:'Xin chào, tên tôi là John, tôi đến từ Mỹ.', note:'Hello, my name is John, I\'m from America'},
      {text:'Cho tôi hỏi đường đến bến xe buýt ở đâu?', note:'Can I ask where the bus stop is?'},
      {text:'Tôi muốn gọi một tô phở và một ly cà phê sữa đá.', note:'I want to order a bowl of pho and an iced coffee with milk'},
      {text:'Giá vé máy bay từ Hà Nội đến thành phố Hồ Chí Minh là bao nhiêu?', note:'What is the price of a flight from Hanoi to Ho Chi Minh City?'},
      {text:'Hôm nay trời mưa, tôi cần mua một cái ô.', note:'Today it\'s raining, I need to buy an umbrella'},
    ]
  },
  {
    code:'es', label:'Spanish 🇪🇸', dgCode:'es', smCode:'es',
    phrases:[
      {text:'Hola, me llamo John y vengo de Estados Unidos.', note:'Hello, my name is John and I come from the United States'},
      {text:'¿Puede decirme dónde está la estación de tren más cercana?', note:'Can you tell me where the nearest train station is?'},
      {text:'Quisiera pedir dos cafés con leche y una botella de agua, por favor.', note:'I would like to order two lattes and a bottle of water, please'},
      {text:'¿Cuánto cuesta la habitación doble para esta noche?', note:'How much does a double room cost for tonight?'},
      {text:'El tiempo está muy bonito hoy, ideal para dar un paseo por el parque.', note:'The weather is very nice today, perfect for a walk in the park'},
    ]
  },
  {
    code:'fil', label:'Tagalog 🇵🇭', dgCode:'fil', smCode:'fil',
    phrases:[
      {text:'Magandang umaga, ang pangalan ko ay John, galing ako sa Amerika.', note:'Good morning, my name is John, I\'m from America'},
      {text:'Saan po ang pinakamalapit na palengke?', note:'Where is the nearest market?'},
      {text:'Gusto ko pong mag-order ng adobo at isang baso ng tubig.', note:'I would like to order adobo and a glass of water'},
      {text:'Magkano po ang pamasahe papuntang Maynila?', note:'How much is the fare to Manila?'},
      {text:'Mainit ngayon, gusto ko ng malamig na buko juice.', note:'It\'s hot today, I want a cold coconut juice'},
    ]
  },
  {
    code:'ko', label:'Korean 🇰🇷', dgCode:'ko', smCode:'ko',
    phrases:[
      {text:'안녕하세요, 제 이름은 존이고 미국에서 왔습니다.', note:'Hello, my name is John and I\'m from America'},
      {text:'가장 가까운 지하철역이 어디 있나요?', note:'Where is the nearest subway station?'},
      {text:'비빔밥 하나와 된장찌개 하나 주세요.', note:'One bibimbap and one doenjang jjigae, please'},
      {text:'서울에서 부산까지 KTX로 얼마나 걸려요?', note:'How long does it take from Seoul to Busan by KTX?'},
      {text:'오늘 날씨가 정말 좋네요, 한강에서 산책하고 싶어요.', note:'The weather is really nice today, I want to take a walk along the Han River'},
    ]
  },
];

var currentLangIdx = {dg:0, sm:0};
var currentPhraseIdx = 0;
var totalPhrases = 5;

// ── KEYS ────────────────────────────────────────────────────────────────────
var KEYS = {dg:'', sm:''};

function saveKeys(){
  var dg = document.getElementById('dg-key-input').value.trim();
  var sm = document.getElementById('sm-key-input').value.trim();
  if(dg){KEYS.dg=dg;localStorage.setItem('stt_dg_key',dg);}
  if(sm){KEYS.sm=sm;localStorage.setItem('stt_sm_key',sm);}
  updateStartButtons();
  toast('Keys saved');
}

function loadKeys(){
  var dg=localStorage.getItem('stt_dg_key')||'';
  var sm=localStorage.getItem('stt_sm_key')||'';
  if(dg){KEYS.dg=dg;document.getElementById('dg-key-input').value=dg;}
  if(sm){KEYS.sm=sm;document.getElementById('sm-key-input').value=sm;}
  updateStartButtons();
}

function updateStartButtons(){
  document.getElementById('dg-start').disabled=!KEYS.dg||dgActive;
  document.getElementById('sm-start').disabled=!KEYS.sm||smActive;
}

// ── LANG/PHRASE LOGIC ────────────────────────────────────────────────────────
function populateLangSelects(){
  ['dg','sm'].forEach(function(p){
    var sel=document.getElementById(p+'-lang');
    sel.innerHTML=LANGS.map(function(l,i){return '<option value="'+i+'">'+l.label+'</option>'}).join('');
    sel.value='0';
  });
}

function onLangChange(provider,idx){
  currentLangIdx[provider]=parseInt(idx);
  updatePrompt(provider);
}

function updatePrompt(provider){
  var lang=LANGS[currentLangIdx[provider]];
  var phrase=lang.phrases[currentPhraseIdx]||lang.phrases[0];
  var el=document.getElementById(provider+'-prompt');
  el.innerHTML=phrase.text+'<em>'+phrase.note+'</em>';
}

function nextPhrase(){
  currentPhraseIdx=(currentPhraseIdx+1)%totalPhrases;
  updatePrompt('dg');updatePrompt('sm');
  document.getElementById('phrase-counter').textContent='Phrase '+(currentPhraseIdx+1)+' / '+totalPhrases;
}

function clearPanel(p){
  var el=document.getElementById(p+'-transcript');
  el.innerHTML='<div class="tr-empty">Transcript will appear here.</div>';
}

// ── MIC INDICATOR ────────────────────────────────────────────────────────────
var micCount=0;
function setMicLive(on){
  micCount=on?micCount+1:Math.max(0,micCount-1);
  var live=micCount>0;
  document.getElementById('mic-dot').className='status-dot'+(live?' live':'');
  document.getElementById('mic-label').textContent=live?'mic live':'mic idle';
}

// ── TIMER ───────────────────────────────────────────────────────────────────
var timers={dg:null,sm:null};
var timerStart={dg:0,sm:0};
function startTimer(p){
  timerStart[p]=Date.now();
  timers[p]=setInterval(function(){
    var s=Math.floor((Date.now()-timerStart[p])/1000);
    document.getElementById(p+'-timer').textContent=Math.floor(s/60)+':'+(s%60<10?'0':'')+s%60;
  },500);
}
function stopTimer(p){
  if(timers[p]){clearInterval(timers[p]);timers[p]=null;}
  document.getElementById(p+'-timer').textContent='0:00';
}

// ── TRANSCRIPT HELPERS ───────────────────────────────────────────────────────
function appendTranscript(provider,text,isFinal,lang){
  if(!text||!text.trim())return;
  var el=document.getElementById(provider+'-transcript');
  var empty=el.querySelector('.tr-empty');
  if(empty)empty.remove();
  var prev=el.querySelector('.tr-entry.partial');
  if(!isFinal&&prev){prev.innerHTML=esc(text);return;}
  if(prev){prev.remove();}
  var div=document.createElement('div');
  div.className='tr-entry '+(isFinal?'final':'partial');
  div.innerHTML=esc(text)+(isFinal?'<div class="tr-meta"><span class="lang-tag">'+esc(lang||'')+'</span><span>final</span></div>':'');
  el.appendChild(div);
  el.scrollTop=el.scrollHeight;
}
function esc(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}
function toast(m){console.log('[toast]',m);}

// ── AUDIO PIPELINE ───────────────────────────────────────────────────────────
// Both providers need PCM linear16 @ 16000Hz
var sharedStream=null;
var sharedAudioCtx=null;

async function getAudioStream(){
  if(sharedStream&&sharedStream.active)return sharedStream;
  sharedStream=await navigator.mediaDevices.getUserMedia({audio:{sampleRate:16000,channelCount:1,echoCancellation:true,noiseSuppression:true},video:false});
  return sharedStream;
}

function getAudioContext(){
  if(!sharedAudioCtx||sharedAudioCtx.state==='closed'){
    sharedAudioCtx=new (window.AudioContext||window.webkitAudioContext)({sampleRate:16000});
  }
  return sharedAudioCtx;
}

// ScriptProcessor converts float32 to int16 PCM
function createPCMProcessor(stream,onData){
  var ctx=getAudioContext();
  var src=ctx.createMediaStreamSource(stream);
  var proc=ctx.createScriptProcessor(4096,1,1);
  proc.onaudioprocess=function(e){
    var f32=e.inputBuffer.getChannelData(0);
    var i16=new Int16Array(f32.length);
    for(var i=0;i<f32.length;i++){
      var s=Math.max(-1,Math.min(1,f32[i]));
      i16[i]=s<0?s*0x8000:s*0x7FFF;
    }
    onData(i16.buffer);
  };
  src.connect(proc);
  proc.connect(ctx.destination);
  return {src:src,proc:proc,ctx:ctx,stop:function(){try{src.disconnect();proc.disconnect();}catch(_){}}};
}

// ── DEEPGRAM ─────────────────────────────────────────────────────────────────
var dgActive=false,dgWs=null,dgAudio=null;

async function startDG(){
  if(dgActive)return;
  if(!KEYS.dg){alert('Enter Deepgram API key first');return;}
  var lang=LANGS[currentLangIdx.dg];
  try{
    var stream=await getAudioStream();
    var url='wss://api.deepgram.com/v1/listen?api_key='+encodeURIComponent(KEYS.dg)
      +'&model=nova-3&language='+encodeURIComponent(lang.dgCode)
      +'&encoding=linear16&sample_rate=16000&channels=1'
      +'&interim_results=true&punctuate=true&endpointing=300';
    dgWs=new WebSocket(url);
    dgWs.binaryType='arraybuffer';
    dgWs.onopen=function(){
      dgActive=true;
      document.getElementById('dg-start').disabled=true;
      document.getElementById('dg-stop').disabled=false;
      setMicLive(true);startTimer('dg');
      dgAudio=createPCMProcessor(stream,function(buf){
        if(dgWs&&dgWs.readyState===1)dgWs.send(buf);
      });
    };
    dgWs.onmessage=function(e){
      try{
        var d=JSON.parse(e.data);
        var alt=d.channel&&d.channel.alternatives&&d.channel.alternatives[0];
        if(!alt)return;
        var text=alt.transcript;
        var isFinal=d.is_final;
        if(text)appendTranscript('dg',text,isFinal,lang.label);
      }catch(_){}
    };
    dgWs.onerror=function(){appendTranscript('dg','[WebSocket error]',true,'ERR');};
    dgWs.onclose=function(){
      if(dgActive)cleanupDG();
    };
  }catch(e){alert('Mic error: '+e.message);}
}

function stopDG(){
  if(dgWs&&dgWs.readyState===1){
    try{dgWs.send(JSON.stringify({type:'CloseStream'}));}catch(_){}
    dgWs.close();
  }
  cleanupDG();
}

function cleanupDG(){
  dgActive=false;
  if(dgAudio){dgAudio.stop();dgAudio=null;}
  dgWs=null;
  document.getElementById('dg-start').disabled=!KEYS.dg;
  document.getElementById('dg-stop').disabled=true;
  setMicLive(false);stopTimer('dg');
}

// ── SPEECHMATICS ─────────────────────────────────────────────────────────────
var smActive=false,smWs=null,smAudio=null;

async function startSM(){
  if(smActive)return;
  if(!KEYS.sm){alert('Enter Speechmatics API key first');return;}
  var lang=LANGS[currentLangIdx.sm];
  try{
    // Step 1: Get short-lived JWT (required for browser WebSocket — can't set Authorization header)
    var jwtResp=await fetch('https://mp.speechmatics.com/v1/api_keys?type=rt',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+KEYS.sm},
      body:JSON.stringify({ttl:3600})
    });
    if(!jwtResp.ok)throw new Error('JWT fetch failed: '+jwtResp.status);
    var jwtData=await jwtResp.json();
    var jwt=jwtData.key_value;

    var stream=await getAudioStream();
    smWs=new WebSocket('wss://eu2.rt.speechmatics.com/v2?jwt='+encodeURIComponent(jwt));
    smWs.binaryType='arraybuffer';

    smWs.onopen=function(){
      // Send StartRecognition config
      smWs.send(JSON.stringify({
        message:'StartRecognition',
        audio_format:{type:'raw',encoding:'pcm_s16le',sample_rate:16000},
        transcription_config:{
          language:lang.smCode,
          enable_partials:true,
          max_delay:2,
          punctuation_overrides:{permitted_marks:['.','!','?',',']},
        }
      }));
    };

    smWs.onmessage=function(e){
      try{
        var d=JSON.parse(e.data);
        if(d.message==='RecognitionStarted'){
          smActive=true;
          document.getElementById('sm-start').disabled=true;
          document.getElementById('sm-stop').disabled=false;
          setMicLive(true);startTimer('sm');
          smAudio=createPCMProcessor(stream,function(buf){
            if(smWs&&smWs.readyState===1)smWs.send(buf);
          });
        } else if(d.message==='AddPartialTranscript'){
          var text=d.metadata&&d.metadata.transcript;
          if(text)appendTranscript('sm',text,false,lang.label);
        } else if(d.message==='AddTranscript'){
          var text=d.metadata&&d.metadata.transcript;
          if(text)appendTranscript('sm',text,true,lang.label);
        } else if(d.message==='Error'){
          appendTranscript('sm','[SM Error: '+(d.reason||d.type)+']',true,'ERR');
        }
      }catch(_){}
    };

    smWs.onerror=function(){appendTranscript('sm','[WebSocket error]',true,'ERR');};
    smWs.onclose=function(){if(smActive)cleanupSM();};

  }catch(e){
    alert('Error: '+e.message);
    cleanupSM();
  }
}

function stopSM(){
  if(smWs&&smWs.readyState===1){
    try{smWs.send(JSON.stringify({message:'EndOfStream',last_seq_no:0}));}catch(_){}
    setTimeout(function(){if(smWs)smWs.close();},500);
  }else{
    cleanupSM();
  }
}

function cleanupSM(){
  smActive=false;
  if(smAudio){smAudio.stop();smAudio=null;}
  smWs=null;
  document.getElementById('sm-start').disabled=!KEYS.sm;
  document.getElementById('sm-stop').disabled=true;
  setMicLive(false);stopTimer('sm');
}

loadKeys();
updatePrompt('dg');
updatePrompt('sm');
document.getElementById('dg-stop').disabled=true;
document.getElementById('sm-stop').disabled=true;
document.getElementById('phrase-counter').textContent='Phrase 1 / '+totalPhrases;
</script>
