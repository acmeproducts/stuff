<!-- Talk+Say-v2.2-2026-03-08 03:08 PM -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Talk + Say · v2.2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Lora:wght@400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --teal:#2E8B8B;--teal-mid:#3A9E9E;--teal-light:#E6F4F4;
  --ink:#1A1714;--ink-mid:#5A5552;--ink-dim:#9A9592;
  --border:#E2DDD8;--paper:#F5F1EC;--cream:#FDFAF7;
  --green:#2E7D4F;--green-light:#E8F5EE;
  --amber:#C07830;--amber-light:#FBF0E4;
  --red:#C0392B;--red-light:#F9EBEA;
  --shadow:0 4px 24px rgba(0,0,0,0.08);
}
[hidden] { display: none !important; }
html,body{height:100%;overflow:hidden;background:var(--cream);font-family:"DM Sans",sans-serif;color:var(--ink);}
#app{position:fixed;inset:0;max-width:480px;margin:0 auto;background:var(--cream);display:flex;flex-direction:column;overflow:hidden;box-shadow:var(--shadow);}

/* FIELDS */
.field-label{display:block;font-size:11px;font-weight:700;color:var(--ink-dim);text-transform:uppercase;letter-spacing:0.4px;margin:14px 0 5px;}
.field-input{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:10px 13px;font-size:15px;font-family:"DM Sans",sans-serif;color:var(--ink);background:#fff;outline:none;}
.field-input:focus{border-color:var(--teal);}
textarea.field-input{resize:none;}
.field-select{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:10px 13px;font-size:14px;font-family:"DM Sans",sans-serif;color:var(--ink);background:#fff;outline:none;-webkit-appearance:none;appearance:none;cursor:pointer;}

.empty-state{text-align:center;padding:36px 20px;font-size:13px;color:var(--ink-dim);line-height:1.8;}

/* ════════════════════ CHAT ════════════════════ */
.chat-header{padding:10px 12px;background:var(--cream);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0;}
.chat-title-block{flex:1;min-width:0;}
.chat-partner{font-family:"Lora",serif;font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.conn-dot{width:6px;height:6px;border-radius:50%;background:#D5D0CB;flex-shrink:0;transition:background .3s;}
.conn-dot.green{background:var(--green);}
.conn-dot.grey{background:#D5D0CB;}
.engine-badge{font-size:10px;color:var(--ink-dim);padding:3px 14px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--cream);}
.engine-badge.on-device{color:var(--green);}

#messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;scroll-behavior:smooth;}
.msg-row{display:flex;flex-direction:column;max-width:85%;animation:msgIn .25s ease-out backwards;}
.msg-row.mine{align-self:flex-end;align-items:flex-end;}
.msg-row.theirs{align-self:flex-start;align-items:flex-start;}
@keyframes msgIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

/* Bubble structure */
.bubble-card{background:#fff;border:1px solid var(--border);border-radius:16px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.04);width:100%;}
.msg-row.mine .bubble-card{background:var(--teal);border-color:var(--teal);color:#fff;border-bottom-right-radius:4px;}
.msg-row.theirs .bubble-card{border-bottom-left-radius:4px;}

/* Bubble header */
.bbl-hdr{display:flex;align-items:center;padding:0 14px;background:rgba(0,0,0,.03);border-bottom:1px solid rgba(0,0,0,.06);}
.msg-row.mine .bbl-hdr{background:rgba(255,255,255,.1);border-bottom-color:rgba(255,255,255,.14);}
.bbl-sender{font-size:11px;font-weight:700;padding:8px 0;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:.3px;}
.bbl-time{font-size:10px;color:var(--ink-dim);padding:8px 0;display:flex;align-items:center;gap:4px;}
.msg-row.mine .bbl-time{color:rgba(255,255,255,.7);}
.msg-status-icon{font-size:9px;}

/* Bubble body */
.bbl-body{display:grid;grid-template-columns:1fr 1px 1fr;background:#fff;}
.msg-row.mine .bbl-body{background:var(--teal);}
.bbl-side{padding:12px 14px;position:relative;display:flex;flex-direction:column;}
.bbl-mid-line{background:rgba(0,0,0,.06);margin:8px 0;}
.msg-row.mine .bbl-mid-line{background:rgba(255,255,255,.14);}
.bbl-txt{font-size:15px;line-height:1.45;word-break:break-word;flex:1;}
.bbl-lang{font-size:9px;font-weight:700;text-transform:uppercase;color:var(--ink-dim);letter-spacing:.5px;margin-bottom:4px;display:flex;justify-content:space-between;align-items:center;}
.msg-row.mine .bbl-lang{color:rgba(255,255,255,.6);}

/* Detail rows (Back-translation, Clarify) */
.bbl-detail{background:rgba(0,0,0,.02);border-top:1px solid rgba(0,0,0,.06);font-size:13px;display:none;}
.msg-row.mine .bbl-detail{background:rgba(0,0,0,.15);border-top-color:rgba(255,255,255,.14);}
.bbl-detail-section{padding:10px 14px;border-bottom:1px solid rgba(0,0,0,.06);}
.msg-row.mine .bbl-detail-section{border-bottom-color:rgba(255,255,255,.14);}
.bbl-detail-section:last-child{border-bottom:none;}
.bbl-dl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--ink-dim);margin-bottom:4px;}
.msg-row.mine .bbl-dl{color:rgba(255,255,255,.6);}
.bbl-dt{line-height:1.4;}

/* Bubble footer */
.bbl-foot{border-top:1px solid rgba(0,0,0,.06);display:block;}
.msg-row.mine .bbl-foot{border-top-color:rgba(255,255,255,.14);}
.bbl-foot-bar{display:flex;align-items:center;padding:5px 8px;gap:2px;}
.bbl-act{background:none;border:none;cursor:pointer;font-size:11px;font-weight:600;font-family:"DM Sans",sans-serif;padding:4px 7px;border-radius:7px;color:var(--ink-dim);line-height:1.2;transition:background .12s;}
.bbl-act:hover{background:rgba(0,0,0,.06);}
.msg-row.mine .bbl-act{color:rgba(255,255,255,.8);}
.msg-row.mine .bbl-act:hover{background:rgba(255,255,255,.12);}
.bbl-toggle{margin-left:auto;background:none;border:none;cursor:pointer;color:var(--ink-dim);opacity:.5;padding:4px 6px;font-size:12px;line-height:1;transition:transform .2s;}
.msg-row.mine .bbl-toggle{color:#fff;}
.bbl-toggle.open{transform:rotate(180deg);}

.bbl-tts{background:none;border:none;cursor:pointer;color:var(--ink-dim);opacity:.6;transition:opacity .2s;padding:2px;border-radius:4px;line-height:0;}
.msg-row.mine .bbl-tts{color:#fff;}
.bbl-tts:hover{opacity:1;background:rgba(0,0,0,.05);}
.msg-row.mine .bbl-tts:hover{background:rgba(255,255,255,.2);}
.bbl-tts.active{color:var(--teal);opacity:1;}
.msg-row.mine .bbl-tts.active{color:#FFE082;opacity:1;}

.bbl-vbtn{border:none;border-radius:6px;padding:4px 8px;font-size:11px;font-weight:700;cursor:pointer;font-family:"DM Sans",sans-serif;}
.bbl-vbtn.verify{background:var(--teal-light);color:var(--teal);}
.bbl-vbtn.good{background:#E8F5EE;color:#2E7D4F;}
.bbl-vbtn.bad{background:var(--red-light);color:var(--red);}
.msg-row.mine .bbl-vbtn.good{background:rgba(46,125,79,.9);color:#fff;}
.msg-row.mine .bbl-vbtn.bad{background:rgba(192,57,43,.9);color:#fff;}
.bbl-flagged{color:var(--red);font-weight:700;font-size:11px;margin-top:6px;display:flex;align-items:center;gap:4px;}
.msg-row.mine .bbl-flagged{color:#FFCDD2;}

.sys-msg{text-align:center;font-size:11px;font-weight:700;color:var(--ink-dim);margin:16px 0;text-transform:uppercase;letter-spacing:1px;}
.shimmer{animation:shimmer 2s infinite linear;background:linear-gradient(90deg,rgba(0,0,0,.04) 25%,rgba(0,0,0,.08) 50%,rgba(0,0,0,.04) 75%);background-size:200% 100%;border-radius:4px;height:16px;width:60%;}
.msg-row.mine .shimmer{background:linear-gradient(90deg,rgba(255,255,255,.15) 25%,rgba(255,255,255,.25) 50%,rgba(255,255,255,.15) 75%);background-size:200% 100%;}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* Typing & Offline indicators */
.typing-bar{padding:0 16px;height:24px;display:flex;align-items:center;gap:4px;font-size:12px;color:var(--ink-dim);opacity:0;transition:opacity .2s;}
.typing-bar.show{opacity:1;}
.typing-dot{width:4px;height:4px;background:var(--ink-dim);border-radius:50%;animation:typingBounce 1.4s infinite ease-in-out both;}
.typing-dot:nth-child(1){animation-delay:-0.32s;}.typing-dot:nth-child(2){animation-delay:-0.16s;}
@keyframes typingBounce{0%,80%,100%{transform:scale(0);}40%{transform:scale(1);}}
.offline-indicator{background:var(--amber-light);color:var(--amber);font-size:11px;font-weight:700;text-align:center;padding:6px;display:none;flex-shrink:0;}
.offline-indicator.show{display:block;}

/* PHRASE CARD (v1.5) */
.pb-card{background:#fff;border:1px solid var(--border);border-radius:13px;margin-bottom:7px;overflow:hidden;transition:border-color .15s;}
.pb-card-main{padding:12px 14px;cursor:pointer;position:relative;}
.pb-card-main:hover{background:var(--cream);}
.pb-src{font-size:15px;color:var(--ink);line-height:1.4;margin-bottom:2px;}
.pb-tgt{font-size:14px;color:var(--teal);font-weight:500;line-height:1.4;}
.pb-chevron{position:absolute;top:14px;right:14px;color:var(--ink-dim);font-size:12px;transition:transform .2s;}
.pb-card.open .pb-chevron{transform:rotate(180deg);}
.pb-detail{display:none;border-top:1px solid var(--border);background:var(--paper);padding:12px 14px;}
.pb-card.open .pb-detail{display:block;}
.pb-field{margin-bottom:12px;}
.pb-field:last-child{margin-bottom:0;}
.pb-lbl{font-size:10px;font-weight:700;color:var(--ink-dim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;}
.pb-val{font-size:13px;line-height:1.5;color:var(--ink-mid);}
.layer-editable{cursor:text;padding:4px -4px;border-radius:6px;transition:background .15s;min-height:20px;}
.layer-editable:hover{background:rgba(0,0,0,.04);}
.layer-editable:focus{background:#fff;outline:2px solid var(--teal);padding:4px;}
.tag-row{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px;}
.tag-chip{background:#fff;border:1px solid var(--border);border-radius:6px;padding:2px 6px;font-size:10px;color:var(--ink-dim);display:inline-flex;align-items:center;gap:4px;}
.tag-chip button{background:none;border:none;cursor:pointer;color:var(--ink-dim);font-size:10px;opacity:.5;}
.tag-chip button:hover{color:var(--red);opacity:1;}

/* ════════════════════ OVERLAYS ════════════════════ */
.overlay{position:fixed;inset:0;background:rgba(26,23,20,.46);display:flex;align-items:flex-end;justify-content:center;z-index:200;animation:fadeIn .15s;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.sheet{width:100%;max-width:480px;background:#fff;border-radius:24px 24px 0 0;box-shadow:0 -10px 40px rgba(0,0,0,.15);display:flex;flex-direction:column;max-height:90vh;animation:slideUp .25s cubic-bezier(0.175,0.885,0.32,1.05);}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-handle{width:40px;height:5px;background:var(--border);border-radius:3px;margin:12px auto;flex-shrink:0;}
.sheet-body{padding:0 24px 32px;overflow-y:auto;flex:1;}
.sheet-title{font-family:"Lora",serif;font-size:22px;font-weight:600;margin-bottom:16px;color:var(--ink);}
.sheet-btn-row{display:flex;gap:10px;margin-top:20px;}
.sheet-btn{flex:1;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;font-family:"DM Sans",sans-serif;transition:opacity .12s;}
.sheet-btn:active{opacity:.7;}
.sheet-btn.primary{background:var(--teal);color:#fff;}
.sheet-btn.secondary{background:var(--paper);color:var(--ink-mid);}
.sheet-btn.danger{background:var(--red-light);color:var(--red);}

.chat-side-panel{position:absolute;inset:0 auto 0 0;width:min(86vw,320px);background:var(--cream);border-right:1px solid var(--border);box-shadow:var(--shadow);transform:translateX(-105%);transition:transform .18s;z-index:30;display:flex;flex-direction:column;}
.chat-side-panel.open{transform:translateX(0);}
.side-session-row{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--border);border-radius:12px;padding:9px 10px;margin-bottom:7px;cursor:pointer;}
.side-session-row.active{border-color:var(--teal);}
.side-session-meta{flex:1;min-width:0;}
.side-session-sub{font-size:11px;color:var(--ink-dim);margin-top:2px;}
.side-pill{font-size:10px;font-weight:700;background:var(--teal-light);color:var(--teal);padding:2px 7px;border-radius:999px;}
.chat-side-scrim{position:absolute;inset:0;background:rgba(0,0,0,.18);z-index:29;display:none;}
.chat-side-scrim.show{display:block;}

.ribbon-btn{background:none;border:none;cursor:pointer;color:var(--ink-mid);padding:7px 8px;border-radius:9px;line-height:0;transition:background .12s,color .12s;}
.ribbon-btn:hover{background:var(--paper);color:var(--teal);}
.conn-pill{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:18px;background:var(--paper);border:1px solid var(--border);}
.auto-tts-btn{border:1px solid var(--border);background:#fff;color:var(--ink-mid);border-radius:18px;padding:5px 10px;font-size:11px;font-weight:700;cursor:pointer;font-family:"DM Sans",sans-serif;transition:all .12s;}

/* SHARE PANEL */
.share-link-box{background:var(--paper);border:1.5px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:4px;word-break:break-all;}
.share-link-text{font-family:monospace;font-size:13px;color:var(--teal);text-decoration:none;}

/* CHAT INPUT v1.9 */
.chat-compose{background:var(--cream);border-top:1px solid var(--border);padding:10px 14px max(10px,env(safe-area-inset-bottom));display:flex;align-items:flex-end;gap:8px;flex-shrink:0;}
.compose-box{flex:1;background:#fff;border:1.5px solid var(--border);border-radius:20px;display:flex;align-items:flex-end;min-height:44px;padding:0 4px;transition:border-color .15s;}
.compose-box:focus-within{border-color:var(--teal);}
.compose-input{flex:1;border:none;background:none;padding:12px 10px;font-size:15px;font-family:"DM Sans",sans-serif;color:var(--ink);resize:none;max-height:120px;outline:none;line-height:1.4;}
.compose-input::placeholder{color:var(--ink-dim);}
.compose-tools{display:flex;padding:6px 2px;}
.c-tool{background:none;border:none;color:var(--ink-dim);cursor:pointer;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:background .12s,color .12s;}
.c-tool:hover{background:var(--paper);color:var(--teal);}
.send-btn{width:44px;height:44px;border-radius:50%;background:var(--teal);color:#fff;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:transform .1s,background .15s;}
.send-btn:active{transform:scale(0.95);}
.send-btn:disabled{background:var(--border);color:var(--ink-dim);cursor:not-allowed;transform:none;}
.att-preview-bar{display:none;padding:8px 14px;background:var(--paper);border-top:1px solid var(--border);align-items:center;gap:10px;}
.att-preview-bar.show{display:flex;}
.att-thumb{width:40px;height:40px;border-radius:6px;object-fit:cover;background:#E2DDD8;}
.att-meta{flex:1;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.att-clear{background:none;border:none;font-size:18px;color:var(--ink-dim);cursor:pointer;padding:4px;}

/* TOAST */
#toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(26,23,20,.88);color:#fff;font-size:13px;font-weight:600;padding:9px 18px;border-radius:22px;z-index:1000;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;white-space:nowrap;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
#master-footer{text-align:center; padding: 4px; font-size: 10px; color: var(--ink-dim); background: var(--cream); border-top: 1px solid var(--border); flex-shrink: 0; z-index: 50;}
</style>
</head>
<body>
<div id="app">

  <div class="chat-side-scrim" id="chat-side-scrim" onclick="closeChatSidePanel()"></div>
  <aside class="chat-side-panel" id="chat-side-panel">
    <div class="chat-side-head" style="display:flex; align-items:center; justify-content:space-between; padding:12px; border-bottom:1px solid var(--border);">
      <input id="panel-my-name" value="Me" onblur="saveMyNamePanel(this)" style="font-size:18px; font-weight:bold; border:none; background:transparent; outline:none; flex:1; min-width:0; font-family:'Lora', serif;">
      <button class="ribbon-btn" onclick="openSettingsPanel()" title="Settings">⚙</button>
    </div>
    <div class="chat-side-body" id="chat-side-body" style="flex:1; overflow-y:auto; padding:10px;"></div>
    <div style="padding:10px; border-top:1px solid var(--border);">
      <button style="width:100%; border:none; border-radius:12px; padding:12px; font-size:15px; font-weight:700; background:var(--teal); color:#fff; cursor:pointer;" onclick="createNewSession()">+ New Chat</button>
    </div>
  </aside>

  <div style="display:flex; flex-direction:column; flex:1; overflow:hidden;">
    <div class="chat-header">
      <button class="ribbon-btn" onclick="openChatSidePanel()" style="font-size:18px;font-weight:700;">☰</button>
      <div class="chat-title-block" style="text-align:center;">
        <div class="chat-partner" id="chat-partner-name" style="font-size:16px;">Partner</div>
      </div>
      <button class="auto-tts-btn" id="auto-tts-btn" onclick="toggleAutoSpeakIncoming()" style="margin-right:8px;" title="Auto-read incoming translations" aria-pressed="false">🔇</button>
      <button class="ribbon-btn" id="ribbon-share" onclick="openSharePanel()" title="Share invite link"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg></button>
      <div class="conn-pill" id="conn-pill" style="border:none; padding:4px;"><span class="conn-dot grey" id="conn-dot"></span></div>
    </div>
  <div id="messages"></div>
  <div class="typing-bar" id="typing-bar"></div>
  <div class="offline-indicator" id="offline-indicator">Offline — queuing messages</div>
  <div class="att-preview-bar" id="att-preview-bar">
    <img id="att-preview-img" class="att-thumb" src="" alt="Attachment preview">
    <div class="att-meta" id="att-preview-name">image.png</div>
    <button class="att-clear" onclick="clearAttachment()">×</button>
  </div>
  <div class="chat-compose">
    <div class="compose-box">
      <textarea class="compose-input" id="chat-input" rows="1" placeholder="Message…"
        oninput="autoResize();handleTyping()"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChat();}"></textarea>
      <div class="compose-tools">
        <button class="c-tool" id="stt-btn" onclick="toggleStt()" title="Dictate">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/></svg>
        </button>
        <button class="c-tool" onclick="document.getElementById('attach-input').click()" title="Attach file">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
        </button>
        <button class="c-tool" onclick="openPhrasePicker()" title="Use phrasebook">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        </button>
      </div>
    </div>
    <button class="send-btn" id="send-btn" onclick="sendChat()" disabled>
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>

async function translate(text,src,tgt){
  if(!text||src===tgt)return text;
  if(tEngine==='on-device'&&window.translation){
    try{const tc=await window.translation.createTranslator({sourceLanguage:src,targetLanguage:tgt});return await tc.translate(text);}
    catch(e){console.warn('Local fail, falling back');}
  }
  try{
    const r=await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=${src}&tl=${tgt}&dt=t&q=${encodeURIComponent(text)}`);
    const d=await r.json();return d[0].map(x=>x[0]).join('');
  }catch(e){return null;}
}

const synth=window.speechSynthesis;
let canSpeak='speechSynthesis' in window;
function speak(text,langCode,btnEl){
  if(!canSpeak||!text)return;
  if(ttsActive===btnEl){synth.cancel();if(btnEl){btnEl.classList.remove('active');ttsActive=null;}return;}
  synth.cancel();if(ttsActive)ttsActive.classList.remove('active');
  const u=new SpeechSynthesisUtterance(text);
  u.lang=ttsLocale(langCode);
  u.onstart=()=>{if(btnEl){btnEl.classList.add('active');ttsActive=btnEl;}};
  u.onend=()=>{if(btnEl){btnEl.classList.remove('active');if(ttsActive===btnEl)ttsActive=null;}};
  u.onerror=()=>{if(btnEl){btnEl.classList.remove('active');if(ttsActive===btnEl)ttsActive=null;}};
  let voices=synth.getVoices();
  if(voices.length>0){const lv=voices.find(v=>v.lang===u.lang||v.lang.startsWith(u.lang.split('-')[0]));if(lv)u.voice=lv;}
  synth.speak(u);
}

const SpeechRec=window.SpeechRecognition||window.webkitSpeechRecognition;
let recognition=null;let isDictating=false;
function toggleStt(){
  if(!SpeechRec){toast('Speech dictation not supported in this browser');return;}
  const btn=document.getElementById('stt-btn');
  if(isDictating){if(recognition)recognition.stop();return;}
  recognition=new SpeechRec();
  recognition.lang=ttsLocale(state.session?.myLang||'en');
  recognition.interimResults=true;
  recognition.continuous=true; // keep listening until manually stopped
  const ta=document.getElementById('chat-input');
  let startVal=ta.value;
  recognition.onstart=()=>{isDictating=true;btn.style.color='var(--red)';toast('Listening… Tap mic to stop');};
  recognition.onresult=(e)=>{
    let final='',interim='';
    for(let i=e.resultIndex;i<e.results.length;++i){if(e.results[i].isFinal)final+=e.results[i][0].transcript;else interim+=e.results[i][0].transcript;}
    ta.value=startVal+(startVal&&!startVal.endsWith(' ')&&final?' ':'')+final+(interim?' '+interim:'');
    autoResize();updateSendBtn();
  };
  recognition.onerror=()=>toast('Dictation error');
  recognition.onend=()=>{isDictating=false;btn.style.color='';startVal=ta.value;};
  try{recognition.start();}catch(e){}
}

// ════════════════════ TRANSPORT ════════════════════
class RelayTransport {
  constructor() {
    this.bc = null;
    this.handlers = {};
    this.state = 'disconnected';
    this.convId = null;
    this.partId = null;
  }
  connect(conversationId, participant) {
    this.convId = conversationId;
    this.partId = participant;
    if (this.bc) this.bc.close();
    this.bc = new BroadcastChannel('talk_say_' + conversationId);
    this.bc.onmessage = (e) => {
      if (e.data.from !== this.partId && this.handlers['message']) {
        this.handlers['message'](e.data.payload);
      }
    };
    this.changeState('connected');
    this.bc.postMessage({ from: this.partId, payload: { type: 'peer_connect' }});
  }
  send(event) {
    if (this.state === 'connected' && this.bc) {
      this.bc.postMessage({ from: this.partId, payload: event });
    }
  }
  disconnect() {
    if (this.bc) {
      this.bc.postMessage({ from: this.partId, payload: { type: 'peer_disconnect' }});
      this.bc.close();
    }
    this.changeState('disconnected');
  }
  onEvent(type, handler) {
    this.handlers[type] = handler;
  }
  getState() {
    return this.state;
  }
  changeState(newState) {
    this.state = newState;
    if (this.handlers['state']) this.handlers['state'](newState);
  }
}
const transport = new RelayTransport();

function setConnected(on){
  state.connected=on;
  const dot=document.getElementById('conn-dot');
  if(dot) dot.className = 'conn-dot ' + (on ? 'green' : 'grey');
  const offline=document.getElementById('offline-indicator');
  if(offline)offline.classList.toggle('show',!on&&state.session!=null);
  updateSendBtn();
  if(on){ reconnectAttempts=0; clearTimeout(reconnectTimer); flushQueue(); }
  else { scheduleReconnect(); }
}
function handleData(d){
  if(!d||!d.type)return;
  const sess=state.session;
  
  if (d.type === 'peer_connect') {
    transport.send({type:'hello', name:sess.myName, lang:sess.myLang});
    return;
  }
  if (d.type === 'peer_disconnect') {
    return;
  }

  if(d.type==='hello'){
    sess.partnerName=d.name||sess.partnerName||'Partner';
    if(d.lang)sess.partnerLang=d.lang; // update partnerLang from hello; never touch myLang
    saveSession();updateChatHeader();
    renderChatSidePanel();
    return;
  }
  if(d.type==='msg'){
    const msg={id:d.id,from:'them',text:'',orig:d.orig,lang:d.lang,translated:d.text,status:'delivered',timestamp:d.timestamp||Date.now(),clarify:{status:'none',text:''},attachment:d.attachment||null};
    state.messages.push(msg);renderMsg(msg);scrollBottom();
    const tr=d.text;
    const myLang=sess.myLang||state.myLang||'en';
    if(tr){
      msg.text=tr;
      updateTransDOM(msg);
      saveMsgs(sess.sessionId,state.messages);
      if(state.autoSpeakIncoming&&msg.text){
        const ttsBtn=document.getElementById('btts-tgt-'+msg.id)||null;
        speak(msg.text,myLang,ttsBtn);
      }
    } else {
      translate(d.orig,d.lang||sess.partnerLang||'th',myLang).then(t=>{
        msg.text=t||d.orig;
        updateTransDOM(msg);
        saveMsgs(sess.sessionId,state.messages);
        transport.send({type:'tr',id:d.id,text:t||msg.orig});
        if(state.autoSpeakIncoming&&msg.text){
          const ttsBtn=document.getElementById('btts-tgt-'+msg.id)||null;
          speak(msg.text,myLang,ttsBtn);
        }
      });
    }
    markSessionViewed(sess.sessionId);return;
  }
  if(d.type==='tr'){const msg=findMsg(d.id);if(msg){msg.translated=d.text;msg.status='delivered';updateTransDOM(msg);updateMsgStatusDOM(msg);saveMsgs(sess.sessionId,state.messages);}return;}
  if(d.type==='typing'){showTyping();return;}
  if(d.type==='clarify'){const msg=findMsg(d.id);if(!msg)return;msg.clarify={status:'requested',text:d.note||'',originalText:d.originalText||msg.text||msg.orig||'',translatedText:d.translatedText||msg.translated||''};saveMsgs(sess.sessionId,state.messages);updateBblClarify(msg);toast(sess.partnerName+' asked for clarification');return;}
  if(d.type==='clarify-ans'){const msg=findMsg(d.id);if(!msg)return;msg.clarify={status:'answered',text:d.answer||'',originalText:d.originalText||msg.orig||msg.text||'',translatedText:d.translatedText||msg.text||msg.translated||''};saveMsgs(sess.sessionId,state.messages);updateBblClarify(msg);toast(sess.partnerName+' clarified a message');return;}
}
function flushQueue(){
  if(!msgQueue.length||transport.getState() !== 'connected')return;
  const toSend=[...msgQueue];
  msgQueue=[];
  toSend.forEach(q=>{
    try{
      transport.send(q.payload);
      const msg=findMsg(q.msgId);
      if(msg){msg.status='sent';updateMsgStatusDOM(msg);}
    }catch(e){msgQueue.unshift(q);}
  });
}
function scheduleReconnect() {
  if (transport.getState() === 'connected') return;
  const delay = Math.min(1000 * Math.pow(2, reconnectAttempts), 30000);
  reconnectAttempts++;
  clearTimeout(reconnectTimer);
  reconnectTimer = setTimeout(() => {
    if (state.session && transport.getState() !== 'connected') {
      transport.connect(state.session.sessionId, state.session.myName);
    }
  }, delay);
}

async function bblVerify(msgId){
  const msg=findMsg(msgId);if(!msg)return;
  const s=state.session;const sides=getSides(msg);
  const tgtTxt=sides.tgtTxt;if(!tgtTxt){toast('No translation to verify');return;}
  const btn=document.getElementById('bverify-'+msgId);if(btn){btn.disabled=true;}
  const back=await translate(tgtTxt,sides.tgtLang,sides.srcLang);
  msg._backTrans=back;
  
  const det = document.getElementById('bdetail-'+msgId);
  const bs = document.getElementById('bback-sect-'+msgId);
  if(det) det.style.display = 'block';
  if(bs) bs.style.display = 'block';
  
  const backEl=document.getElementById('bback-'+msgId);
  if(backEl){backEl.textContent=back||'(translation failed)';backEl.style.cssText='';}

  if(back){

     if (msg.from === 'me') openClarifyAns(msgId);

       const sec = document.getElementById('bclarify-section-'+msgId);

function autoResize(){
  const ta=document.getElementById('chat-input');if(!ta)return;
  ta.style.height='auto';ta.style.height=Math.min(ta.scrollHeight,120)+'px';
}
function updateSendBtn(){
  const ta=document.getElementById('chat-input');const btn=document.getElementById('send-btn');
  if(!ta||!btn)return;
  btn.disabled=!ta.value.trim()&&!pendingAttachment;
}
function handleTyping(){
  updateSendBtn();
  if(!state.connected)return;
  const now=Date.now();
  if(now-lastTypingTs>2000){lastTypingTs=now;transport.send({type:'typing'});}
}
function showTyping(){
  const b=document.getElementById('typing-bar');if(!b)return;
  b.innerHTML=`<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div><span>${escHtml(state.session?.partnerName||'Partner')} is typing…</span>`;
  b.classList.add('show');
  clearTimeout(typingTimer);
  typingTimer=setTimeout(()=>{b.classList.remove('show');b.innerHTML='';},3000);
}
function handleAttachFile(e){
  const f=e.target.files[0];if(!f)return;
  if(f.size>2*1024*1024){toast('File too large (max 2MB)');e.target.value='';return;}
  const r=new FileReader();
  r.onload=(ev)=>{
    pendingAttachment={name:f.name,type:f.type,data:ev.target.result};
    document.getElementById('att-preview-img').src=f.type.startsWith('image/')?ev.target.result:'';
    document.getElementById('att-preview-name').textContent=f.name;
    document.getElementById('att-preview-bar').classList.add('show');
    updateSendBtn();
  };
  r.readAsDataURL(f);
}
function clearAttachment(){pendingAttachment=null;document.getElementById('att-preview-bar').classList.remove('show');document.getElementById('attach-input').value='';updateSendBtn();}
function sendChat(){
  if(isDictating){if(recognition)recognition.stop();return;}
  const ta=document.getElementById('chat-input');const text=ta.value.trim();
  const att=pendingAttachment;
  if(!text&&!att)return;
  const s=state.session;if(!s){toast('No active conversation');return;}
  const p=getPrefs();
  let outLang=s.myLang||'en';
  if(p.autoDetectLang!==false&&text){outLang=detectLangHeuristic(text,outLang);}
  
  clearAttachment();
  
  const msg={id:uid(),from:'me',text,lang:outLang,translated:null,status:state.connected?'sending':'queued',timestamp:Date.now(),clarify:{status:'none',text:''},attachment:null};
  state.messages.push(msg);renderMsg(msg);ta.value='';autoResize();updateSendBtn();scrollBottom();
  s.lastActivity=msg.timestamp;saveSession();
  saveMsgs(s.sessionId,state.messages);
  translate(text, s.myLang, s.partnerLang).then(tr => {
    msg.translated = tr;
    updateTransDOM(msg);
    const payload = { type: 'msg', id: msg.id, orig: text, text: tr || text, lang: s.myLang, timestamp: msg.timestamp, attachment: att };
    if (transport.getState() === 'connected') { transport.send(payload); msg.status = 'sent'; }
    else { msgQueue.push({ msgId: msg.id, payload }); msg.status = 'queued'; }
    updateMsgStatusDOM(msg); saveMsgs(s.sessionId, state.messages);
  });
}

function sendPreset(txt){
  const s=state.session;if(!s)return;
  const att=pendingAttachment;clearAttachment();
  const msg={id:uid(),from:'me',text:txt,orig:txt,lang:s.myLang,translated:null,status:state.connected?'sending':'queued',timestamp:Date.now(),clarify:{status:'none',text:''},attachment:att};
  state.messages.push(msg);renderMsg(msg);scrollBottom();
  saveMsgs(s.sessionId,state.messages);
  translate(txt, s.myLang, s.partnerLang).then(tr => {
    msg.translated = tr;
    updateTransDOM(msg);
    const payload = { type: 'msg', id: msg.id, orig: txt, text: tr || txt, lang: s.myLang, timestamp: msg.timestamp, attachment: att };
    if (transport.getState() === 'connected') { transport.send(payload); msg.status = 'sent'; }
    else { msgQueue.push({ msgId: msg.id, payload }); msg.status = 'queued'; }
    updateMsgStatusDOM(msg); saveMsgs(s.sessionId, state.messages);
  });
}

// ════════════════════ PHRASE PICKER ════════════════════
function openPhrasePicker(){state.ppTagFilter=[];document.getElementById('pp-search').value='';document.getElementById('phrase-picker-overlay').hidden=false;renderPhrasePicker();}
function renderPhrasePicker(){
  const q=document.getElementById('pp-search').value.toLowerCase();
  let cards=getCards();
  if(q)cards=cards.filter(c=>(c.source||'').toLowerCase().includes(q)||(c.target||'').toLowerCase().includes(q)||(c.tags||[]).some(t=>t.toLowerCase().includes(q)));
  if(state.ppTagFilter.length)cards=cards.filter(c=>state.ppTagFilter.every(tf=>(c.tags||[]).includes(tf)));
  const ctr=document.getElementById('pp-count');
  if(ctr)ctr.textContent=cards.length+' phrase'+(cards.length!==1?'s':'');
  const list=document.getElementById('pp-list');
  if(!cards.length){list.innerHTML='<div style="text-align:center;padding:20px;font-size:13px;color:var(--ink-dim);">No phrases found.</div>';return;}
  list.innerHTML=cards.map(c=>{
    const insertSrc=JSON.stringify(c.source||'');
    const insertTgt=JSON.stringify(c.target||c.source||'');
    const insertLang=JSON.stringify(c.sourceLang||'en');
    return`<div class="pp-row"><button class="pp-tts" onclick="speak(${JSON.stringify(c.source||'')},${JSON.stringify(c.sourceLang||'en')},this)" title="Listen">${ICON_TTS}</button><div class="pp-texts"><div class="pp-source">${escHtml(c.source||'')}</div><div class="pp-target">${escHtml(c.target||'')}</div></div><button class="pp-insert-btn" onclick="insertPhrase(${insertSrc},${insertTgt},${insertLang})" style="margin-right:4px;">Use</button><button class="ribbon-btn" onclick="deleteCardFromPicker('${c.id}')" title="Delete" style="padding:4px; font-size:14px;">🗑</button></div>`;
  }).join('');
  renderChatSidePanel();
}
function deleteCardFromPicker(cid) {
  const cards = getCards().filter(c => c.id !== cid);
  saveCards(cards);
  renderPhrasePicker();
  toast('Deleted');
}
function insertPhrase(src,tgt,srcLang){
  const myLang=state.session?.myLang||state.myLang||'en';
  const val=srcLang===myLang?src:tgt;
  const ta=document.getElementById('chat-input');
  if(!ta)return;
  ta.value=(ta.value?ta.value+' ':'')+val;
  autoResize();updateSendBtn();ta.focus();
  document.getElementById('phrase-picker-overlay').hidden=true;
}

// ════════════════════ SEED DATA ════════════════════
function seedStarterData(){if(getCatalogs().length||getCards().length)return;const catId='cat-thailand';saveCatalogs([{id:catId,name:'Thailand Travel',emoji:'🇹🇭',desc:'Essential phrases for Thailand',createdAt:Date.now()}]);const starter=[{source:'Hello',target:'สวัสดี'},{source:'Thank you',target:'ขอบคุณ'},{source:'How much?',target:'เท่าไหร่?'},{source:'Where is the bathroom?',target:'ห้องน้ำอยู่ที่ไหน?'},{source:"I don't eat meat",target:'ฉันไม่กินเนื้อสัตว์'},{source:'Delicious!',target:'อร่อย!'},{source:'Can you help me?',target:'คุณช่วยฉันได้ไหม?'},{source:"I don't understand",target:'ฉันไม่เข้าใจ'},{source:'Please speak slowly',target:'กรุณาพูดช้าๆ'},{source:'Call the police!',target:'เรียกตำรวจ!'}];saveCards(starter.map((p,i)=>({id:'seed-'+i,catalogIds:[catId],sourceLang:'en',targetLang:'th',...p,backTranslation:'',backApproved:false,backFlagged:false,notes:'',tags:['essential','travel'],createdAt:Date.now()-i*1000,updatedAt:Date.now()})));}

// ════════════════════ INIT ════════════════════
document.addEventListener('DOMContentLoaded',()=>{
  detectEngine();seedStarterData();
  if(canSpeak){synth.getVoices();if(synth.onvoiceschanged!==undefined)synth.onvoiceschanged=()=>synth.getVoices();}
  const p=getPrefs();
  if (!p.userName || !ls(SK.onboarded)) {
    p.userName = makeGuestName();
    const devLang = navigator.language?.split('-')[0] || 'en';
    const supported = LANGS.map(l=>l.code);
    p.myLang = supported.includes(devLang) ? devLang : 'en';
    p.partnerLang = p.myLang === 'th' ? 'en' : 'th';
    savePrefs(p);
    lsW(SK.onboarded, '1');
  }
  state.myLang=p.myLang;
  state.autoSpeakIncoming=!!p.autoSpeakIncoming;

  const panelNameEl = document.getElementById('panel-my-name');
  if(panelNameEl) panelNameEl.value = p.userName;
  if(p.accentColor) setTheme(p.accentColor);

  if(!SpeechRec){const b=document.getElementById('stt-btn');if(b)b.style.display='none';}

  window.addEventListener('online',()=>{if(state.session&&!state.connected){manualReconnect();}});
  window.addEventListener('offline',()=>{if(state.session){setConnected(false);}});

  document.querySelectorAll('.overlay .sheet-handle').forEach(h=>{let sy=0;let dy=0;h.addEventListener('pointerdown',e=>{sy=e.clientY;dy=0;h.setPointerCapture(e.pointerId);});h.addEventListener('pointermove',e=>{if(!h.hasPointerCapture(e.pointerId))return;dy=e.clientY-sy;if(dy>0)h.closest('.sheet').style.transform='translateY('+Math.min(dy,120)+'px)';});h.addEventListener('pointerup',e=>{const sh=h.closest('.sheet');if(sh)sh.style.transform='';if(dy>70){const ov=h.closest('.overlay');if(ov)ov.hidden=true;}try{h.releasePointerCapture(e.pointerId);}catch(_){}});});

  {const ss=getAllSessions();const pruned=ss.filter(s=>s.sessionId&&s.myName);if(pruned.length!==ss.length)saveSessions(pruned);}

  transport.onEvent('state', (st) => setConnected(st === 'connected'));
  transport.onEvent('message', handleData);

  const urlParams=new URLSearchParams(location.search);
  const joinCode=urlParams.get('join');
  if(joinCode){
    let ss = getAllSessions();
    let s = ss.find(x => x.sessionId === joinCode);
    if (!s) {
      s = { sessionId: joinCode, myName: p.userName || 'Me', partnerName: 'Partner', myLang: p.myLang, partnerLang: p.partnerLang, createdAt: Date.now(), lastActivity: Date.now(), lastViewedAt: Date.now() };
      ss.unshift(s); saveSessions(ss);
    }
    state.session = s;
    window.history.replaceState({}, document.title, window.location.pathname);
  } else {
    const aid = getActiveId();
    let ss = getAllSessions();
    let active = ss.find(x => x.sessionId === aid);
    if (!active && ss.length) active = ss[0];
    if (!active) {
      active = { sessionId: uid(), myName: p.userName || 'Me', partnerName: 'New Chat', myLang: p.myLang, partnerLang: p.partnerLang, createdAt: Date.now(), lastActivity: Date.now(), lastViewedAt: Date.now() };
      ss.unshift(active); saveSessions(ss);
    }
    state.session = active;
  }
  loadSession(state.session.sessionId);
});
</script>
