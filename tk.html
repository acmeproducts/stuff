<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Say · Phrasebook</title>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<style>
:root{
  --cream:#FAF8F4;--paper:#F2EDE4;--ink:#1A1714;--ink-mid:#4A4540;--ink-dim:#9A9390;
  --teal:#1D6B66;--teal-mid:#2A8C85;--teal-light:#E8F4F3;
  --amber:#C4600A;--amber-light:#FEF3E8;
  --border:#E2DDD6;--red:#C0392B;--red-light:#FDEDEB;
  --tag-bg:#EEE9E2;--tag-text:#5A5450;
  --shadow-1:0 1px 4px rgba(0,0,0,0.09);--shadow-2:0 4px 20px rgba(0,0,0,0.13);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"DM Sans",system-ui,sans-serif;background:#e4dfd7;color:var(--ink);}
body{display:flex;justify-content:center;align-items:stretch;padding:16px;}

.app-frame{
  position:relative;width:100%;max-width:480px;height:100dvh;
  background:var(--cream);border-radius:24px;box-shadow:0 12px 40px rgba(0,0,0,0.18);
  overflow:hidden;display:flex;flex-direction:column;
}

/* Screens */
.screen{flex:1;display:none;flex-direction:column;padding:16px;overflow-y:auto;}
.screen.active{display:flex;}
@keyframes scr-in{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.screen.active{animation:scr-in 0.2s ease-out;}

/* Hero */
.hero{
  background:linear-gradient(135deg,var(--teal-mid),var(--teal));
  border-radius:24px;padding:24px 20px;color:#fff;box-shadow:var(--shadow-1);margin-bottom:16px;
}
.hero-title{font-family:"Lora","Georgia",serif;font-size:26px;font-weight:600;margin:0 0 6px;text-transform:lowercase;}
.hero-sub{font-size:14px;opacity:.9;margin:0 0 12px;}

/* Topbar */
.topbar{
  display:flex;align-items:center;gap:10px;margin-bottom:12px;
}
.topbar-back{
  width:32px;height:32px;border-radius:999px;border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;cursor:pointer;background:#fff;
}
.topbar-title{
  font-family:"Lora","Georgia",serif;font-size:18px;font-weight:600;
}

/* Buttons */
.button-primary,.button-secondary{
  border:none;border-radius:16px;padding:10px 14px;font-size:14px;font-weight:600;cursor:pointer;
}
.button-primary{background:var(--teal);color:#fff;}
.button-primary:disabled{background:#b0c7c6;cursor:default;}
.button-secondary{background:var(--paper);border:1px solid var(--border);color:var(--ink);}

/* Inputs */
.input-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.input{flex:1;padding:8px 10px;border-radius:12px;border:1px solid var(--border);font-size:14px;background:#fff;}
.input:focus{outline:none;border-color:var(--teal);}
.input-label{font-size:13px;font-weight:600;color:var(--ink-mid);margin:8px 2px 4px;}
.select{padding:8px 10px;border-radius:12px;border:1px solid var(--border);font-size:14px;background:#fff;}
.helper-text{font-size:12px;color:var(--ink-dim);margin:4px 2px 8px;}

/* Catalog grid */
.section-header{
  display:flex;align-items:center;justify-content:space-between;
  margin:10px 4px 6px;font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-dim);
}
.catalog-grid{
  display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-top:6px;
}
.catalog-card{
  background:#fff;border-radius:16px;border:1px solid var(--border);
  padding:10px 10px;box-shadow:var(--shadow-1);cursor:pointer;
}
.catalog-name{
  font-family:"Lora","Georgia",serif;font-size:15px;font-weight:600;margin-bottom:2px;
}
.catalog-meta{font-size:12px;color:var(--ink-dim);}
.catalog-emoji{font-size:22px;margin-bottom:4px;}

/* Card list */
.card-list{display:flex;flex-direction:column;gap:8px;margin-top:8px;}
.card-row{
  background:#fff;border-radius:14px;border:1px solid var(--border);
  padding:8px 10px;box-shadow:var(--shadow-1);cursor:pointer;
}
.card-row-top{
  display:flex;align-items:center;gap:8px;margin-bottom:2px;
}
.card-row-main{flex:1;font-size:14px;font-weight:500;}
.card-row-sub{font-size:12px;color:var(--ink-dim);margin-top:2px;}
.card-row-tags{font-size:11px;color:var(--ink-dim);margin-top:2px;}
.card-row-btn{
  border-radius:999px;border:none;background:var(--teal);
  color:#fff;font-size:12px;padding:4px 8px;cursor:pointer;
}

/* Card detail (simple inline expansion) */
.card-detail{
  margin-top:6px;padding-top:6px;border-top:1px solid var(--border);font-size:12px;color:var(--ink-mid);
}
.detail-row{margin-bottom:6px;}
.detail-label{font-size:11px;font-weight:600;text-transform:uppercase;color:var(--ink-dim);margin-bottom:2px;}
.detail-text{font-size:13px;}
.detail-notes{white-space:pre-wrap;}

/* Tag pills */
.tag-pill{
  display:inline-block;border-radius:10px;background:var(--tag-bg);color:var(--tag-text);
  padding:2px 6px;font-size:11px;font-weight:600;margin:0 4px 4px 0;
}

/* Tag row for filter */
.tag-row{display:flex;flex-wrap:wrap;gap:4px;margin:4px 0 6px;}
.tag-chip{
  border-radius:14px;border:1px solid var(--border);padding:4px 8px;font-size:11px;cursor:pointer;
  background:#f7f2ea;color:var(--ink-mid);
}
.tag-chip.active{background:var(--teal-light);border-color:var(--teal);color:var(--teal);}

/* Toast */
.toast{
  position:fixed;left:50%;bottom:24px;transform:translateX(-50%);
  padding:10px 14px;border-radius:20px;font-size:13px;color:#fff;
  background:rgba(26,23,20,0.88);opacity:0;pointer-events:none;
  transition:opacity .2s ease-out;z-index:1000;
}
.toast.show{opacity:1;}

/* Sheet (New phrase, New catalog) */
.sheet-backdrop{
  position:fixed;left:0;top:0;width:100%;height:100%;
  background:rgba(26,23,20,0.45);display:none;align-items:flex-end;justify-content:center;
  z-index:900;
}
.sheet-backdrop.show{display:flex;}
.sheet{
  width:100%;max-width:480px;max-height:92dvh;background:var(--cream);
  border-radius:24px 24px 0 0;box-shadow:var(--shadow-2);
  padding:10px 16px 16px;display:flex;flex-direction:column;
}
.sheet-handle{
  width:36px;height:4px;border-radius:999px;background:var(--border);
  margin:6px auto 8px;
}
.sheet-title{
  font-family:"Lora","Georgia",serif;font-size:16px;font-weight:600;margin-bottom:10px;
}
.sheet-body{flex:1;overflow-y:auto;padding-right:4px;}
.sheet-footer{display:flex;gap:8px;margin-top:12px;}
.sheet-footer .button-secondary{flex:1;}
.sheet-footer .button-primary{flex:1;}

/* Bottom bar (stub) */
.bottom-bar{
  display:flex;align-items:stretch;justify-content:space-around;
  padding:6px 12px calc(8px + env(safe-area-inset-bottom,0px));
  border-top:1px solid var(--border);background:rgba(250,248,244,0.98);
}
.bottom-tab{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;
  font-size:11px;color:var(--ink-dim);
}
.bottom-tab span{font-size:18px;}
.bottom-tab.active{color:var(--teal);font-weight:600;}
</style>
</head>
<body>
<div class="app-frame">

  <!-- Say Home -->
  <div id="scr-say-home" class="screen">
    <div class="hero">
      <div class="hero-title">say</div>
      <div class="hero-sub">Your phrasebook. Save, tag, and review phrases from Talk.</div>
      <div class="input-row">
        <input id="home-search" class="input" placeholder="Search all phrases…" />
        <button id="btn-home-add-card" class="button-primary" style="flex:0 0 auto;">+ Card</button>
      </div>
      <div class="input-row" style="margin-top:6px;">
        <select id="home-lang-filter" class="select" style="flex:1;">
          <option value="all">Show: All languages</option>
        </select>
      </div>
    </div>

    <div class="section-header">
      <span>Catalogs</span>
      <button id="btn-home-add-cat" class="button-secondary" style="font-size:11px;padding:4px 8px;">+ Catalog</button>
    </div>
    <div id="catalog-grid" class="catalog-grid"></div>
  </div>

  <!-- Catalog View -->
  <div id="scr-catalog" class="screen">
    <div class="topbar">
      <div class="topbar-back" data-back="say-home">←</div>
      <div class="topbar-title" id="cat-title">Catalog</div>
    </div>
    <div>
      <div class="input-row">
        <input id="cat-search" class="input" placeholder="Search phrases…" />
      </div>
      <div id="cat-tag-row" class="tag-row"></div>
      <div id="cat-card-list" class="card-list"></div>
    </div>
  </div>

  <!-- Bottom bar -->
  <div class="bottom-bar">
    <div class="bottom-tab">
      <span>💬</span>
      Talk
    </div>
    <div class="bottom-tab active">
      <span>📚</span>
      Say
    </div>
  </div>

</div>

<div id="toast" class="toast"></div>

<!-- New Phrase Sheet -->
<div id="sheet-new-card" class="sheet-backdrop">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">New phrase</div>
    <div class="sheet-body">
      <div class="input-label">Source phrase *</div>
      <textarea id="nc-source" class="input" rows="2" placeholder="What do you want to say?"></textarea>
      <div class="helper-text">In your language.</div>

      <div class="input-label">Source language</div>
      <select id="nc-source-lang" class="select"></select>

      <div class="input-label">Translation</div>
      <textarea id="nc-target" class="input" rows="2" placeholder="Translation (optional)"></textarea>

      <div class="input-label">Target language</div>
      <select id="nc-target-lang" class="select"></select>
      <button id="nc-auto" class="button-secondary" style="margin-top:6px;">Auto-translate →</button>

      <div class="input-label">Notes</div>
      <textarea id="nc-notes" class="input" rows="2" placeholder="Usage tips, pronunciation…"></textarea>

      <div class="input-label">Tags</div>
      <div id="nc-tag-row" class="tag-row"></div>
      <input id="nc-tag-input" class="input" placeholder="Add tag and press Enter" />

      <div class="input-label">Catalog</div>
      <select id="nc-catalog" class="select"></select>
    </div>
    <div class="sheet-footer">
      <button id="nc-cancel" class="button-secondary">Cancel</button>
      <button id="nc-save" class="button-primary">Save phrase</button>
    </div>
  </div>
</div>

<!-- New Catalog Sheet -->
<div id="sheet-new-cat" class="sheet-backdrop">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">New catalog</div>
    <div class="sheet-body">
      <div class="input-label">Name *</div>
      <input id="ncat-name" class="input" />
      <div class="input-label">Description</div>
      <input id="ncat-desc" class="input" />
      <div class="input-label">Emoji</div>
      <input id="ncat-emoji" class="input" placeholder="📚" />
      <div class="helper-text">Choose any single emoji.</div>
    </div>
    <div class="sheet-footer">
      <button id="ncat-cancel" class="button-secondary">Cancel</button>
      <button id="ncat-save" class="button-primary">Create catalog</button>
    </div>
  </div>
</div>

<script>
/* Shared schema keys with Talk (8.5.1) [file:1] */
const STORAGE_KEYS = {
  sessions: 'ts_sessions',
  activeSession: 'ts_active',
  msgsPrefix: 'ts_msg_',
  onboarded: 'ts_onboarded',
  prefs: 'ts_prefs',
  sayCards: 'say_cards',
  sayCatalogs: 'say_catalogs',
  sayTags: 'say_tags'
};

function lsGet(k){ try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch(e){return null;} }
function lsSet(k,v){ try{localStorage.setItem(k,JSON.stringify(v));}catch(e){showToast('Storage full');} }

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  const el=document.getElementById(id); if(el) el.classList.add('active');
}

function showToast(msg,ms=2000){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),ms);
}

/* Language helpers (same list as Talk) [file:1] */
const LANGS = [
  ['en','English'],['th','Thai'],['es','Spanish'],['fr','French'],['de','German'],
  ['it','Italian'],['ja','Japanese'],['ko','Korean'],['zh','Chinese'],['vi','Vietnamese'],
  ['pt','Portuguese'],['ru','Russian'],['ar','Arabic'],['hi','Hindi'],['id','Indonesian'],
  ['ms','Malay'],['fil','Filipino'],['nl','Dutch'],['sv','Swedish'],['pl','Polish'],['tr','Turkish']
];

function detectMyLang(){
  let nav=navigator.language||'en'; nav=nav.toLowerCase();
  for(const [code,name] of LANGS){ if(nav.startsWith(code)) return code; }
  return 'en';
}
function langName(code){
  const f=LANGS.find(l=>l[0]===code);
  return f?f[1]:code;
}

/* TTS (same pattern as Talk) [file:1] */
const synth = 'speechSynthesis' in window ? window.speechSynthesis : null;
let ttsActiveBtn = null;
function speak(text, langCode, btn){
  if(!synth || !text) return;
  if(ttsActiveBtn===btn){
    synth.cancel(); ttsActiveBtn.textContent='🔊'; ttsActiveBtn=null; return;
  }
  if(ttsActiveBtn){ synth.cancel(); ttsActiveBtn.textContent='🔊'; }
  const utt=new SpeechSynthesisUtterance(text);
  utt.lang=langCode||'en-US';
  synth.cancel(); synth.speak(utt);
  ttsActiveBtn=btn; btn.textContent='⏹';
  utt.onend=utt.onerror=()=>{ if(ttsActiveBtn===btn){btn.textContent='🔊';ttsActiveBtn=null;} };
}

/* Translation (reuse MyMemory only here for simplicity) [file:1] */
const tCache = new Map();
async function translateText(text, from, to){
  if(!text.trim() || from===to) return text;
  const key=`${from}|${to}|${text}`;
  if(tCache.has(key)) return tCache.get(key);
  let out=text;
  try{
    const url=`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${from}|${to}`;
    const res=await fetch(url);
    const data=await res.json();
    if(data && data.responseData && data.responseData.translatedText){
      out=data.responseData.translatedText;
    }
  }catch(e){ console.error('translate error',e); showToast('Translation failed'); return text; }
  tCache.set(key,out); return out;
}

/* Data access */
function getCards(){ return lsGet(STORAGE_KEYS.sayCards)||[]; }
function saveCards(cards){ lsSet(STORAGE_KEYS.sayCards,cards); }

function getCatalogs(){ return lsGet(STORAGE_KEYS.sayCatalogs)||[]; }
function saveCatalogs(cats){ lsSet(STORAGE_KEYS.sayCatalogs,cats); }

function getTagsRegistry(){ return lsGet(STORAGE_KEYS.sayTags)||[]; }
function saveTagsRegistry(tags){ lsSet(STORAGE_KEYS.sayTags,tags); }

function ensureFromTalkCatalog(){
  let cats=getCatalogs(); let cat=cats.find(c=>c.id==='cat-talk');
  if(!cat){
    cat={id:'cat-talk',name:'From Talk',emoji:'💬',desc:'Phrases saved from Talk sessions',isPinned:true,createdAt:Date.now()};
    cats.push(cat); saveCatalogs(cats);
  }
  return cat.id;
}

/* Say Home rendering */
function renderHome(){
  const cards=getCards();
  const cats=getCatalogs();
  // Ensure From Talk exists if there are cards referencing it [file:1]
  if(cards.some(c=>c.catalogIds && c.catalogIds.includes('cat-talk'))){
    ensureFromTalkCatalog();
  }
  const catalogsNow=getCatalogs();

  // Language filter options from card data [file:1]
  const langSel=document.getElementById('home-lang-filter');
  const prev=langSel.value||'all';
  langSel.innerHTML='<option value="all">Show: All languages</option>';
  const pairs=new Set();
  cards.forEach(c=>pairs.add(`${c.sourceLang}|${c.targetLang}`));
  [...pairs].forEach(p=>{
    const [src,tgt]=p.split('|');
    const opt=document.createElement('option');
    opt.value=p; opt.textContent=`${langName(src)} ↔ ${langName(tgt)}`;
    langSel.appendChild(opt);
  });
  langSel.value = prev && [...pairs,'all'].includes(prev) ? prev : 'all';

  const grid=document.getElementById('catalog-grid');
  grid.innerHTML='';

  // All Phrases virtual catalog
  const allCount=cards.length;
  const allCard=document.createElement('div');
  allCard.className='catalog-card';
  allCard.onclick=()=>openCatalog({id:'all',name:'All phrases',emoji:'📚',desc:'All your phrases'},false);
  allCard.innerHTML=`
    <div class="catalog-emoji">📚</div>
    <div class="catalog-name">All phrases</div>
    <div class="catalog-meta">${allCount} phrase${allCount===1?'':'s'}</div>
  `;
  grid.appendChild(allCard);

  catalogsNow.forEach(cat=>{
    const count=cards.filter(c=>c.catalogIds && c.catalogIds.includes(cat.id)).length;
    const card=document.createElement('div');
    card.className='catalog-card';
    card.onclick=()=>openCatalog(cat,true);
    card.innerHTML=`
      <div class="catalog-emoji">${cat.emoji || '📂'}</div>
      <div class="catalog-name">${cat.name}</div>
      <div class="catalog-meta">${count} phrase${count===1?'':'s'}</div>
    `;
    grid.appendChild(card);
  });
}

let currentCatalog = null;
let currentCatIsReal = false;
let catSelectedTags = [];

/* Catalog screen */
function openCatalog(cat,isReal){
  currentCatalog=cat; currentCatIsReal=isReal; catSelectedTags=[];
  document.getElementById('cat-title').textContent=cat.name;
  document.getElementById('cat-search').value='';
  renderCatalogCards();
  showScreen('scr-catalog');
}

function renderCatalogCards(){
  const cards=getCards();
  const listEl=document.getElementById('cat-card-list');
  const tagRow=document.getElementById('cat-tag-row');
  listEl.innerHTML=''; tagRow.innerHTML='';
  const q=(document.getElementById('cat-search').value||'').toLowerCase();
  let filtered=cards;
  if(currentCatalog && currentCatalog.id!=='all'){
    filtered=filtered.filter(c=>c.catalogIds && c.catalogIds.includes(currentCatalog.id));
  }
  // language filter from home
  const langFilter=document.getElementById('home-lang-filter').value;
  if(langFilter!=='all'){
    const [src,tgt]=langFilter.split('|');
    filtered=filtered.filter(c=>c.sourceLang===src && c.targetLang===tgt);
  }
  if(q){
    filtered=filtered.filter(c=>
      (c.source && c.source.toLowerCase().includes(q)) ||
      (c.target && c.target.toLowerCase().includes(q)) ||
      (c.tags||[]).some(t=>t.toLowerCase().includes(q))
    );
  }
  // Tag chips from this catalog (4.2.2) [file:1]
  const tagFreq=new Map();
  filtered.forEach(c=>{
    (c.tags||[]).forEach(t=>tagFreq.set(t,(tagFreq.get(t)||0)+1));
  });
  const tagEntries=[...tagFreq.entries()].sort((a,b)=>b[1]-a[1]);
  if(tagEntries.length){
    const allChip=document.createElement('div');
    allChip.className='tag-chip'+(catSelectedTags.length===0?' active':'');
    allChip.textContent='All';
    allChip.onclick=()=>{catSelectedTags=[];renderCatalogCards();};
    tagRow.appendChild(allChip);
    tagEntries.forEach(([tag,count])=>{
      const chip=document.createElement('div');
      chip.className='tag-chip'+(catSelectedTags.includes(tag)?' active':'');
      chip.textContent='#'+tag;
      chip.onclick=()=>{
        if(catSelectedTags.includes(tag)){
          catSelectedTags=catSelectedTags.filter(t=>t!==tag);
        }else{
          catSelectedTags.push(tag);
        }
        renderCatalogCards();
      };
      tagRow.appendChild(chip);
    });
  }

  if(catSelectedTags.length){
    filtered=filtered.filter(c=>{
      const tags=c.tags||[];
      return catSelectedTags.every(t=>tags.includes(t));
    });
  }

  if(!filtered.length){
    const empty=document.createElement('div');
    empty.className='helper-text';
    empty.style.margin='8px 4px';
    empty.textContent='No phrases yet.';
    listEl.appendChild(empty);
    return;
  }

  filtered.forEach(card=>{
    const row=document.createElement('div');
    row.className='card-row';

    const top=document.createElement('div'); top.className='card-row-top';

    const main=document.createElement('div'); main.className='card-row-main';
    main.textContent=card.source || '(no source)';
    const btnTts=document.createElement('button');
    btnTts.className='card-row-btn';
    btnTts.textContent='🔊';
    btnTts.onclick=(ev)=>{ev.stopPropagation();speak(card.target,card.targetLang,btnTts);};
    top.appendChild(main); top.appendChild(btnTts);

    row.appendChild(top);

    const sub=document.createElement('div');
    sub.className='card-row-sub';
    sub.textContent=card.target || '(no translation yet)';
    row.appendChild(sub);

    if(card.tags && card.tags.length){
      const tagsEl=document.createElement('div');
      tagsEl.className='card-row-tags';
      tagsEl.textContent=card.tags.slice(0,2).map(t=>'#'+t).join(' ');
      if(card.tags.length>2) tagsEl.textContent+='  +' + (card.tags.length-2);
      row.appendChild(tagsEl);
    }

    // expand detail on click (simplified version of 5-layer view) [file:1]
    row.onclick=()=>{
      const existing=row.querySelector('.card-detail');
      if(existing){ existing.remove(); return; }
      const detail=document.createElement('div');
      detail.className='card-detail';
      detail.innerHTML=`
        <div class="detail-row">
          <div class="detail-label">Source (${langName(card.sourceLang)})</div>
          <div class="detail-text">${card.source || '(empty)'}</div>
        </div>
        <div class="detail-row">
          <div class="detail-label">Translation (${langName(card.targetLang)})</div>
          <div class="detail-text">${card.target || '(empty)'}</div>
        </div>
        <div class="detail-row">
          <div class="detail-label">Notes</div>
          <div class="detail-text detail-notes">${card.notes || 'No notes'}</div>
        </div>
        <div class="detail-row">
          <div class="detail-label">Tags</div>
          <div>${(card.tags||[]).map(t=>'<span class="tag-pill">#'+t+'</span>').join(' ')||'No tags'}</div>
        </div>
      `;
      row.appendChild(detail);
    };

    listEl.appendChild(row);
  });
}

/* Sheets helpers */
function showSheet(id){ document.getElementById(id).classList.add('show'); }
function hideSheet(id){ document.getElementById(id).classList.remove('show'); }

/* New Phrase Sheet */
const sheetNewCard=document.getElementById('sheet-new-card');
const ncSource=document.getElementById('nc-source');
const ncTarget=document.getElementById('nc-target');
const ncSourceLang=document.getElementById('nc-source-lang');
const ncTargetLang=document.getElementById('nc-target-lang');
const ncNotes=document.getElementById('nc-notes');
const ncTagRow=document.getElementById('nc-tag-row');
const ncTagInput=document.getElementById('nc-tag-input');
const ncCatalog=document.getElementById('nc-catalog');
let ncTagsSelected=[];

function openNewCardSheet(){
  // populate language dropdowns
  ncSourceLang.innerHTML=''; ncTargetLang.innerHTML='';
  LANGS.forEach(([code,name])=>{
    const opt1=document.createElement('option'); opt1.value=code; opt1.textContent=name; ncSourceLang.appendChild(opt1);
    const opt2=document.createElement('option'); opt2.value=code; opt2.textContent=name; ncTargetLang.appendChild(opt2);
  });
  const prefs=lsGet(STORAGE_KEYS.prefs)||{myLang:detectMyLang(),partnerLang:'th'};
  ncSourceLang.value=prefs.myLang||'en';
  ncTargetLang.value=prefs.partnerLang||'th';

  // catalogs
  const cats=getCatalogs();
  ncCatalog.innerHTML='';
  const allOption=document.createElement('option');
  allOption.value='all'; allOption.textContent='All phrases';
  ncCatalog.appendChild(allOption);
  cats.forEach(c=>{
    const opt=document.createElement('option');
    opt.value=c.id; opt.textContent=c.name;
    ncCatalog.appendChild(opt);
  });
  if(currentCatalog && currentCatalog.id!=='all'){
    ncCatalog.value=currentCatalog.id;
  }

  // tags: show registry as chips (8.7.3, 8.7.5) [file:1]
  ncTagsSelected=[];
  renderNcTags();
  ncSource.value=''; ncTarget.value=''; ncNotes.value=''; ncTagInput.value='';
  showSheet('sheet-new-card');
  ncSource.focus();
}

function normalizeTag(raw){
  let t=raw.toLowerCase().trim();
  t=t.replace(/s+/g,'-');
  t=t.replace(/[^a-z0-9-]/g,'');
  if(!t || t.length>24) return null;
  return t;
}

function renderNcTags(){
  ncTagRow.innerHTML='';
  const registry=getTagsRegistry();
  ncTagsSelected.forEach(tag=>{
    const pill=document.createElement('div');
    pill.className='tag-chip active';
    pill.textContent='#'+tag+' ×';
    pill.onclick=()=>{
      ncTagsSelected=ncTagsSelected.filter(t=>t!==tag);
      renderNcTags();
    };
    ncTagRow.appendChild(pill);
  });
  // show registry tags that are not selected
  registry.filter(t=>!ncTagsSelected.includes(t)).forEach(tag=>{
    const chip=document.createElement('div');
    chip.className='tag-chip';
    chip.textContent='#'+tag;
    chip.onclick=()=>{
      ncTagsSelected.push(tag);
      renderNcTags();
    };
    ncTagRow.appendChild(chip);
  });
}

document.getElementById('nc-tag-input').addEventListener('keydown',ev=>{
  if(ev.key==='Enter'){
    ev.preventDefault();
    const tag=normalizeTag(ncTagInput.value);
    if(!tag){ showToast('Tag must be letters/numbers/hyphen, max 24 chars.'); return; }
    if(!ncTagsSelected.includes(tag)) ncTagsSelected.push(tag);
    // update registry [file:1]
    let reg=getTagsRegistry();
    if(!reg.includes(tag)){
      reg.push(tag);
      reg.sort();
      saveTagsRegistry(reg);
    }
    ncTagInput.value='';
    renderNcTags();
  }
});

document.getElementById('nc-auto').onclick = async ()=>{
  const src=ncSource.value.trim();
  if(!src){ showToast('Enter a source phrase first.'); return; }
  ncTarget.value='Translating…';
  const from=ncSourceLang.value,to=ncTargetLang.value;
  const res=await translateText(src,from,to);
  ncTarget.value=res;
};

document.getElementById('nc-save').onclick = ()=>{
  const source=ncSource.value.trim();
  const target=ncTarget.value.trim();
  if(!source && !target){ showToast('At least source or translation is required.'); return; }
  if(!source){ showToast('Source phrase is required.'); return; }
  const cards=getCards();
  const card={
    id:'card-'+Math.random().toString(36).slice(2,10),
    catalogIds:[],
    sourceLang:ncSourceLang.value,
    targetLang:ncTargetLang.value,
    source,
    target,
    notes:ncNotes.value.trim(),
    tags:[...ncTagsSelected],
    priority:'Standard',
    favorite:false,
    usage:0,
    createdAt:Date.now(),
    updatedAt:Date.now(),
    sourceSessionId:null,
    sourcePartnerName:''
  }; // [file:1]
  const selectedCat=ncCatalog.value;
  if(selectedCat==='all'){
    // default catalog: All (no specific catalog), but map to From Talk? keep none for now
  }else{
    card.catalogIds.push(selectedCat);
  }
  const reg=getTagsRegistry();
  ncTagsSelected.forEach(t=>{ if(!reg.includes(t)){reg.push(t);} });
  reg.sort();
  saveTagsRegistry(reg);

  cards.push(card); saveCards(cards);
  showToast('Phrase saved.');
  hideSheet('sheet-new-card');
  if(currentCatalog){
    renderCatalogCards();
  }else{
    renderHome();
  }
};

document.getElementById('nc-cancel').onclick = ()=> hideSheet('sheet-new-card');
sheetNewCard.addEventListener('click',ev=>{ if(ev.target===sheetNewCard) hideSheet('sheet-new-card'); });

/* New Catalog Sheet */
const sheetNewCat=document.getElementById('sheet-new-cat');
document.getElementById('ncat-save').onclick = ()=>{
  const name=document.getElementById('ncat-name').value.trim();
  const desc=document.getElementById('ncat-desc').value.trim();
  let emoji=document.getElementById('ncat-emoji').value.trim() || '📚';
  if(!name){ showToast('Catalog name is required.'); return; }
  const cats=getCatalogs();
  cats.push({
    id:'cat-'+Math.random().toString(36).slice(2,10),
    name,desc,emoji,isPinned:false,createdAt:Date.now()
  });
  saveCatalogs(cats);
  showToast('Catalog created.');
  hideSheet('sheet-new-cat');
  renderHome();
};
document.getElementById('ncat-cancel').onclick = ()=> hideSheet('sheet-new-cat');
sheetNewCat.addEventListener('click',ev=>{ if(ev.target===sheetNewCat) hideSheet('sheet-new-cat'); });

/* Navigation */
document.querySelectorAll('.topbar-back').forEach(btn=>{
  btn.addEventListener('click',()=>{
    const target=btn.getAttribute('data-back');
    if(target==='say-home'){ showScreen('scr-say-home'); renderHome(); }
  });
});

/* Home events */
document.getElementById('btn-home-add-card').onclick = openNewCardSheet;
document.getElementById('btn-home-add-cat').onclick = ()=>{ 
  document.getElementById('ncat-name').value='';
  document.getElementById('ncat-desc').value='';
  document.getElementById('ncat-emoji').value='';
  showSheet('sheet-new-cat'); 
};
document.getElementById('home-search').addEventListener('input',()=>{
  // Quick search goes to All phrases view
  const q=document.getElementById('home-search').value.trim();
  if(q.length>0){
    openCatalog({id:'all',name:'All phrases',emoji:'📚',desc:''},false);
    document.getElementById('cat-search').value=q;
    renderCatalogCards();
  }
});
document.getElementById('home-lang-filter').addEventListener('change',()=>{
  if(currentCatalog && document.getElementById('scr-catalog').classList.contains('active')){
    renderCatalogCards();
  }else{
    renderHome();
  }
});
document.getElementById('cat-search').addEventListener('input',renderCatalogCards);

/* Boot */
(function boot(){
  // Ensure prefs exist [file:1]
  if(!lsGet(STORAGE_KEYS.prefs)){
    lsSet(STORAGE_KEYS.prefs,{userName:'',myLang:detectMyLang(),partnerLang:'th'});
  }
  // Ensure tag registry seeded with recommended tags (8.7.5) [file:1]
  let reg=getTagsRegistry();
  if(!reg || !reg.length){
    reg=['essential','food','transport','formal','casual','emergency','shopping','social','medical','hotel','communication','dietary','restaurant','taxi','negotiating','everywhere'];
    saveTagsRegistry(reg);
  }
  showScreen('scr-say-home');
  renderHome();
})();
</script>
</body>
</html>
