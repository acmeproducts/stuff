<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Configurable RSS Portlet Dashboard — Drawer Config</title>
<style>
  :root{
    --bg:#0b0b0b; --fg:#e6e6e6; --muted:#bdbdbd; --line:rgba(255,255,255,0.14);
    --accent:#86aaf0; --success:#4ade80; --warning:#fb923c;
    --radius:12px; --shadow:0 10px 30px rgba(0,0,0,0.45);
    --header-h: 56px;
    --panel-w: 980px; --panel-side-w: 460px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;background:var(--bg);color:var(--fg);font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Cantarell,Noto Sans,Arial}
  a{color:inherit;text-decoration:none}
  button{background:#1b1b1b;color:var(--fg);border:1px solid #444;border-radius:8px;padding:8px 12px;cursor:pointer;font-size:12px}
  button:hover{background:#2a2a2a;border-color:#555}
  input,select{background:#111;color:var(--fg);border:1px solid #333;border-radius:6px;padding:8px;font-size:12px}
  .app{position:fixed;inset:0;display:flex;flex-direction:column}
  .topbar{height:var(--header-h);display:flex;align-items:center;justify-content:space-between;padding:0 16px;border-bottom:1px solid var(--line);background:rgba(255,255,255,0.02)}
  .brand{font-weight:800;letter-spacing:.3px;color:var(--accent)}
  .actions{display:flex;align-items:center;gap:8px}
  .update{font-size:12px;color:var(--muted)}
  .container{flex:1;display:flex;min-height:0;overflow:hidden}
  /* Dashboard */
  .dashboard{flex:1;display:flex;gap:12px;padding:14px;overflow:hidden}
  .column{flex:1;min-width:0;display:flex;flex-direction:column;gap:12px;min-height:0}
  .portlet{display:flex;flex-direction:column;border:1px solid var(--line);border-radius:12px;background:rgba(26,26,28,0.8);box-shadow:var(--shadow);overflow:hidden;flex:0 0 auto}
  .portlet.collapsed{max-height:44px}
  .portlet.expanded{flex:0 0 auto;min-height:220px;max-height:min(60vh,680px)}
  .portlet-header{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;border-bottom:1px solid var(--line);cursor:pointer;background:rgba(255,255,255,0.03);user-select:none}
  .portlet-title{font-weight:800;font-size:13px}
  .portlet-actions{display:flex;gap:6px;align-items:center}
  .count{font-size:11px;background:rgba(134,170,240,0.2);color:var(--accent);padding:2px 8px;border-radius:999px;font-weight:700}
  .portlet-body{flex:1;overflow:auto;min-height:0}
  .item{padding:10px 12px;border-bottom:1px solid var(--line)}
  .item:last-child{border-bottom:none}
  .headline{font-weight:700;font-size:13px;display:block;margin-bottom:6px}
  .sources{display:flex;gap:6px;flex-wrap:wrap}
  .chip{display:inline-flex;align-items:center;gap:6px;padding:2px 8px;border-radius:999px;background:rgba(255,255,255,0.06);border:1px solid var(--line);font-size:11px;color:#d8d8d8}
  .empty{padding:16px;text-align:center;color:var(--muted);font-size:12px}

  /* ===================== Drawer & Handle ===================== */
  #drawer{position:fixed;z-index:1000;pointer-events:none}
  #drawer .panel{background:rgba(8,8,8,0.88);border:1px solid var(--line);box-shadow:var(--shadow);backdrop-filter: blur(6px);pointer-events:auto;transition:transform 220ms cubic-bezier(.2,.8,.2,1);border-radius:12px}
  /* top */
  #drawer[data-side="top"]{left:0;right:0;top:0}
  #drawer[data-side="top"] .panel{max-width:var(--panel-w);margin:8px auto 0 auto;transform:translateY(-120%);border-bottom-left-radius:12px;border-bottom-right-radius:12px}
  #drawer.open[data-side="top"] .panel{transform:translateY(0)}
  /* bottom */
  #drawer[data-side="bottom"]{left:0;right:0;bottom:0}
  #drawer[data-side="bottom"] .panel{max-width:var(--panel-w);margin:0 auto 8px auto;transform:translateY(120%);border-top-left-radius:12px;border-top-right-radius:12px}
  #drawer.open[data-side="bottom"] .panel{transform:translateY(0)}
  /* left */
  #drawer[data-side="left"]{top:0;bottom:0;left:0}
  #drawer[data-side="left"] .panel{height:calc(100% - 16px);width:var(--panel-side-w);margin:8px;transform:translateX(-120%)}
  #drawer.open[data-side="left"] .panel{transform:translateX(0)}
  /* right */
  #drawer[data-side="right"]{top:0;bottom:0;right:0}
  #drawer[data-side="right"] .panel{height:calc(100% - 16px);width:var(--panel-side-w);margin:8px;transform:translateX(120%)}
  #drawer.open[data-side="right"] .panel{transform:translateX(0)}
  /* Handle */
  #handle{position:fixed;z-index:1001;display:grid;place-items:center;cursor:pointer;pointer-events:auto;background:rgba(26,26,28,0.92);border:1px solid var(--line);border-radius:8px;transition:all .2s}
  #handle:hover{background:rgba(42,42,45,0.92);transform:scale(1.05)}
  #handle .bar{background:var(--accent);border-radius:2px}
  #drawer[data-side="top"] ~ #handle{left:50%;top:8px;transform:translateX(-50%);width:60px;height:24px}
  #drawer[data-side="top"] ~ #handle .bar{width:24px;height:3px}
  #drawer[data-side="bottom"] ~ #handle{left:50%;bottom:8px;transform:translateX(-50%);width:60px;height:24px}
  #drawer[data-side="bottom"] ~ #handle .bar{width:24px;height:3px}
  #drawer[data-side="left"] ~ #handle{left:8px;top:50%;transform:translateY(-50%);width:24px;height:60px}
  #drawer[data-side="left"] ~ #handle .bar{width:3px;height:24px}
  #drawer[data-side="right"] ~ #handle{right:8px;top:50%;transform:translateY(-50%);width:24px;height:60px}
  #drawer[data-side="right"] ~ #handle .bar{width:3px;height:24px}

  /* ===================== Config Content ===================== */
  .content{padding:14px;color:var(--fg);max-height:70vh;overflow:auto}
  .grid{display:grid;grid-template-columns:1fr 1.6fr 88px 28px;gap:8px;align-items:center}
  .grid.header{font-size:12px;color:var(--muted);border-bottom:1px solid var(--line);padding-bottom:6px;margin-bottom:6px}
  .rows{display:flex;flex-direction:column;gap:8px}
  .row{display:grid;grid-template-columns:24px 1fr 1.6fr 28px;gap:8px;align-items:center;padding:8px;border:1px solid var(--line);border-radius:10px;background:rgba(255,255,255,0.02)}
  .drag{cursor:grab;user-select:none;color:#888;text-align:center}
  .del{background:none;border:none;color:#888;cursor:pointer;font-size:16px;line-height:1}
  .del:hover{color:#fff}
  .controls{display:flex;gap:8px;align-items:center;margin:10px 0 8px;flex-wrap:wrap}
  .hint{font-size:11px;color:var(--muted);margin-top:6px}
  .barline{border-top:1px solid var(--line);margin:10px 0}
  .inline{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .cols-input{width:80px}
  .notif{position:fixed;right:16px;bottom:16px;background:var(--success);color:#000;padding:10px 14px;border-radius:10px;box-shadow:var(--shadow);opacity:0;transform:translateY(8px);transition:all .25s}
  .notif.show{opacity:1;transform:translateY(0)}
  .danger{background:var(--warning)!important;color:#000}
  .portlet.dragging{opacity:.6;border-color:var(--accent)}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="brand">Configurable RSS Portlet Dashboard</div>
    <div class="actions">
      <span class="update" id="lastUpdate">Updated now</span>
      <button id="refreshBtn" title="Refresh feeds">Refresh</button>
      <button id="resetBtn" title="Reset to starter config">Reset</button>
    </div>
  </div>
  <div class="container">
    <main class="dashboard" id="dashboard"></main>
  </div>

  <!-- Drawer + Handle -->
  <div id="drawer" data-side="bottom">
    <div class="panel">
      <div class="content">
        <div class="controls">
          <strong>Configuration</strong>
          <span class="hint">Unobtrusive panel with movable handle.</span>
        </div>
        <div class="controls inline">
          <label># of portlets wide <input class="cols-input" id="colsInput" type="number" min="1" max="6" value="2"></label>
          <label>Handle position
            <select id="handlePos">
              <option value="bottom" selected>Bottom</option>
              <option value="top">Top</option>
              <option value="left">Left</option>
              <option value="right">Right</option>
            </select>
          </label>
          <button id="applyBtn">Apply</button>
          <button id="saveBtn">Save</button>
          <button id="exportBtn">Export</button>
          <input type="file" id="importFile" accept=".json" style="display:none">
          <button id="importBtn">Import</button>
        </div>

        <div class="barline"></div>

        <div class="controls"><strong>Add Section</strong></div>
        <div class="grid" style="grid-template-columns:1fr 1.6fr 88px;">
          <input id="newLabel" placeholder="Section label (e.g., Technology)">
          <input id="newUrl" placeholder="RSS feed URL (https://...)">
          <button id="addBtn">Add</button>
        </div>

        <div class="hint">Drag rows by the handle to reorder. “×” deletes. Order defines portlet placement.</div>

        <div class="barline"></div>

        <div class="grid header">
          <div></div><div>Label</div><div>RSS URL</div><div></div>
        </div>
        <div class="rows" id="rows"></div>
      </div>
    </div>
  </div>
  <button id="handle" title="Open configuration"><div class="bar"></div></button>
</div>

<div class="notif" id="notif"></div>

<script>
const RSS_PROXY = 'https://api.allorigins.win/raw?url=';
const STARTER = {
  columns: 2,
  handle: 'bottom',
  sections: [
    { label: 'Top News', url: 'http://feeds.reuters.com/reuters/topNews' },
    { label: 'Technology', url: 'https://techcrunch.com/feed/' },
    { label: 'Markets', url: 'https://feeds.bloomberg.com/markets/news.rss' },
    { label: 'World', url: 'http://feeds.bbci.co.uk/news/world/rss.xml' },
    { label: 'NPR', url: 'https://feeds.npr.org/1001/rss.xml' },
    { label: 'Ars Technica', url: 'http://feeds.arstechnica.com/arstechnica/index' }
  ]
};
let state = loadConfig() || structuredClone(STARTER);
let cache = {};

const drawer = document.getElementById('drawer');
const handle = document.getElementById('handle');

document.addEventListener('DOMContentLoaded', () => {
  applyHandlePosition(state.handle || 'bottom');
  buildDashboard();
  buildConfigUI();
  bindGlobal();
  refreshAll();
  setInterval(refreshAll, 10*60*1000);
});

function bindGlobal(){
  document.getElementById('refreshBtn').onclick = refreshAll;
  document.getElementById('resetBtn').onclick = () => {
    localStorage.removeItem('rss-portlet-config');
    state = structuredClone(STARTER);
    buildConfigUI();
    buildDashboard();
    applyHandlePosition(state.handle);
    refreshAll();
    toast('Starter configuration restored');
  };
  handle.onclick = toggleDrawer;
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') { toggleDrawer(false); } });
}

function toggleDrawer(force){
  const willOpen = (typeof force === 'boolean') ? force : !drawer.classList.contains('open');
  drawer.classList.toggle('open', willOpen);
}

function buildConfigUI(){
  document.getElementById('colsInput').value = state.columns;
  const posSel = document.getElementById('handlePos');
  posSel.value = state.handle || 'bottom';

  document.getElementById('applyBtn').onclick = () => {
    const cols = clamp(parseInt(document.getElementById('colsInput').value||'2',10),1,6);
    state.columns = cols;
    applyHandlePosition(posSel.value);
    buildDashboard();
    saveConfig();
    toast('Applied');
  };
  document.getElementById('saveBtn').onclick = () => { saveConfig(); toast('Saved'); };
  document.getElementById('exportBtn').onclick = exportConfig;
  document.getElementById('importBtn').onclick = () => document.getElementById('importFile').click();
  document.getElementById('importFile').addEventListener('change', importConfig);

  const rows = document.getElementById('rows');
  rows.innerHTML = '';
  state.sections.forEach((sec, idx) => rows.appendChild(makeRow(sec, idx)));

  document.getElementById('addBtn').onclick = () => {
    const label = document.getElementById('newLabel').value.trim();
    const url = document.getElementById('newUrl').value.trim();
    if (!label || !isValidUrl(url)) { toast('Enter a label and a valid URL', true); return; }
    state.sections.push({label,url});
    document.getElementById('newLabel').value=''; document.getElementById('newUrl').value='';
    rows.appendChild(makeRow({label,url}, state.sections.length-1));
    buildDashboard(); saveConfig(); refreshAll(); toast('Section added');
  };
}

function makeRow(sec, idx){
  const row = document.createElement('div'); row.className='row'; row.draggable=true; row.dataset.index=idx;

  const drag = document.createElement('div'); drag.className='drag'; drag.title='Drag to reorder'; drag.textContent='⋮⋮';

  const label = document.createElement('input'); label.value=sec.label; label.placeholder='Section label';
  label.onchange = () => { sec.label = label.value.trim(); buildDashboard(); saveConfig(); refreshAll(); };

  const url = document.createElement('input'); url.value=sec.url; url.placeholder='RSS feed URL';
  url.onchange = () => { const v=url.value.trim(); if(!isValidUrl(v)){ toast('Invalid URL',true); url.focus(); return; } sec.url=v; buildDashboard(); saveConfig(); refreshAll(); };

  const del = document.createElement('button'); del.className='del'; del.title='Delete'; del.textContent='×';
  del.onclick = () => { const i = Array.from(row.parentElement.children).indexOf(row); state.sections.splice(i,1); row.remove(); buildDashboard(); saveConfig(); refreshAll(); };

  row.addEventListener('dragstart', (e)=>{ row.style.opacity='.5'; e.dataTransfer.effectAllowed='move'; window.__dragRow = row; });
  row.addEventListener('dragend', ()=>{ row.style.opacity='1'; window.__dragRow=null; });
  row.addEventListener('dragover', (e)=>{ e.preventDefault(); e.dataTransfer.dropEffect='move'; });
  row.addEventListener('drop', (e)=>{
    e.preventDefault();
    const dragging = window.__dragRow;
    if (!dragging || dragging===row) return;
    const list = row.parentElement;
    const nodes = Array.from(list.children);
    const from = nodes.indexOf(dragging);
    const to = nodes.indexOf(row);
    if (from < 0 || to < 0) return;
    if (from < to) list.insertBefore(dragging, row.nextSibling); else list.insertBefore(dragging, row);
    const moved = state.sections.splice(from,1)[0];
    state.sections.splice(to,0,moved);
    buildDashboard(); saveConfig(); refreshAll();
  });

  row.appendChild(drag); row.appendChild(label); row.appendChild(url); row.appendChild(del);
  return row;
}

function buildDashboard(){
  const dash = document.getElementById('dashboard');
  dash.innerHTML='';
  const cols = clamp(state.columns||2,1,6);
  const colEls = [];
  for(let i=0;i<cols;i++){
    const col=document.createElement('div');
    col.className='column';
    col.dataset.col=String(i);
    dash.appendChild(col);
    colEls.push(col);
  }
  state.sections.forEach((sec, idx)=>{
    const col = colEls[idx % cols];
    col.appendChild(makePortlet(sec, idx));
  });
}

function makePortlet(sec, idx){
  const card = document.createElement('div'); card.className='portlet collapsed'; card.dataset.section=String(idx); card.draggable = true;
  const header = document.createElement('div'); header.className='portlet-header';
  const title = document.createElement('div'); title.className='portlet-title'; title.textContent = sec.label || '(Untitled)';
  const actions = document.createElement('div'); actions.className='portlet-actions';
  const count = document.createElement('span'); count.className='count'; count.textContent='0';
  actions.appendChild(count); header.appendChild(title); header.appendChild(actions);
  const body = document.createElement('div'); body.className='portlet-body'; body.innerHTML='<div class="empty">No content yet</div>';
  header.addEventListener('click', ()=>{
    if (card.classList.contains('dragging')) return;
    const column = card.parentElement;
    Array.from(column.children).forEach(el => { if (el!==card) { el.classList.remove('expanded'); el.classList.add('collapsed'); } });
    const isExpanded = card.classList.contains('expanded');
    if (isExpanded) {
      card.classList.remove('expanded'); card.classList.add('collapsed');
    } else {
      card.classList.remove('collapsed'); card.classList.add('expanded');
    }
  });

  card.addEventListener('dragstart', (e)=>{
    card.classList.add('dragging');
    window.__dragPortlet = card;
    if (e.dataTransfer){ e.dataTransfer.effectAllowed = 'move'; e.dataTransfer.setData('text/plain', card.dataset.section || ''); }
  });
  card.addEventListener('dragend', ()=>{ card.classList.remove('dragging'); window.__dragPortlet = null; });
  card.addEventListener('dragover', (e)=>{ e.preventDefault(); if (e.dataTransfer) e.dataTransfer.dropEffect = 'move'; });
  card.addEventListener('drop', (e)=>{
    e.preventDefault();
    const dragging = window.__dragPortlet;
    if (!dragging || dragging === card) return;
    const from = Number(dragging.dataset.section);
    const to = Number(card.dataset.section);
    if (!Number.isInteger(from) || !Number.isInteger(to) || from < 0 || to < 0 || from === to) return;
    const moved = state.sections.splice(from, 1)[0];
    state.sections.splice(to, 0, moved);
    buildConfigUI();
    buildDashboard();
    saveConfig();
    refreshAll();
    toast('Portlet order updated');
  });
  card.appendChild(header); card.appendChild(body); return card;
}

async function refreshAll(){
  const promises = state.sections.map((sec, idx) => refreshSection(sec, idx));
  await Promise.all(promises);
  document.getElementById('lastUpdate').textContent = `Updated ${new Date().toLocaleTimeString()}`;
}

async function refreshSection(sec, idx){
  const items = await fetchRSS(sec.url, sec.label);
  cache[idx] = items;
  const portlet = document.querySelector(`.portlet[data-section="${idx}"]`);
  if (!portlet) return;
  const countEl = portlet.querySelector('.count');
  const body = portlet.querySelector('.portlet-body');
  countEl.textContent = String(items.length);
  if (!items.length){ body.innerHTML = '<div class="empty">No items found or feed unavailable</div>'; return; }
  body.innerHTML = items.slice(0,30).map(renderItem).join('');
  body.querySelectorAll('a[target-link]').forEach(a => a.addEventListener('click', (e)=>e.stopPropagation()));
}

function renderItem(it){
  const host = safeHost(it.link);
  const hostUrl = host ? `https://${host}` : (it.link || '#');
  const title = escapeHtml(it.title||'');
  return `<div class="item">
    <a class="headline" href="${it.link}" target="_blank" rel="noopener" target-link>${title}</a>
    <div class="sources"><a class="chip" href="${hostUrl}" target="_blank" rel="noopener" target-link">${escapeHtml(it.source||host||'Source')}</a></div>
  </div>`;
}

async function fetchRSS(url, sourceName){
  try{
    const res = await fetch(RSS_PROXY + encodeURIComponent(url));
    const text = await res.text();
    const xml = new DOMParser().parseFromString(text, 'text/xml');
    const nodes = Array.from(xml.querySelectorAll('item, entry')).slice(0, 40);
    return nodes.map(n => {
      const title = n.querySelector('title')?.textContent || '';
      let link = '';
      const linkEl = n.querySelector('link');
      if (linkEl) link = linkEl.getAttribute('href') || linkEl.textContent || '';
      const pubRaw = n.querySelector('pubDate, published, updated')?.textContent || '';
      const ts = pubRaw ? new Date(pubRaw).getTime() : 0;
      return { title: title.trim(), link: link.trim(), timestamp: ts, source: sourceName };
    }).sort((a,b)=>b.timestamp - a.timestamp);
  }catch(e){ console.error('RSS error', sourceName, e); return []; }
}

function applyHandlePosition(side){
  state.handle = side;
  drawer.dataset.side = side;
  saveConfig();
}

function saveConfig(){ localStorage.setItem('rss-portlet-config', JSON.stringify(state)); }
function loadConfig(){
  try{
    const s = localStorage.getItem('rss-portlet-config');
    if(!s) return null;
    const cfg = JSON.parse(s);
    if(!cfg.sections || !Array.isArray(cfg.sections)) return null;
    if(!cfg.columns) cfg.columns = 2;
    if(!cfg.handle) cfg.handle = 'bottom';
    return cfg;
  }catch{ return null; }
}
function exportConfig(){
  const data = JSON.stringify(state, null, 2);
  const a = document.createElement('a'); a.href = 'data:application/json;charset=utf-8,' + encodeURIComponent(data); a.download = 'rss-portlet-config.json'; a.click();
  toast('Exported configuration');
}
function importConfig(ev){
  const file = ev.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try{
      const cfg = JSON.parse(e.target.result);
      if (!cfg || !Array.isArray(cfg.sections) || !cfg.sections.length) throw new Error('Invalid');
      state = { columns: clamp(cfg.columns||2,1,6), handle: (cfg.handle||'bottom'), sections: cfg.sections.map(s => ({label: s.label||'', url: s.url||''})) };
      applyHandlePosition(state.handle);
      buildConfigUI(); buildDashboard(); saveConfig(); refreshAll(); toast('Imported configuration');
    }catch(err){ toast('Invalid configuration file', true); }
  };
  reader.readAsText(file);
  ev.target.value='';
}
function clamp(v,min,max){ return Math.max(min, Math.min(max, v)); }
function isValidUrl(u){ try{ new URL(u); return true; }catch{ return false; } }
function escapeHtml(s){ return (s||'').replace(/[&<>\"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function safeHost(u){ try{ return new URL(u).host; }catch{ return ''; } }
function toast(msg, danger=false){ const n=document.getElementById('notif'); n.textContent=msg; n.className='notif'+(danger?' danger':''); n.classList.add('show'); setTimeout(()=>n.classList.remove('show'), 2200); }
</script>
</body>
</html>
