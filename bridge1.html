<!DOCTYPE html>
<!-- talkbridge · 2026-04-07 · fixed layout + speech -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<title>TalkBridge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Lora:wght@500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0a0a0a;--surface:#161616;--surface2:#222;
  --teal:#2E8B8B;--teal-bright:#3FC1C1;
  --text:#e8e4df;--text-dim:#888;--text-muted:#555;
  --red:#e74c3c;--green:#2ecc71;
  --radius:14px;
}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:"DM Sans",sans-serif;color:var(--text);}

/* LOBBY */
.lobby{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;z-index:10;background:var(--bg);transition:opacity .3s;overflow-y:auto;}
.lobby.hidden{opacity:0;pointer-events:none;}
.lobby-card{width:min(100%,380px);display:flex;flex-direction:column;gap:16px;}
.lobby-brand{font-family:"Lora",serif;font-size:32px;font-weight:600;color:var(--teal-bright);text-align:center;letter-spacing:-0.5px;}
.lobby-sub{font-size:13px;color:var(--text-dim);text-align:center;margin-top:-8px;}
.lobby-label{font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:-8px;}
.lobby-input{width:100%;background:var(--surface);color:var(--text);border:1.5px solid var(--surface2);border-radius:10px;padding:12px 14px;font-size:15px;font-family:"DM Sans",sans-serif;outline:none;}
.lobby-input:focus{border-color:var(--teal);}
.lobby-input::placeholder{color:var(--text-muted);}
.lobby-select{width:100%;background:var(--surface);color:var(--text);border:1.5px solid var(--surface2);border-radius:10px;padding:12px 14px;font-size:15px;font-family:"DM Sans",sans-serif;outline:none;-webkit-appearance:none;appearance:none;cursor:pointer;}
.lobby-select:focus{border-color:var(--teal);}
.lobby-btn{width:100%;background:var(--teal);color:#fff;border:none;border-radius:12px;padding:14px;font-size:16px;font-weight:600;cursor:pointer;font-family:"DM Sans",sans-serif;transition:opacity .15s;margin-top:4px;}
.lobby-btn:hover{opacity:.85;}
.lobby-btn:disabled{opacity:.4;cursor:default;}
.lobby-btn.secondary{background:var(--surface2);color:var(--text);}
.lobby-btn.secondary:hover{background:var(--teal);color:#fff;opacity:1;}
.lobby-link-box{background:var(--surface);border:1.5px solid var(--surface2);border-radius:10px;padding:12px;word-break:break-all;font-size:11px;color:var(--teal-bright);margin-bottom:12px;cursor:pointer;}
.lobby-link-row{display:flex;gap:8px;}
.lobby-link-btn{flex:1;background:var(--surface2);color:var(--text);border:none;border-radius:10px;padding:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:"DM Sans",sans-serif;}
.lobby-link-btn:hover{background:var(--teal);color:#fff;}
.lobby-preview{width:min(100%,280px);aspect-ratio:16/9;border-radius:var(--radius);overflow:hidden;background:var(--surface);margin:0 auto 8px;}
.lobby-preview video{width:100%;height:100%;object-fit:cover;transform:scaleX(-1);}
.recent-rooms{margin-top:6px;display:flex;flex-direction:column;gap:8px;}
.recent-title{font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.6px;}
.recent-item{background:var(--surface);border:1px solid var(--surface2);border-radius:10px;padding:10px 12px;display:flex;flex-direction:column;gap:8px;}
.recent-item-top{display:flex;align-items:flex-start;gap:8px;min-width:0;}
.recent-open{flex:1;min-width:0;background:none;border:none;color:var(--text);text-align:left;cursor:pointer;font:inherit;font-size:14px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.recent-item-meta{display:flex;align-items:center;justify-content:flex-end;gap:8px;flex:0 0 auto;max-width:55%;min-width:0;color:var(--text-dim);font-size:11px;line-height:1.2;text-align:right;white-space:nowrap;}
.recent-item-time,.recent-item-flags{display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.recent-item-time{flex:0 1 auto;}
.recent-item-flags{flex:0 0 auto;}
.recent-actions{display:flex;gap:6px;margin-top:8px;}
.recent-act{flex:1;background:rgba(255,255,255,.06);color:var(--text-dim);border:none;border-radius:8px;padding:6px;font-size:11px;font-weight:600;cursor:pointer;font-family:"DM Sans",sans-serif;}
.recent-act:hover{background:var(--teal);color:#fff;}
.recent-act.danger{color:var(--red);}
.recent-act.danger:hover{background:var(--red);color:#fff;}
.lobby-footer{display:flex;gap:8px;margin-top:4px;}
.lobby-footer-btn{flex:1;background:none;border:1px solid var(--surface2);border-radius:8px;color:var(--text-dim);padding:8px;font-size:12px;cursor:pointer;font-family:"DM Sans",sans-serif;}
.lobby-footer-btn:hover{background:var(--surface2);color:var(--text);}

/* JOINING */
.joining-screen{position:fixed;inset:0;background:var(--bg);z-index:20;display:none;align-items:center;justify-content:center;flex-direction:column;gap:16px;}
.joining-screen.show{display:flex;}
.joining-spinner{width:40px;height:40px;border:3px solid var(--surface2);border-top-color:var(--teal-bright);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.joining-label{font-size:14px;color:var(--text-dim);}

/* DEBUG LOG overlay */
.log-overlay{position:fixed;inset:0;background:rgba(0,0,0,.96);z-index:50;display:none;flex-direction:column;}
.log-overlay.show{display:flex;}
.log-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--surface2);flex-shrink:0;gap:8px;flex-wrap:wrap;}
.log-title{font-family:"Lora",serif;font-size:17px;color:var(--teal-bright);}
.log-actions{display:flex;gap:6px;flex-wrap:wrap;}
.log-btn{background:var(--surface2);color:var(--text);border:none;border-radius:8px;padding:7px 12px;font-size:12px;font-weight:600;cursor:pointer;font-family:"DM Sans",sans-serif;}
.log-btn:hover{background:var(--teal);color:#fff;}
.log-body{flex:1;overflow-y:auto;padding:10px 16px 20px;font-family:monospace;font-size:11px;line-height:1.7;color:#aaa;}
.log-row{border-bottom:1px solid rgba(255,255,255,.03);padding:1px 0;}
.log-row .ts{color:#555;}.log-row .ev{color:var(--teal-bright);}
.log-row.error .ev{color:#e74c3c;}.log-row.warn .ev{color:#f39c12;}.log-row.ok .ev{color:#2ecc71;}

/* === CALL — 3-row flex: video | transcript | controls === */
.call{position:fixed;inset:0;background:#000;z-index:5;display:none;flex-direction:column;}
.call.active{display:flex;}

.call-videos{position:relative;background:#000;overflow:hidden;flex:1;min-height:0;transition:flex-basis .2s ease;}
.call-info-chip{position:absolute;top:8px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:8px;max-width:calc(100% - 24px);padding:5px 10px;border-radius:999px;background:rgba(0,0,0,.55);backdrop-filter:blur(6px);color:#fff;font-size:12px;line-height:1.2;z-index:2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;pointer-events:none;}
.call-info-chip-part{overflow:hidden;text-overflow:ellipsis;}
.call-info-chip-divider{width:1px;height:12px;background:rgba(255,255,255,.35);flex-shrink:0;}
#remote-video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;background:#000;z-index:1;}
#local-video{position:absolute;top:8px;right:8px;width:min(20%,90px);aspect-ratio:9/16;border-radius:8px;object-fit:cover;transform:scaleX(-1);border:2px solid rgba(255,255,255,.2);box-shadow:0 2px 12px rgba(0,0,0,.5);z-index:3;background:var(--surface);}
.no-video-placeholder{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:48px;color:var(--text-muted);z-index:1;}
.solo-banner{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:2;text-align:center;pointer-events:none;}
.solo-banner-text{background:rgba(0,0,0,.6);color:var(--text-dim);font-size:13px;padding:8px 18px;border-radius:20px;backdrop-filter:blur(6px);}
.subtitle-area{position:absolute;bottom:0;left:0;right:0;z-index:4;padding:8px 14px 10px;pointer-events:none;display:flex;flex-direction:column;align-items:center;gap:4px;background:linear-gradient(transparent,rgba(0,0,0,.6) 40%);}
.subtitle-line{max-width:94%;padding:4px 12px;border-radius:6px;font-size:14px;line-height:1.35;text-align:center;word-break:break-word;}
.subtitle-line.partner{background:rgba(0,0,0,.6);color:#fff;}
.subtitle-line.mine{background:rgba(46,139,139,.2);color:rgba(255,255,255,.65);font-size:12px;}
.subtitle-line.translation{background:rgba(63,193,193,.2);color:#fff;font-size:13px;}
.subtitle-line.partner-source{background:rgba(255,255,255,.07);color:rgba(255,255,255,.6);font-size:11px;}
.partner-speaking-indicator{position:absolute;right:12px;bottom:56px;z-index:5;min-width:34px;height:24px;border-radius:999px;background:rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.2);color:#fff;display:none;align-items:center;justify-content:center;font-size:18px;font-weight:700;line-height:1;backdrop-filter:blur(4px);}
.partner-speaking-indicator.show{display:flex;animation:pulseSpeak .9s ease-in-out infinite alternate;}
@keyframes pulseSpeak{from{opacity:.55;transform:scale(.98)}to{opacity:1;transform:scale(1.03)}}

.call-transcript{position:relative;flex:0 0 30%;min-height:0;max-height:45%;overflow-y:auto;background:var(--bg);border-top:1px solid var(--surface2);padding:0 12px;transition:flex-basis .2s ease;}
.call-transcript-header{display:flex;align-items:center;justify-content:flex-start;padding:8px 0;position:sticky;top:0;background:var(--bg);z-index:1;gap:8px;}
.call-transcript-title{font-size:12px;font-weight:700;color:var(--text-dim);letter-spacing:.3px;}
.call-transcript-actions{display:flex;gap:6px;}
.call-transcript-btn{width:24px;height:24px;display:flex;align-items:center;justify-content:center;background:transparent;color:#8f959d;border:1px solid rgba(255,255,255,.18);border-radius:7px;cursor:pointer;padding:0;}
.call-transcript-btn:hover{background:rgba(255,255,255,.06);color:#b6bcc3;border-color:rgba(255,255,255,.26);}
.call-transcript-btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.cc-prefs-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:60;display:none;align-items:center;justify-content:center;padding:16px;}
.cc-prefs-overlay.show{display:flex;}
.cc-prefs-card{width:min(100%,320px);background:var(--surface);border:1px solid var(--surface2);border-radius:12px;padding:14px;display:flex;flex-direction:column;gap:10px;}
.cc-prefs-title{font-size:14px;font-weight:700;color:var(--text);}
.cc-prefs-row{display:flex;flex-direction:column;gap:4px;}
.cc-prefs-row label{font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.04em;}
.cc-prefs-input{background:var(--bg);color:var(--text);border:1px solid var(--surface2);border-radius:8px;padding:8px 10px;font:inherit;font-size:13px;}
.cc-prefs-actions{display:flex;gap:8px;margin-top:4px;}
.cc-prefs-btn{flex:1;background:var(--surface2);color:var(--text);border:none;border-radius:8px;padding:9px;font-size:12px;font-weight:600;cursor:pointer;font-family:"DM Sans",sans-serif;}
.cc-prefs-btn:hover{background:var(--teal);color:#fff;}
.call.transcript-collapsed .chevron-down{display:none;}
.call:not(.transcript-collapsed) .chevron-right{display:none;}
.transcript-more-indicator{position:absolute;right:6px;top:50%;transform:translateY(-50%);z-index:3;width:22px;height:22px;border-radius:999px;background:rgba(46,139,139,.2);color:var(--teal-bright);border:1px solid rgba(63,193,193,.35);display:none;align-items:center;justify-content:center;font-size:14px;font-weight:700;pointer-events:none;}
.transcript-more-indicator.show{display:flex;}
.call.transcript-collapsed .call-transcript{flex:0 0 32px;max-height:32px;overflow:hidden;}
.call.transcript-collapsed #transcript-body{display:none;}
.call-videos.swapped #remote-video{top:8px;right:8px;left:auto;bottom:auto;width:min(24%,120px);height:auto;aspect-ratio:16/9;border-radius:8px;border:2px solid rgba(255,255,255,.2);box-shadow:0 2px 12px rgba(0,0,0,.5);z-index:3;}
.call-videos.swapped #local-video{inset:0;width:100%;height:100%;border-radius:0;border:none;box-shadow:none;z-index:1;}
.tr-entry{padding:6px 0;}
.tr-bubble{border:1px solid rgba(255,255,255,.14);border-radius:12px;overflow:hidden;background:rgba(255,255,255,.02);}
.tr-head{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:6px 10px;border-bottom:1px solid rgba(255,255,255,.08);font-size:11px;}
.tr-who{font-weight:700;color:var(--text-dim);}
.tr-who.mine{color:var(--teal-bright);}
.tr-time{font-size:10px;color:var(--text-muted);font-variant-numeric:tabular-nums;}
.tr-body{display:grid;grid-template-columns:1fr 1px 1fr;}
.tr-col{padding:8px 10px;display:flex;flex-direction:column;gap:6px;min-width:0;}
.tr-divider{background:rgba(255,255,255,.08);}
.tr-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;color:var(--text-muted);}
.tr-text{font-size:13px;line-height:1.4;color:var(--text);word-break:break-word;}
.tr-col.source .tr-text{color:var(--text-dim);}
.tr-tts{border:none;background:transparent;color:#8f959d;cursor:pointer;padding:0;display:flex;align-items:center;gap:4px;font-size:10px;line-height:1;}
.tr-tts:hover{color:#c4ccd4;}
.tr-tts svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.tr-empty{color:var(--text-muted);font-size:12px;font-style:italic;padding:12px 0;}

.call-controls{display:flex;align-items:center;justify-content:center;gap:14px;padding:8px 16px max(8px,env(safe-area-inset-bottom));background:var(--surface);flex-shrink:0;}
.ctrl-btn{width:48px;height:48px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s,transform .1s;background:rgba(255,255,255,.1);color:#fff;}
.ctrl-btn:hover{background:rgba(255,255,255,.18);}
.ctrl-btn:active{transform:scale(.93);}
.ctrl-btn.off{background:rgba(231,76,60,.2);color:var(--red);}
.ctrl-btn.end-call{background:var(--red);color:#fff;width:56px;height:48px;border-radius:24px;}
.ctrl-btn.end-call:hover{background:#c0392b;}

#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(255,255,255,.15);backdrop-filter:blur(12px);color:#fff;font-size:13px;font-weight:600;padding:10px 20px;border-radius:22px;z-index:100;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

@media(min-width:768px){
  .lobby-card{width:420px;}
  #local-video{width:min(18%,160px);}
  .call-controls{gap:20px;padding:10px 24px;}
  .ctrl-btn{width:54px;height:54px;}
  .ctrl-btn.end-call{width:64px;height:54px;}
  .subtitle-line{font-size:16px;max-width:80%;}
  .call-transcript{flex-basis:28%;}
}
@media(max-height:500px) and (orientation:landscape){
  .call-transcript{flex-basis:34%;}
  #local-video{width:min(16%,90px);top:6px;right:6px;}
  .call-controls{gap:10px;padding:6px 12px;}
  .ctrl-btn{width:40px;height:40px;}
  .ctrl-btn.end-call{width:48px;height:40px;}
  .subtitle-line{font-size:12px;padding:3px 8px;}
}
@media(max-width:400px){
  .call-controls{gap:10px;}
  .ctrl-btn{width:44px;height:44px;}
  .ctrl-btn.end-call{width:52px;height:44px;}
}
</style>
</head>
<body>

<div class="lobby" id="lobby">
  <div class="lobby-card">
    <div class="lobby-brand">TalkBridge</div>
    <div class="lobby-sub">Video call with live subtitles</div>
    <div id="lobby-setup">
      <div style="display:flex;flex-direction:column;gap:12px;">
        <div><div class="lobby-label" style="margin-bottom:6px;">Room name (optional)</div>
        <input class="lobby-input" id="room-name" placeholder="e.g. English ↔ Thai session" maxlength="60"></div>
        <div><div class="lobby-label" style="margin-bottom:6px;">I speak</div>
        <select class="lobby-select" id="my-lang"></select></div>
        <div><div class="lobby-label" style="margin-bottom:6px;">They speak</div>
        <select class="lobby-select" id="their-lang"></select></div>
        <button class="lobby-btn" id="create-btn" onclick="createRoom()" disabled>Start a room</button>
      </div>
      <div class="recent-rooms" id="recent-rooms" style="display:none;">
        <div class="recent-title">Recent rooms</div>
        <div id="recent-rooms-list"></div>
      </div>
      <div class="lobby-footer">
        <button class="lobby-footer-btn" onclick="openLog()">🪲 Debug log</button>
      </div>
    </div>
    <div id="lobby-waiting" style="display:none;">
      <div class="lobby-preview"><video id="preview-video" autoplay muted playsinline></video></div>
      <div style="font-size:14px;color:var(--text-dim);text-align:center;margin-bottom:10px;" id="room-name-display"></div>
      <div class="lobby-link-box" id="lobby-link" onclick="copyLink()">—</div>
      <div class="lobby-link-row">
        <button class="lobby-link-btn" onclick="copyLink()">Copy link</button>
        <button class="lobby-link-btn" onclick="shareLink()">Share</button>
      </div>
      <button class="lobby-btn secondary" style="margin-top:8px;" onclick="backToSetup()">← Back</button>
      <div style="margin-top:12px;font-size:12px;color:var(--text-muted);text-align:center;">Or wait for partner to join via link…</div>
    </div>
  </div>
</div>

<div class="joining-screen" id="joining-screen">
  <div class="joining-spinner"></div>
  <div class="joining-label" id="joining-label">Joining call…</div>
</div>

<div class="log-overlay" id="log-overlay">
  <div class="log-header">
    <span class="log-title">🪲 Debug Log</span>
    <div class="log-actions">
      <button class="log-btn" onclick="copyLogText()">Copy</button>
      <button class="log-btn" onclick="clearLogText()">Clear</button>
      <button class="log-btn" onclick="closeLog()">✕ Close</button>
    </div>
  </div>
  <div class="log-body" id="log-body"></div>
</div>

<div class="log-overlay" id="room-tr-overlay">
  <div class="log-header">
    <span class="log-title" id="room-tr-title">Transcript</span>
    <div class="log-actions">
      <button class="log-btn" onclick="copyRoomTr()">Copy</button>
      <button class="log-btn" onclick="closeRoomTr()">✕ Close</button>
    </div>
  </div>
  <div class="log-body" id="room-tr-body" style="font-family:'DM Sans',sans-serif;font-size:13px;"></div>
</div>

<div class="call" id="call-screen">
  <div class="call-videos">
    <video id="remote-video" autoplay playsinline></video>
    <video id="local-video" autoplay muted playsinline></video>
    <div class="call-info-chip" id="call-info-chip" style="display:none;"></div>
    <div class="no-video-placeholder" id="no-video-msg">👤</div>
    <div class="solo-banner" id="solo-banner" style="display:none;"><div class="solo-banner-text">Solo / test mode — waiting for partner</div></div>
    <div class="partner-speaking-indicator" id="partner-speaking-indicator" aria-hidden="true">…</div>
    <div class="subtitle-area" id="subtitle-area"></div>
  </div>
  <div class="call-controls">
    <button class="ctrl-btn" id="mic-btn" onclick="toggleMic()" title="Mute/unmute">
      <svg id="mic-on" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
      <svg id="mic-off" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/><line x1="2" y1="22" x2="22" y2="2" stroke="#e74c3c" stroke-width="2.5"/></svg>
    </button>
    <button class="ctrl-btn end-call" onclick="hangUp()" title="End call">

function log(ev,d,l){
  var r={ts:new Date().toISOString(),ev:ev,d:d||{},l:l||'info'};
  debugLog.push(r);if(debugLog.length>400)debugLog.shift();
  var b=$('log-body');if(!b)return;
  var div=document.createElement('div');div.className='log-row '+(l||'info');
  div.innerHTML='<span class="ts">'+r.ts.slice(11,23)+'</span> <span class="ev">'+esc(ev)+'</span> '+esc(JSON.stringify(d||{}));
  b.appendChild(div);b.scrollTop=b.scrollHeight;
}
function logLocalMediaState(reason){
  var tracks=videoStream?videoStream.getTracks():[];
  log('media_track_state',{
    atMs:Date.now(),
    reason:reason||'unknown',
    hasStream:!!videoStream,
    tracks:tracks.map(function(t){return{kind:t.kind,enabled:t.enabled,readyState:t.readyState,id:t.id}})
  },'ok');
}
async function ensureVideoStream(reason){
  if(videoStream&&videoStream.getTracks().some(function(t){return t.readyState==='live'})){
    log('media_reuse',{reason:reason||'unknown'},'ok');
    logLocalMediaState('reuse:'+reason);
    return videoStream;
  }
  if(mediaRequestInFlight){
    log('media_wait_inflight',{reason:reason||'unknown'},'warn');
    return mediaRequestInFlight;
  }
  log('media_request',{reason:reason||'unknown'},'warn');
  mediaRequestInFlight=navigator.mediaDevices.getUserMedia({video:true,audio:false}).then(function(s){
    videoStream=s;
    log('media_acquired',{reason:reason||'unknown',tracks:s.getTracks().length},'ok');
    logLocalMediaState('acquired:'+reason);
    return s;
  }).finally(function(){mediaRequestInFlight=null});
  return mediaRequestInFlight;
}

function detectLang(t,fb){t=(t||'').trim();if(!t)return fb||'en';if(/[฀-๿]/.test(t))return'th';if(/[぀-ヿ]/.test(t))return'ja';if(/[一-鿿]/.test(t))return'zh';if(/[가-힯]/.test(t))return'ko';if(/[؀-ۿ]/.test(t))return'ar';return fb||'en'}

function translate(text,from,to){
  if(!text||!from||!to||from===to)return Promise.resolve(text);
  var k=from+'|'+to+'|'+text;if(trCache.has(k))return Promise.resolve(trCache.get(k));
  return fetch('https://api.mymemory.translated.net/get?q='+encodeURIComponent(text)+'&langpair='+from+'|'+to)
    .then(function(r){return r.json()}).then(function(d){if(d&&d.responseStatus===200&&d.responseData){var t=d.responseData.translatedText;if(t&&t.indexOf('MYMEMORY')<0){trCache.set(k,t);return t}}return text}).catch(function(){return text});
}

function handleRelay(d){
  if(!d||d.from===deviceId)return;
  if(d.type==='hello'){
    if(lobbyState===LS.waiting){room.solo=false;enterCall();return}
    if(lobbyState===LS.call){
      var stableConn=!!(pc&&(pc.connectionState==='connected'||pc.connectionState==='completed'||pc.iceConnectionState==='connected'||pc.iceConnectionState==='completed'));
      if(!stableConn&&lastLocalDescription&&!helloResentByPeer[d.from]){
        helloResentByPeer[d.from]=true;
        relaySend({type:'webrtc-signal',transient:true,signal:{description:lastLocalDescription}});
        log('relay_hello_resend_sdp',{type:lastLocalDescription.type,from:d.from},'ok');
      }
      if(pc&&pc.signalingState==='stable'){
        log('relay_hello_renegotiate',{state:pc.signalingState,from:d.from},'ok');
        renegotiateIfStable('hello');
      }
    }
    return;
  }
  if(d.type==='ping'){relaySend({type:'pong',transient:true});return}
  if(d.type==='pong')return;
  if(d.type==='webrtc-signal'){handleSig(d);return}
  if(d.type==='subtitle'){
    markPartnerTalking();
    if(d.text&&d.targetLang===room.myLang)showSub(d.text,'partner');
    addTr('partner',d.sourceText,d.text,d.sourceLang,d.targetLang,d.subtitleSeq);return;
  }
  if(d.type==='subtitle-update'){
    markPartnerTalking();
    if(d.text&&d.targetLang===room.myLang)showSub(d.text,'partner');
    patchTr('partner',d.subtitleSeq,d.text,d.sourceLang,d.targetLang);return;
  }
  if(d.type==='hangup'){toast('Partner left');cleanUp();return}
}

function setupPC(){
  if(pc)return;pc=new RTCPeerConnection({iceServers:[{urls:'stun:stun.l.google.com:19302'}]});
  var emitOffer=async function(){try{makingOffer=true;await pc.setLocalDescription(await pc.createOffer());lastLocalDescription=pc.localDescription;helloResentByPeer={};relaySend({type:'webrtc-signal',transient:true,signal:{description:pc.localDescription}})}catch(_){}finally{makingOffer=false}};
  pc._tbEmitOffer=emitOffer;
  pc.onnegotiationneeded=emitOffer;
  var localVideoTracks=videoStream?videoStream.getVideoTracks():[];
  localVideoTracks.forEach(function(t){pc.addTrack(t,videoStream)});
  // Explicit policy: do not uplink microphone audio over WebRTC in this bridge.
  // Keep capture isolated to SpeechRecognition for subtitles only.
  if(ENABLE_WEBRTC_UPLINK_AUDIO&&videoStream){
    var localAudioTracks=videoStream.getAudioTracks();
    localAudioTracks.forEach(function(t){pc.addTrack(t,videoStream)});
  }
  if(localVideoTracks.length)renegotiateIfStable('setup');
  pc.onicecandidate=function(e){if(e.candidate)relaySend({type:'webrtc-signal',transient:true,signal:{candidate:e.candidate}})};
  pc.ontrack=function(e){
    if(!remoteStream)remoteStream=new MediaStream();
    if(e.streams&&e.streams[0]){
      e.streams[0].getTracks().forEach(function(track){
        var hasTrack=remoteStream.getTracks().some(function(existing){return existing.id===track.id});
        if(!hasTrack)remoteStream.addTrack(track);
        bindRemoteTrackState(track);
      });
    }else if(e.track){
      var exists=remoteStream.getTracks().some(function(track){return track.id===e.track.id});
      if(!exists)remoteStream.addTrack(e.track);
      bindRemoteTrackState(e.track);
    }
    refreshRemoteVideo();
  };
}
async function handleSig(d){

    if(d.signal.description){var desc=d.signal.description,pol=deviceId>d.from;var rdy=!makingOffer&&(pc.signalingState==='stable'||isSettingRemoteAnswerPending);var col=desc.type==='offer'&&!rdy;ignoreOffer=!pol&&col;if(ignoreOffer)return;isSettingRemoteAnswerPending=desc.type==='answer';await pc.setRemoteDescription(desc);isSettingRemoteAnswerPending=false;if(desc.type==='offer'){await pc.setLocalDescription(await pc.createAnswer());lastLocalDescription=pc.localDescription;helloResentByPeer={};relaySend({type:'webrtc-signal',transient:true,signal:{description:pc.localDescription}})}}

/* === SPEECH — finals only, strong dedup === */
function isDupe(text){
  var now=Date.now();recentFinals=recentFinals.filter(function(f){return now-f.t<DEDUP_MS});
  var lo=text.toLowerCase();
  for(var i=0;i<recentFinals.length;i++){var p=recentFinals[i].s;if(p===lo)return true;if(p.length>5&&lo.length>5&&(p.indexOf(lo)>=0||lo.indexOf(p)>=0))return true}
  return false;
}
function recFinal(t){recentFinals.push({s:t.toLowerCase(),t:Date.now()});if(recentFinals.length>DEDUP_MAX)recentFinals.shift()}
function isCallActive(){return !!(room.id&&$('call-screen').classList.contains('active'))}
function clearSpeechRestart(){if(restartTimer){clearTimeout(restartTimer);restartTimer=null}restartScheduled=false}
function resetSpeechState(){clearSpeechRestart();restartBackoff=250;endBurst=[]}
function canAutoStartSpeech(){return !!(SpeechRec&&wantSpeech&&micOn&&isCallActive()&&!document.hidden&&Date.now()>=speechBlockedUntil)}
function canScheduleSpeechRestart(){return !restartScheduled&&Date.now()>=speechBlockedUntil}
function scheduleSpeechRestart(reason,minDelay){
  if(!canScheduleSpeechRestart()||!canAutoStartSpeech()){log('speech_restart_skip',{reason:reason,scheduled:restartScheduled,auto:canAutoStartSpeech(),atMs:Date.now()},'warn');return}
  var now=Date.now();
  restartBackoff=(now-lastRestartTs<2500)?Math.min(6000,Math.max(restartBackoff*1.7,300)):Math.max(250,restartBackoff*0.85);
  lastRestartTs=now;
  var delay=Math.max(minDelay||0,Math.round(restartBackoff));
  restartScheduled=true;
  log('speech_restart_scheduled',{reason:reason,delay:delay,backoff:Math.round(restartBackoff),atMs:now},'warn');
  restartTimer=setTimeout(function(){
    restartScheduled=false;restartTimer=null;
    if(!canAutoStartSpeech()||recognizerActive){log('speech_restart_cancelled',{reason:reason,recognizerActive:recognizerActive,auto:canAutoStartSpeech(),atMs:Date.now()},'warn');return}
    log('speech_restart',{reason:reason,delay:delay,atMs:Date.now()},'warn');
    startSpeech();
  },delay);
}

function flushSpeechRuntime(reason){
  // Flush lightweight runtime state before deliberate stops/restarts.
  recentFinals=[];
  log('speech_flush',{reason:reason||'manual',recognizerActive:recognizerActive,recognizing:recognizing,wantSpeech:wantSpeech,micOn:micOn,atMs:Date.now()},'ok');
}

function startSpeech(){
  if(!SpeechRec){toast('Live transcript unavailable');return}
  if(recognizerActive||recognizing||!canAutoStartSpeech()){log('speech_start_skip',{recognizerActive:recognizerActive,recognizing:recognizing,auto:canAutoStartSpeech()},'warn');return}
  clearSpeechRestart();
  var gen=++speechGen;var locale=TTS_LOCALE[room.myLang]||room.myLang;
  log('speech_start_attempt',{gen:gen,locale:locale},'ok');
  recognizerActive=true;
  recognizer=new SpeechRec();recognizer.lang=locale;
  recognizer.interimResults=false;
  recognizer.continuous=true;recognizer.maxAlternatives=1;
  recognizer.onstart=function(){if(gen===speechGen){recognizing=true;recognizerActive=true;restartBackoff=250;endBurst=[];endBurstWarned=false;lastSpeechEventTs=Date.now();log('speech_onstart',{gen:gen},'ok')}};
  recognizer.onresult=function(e){
    if(gen!==speechGen)return;
    var text='';for(var i=e.resultIndex;i<e.results.length;i++)if(e.results[i].isFinal)text+=e.results[i][0].transcript;
    text=norm(text);if(!text)return;
    setTimeout(function(){
      if(gen!==speechGen)return;
      if(isDupe(text)){log('dedup',{t:text.slice(0,40)},'warn');return}
      lastSpeechEventTs=Date.now();
      recFinal(text);log('final',{t:text.slice(0,60)},'ok');
      var src=detectLang(text,room.myLang),tgt=room.theirLang,ss=++localSubSeq;
      showSub(text,'mine');
      relaySend({type:'subtitle',subtitleSeq:ss,text:text,sourceText:text,sourceLang:src,targetLang:tgt,provisional:true});
      addTr('me',text,text,src,tgt,ss);
      translate(text,src,tgt).then(function(tr){tr=norm(tr)||text;if(tr!==text){relaySend({type:'subtitle-update',subtitleSeq:ss,text:tr,sourceText:text,sourceLang:src,targetLang:tgt});patchTr('me',ss,tr,src,tgt)}});
    },CAPTION_PAUSE_MS);
  };
  recognizer.onend=function(){
    if(gen!==speechGen)return;
    recognizing=false;recognizerActive=false;recognizer=null;
    var now=Date.now();
    var sinceSpeech=lastSpeechEventTs?now-lastSpeechEventTs:null;
    var countsTowardBurst=sinceSpeech===null||sinceSpeech<3000;
    endBurst=endBurst.filter(function(t){return now-t<8000});
    if(countsTowardBurst)endBurst.push(now);
    log('speech_onend',{sinceSpeechMs:sinceSpeech,countsTowardBurst:countsTowardBurst,burstCount:endBurst.length},'warn');
    if(endBurst.length>=END_BURST_THRESHOLD){
      speechBlockedUntil=now+20000;
      if(!endBurstWarned){toast('Live transcript is unstable on this browser right now');endBurstWarned=true}
      log('speech_end_burst',{count:endBurst.length},'warn');
      return;
    }
    flushSpeechRuntime('onend');
    scheduleSpeechRestart('onend',countsTowardBurst?2200:850);
  };
  recognizer.onerror=function(e){
    if(gen!==speechGen)return;
    recognizing=false;recognizerActive=false;
    log('speech_error',{error:e.error},'error');
    if(e.error==='not-allowed'||e.error==='service-not-allowed'){
      speechBlockedUntil=Date.now()+15000;clearSpeechRestart();toast('Mic permission needed');
      return;
    }
    if(e.error==='audio-capture')toast('Microphone unavailable');
    if(e.error==='aborted'||e.error==='network')scheduleSpeechRestart('onerror:'+e.error,2600);
    else scheduleSpeechRestart('onerror:'+e.error,1200);
  };
  try{recognizer.start()}catch(_){recognizerActive=false;log('speech_start_throw',{},'error');scheduleSpeechRestart('start-throw',800)}
}
function stopSpeech(keepWant,reason){
  if(!recognizer&&!recognizerActive&&!recognizing){if(!keepWant)wantSpeech=false;log('speech_stop_skip',{reason:reason||'manual',keepWant:!!keepWant},'warn');return}
  speechGen++;clearSpeechRestart();if(!keepWant)wantSpeech=false;
  log('speech_stop',{reason:reason||'manual',keepWant:!!keepWant,hadRecognizer:!!recognizer,recognizerActive:recognizerActive,recognizing:recognizing},'warn');
  if(recognizer)try{recognizer.stop()}catch(_){}
  recognizer=null;recognizing=false;recognizerActive=false
}

function addTr(who,src,tr,sL,tL,ss){

  var entry={who:who,sourceText:src,translatedText:tr,srcLang:sL,tgtLang:tL,subtitleSeq:ss||null,ts:Date.now()};
  transcript.push(entry);if(transcript.length>MAX_TR)transcript.splice(0,transcript.length-MAX_TR);
  saveTr();appendTrDom(entry);
  if(transcriptTtsOn&&src)speakText(src,sL||room.myLang);

}
function getTranscriptPhrasebookPayload(){
  return {type:'phrasebook',cards:getTranscriptExportCards(),catalogs:[],tags:[],exportedAt:Date.now()};
}
function getTranscriptPhrasebookCsvRows(cards){
  return (cards||[]).map(function(card){
    return {
      id:card.id||'',
      source:card.source||'',
      sourceLang:card.sourceLang||'',
      target:card.target||'',
      targetLang:card.targetLang||'',
      notes:card.notes||'',
      tags:JSON.stringify(card.tags||[]),
      catalogIds:JSON.stringify(card.catalogIds||[]),
      catalogs:JSON.stringify([]),
      clarifyChain:JSON.stringify(card.clarifyChain||[]),
      backtranslate:JSON.stringify(card.backtranslate||{}),
      backtranslateVerdict:(card.backtranslate&&card.backtranslate.verdict)||'',
      savedBy:card.savedBy||'',
      createdAt:card.createdAt||'',
      updatedAt:card.updatedAt||''
    };
  });
}
function downloadCsvRows(rows,fileName){
  if(!rows||!rows.length){toast('No transcript');return}
  var headers=Object.keys(rows[0]);
  var csv=[headers.map(csvEscape).join(',')].concat(rows.map(function(row){
    return headers.map(function(h){return csvEscape(row[h]);}).join(',');
  })).join('\n');
  downloadBlob(csv,'text/csv;charset=utf-8',fileName);
}
function exportTxt(){
  if(!transcript.length){toast('No transcript');return}
  var t='TalkBridge Transcript\n'+(room.name?room.name+'\n':'')+new Date().toLocaleString()+'\n\n'+transcript.map(function(e){var ts=new Date(e.ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'});return '['+ts+'] '+(e.who==='me'?'You':'Partner')+' ('+((e.srcLang||'?').toUpperCase())+'): '+e.sourceText+(e.translatedText&&e.translatedText!==e.sourceText?'\n → ('+((e.tgtLang||'?').toUpperCase())+'): '+e.translatedText:'')}).join('\n\n');
  downloadBlob(t,'text/plain;charset=utf-8','talkbridge-'+new Date().toISOString().slice(0,10)+'.txt');toast('Exported TXT');
}
function exportPhrasebookJson(){
  if(!transcript.length){toast('No transcript');return}
  var payload=getTranscriptPhrasebookPayload();
  downloadBlob(JSON.stringify(payload,null,2),'application/json','talkbridge-phrasebook-'+new Date().toISOString().slice(0,10)+'.json');
  toast('Exported phrasebook JSON');
}
function exportPhrasebookCsv(){
  if(!transcript.length){toast('No transcript');return}
  var cards=getTranscriptExportCards();
  var rows=getTranscriptPhrasebookCsvRows(cards);
  downloadCsvRows(rows,'talkbridge-phrasebook-'+new Date().toISOString().slice(0,10)+'.csv');
  toast('Exported phrasebook CSV');
}
function openTranscriptExport(){
  if(!transcript.length){toast('No transcript');return}
  var choice=(window.prompt('Export format: txt, json, or csv','json')||'').toLowerCase().trim();
  if(choice==='json'||choice==='phrasebook'||choice==='phrasebook-json'){exportPhrasebookJson();return}
  if(choice==='csv'||choice==='phrasebook-csv'){exportPhrasebookCsv();return}
  if(choice==='txt'||!choice){exportTxt();return}
  toast('Unknown format. Use txt, json, or csv.');
}

function toggleMic(){
  micOn=!micOn;wantSpeech=micOn;
  log('mic_toggle',{micOn:micOn,callActive:isCallActive(),recognizerActive:recognizerActive},'ok');
  if(micOn){
    recentFinals=[];
    if(isCallActive()&&!recognizerActive&&!recognizing&&!restartScheduled)scheduleSpeechRestart('mic_on',120);
    else log('mic_on_restart_skip',{callActive:isCallActive(),recognizerActive:recognizerActive,recognizing:recognizing,restartScheduled:restartScheduled,atMs:Date.now()},'warn');
  }else if(recognizer||recognizerActive||recognizing||restartScheduled){
    stopSpeech(true,'mic_off');
  }else{
    log('mic_off_stop_skip',{atMs:Date.now()},'warn');
  }
  syncMic();
}
function toggleCam(){if(!videoStream)return;camOn=!camOn;videoStream.getVideoTracks().forEach(function(t){t.enabled=camOn});syncCam()}
function hangUp(){relaySend({type:'hangup'});cleanUp()}
function cleanUp(){
  saveTr();stopSpeech(false,'cleanup');resetSpeechState();speechBlockedUntil=0;recentFinals=[];clearTimeout(wsReconnectTimer);wsReconnectTimer=null;
  if(videoStream){videoStream.getTracks().forEach(function(t){t.stop()});videoStream=null}
  logLocalMediaState('cleanup_after_stop');
  if(pc){pc.close();pc=null}lastLocalDescription=null;helloResentByPeer={};room.id=null;room.solo=false;stopHB();if(ws)try{ws.close()}catch(_){}ws=null;
  $('call-screen').classList.remove('active');$('lobby').classList.remove('hidden');setLS(LS.setup);
  $('subtitle-area').innerHTML='';$('no-video-msg').style.display='';
  $('partner-speaking-indicator').classList.remove('show');clearTimeout(partnerSpeakTimer);
  $('call-screen').classList.remove('transcript-collapsed');transcriptCollapsed=false;setTranscriptMore(false);syncTranscriptToggleButton();
  transcriptTtsOn=false;syncTranscriptTtsButton();if(window.speechSynthesis)window.speechSynthesis.cancel();
  document.querySelector('.call-videos').classList.remove('swapped');
  resetRemoteMediaState();
  transcript=[];micOn=true;wantSpeech=true;camOn=true;syncMic();syncCam();callHistoryPushed=false;renderRecent();
}

populateLangs();renderRecent();syncMic();syncCam();syncTranscriptToggleButton();syncTranscriptTtsButton();
loadCcPrefs();syncCcPrefsInputs();
$('call-transcript').addEventListener('scroll',function(){if(transcriptNearBottom())setTranscriptMore(false)});
$('transcript-body').addEventListener('click',function(ev){
  var btn=ev.target&&ev.target.closest?ev.target.closest('.tr-tts'):null;
  if(!btn)return;
  var text=btn.getAttribute('data-tts-text')||'';
  var lang=btn.getAttribute('data-tts-lang')||room.myLang||'en';
  speakText(text,lang);
});
$('local-video').addEventListener('click',swapVideos);
$('remote-video').addEventListener('click',swapVideos);
$('remote-video').addEventListener('loadedmetadata',refreshRemoteVideo);
var hp=new URLSearchParams((location.hash||'').replace(/^#/,''));var inv=hp.get('j');if(inv){var p=decInv(inv);if(p&&p.r)handleHash(p)}
window.addEventListener('popstate',function(){if(lobbyState===LS.call&&room.id){hangUp();history.pushState({},'',location.href);return}if(lobbyState===LS.waiting)setLS(LS.setup)});
window.addEventListener('visibilitychange',function(){
  var now=Date.now();
  var state=document.hidden?'hidden':'visible';
  var since=now-lastVisibilityChangeTs;
  log('visibility_change',{state:state,sinceMs:since,wantSpeech:wantSpeech,callActive:isCallActive()},'warn');
  if(state===lastVisibilityState&&since<350){log('visibility_ignored_repeat',{state:state,sinceMs:since},'warn');return}
  lastVisibilityState=state;lastVisibilityChangeTs=now;
  if(now-lastVisibilitySpeechActionTs<700){log('visibility_speech_guard',{state:state,sinceSpeechActionMs:now-lastVisibilitySpeechActionTs},'warn');return}
  if(document.hidden){
    lastVisibilitySpeechActionTs=now;
    if(recognizer||recognizerActive||recognizing||restartScheduled){
      flushSpeechRuntime('hidden');
      stopSpeech(true,'visibility_hidden');
    }else log('visibility_hidden_noop',{atMs:now},'warn');
    return;
  }
  if(wantSpeech&&isCallActive()){
    lastVisibilitySpeechActionTs=now;
    scheduleSpeechRestart('visible',600);
  }
});
window.addEventListener('pagehide',function(){log('pagehide',{roomId:room.id||null},'warn');stopSpeech(false,'pagehide');resetSpeechState();if(room.id){saveTr();relaySend({type:'hangup',reason:'pagehide'})}});
</script>
