<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>AI Jobs Kanban</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
:root{
  --bg:#eef2f7;
  --panel:#ffffff;
  --text:#111;
  --muted:#666;
  --accent:#1f6feb;
  --border:#d5dce7;
  --danger:#b3261e;
  --highlight:#ff7a00;
  --search:#14532d;
  --ok:#166534;
  --err:#7f1d1d;
}
*{box-sizing:border-box}
html,body{height:100%}
body{margin:0;font-family:system-ui,Segoe UI,Roboto,Ubuntu,Cantarell,Noto Sans,sans-serif;background:linear-gradient(180deg,#f4f7fb 0%, #e9eef5 100%);color:var(--text)}
header{position:sticky;top:0;z-index:20;background:var(--panel);border-bottom:1px solid var(--border);}
.toolbar{padding:10px 16px;display:flex;gap:8px;align-items:center;flex-wrap:nowrap;white-space:nowrap;overflow:auto}
.toolbar .btn{flex:0 0 auto}
.searchbar{padding:10px 16px;border-top:1px solid var(--border);display:grid;grid-template-columns:auto auto 1fr auto auto auto;gap:8px;align-items:center}
#search{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:10px;font-size:15px}
#projectScope,#boardScope{padding:10px 12px;border:1px solid var(--border);border-radius:10px;font-size:14px;background:#fff;min-width:160px}
#btnClearSearch{padding:8px 10px;border:1px solid var(--border);background:#fff;border-radius:8px;cursor:pointer}
.btn{padding:10px 14px;border:1px solid var(--border);background:var(--panel);border-radius:10px;cursor:pointer;font-weight:600}
.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn.danger{background:var(--danger);color:#fff;border-color:var(--danger)}
.btn.small{padding:6px 8px;font-size:12px}
.btn.icon{padding:4px 8px;font-size:14px;line-height:1}
.btn.icon-btn{padding:8px;width:40px;height:40px;display:inline-flex;align-items:center;justify-content:center;color:#666}
.btn.icon-btn svg{width:20px;height:20px;fill:currentColor}
.btn.icon-btn:hover{color:#333;background:#f4f4f6}
.btn:disabled{opacity:.6;cursor:not-allowed}
.footer{padding:8px 16px;color:var(--muted);font-size:12px;text-align:right}

/* Layout */
main#board{padding:16px;gap:16px;align-items:start;}
main#board[data-layout="horizontal"], main#board[data-layout="auto"]{display:grid;grid-template-columns:repeat(auto-fit, minmax(320px,1fr));}
main#board[data-layout="vertical"]{display:flex;flex-direction:column}

/* Orientation-aware overrides when in AUTO layout */
@media (orientation:portrait){
  /* compact toolbar keep on one line */
  .toolbar{gap:6px}
  .btn{padding:8px 10px;font-size:14px}
  main#board[data-layout="auto"]{grid-template-columns:1fr} /* stack lanes in portrait */
}
@media (orientation:landscape){
  main#board[data-layout="auto"]{grid-template-columns:repeat(auto-fit, minmax(300px,1fr))} /* side-by-side lanes in landscape */
}

/* Lanes */
.lane{background:var(--panel);border:1px solid var(--border);border-radius:14px;display:flex;flex-direction:column;min-height:0;box-shadow:0 8px 24px rgba(15,23,42,.06)}
.lane.lane-drop-highlight{border-color:var(--highlight);box-shadow:0 0 0 2px var(--highlight) inset}
.lane-header{padding:10px 12px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;font-weight:700;gap:8px}
.lane-header.dragging-lane{opacity:.6}
.lane-title{display:flex;align-items:center;gap:8px}
.lane-title-text{color:var(--text)}
.lane-chevron{border:none;background:transparent;padding:0 2px;font-size:16px;line-height:1;color:#111;cursor:pointer}
.lane-chevron[disabled]{color:#9ca3af;cursor:default}
.lane-actions{display:flex;align-items:center;gap:6px}
.lane-body{padding:8px;display:flex;flex-direction:column;gap:8px;min-height:0}
.lane-body.collapsed{display:none}
main#board[data-layout="vertical"] .lane-body{padding-inline:16px;touch-action:pan-y}
main#board[data-layout="vertical"] .card{margin-inline:6px}

/* Cards */
.card{
  background:#ffffff;
  border:2px solid var(--border); /* grey oval border */
  border-radius:14px;
  display:flex;flex-direction:column;gap:6px;
  padding:8px 12px;
  cursor:grab;
  min-height:46px;
  box-shadow:0 4px 14px rgba(15,23,42,.06);
  -webkit-user-drag: element;
  user-select:none;
  position:relative;
  transition:border-color .08s ease, box-shadow .08s ease;
  touch-action:manipulation;
}
.card *{ -webkit-user-drag: none; }
.card.dragging{
  opacity:.92;
  border-color:#000;             /* source card outlined black */
  box-shadow:0 0 0 2px #000 inset;
}
.card.search-hit{border-color:var(--search)}
.card-line{display:flex;align-items:center;gap:8px;flex-wrap:nowrap;width:100%;min-width:0;justify-content:flex-start}
.card-title{font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:0 1 auto;min-width:0;max-width:100%;border:none;background:transparent;padding:0;text-align:left;cursor:pointer;color:#1f6feb}
.card-platform{font-size:12px;color:var(--muted);border:1px solid var(--border);padding:2px 8px;border-radius:999px;flex:0 0 auto}
.card-links{display:inline-flex;align-items:center;gap:8px;position:relative;z-index:1;flex:0 0 auto}
.card-archive-btn{border:none;background:transparent;padding:2px;display:inline-flex;align-items:center;justify-content:center;color:#6b7280;cursor:pointer;flex:0 0 auto}
.card-archive-btn svg{width:14px;height:14px;fill:currentColor}
.card-archive-btn:hover{color:var(--danger)}
.card-links a,.card-links span{font-size:12px;text-decoration:none;color:#1f6feb}
.card-links .empty{color:#9ca3af}
.card-detail{display:flex;flex-direction:column;gap:6px}
.card-detail.collapsed{display:none}
.card-edit-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:6px}
.card-edit-grid .full{grid-column:1/-1}
.card-edit-field{display:flex;flex-direction:column;gap:4px;min-width:0}
.card-edit-field label{font-size:11px;color:var(--muted);font-weight:600}
.card-edit-field input,.card-edit-field select,.card-edit-field textarea{width:100%;border:1px solid var(--border);border-radius:8px;padding:6px 8px;font:inherit;background:#fff;color:inherit}
.card-edit-field textarea{resize:vertical;min-height:72px}
.live-notes-preview{border:1px solid var(--border);border-radius:8px;background:#f8fafc;padding:10px;min-height:72px;font-size:13px;line-height:1.4}
.live-notes-preview:empty::before{content:"Rendered markdown";color:#94a3b8}
.live-notes-preview p{margin:0 0 8px}
.live-notes-preview p:last-child{margin-bottom:0}
.live-notes-preview ul,.live-notes-preview ol{margin:0 0 8px 18px;padding:0}
.live-notes-preview code{background:#e2e8f0;padding:1px 4px;border-radius:4px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px}
.live-notes-preview pre{margin:0 0 8px;background:#0f172a;color:#e2e8f0;padding:8px;border-radius:8px;overflow:auto}
.live-notes-preview a{color:#1d4ed8;text-decoration:none}
.card-tags{display:flex;gap:6px;flex-wrap:wrap}
.chip{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--border);border-radius:999px;padding:2px 8px;background:#fff;font-size:12px}
.chip button{border:none;background:transparent;outline:none;padding:0;margin:0;cursor:pointer;font-size:13px;font-weight:800;line-height:1;color:#444}
.chip button:hover{color:#000}
/* Landing target outline (orange) */
.drop-highlight{ border-color:var(--highlight) !important; box-shadow:0 0 0 2px var(--highlight) inset; }

/* Dialogs */
.hidden{display:none}
dialog{border:none;border-radius:14px;padding:0;width:min(900px,96vw)}
.modal{position:relative;padding:16px;background:var(--panel);border:1px solid var(--border);border-radius:14px}
.modal .modal-close{position:absolute;top:10px;right:12px;border:none;background:transparent;font-weight:800;font-size:18px;cursor:pointer;color:#777;line-height:1;padding:2px 6px;border-radius:8px}
.modal .modal-close:hover{color:#000;background:#f2f2f6}
.field{display:flex;flex-direction:column;gap:6px;margin:10px 0}
.field input,.field textarea,.field select{border:1px solid var(--border);border-radius:10px;padding:10px;font-size:14px;width:100%}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}

/* Notes textarea scrollable */
#fNotes{max-height:40vh;overflow:auto;resize:vertical}

/* Search preview */
.results{position:sticky;top:96px;margin:0 16px 8px 16px;background:var(--panel);border:1px solid var(--border);border-radius:10px;max-height:260px;overflow:auto}
.result-item{padding:10px 12px;border-top:1px solid var(--border);cursor:pointer}
.result-item:first-child{border-top:none}
.result-item:hover{background:#f1f5ff}
.muted{color:var(--muted);font-size:12px}
.timepill{font-size:12px;color:#555;border:1px solid var(--border);padding:2px 8px;border-radius:999px;margin-left:8px}

/* Tooltip */
#tooltip{position:fixed;z-index:50;pointer-events:none;background:#fff;color:#111;border:1px solid var(--border);border-radius:12px;box-shadow:0 8px 28px rgba(0,0,0,.12);padding:10px 12px;max-width:360px;display:none}
#tooltip .t-title{font-weight:800;margin-bottom:4px}
#tooltip .t-meta{font-size:12px;color:#888;margin-bottom:4px}
#tooltip .t-tags{font-size:12px;color:#666;margin-bottom:6px}
#tooltip .t-notes{font-size:13px;white-space:pre-wrap;max-height:120px;overflow:auto}
#tooltip .t-notes a{color:#1f6feb;text-decoration:none}
#tooltip .t-notes img{max-width:100%;height:auto;border-radius:8px;margin-top:6px}

/* Toast */
#toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:#fff;border:1px solid var(--border);box-shadow:0 8px 24px rgba(0,0,0,.18);border-left:6px solid var(--ok);padding:10px 14px;border-radius:12px;display:none;z-index:60;min-width:260px}
#toast.err{border-left-color:var(--err)}
#toast .tmsg{font-weight:700}
#toast .tdesc{font-size:12px;color:#555;margin-top:2px}

/* Responsive tightening */
@media (max-width:900px){
  .searchbar{grid-template-columns:1fr auto auto;grid-template-areas:"project board board" "search clear count" "scope scope scope"}
  #projectScope{grid-area:project}
  #boardScope{grid-area:board}
  #search{grid-area:search}
  #btnClearSearch{grid-area:clear}
  #searchCount{grid-area:count}
  #searchScopeStatus{grid-area:scope}
  main#board[data-layout="horizontal"], main#board[data-layout="auto"]{grid-template-columns:1fr}
}
</style>
</head>
<body>
<header>
  <div class="toolbar">
    <button id="btnNew" class="btn icon-btn" title="New card" aria-label="New card">+</button>
    <button id="btnSettings" class="btn icon-btn" title="Settings" aria-label="Settings">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M19.14 12.94c.04-.31.06-.63.06-.94s-.02-.63-.06-.94l2.03-1.58a.5.5 0 0 0 .12-.64l-1.92-3.32a.5.5 0 0 0-.6-.22l-2.39.96a7.18 7.18 0 0 0-1.63-.94l-.36-2.54a.5.5 0 0 0-.49-.42h-3.84a.5.5 0 0 0-.49.42L9.2 5.32c-.58.23-1.12.54-1.63.94l-2.39-.96a.5.5 0 0 0-.6.22L2.66 8.84a.5.5 0 0 0 .12.64l2.03 1.58c-.04.31-.06.63-.06.94s.02.63.06.94l-2.03 1.58a.5.5 0 0 0-.12.64l1.92 3.32c.13.22.39.31.6.22l2.39-.96c.5.4 1.05.72 1.63.94l.36 2.54c.04.24.24.42.49.42h3.84c.25 0 .45-.18.49-.42l.36-2.54c.58-.23 1.12-.54 1.63-.94l2.39.96c.22.09.47 0 .6-.22l1.92-3.32a.5.5 0 0 0-.12-.64l-2.03-1.58ZM12 15.5A3.5 3.5 0 1 1 12 8a3.5 3.5 0 0 1 0 7.5Z"/></svg>
    </button>
    <button id="btnExport" class="btn icon-btn" title="Export JSON" aria-label="Export JSON">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 20h14v-2H5v2Zm7-16v9.17l3.09-3.08 1.41 1.41L12 17l-4.5-5.5 1.41-1.41L11 13.17V4h1Z"/></svg>
    </button>
    <button id="btnImport" class="btn icon-btn" title="Import JSON" aria-label="Import JSON">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 13h10.17l-3.58 3.59L12 18l6-6-6-6-1.41 1.41L14.17 11H4v2Z"/></svg>
    </button>
    <button id="btnShare" class="btn icon-btn" title="Share" aria-label="Share">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 16a3 3 0 0 0-2.39 1.2l-6.71-3.35a3.1 3.1 0 0 0 0-1.7l6.7-3.35A3 3 0 1 0 15 7a3.1 3.1 0 0 0 .1.75l-6.7 3.35a3 3 0 1 0 0 1.8l6.7 3.35A3 3 0 1 0 18 16Z"/></svg>
    </button>
    <input id="fileImport" type="file" accept="application/json" class="hidden" aria-hidden="true" tabindex="-1" />
  </div>
  <div class="searchbar">
    <select id="projectScope" aria-label="Project filter"></select>
    <select id="boardScope" aria-label="Board filter"></select>
    <input id="search" placeholder="Omni search… (use -term to exclude)" aria-label="Omni search"/>
    <button id="btnClearSearch" title="Clear search">×</button>
    <span class="muted" id="searchCount"></span>
    <span class="muted" id="searchScopeStatus"></span>
  </div>
</header>

<div id="resultsContainer"></div>
<main id="board" aria-live="polite" data-layout="auto"></main>
<div class="footer" id="status"></div>
<div id="toast"><div class="tmsg"></div><div class="tdesc"></div></div>

<dialog id="editDialog">
  <form method="dialog" class="modal" id="editForm">
    <button type="button" id="editorCloseBtn" class="modal-close" title="Close">×</button>
    <h3 id="editTitle">Card</h3>

    <div class="field">
      <label for="fTitle">Title</label>
      <div class="row">
        <input id="fTitle" placeholder="Short title" autofocus/>
        <button id="btnSaveAndNew" class="btn small primary" value="save_new">Save & New</button>
      </div>
    </div>

    <div class="grid-2">
      <div class="field">
        <label for="fPlatform">Platform</label>
        <select id="fPlatform"></select>
      </div>
      <div class="field">
        <label for="fStage">Lane</label>
        <select id="fStage"></select>
      </div>
    </div>

    <div class="grid-2">
      <div class="field">
        <label for="fDev">Dev Link</label>
        <input id="fDev" type="url" placeholder="https://…"/>
      </div>
      <div class="field">
        <label for="fLive">Live Link</label>
        <input id="fLive" type="url" placeholder="https://…"/>
      </div>
    </div>

    <div class="field">
      <label>Tags</label>
      <div id="tagChips" class="chips" aria-live="polite"></div>
      <div class="tag-input-row">
        <input id="tagInput" placeholder="type a tag, press Enter" />
      </div>
      <div class="suggestions" id="tagSuggestions" aria-label="Previously used tags"></div>
      <input id="fTags" class="hidden" />
    </div>

    <div class="field">
      <label for="fFiles">Attachments</label>
      <div class="row">
        <input id="fFiles" type="file" multiple />
        <button id="btnClearFiles" type="button" class="btn small">Clear selection</button>
      </div>
      <div id="fileChips" class="chips" aria-live="polite"></div>
    </div>

    <div class="field">
      <label for="fNotes">Notes (Markdown supported)</label>
      <textarea id="fNotes" rows="6" placeholder="Paste images here (from clipboard) or type/paste URLs…"></textarea>
    </div>

    <div class="row">
      <button class="btn primary" value="save" id="btnSave">Save</button>
      <button class="btn" value="cancel" id="btnCancel">Cancel</button>
      <button id="btnDelete" class="btn danger" value="delete">Archive</button>
    </div>
  </form>
</dialog>

<dialog id="archiveDialog">
  <form method="dialog" class="modal">
    <h3>Archive</h3>
    <div id="archiveList" style="max-height:60vh; overflow:auto; margin-top:8px;"></div>
    <div class="row" style="margin-top:10px;">
      <button class="btn danger" value="empty" id="btnEmptyArchive">Empty Archive</button>
      <button class="btn" value="close">Close</button>
    </div>
  </form>
</dialog>

<dialog id="searchDialog">
  <form method="dialog" class="modal">
    <h3>Search results</h3>
    <div id="searchList" style="max-height:60vh; overflow:auto;"></div>
    <div class="row" style="margin-top:10px;">
      <button class="btn" value="close">Close</button>
    </div>
  </form>
</dialog>

<dialog id="settingsDialog">
  <form method="dialog" class="modal" id="settingsForm">
    <h3>Settings</h3>
    <div class="field">
      <label for="sPlatforms">Platforms (comma-separated)</label>
      <input id="sPlatforms" value="Gemini, Claude, ChatGPT, Perplexity"/>
    </div>
    <div class="field">
      <label for="sStages">Stages (left→right, top→bottom order)</label>
      <input id="sStages" value="Done, Doing, Next"/>
    </div>
    <div class="field">
      <label for="sLayout">Lanes layout</label>
      <select id="sLayout">
        <option value="auto" selected>Auto (portrait stacked, landscape side-by-side)</option>
        <option value="horizontal">Horizontal</option>
        <option value="vertical">Vertical</option>
      </select>
    </div>
    <div class="field">
      <label>Copy & paste these status emojis</label>
      <div id="emojiBox" style="border:1px dashed var(--border);border-radius:10px;padding:8px 10px;user-select:all">🟢 🟡 🔴 ⭐ 😡 🤬 🙃 😃</div>
    </div>
    <div class="row">
      <button class="btn primary" value="save">Apply</button>
      <button class="btn" value="cancel">Cancel</button>
      <button type="button" class="btn" id="btnOpenArchive">Archive</button>
      <button class="btn danger" id="btnReset" value="reset">Reset Board</button>
    </div>
  </form>
</dialog>

<div id="tooltip" role="tooltip" aria-hidden="true">
  <div class="t-title"></div>
  <div class="t-meta"></div>
  <div class="t-tags"></div>
  <div class="t-notes"></div>
</div>

<script>
const BUILD = "2026-03-07";
/* ===== Persistence ===== */
const STABLE_KEY = "ai_jobs_kanban";
const TAGS_KEY = "ai_jobs_kanban_tags";
const SEARCH_SCOPE_PROJECT_KEY = "ai_jobs_kanban_search_scope_project";
const SEARCH_SCOPE_BOARD_KEY = "ai_jobs_kanban_search_scope_board";
const SYNC_ENDPOINT_KEY = "ai_jobs_kanban_sync_endpoint";
const LEGACY_KEYS = ["ai_jobs_kanban_v3","ai_jobs_kanban_v4","ai_jobs_kanban_v5","ai_jobs_kanban_v6","ai_jobs_kanban_v7"];
let dirty=false, saveTimer=null;
function trySave(key, value){ try{ localStorage.setItem(key, value); return localStorage.getItem(key)===value; }catch(e){ console.warn(e); return false; } }
async function persistNow(){
  state.lastModified=Date.now();
  const result=await syncProvider.saveSnapshot(state);
  if(result.ok){
    setStatus(`Saved via ${result.provider} • Build ${BUILD} • ${new Date().toLocaleTimeString()}`);
  }else{
    toast("Save warning", result.message || "Failed to save snapshot", true);
    setStatus(`Save failed • ${result.message||"Unknown sync failure"} • Build ${BUILD}`);
  }
  dirty=false;
}
function scheduleSave(){ dirty=true; clearTimeout(saveTimer); saveTimer=setTimeout(persistNow, 250); }
function loadState(){
  let raw = localStorage.getItem(STABLE_KEY);
  if(!raw){ for(let i=LEGACY_KEYS.length-1;i>=0;i--){ raw=localStorage.getItem(LEGACY_KEYS[i]); if(raw) break; } if(raw) trySave(STABLE_KEY, raw); }
  if(raw){
    try{
      const normalized = normalizeImportedState(JSON.parse(raw));
      if(normalized.ok) return normalized.state;
    }catch{}
  }
  return null;
}
function loadTagHistory(){ try{ const arr=JSON.parse(localStorage.getItem(TAGS_KEY)||"[]"); return Array.isArray(arr)?arr:[]; }catch{ return []; } }
function saveTagHistory(list){ const uniq=[...new Set(list.map(t=>String(t).toLowerCase()))]; trySave(TAGS_KEY, JSON.stringify(uniq)); return uniq; }

/* ===== App State ===== */
const persistedState = loadState();
let state = persistedState || {
  stages:["Done","Doing","Next"],
  platforms:["Gemini","Claude","ChatGPT","Perplexity"],
  cards:[],
  archive:[],
  collapsed:{},
  cardCollapsed:{},
  layout:"auto",
  lastModified:Date.now()
};
state.collapsed = state.collapsed || {};
state.cardCollapsed = state.cardCollapsed || {};
state.layout = state.layout || "auto";
state.archive = Array.isArray(state.archive)? state.archive : [];
state.lastModified = Number(state.lastModified||Date.now());
let selectedProjectScope = localStorage.getItem(SEARCH_SCOPE_PROJECT_KEY) || "all";
let selectedBoardScope = localStorage.getItem(SEARCH_SCOPE_BOARD_KEY) || "all";
let tagHistory = loadTagHistory();

function cardScopeMeta(card){
  return {
    projectId: card.projectId || "default-project",
    projectName: card.projectName || "Default Project",
    boardId: card.boardId || "default-board",
    boardName: card.boardName || "Default Board"
  };
}
function saveScopeSelection(){
  trySave(SEARCH_SCOPE_PROJECT_KEY, selectedProjectScope);
  trySave(SEARCH_SCOPE_BOARD_KEY, selectedBoardScope);
}
function getScopeOptions(){
  const projects = new Map();
  (state.cards||[]).forEach(card=>{
    const meta = cardScopeMeta(card);
    if(!projects.has(meta.projectId)) projects.set(meta.projectId, {id:meta.projectId, name:meta.projectName, boards:new Map()});
    const project = projects.get(meta.projectId);
    if(!project.boards.has(meta.boardId)) project.boards.set(meta.boardId, {id:meta.boardId, name:meta.boardName});
  });
  if(!projects.size){
    projects.set("default-project", {id:"default-project", name:"Default Project", boards:new Map([["default-board", {id:"default-board", name:"Default Board"}]])});
  }
  return Array.from(projects.values()).map(p=>({...p, boards:Array.from(p.boards.values())}));
}
function syncScopeSelectors(){
  const projectSel = $("#projectScope");
  const boardSel = $("#boardScope");
  if(!projectSel || !boardSel) return;
  const projects = getScopeOptions();

function createCard(data){

  const c={ id:uid(), title:(data.title||"").trim(), platform:data.platform||state.platforms[0]||"General", stage, dev:normalizeUrl(data.dev), live:normalizeUrl(data.live), tags:normalizeTags(data.tags), notes:preprocessNotes(data.notes), pos:topPos(stage), createdAt:now, updatedAt:now, files:(data.files||[]) };

  if(Object.prototype.hasOwnProperty.call(patch,"dev")) patch.dev=normalizeUrl(patch.dev);
  if(Object.prototype.hasOwnProperty.call(patch,"live")) patch.live=normalizeUrl(patch.live);
  if(Object.prototype.hasOwnProperty.call(patch,"notes")) patch.notes=preprocessNotes(patch.notes);
  Object.assign(c, patch); c.tags=normalizeTags(c.tags); c.updatedAt=Date.now(); bumpTagHistory(c.tags); scheduleSave(); render(); focusCard(c.id);
}

  scheduleSave(); render();
}

function normalizeImportedState(raw){
  if(!raw || typeof raw !== "object") return {ok:false, state:null, message:"Expected a JSON object for import."};

  const defaultStages=["Done","Doing","Next"];
  const defaultPlatforms=["Gemini","Claude","ChatGPT","Perplexity"];
  const defaultProjectName="Default Project";
  const defaultBoardName="Default Board";
  const cleanText=(value, fallback="")=>{ const s=String(value??"").trim(); return s || fallback; };
  const asArray=(value)=> Array.isArray(value) ? value : null;
  const uniqNonEmpty=(list)=>[...new Set((list||[]).map(item=>cleanText(item)).filter(Boolean))];
  const normalizeLayout=(value)=>["auto","horizontal","vertical"].includes(value) ? value : "auto";
  const normalizeCard=(card, fallbackStage, boardPlatforms, scope)=>{
    const src=(card && typeof card==="object") ? card : {};
    const stage=cleanText(src.stage, fallbackStage);
    const platform=cleanText(src.platform, boardPlatforms[0] || defaultPlatforms[0]);
    return {
      ...src,
      id: cleanText(src.id, uid()),
      title: cleanText(src.title, "Untitled"),
      stage,
      platform,
      tags: Array.isArray(src.tags) ? src.tags.map(t=>cleanText(t)).filter(Boolean) : [],
      files: Array.isArray(src.files) ? src.files.filter(f=>f && typeof f==="object") : [],
      projectId: cleanText(src.projectId, scope.projectId),
      projectName: cleanText(src.projectName, scope.projectName),
      boardId: cleanText(src.boardId, scope.boardId),
      boardName: cleanText(src.boardName, scope.boardName),
      createdAt: Number(src.createdAt||Date.now()),
      updatedAt: Number(src.updatedAt||Date.now())
    };
  };

  const missing=[];
  const normalized={
    stages:[],
    platforms:[],
    cards:[],
    archive: Array.isArray(raw.archive) ? raw.archive : [],
    collapsed: (raw.collapsed && typeof raw.collapsed==="object") ? raw.collapsed : {},
    cardCollapsed: (raw.cardCollapsed && typeof raw.cardCollapsed==="object") ? raw.cardCollapsed : {},
    layout: normalizeLayout(raw.layout),
    lastModified: Number(raw.lastModified||Date.now())
  };

  const hasFlatSchema = Array.isArray(raw.cards) || Array.isArray(raw.stages) || Array.isArray(raw.platforms);
  if(hasFlatSchema){
    const stages=asArray(raw.stages);
    const platforms=asArray(raw.platforms);
    const cards=asArray(raw.cards);
    if(!stages) missing.push("stages[]");
    if(!platforms) missing.push("platforms[]");
    if(!cards) missing.push("cards[]");
    if(missing.length){
      return {ok:false, state:null, missingFields:missing, message:`Missing required fields for flat schema: ${missing.join(", ")}`};
    }
    normalized.stages = uniqNonEmpty(stages);
    normalized.platforms = uniqNonEmpty(platforms);
    if(!normalized.stages.length) normalized.stages = [...defaultStages];
    if(!normalized.platforms.length) normalized.platforms = [...defaultPlatforms];
    const scope={projectId:"default-project", projectName:defaultProjectName, boardId:"default-board", boardName:defaultBoardName};
    normalized.cards = cards.map(card=>normalizeCard(card, normalized.stages[0], normalized.platforms, scope));
    return {ok:true, state:normalized, schema:"flat"};
  }

  const sourceProjects = Array.isArray(raw.projects) ? raw.projects : [{
    id: raw.projectId || "default-project",
    name: raw.projectName || raw.project || defaultProjectName,
    boards: Array.isArray(raw.boards) ? raw.boards : (raw.board ? [raw.board] : [])
  }];
  if(!sourceProjects.length){
    return {ok:false, state:null, missingFields:["projects[]/boards[]"], message:"Missing required fields for hierarchical schema: projects[] or boards[]"};
  }

  sourceProjects.forEach((project, pIndex)=>{
    const projectObj=(project && typeof project==="object") ? project : {};
    const projectId=cleanText(projectObj.id, `project-${pIndex+1}`);
    const projectName=cleanText(projectObj.name || projectObj.title, defaultProjectName);
    const boards = Array.isArray(projectObj.boards) ? projectObj.boards : (projectObj.board ? [projectObj.board] : []);
    if(!boards.length){
      const boardSource = pIndex===0 && (raw.board || raw.boards) ? (Array.isArray(raw.boards) ? raw.boards : [raw.board]) : [];
      boards.push(...boardSource);
    }
    if(!boards.length){
      missing.push(`projects[${pIndex}].boards[]`);
      return;
    }
    boards.forEach((board, bIndex)=>{
      const boardObj=(board && typeof board==="object") ? board : {};
      const boardId=cleanText(boardObj.id, `${projectId}-board-${bIndex+1}`);
      const boardName=cleanText(boardObj.name || boardObj.title, defaultBoardName);
      const stages = uniqNonEmpty(asArray(boardObj.stages) || asArray(raw.stages) || []);
      const platforms = uniqNonEmpty(asArray(boardObj.platforms) || asArray(raw.platforms) || []);
      const cards = asArray(boardObj.cards);
      if(!cards) missing.push(`projects[${pIndex}].boards[${bIndex}].cards[]`);
      if(!stages.length) missing.push(`projects[${pIndex}].boards[${bIndex}].stages[]`);
      if(!platforms.length) missing.push(`projects[${pIndex}].boards[${bIndex}].platforms[]`);
      if(!cards || !stages.length || !platforms.length) return;
      normalized.stages.push(...stages);
      normalized.platforms.push(...platforms);
      const scope={projectId, projectName, boardId, boardName};
      cards.forEach(card=> normalized.cards.push(normalizeCard(card, stages[0], platforms, scope)));
      if(Array.isArray(boardObj.archive)) normalized.archive.push(...boardObj.archive);
      if(boardObj.collapsed && typeof boardObj.collapsed==="object") Object.assign(normalized.collapsed, boardObj.collapsed);
      if(boardObj.cardCollapsed && typeof boardObj.cardCollapsed==="object") Object.assign(normalized.cardCollapsed, boardObj.cardCollapsed);
      if(boardObj.layout) normalized.layout = normalizeLayout(boardObj.layout);
    });
  });

  if(!normalized.cards.length || !normalized.stages.length || !normalized.platforms.length){
    const requiredMissing=[
      normalized.cards.length ? null : "cards[]",
      normalized.stages.length ? null : "stages[]",
      normalized.platforms.length ? null : "platforms[]",
      ...missing
    ].filter(Boolean);
    return {ok:false, state:null, missingFields:requiredMissing, message:`Missing required fields for hierarchical schema: ${requiredMissing.join(", ")}`};
  }

  normalized.stages = uniqNonEmpty(normalized.stages);
  normalized.platforms = uniqNonEmpty(normalized.platforms);
  return {ok:true, state:normalized, schema:"hierarchical"};
}
function getSyncEndpoint(){ return localStorage.getItem(SYNC_ENDPOINT_KEY)||""; }
function setSyncEndpoint(url){ return trySave(SYNC_ENDPOINT_KEY, String(url||"").trim()); }
function createLocalSyncProvider(){
  return {
    name:"localStorage",
    async loadSnapshot(){
      const raw=localStorage.getItem(STABLE_KEY);
      if(!raw) return {ok:true, provider:this.name, snapshot:null, message:"No local snapshot found"};
      try{
        const normalized=normalizeImportedState(JSON.parse(raw));
        if(!normalized.ok) return {ok:false, provider:this.name, snapshot:null, message:normalized.message||"Local snapshot invalid"};
        normalized.state.lastModified=Number(normalized.state.lastModified||Date.now());
        return {ok:true, provider:this.name, snapshot:normalized.state, message:`Loaded local snapshot (${new Date(normalized.state.lastModified).toLocaleTimeString()})`};
      }catch(err){
        return {ok:false, provider:this.name, snapshot:null, message:`Failed to parse local snapshot: ${err?.message||err}`};
      }
    },
    async saveSnapshot(nextState){
      const ok=trySave(STABLE_KEY, JSON.stringify(nextState));
      return {ok, provider:this.name, message:ok? "Snapshot stored in localStorage" : "Local storage write failed"};
    },
    async healthCheck(){
      try{
        const testKey="__sync_health_probe__";
        localStorage.setItem(testKey, "ok");
        localStorage.removeItem(testKey);
        return {ok:true, provider:this.name, message:"localStorage available"};
      }catch(err){
        return {ok:false, provider:this.name, message:`localStorage unavailable: ${err?.message||err}`};
      }
    }
  };
}
function createRemoteSyncProvider(endpoint){
  const cleanEndpoint=String(endpoint||"").trim();
  return {
    name:"remote",
    endpoint:cleanEndpoint,
    async loadSnapshot(){
      if(!this.endpoint) return {ok:false, provider:this.name, snapshot:null, message:"No sync endpoint configured"};
      try{
        const res=await fetch(this.endpoint, {cache:"no-store"});
        if(!res.ok) return {ok:false, provider:this.name, snapshot:null, message:`Endpoint returned ${res.status}`};
        const txt=await res.text();
        const parsed=parseBoardPayload(txt);
        if(!parsed.ok) return {ok:false, provider:this.name, snapshot:null, message:parsed.message||"Endpoint payload is not a valid board snapshot"};
        parsed.state.lastModified=Number(parsed.state.lastModified||Date.now());
        return {ok:true, provider:this.name, snapshot:parsed.state, message:`Remote snapshot loaded (${new Date(parsed.state.lastModified).toLocaleTimeString()})`};
      }catch(err){
        return {ok:false, provider:this.name, snapshot:null, message:`Remote load failed: ${err?.message||err}`};
      }
    },
    async saveSnapshot(nextState){
      if(!this.endpoint) return {ok:false, provider:this.name, message:"No sync endpoint configured"};
      try{
        const res=await fetch(this.endpoint, {
          method:"PUT",
          headers:{"Content-Type":"application/json"},
          body:JSON.stringify(nextState)
        });
        if(!res.ok) return {ok:false, provider:this.name, message:`Remote save failed (${res.status})`};
        return {ok:true, provider:this.name, message:"Remote save acknowledged"};
      }catch(err){
        return {ok:false, provider:this.name, message:`Remote save failed: ${err?.message||err}`};
      }
    },
    async healthCheck(){
      if(!this.endpoint) return {ok:false, provider:this.name, message:"No sync endpoint configured"};
      try{
        const res=await fetch(this.endpoint, {method:"HEAD", cache:"no-store"});
        if(res.ok) return {ok:true, provider:this.name, message:`Remote endpoint healthy (${res.status})`};
      }catch{}
      try{
        const res=await fetch(this.endpoint, {method:"GET", cache:"no-store"});
        return {ok:res.ok, provider:this.name, message:res.ok? `Remote endpoint reachable (${res.status})` : `Remote endpoint unhealthy (${res.status})`};
      }catch(err){
        return {ok:false, provider:this.name, message:`Remote endpoint unreachable: ${err?.message||err}`};
      }
    }
  };
}
const localSyncProvider=createLocalSyncProvider();

function rebuildRemoteProvider(){ remoteSyncProvider=createRemoteSyncProvider(getSyncEndpoint()); }

function resolveSnapshotConflict(currentState, incomingState){
  const localStamp=Number(currentState?.lastModified||0);
  const normalized=normalizeImportedState(incomingState);
  if(!normalized.ok) return {decision:"reject", mergedState:currentState, reason:normalized.message||"Incoming snapshot invalid"};
  const remoteStamp=Number(normalized.state.lastModified||0);
  if(remoteStamp>=localStamp) return {decision:"adopt_remote", mergedState:normalized.state, reason:`Remote is newer or equal (${remoteStamp} >= ${localStamp})`};

}

}

function applyImportedBoard(obj, sourceLabel="import"){
  const normalized=normalizeImportedState(obj);

function parseBoardPayload(text){
  if(!text) return {ok:false, state:null, message:"Empty payload"};
  const raw = String(text).trim();
  if(!raw) return {ok:false, state:null, message:"Empty payload"};
  try{
    return normalizeImportedState(JSON.parse(raw));
  }catch{}
  const preMatch = raw.match(/<pre[^>]*>([\s\S]*?)<\/pre>/i);
  const candidate = preMatch?.[1] || raw;
  if(!candidate) return {ok:false, state:null, message:"Payload does not contain JSON"};
  try{
    const decoded = candidate
      .replace(/&quot;/g, '"')
      .replace(/&amp;/g, '&')
      .replace(/&lt;/g, '<')
      .replace(/&gt;/g, '>');
    return normalizeImportedState(JSON.parse(decoded.trim()));
  }catch{}
  return {ok:false, state:null, message:"Payload is not valid JSON"};
}
$("#btnImport").onclick=()=> $("#fileImport").click();
$("#fileImport").onchange=(e)=>{ const f=e.target.files?.[0]; if(!f) return; const r=new FileReader(); r.onload=()=>{ try{ const parsed=parseBoardPayload(r.result); if(!parsed.ok){ const reason=parsed.missingFields?.length ? `Missing required fields: ${parsed.missingFields.join(", ")}` : (parsed.message||"Could not parse file"); toast("Import failed", reason, true); alert(`Failed to import JSON. ${reason}`); return; } applyImportedBoard(parsed.state, "JSON file"); }catch(err){ toast("Import failed","Could not parse file", true); alert("Failed to parse JSON."); } }; r.readAsText(f); };

/* ===== Search ===== */
const searchInput=$("#search"); let searchDebounce, currentMatches=[];
const projectScopeSelect=$("#projectScope");
const boardScopeSelect=$("#boardScope");
$("#btnClearSearch").addEventListener("click", ()=>{ searchInput.value=""; applySearch(""); });
searchInput.addEventListener("input", ()=>{ clearTimeout(searchDebounce); searchDebounce=setTimeout(()=> applySearch(searchInput.value), 120); });
searchInput.addEventListener("keydown", (e)=>{ if(e.key==="Escape"){ searchInput.value=""; applySearch(""); return; } if(e.key==="Enter"){ e.preventDefault(); openSearchModal(currentMatches); } });
projectScopeSelect?.addEventListener("change", ()=>{
  selectedProjectScope = projectScopeSelect.value || "all";
  selectedBoardScope = "all";
  saveScopeSelection();
  render();
});
boardScopeSelect?.addEventListener("change", ()=>{
  selectedBoardScope = boardScopeSelect.value || "all";
  saveScopeSelection();
  render();
});
function applySearch(q){
  const {includes, excludes}=parseSearch(q||""); const all=getScopedCards().slice();
  currentMatches = filterCards(all, includes, excludes);
  highlightMatches(new Set(currentMatches.map(c=>c.id)), includes.length||excludes.length);
  renderResultsPreview(currentMatches.slice(0,120));
  $("#searchCount").textContent=(includes.length||excludes.length)? `${currentMatches.length} match(es)`:"";
  updateScopeStatus();
}
function parseSearch(q){ const parts=q.trim().toLowerCase().split(/\s+/).filter(Boolean); const includes=[], excludes=[]; for(const p of parts){ if(p.startsWith("-")&&p.length>1) excludes.push(p.slice(1)); else includes.push(p); } return {includes,excludes}; }
function haystack(c){ const meta=cardScopeMeta(c); const files = (c.files||[]).map(f=>f.name).join(" "); return [c.title,c.platform,c.stage,meta.projectName,meta.boardName,c.notes,c.dev,c.live,files,...(c.tags||[])].join(" ").toLowerCase(); }
function filterCards(cards, inc, exc){ return cards.filter(c=>{ const hay=haystack(c); for(const e of exc){ if(hay.includes(e)) return false; } for(const i of inc){ if(!hay.includes(i)) return false; } return true; }); }
function highlightMatches(idset, active){ $$(".card").forEach(el=>{ el.classList.toggle("search-hit", active && idset.has(el.dataset.id)); el.style.opacity = active && !idset.has(el.dataset.id) ? 0.35 : 1; }); }
function renderResultsPreview(cards){ const cont=$("#resultsContainer"); cont.innerHTML=""; const active=$("#search").value.trim().length>0; if(!active||!cards.length) return; const box=document.createElement("div"); box.className="results"; cards.forEach(c=>{ const meta=cardScopeMeta(c); const item=document.createElement("div"); item.className="result-item"; item.innerHTML=`<strong>${escapeHtml(c.title)}</strong><div class="muted">${escapeHtml(meta.projectName)} · ${escapeHtml(meta.boardName)} · ${escapeHtml(c.platform)} · ${escapeHtml(c.stage)}${c.tags?.length? " · #"+c.tags.join(" #"):""}</div>`; item.onclick=()=>{ openEditor(c.id); }; box.appendChild(item); }); cont.appendChild(box); }
const searchDialog=$("#searchDialog");
function openSearchModal(cards){ const list=$("#searchList"); list.innerHTML=""; if(!cards.length){ list.innerHTML="<div class='muted'>No results (active cards only)</div>"; } else { cards.forEach(c=>{ const meta=cardScopeMeta(c); const row=document.createElement("div"); row.className="result-item"; row.innerHTML=`<strong>${escapeHtml(c.title)}</strong><div class="muted">${escapeHtml(meta.projectName)} · ${escapeHtml(meta.boardName)} · ${escapeHtml(c.platform)} · ${escapeHtml(c.stage)}${c.tags?.length? " · #"+c.tags.join(" #"):""}</div>`; row.onclick=()=>{ searchDialog.close("close"); openEditor(c.id); }; list.appendChild(row); }); } searchDialog.showModal(); }

/* ===== Tooltip ===== */
const tooltip = document.getElementById("tooltip");
function showTooltip(e, card){
  tooltip.querySelector(".t-title").textContent = card.title || "(untitled)";
  tooltip.querySelector(".t-meta").textContent = `${card.platform} · ${card.stage}`;
  tooltip.querySelector(".t-tags").textContent = card.tags?.length ? "tags: " + card.tags.join(", ") : "no tags";
  tooltip.querySelector(".t-notes").innerHTML = renderMarkdown(card.notes||"");
  // Append inline previews for image attachments if not already embedded
  if(card.files && card.files.length){
    const imgs = card.files.filter(f=>/^image\//.test(f.type));
    if(imgs.length){
      const frag = document.createElement('div');
      imgs.forEach(f=>{ const im=new Image(); im.src=f.data; im.alt=f.name; im.style.maxWidth='100%'; im.style.height='auto'; im.style.marginTop='6px'; im.style.borderRadius='8px'; frag.appendChild(im); });
      tooltip.querySelector('.t-notes').appendChild(frag);
    }
  }
  tooltip.style.display = "block"; positionTooltip(e);
}
function positionTooltip(e){ const pad=12; let x=e.clientX+pad, y=e.clientY+pad; const rect=tooltip.getBoundingClientRect(); if(x+rect.width>window.innerWidth-6) x=e.clientX-rect.width-pad; if(y+rect.height>window.innerHeight-6) y=e.clientY-rect.height-pad; tooltip.style.left=x+"px"; tooltip.style.top=y+"px"; tooltip.setAttribute("aria-hidden","false"); }
function hideTooltip(){ tooltip.style.display="none"; tooltip.setAttribute("aria-hidden","true"); }

/* ===== Helpers ===== */
function fmtDate(ts){ if(!ts) return ""; const d=new Date(ts); const pad=n=>String(n).padStart(2,"0"); return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`; }
function escapeHtml(s){ return String(s||"").replace(/[&<>"']/g, m=> ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m])); }
function setStatus(t){ document.getElementById("status").textContent=t; }
function normalizeUrl(url){
  const val=String(url||"").trim();
  if(!val) return "";
  if(/^[a-zA-Z][a-zA-Z\d+\-.]*:\/\//.test(val)) return val;
  if(/^[\w.-]+\.[a-zA-Z]{2,}(?:[\/:?#]|$)/.test(val)) return `https://${val}`;
  return val;
}
function preprocessNotes(s){
  // Normalization contract:
  // - keep existing markdown links/images untouched
  // - convert only naked http/https URLs into markdown links with compact labels
  // - avoid broad rewrites so user-authored markdown remains stable
  const source=String(s||"");
  const protectedChunks=[];
  const tokenized=source.replace(/!?\[[^\]]+\]\([^\)]+\)/g, (match)=>{
    const token=`__MD_LINK_${protectedChunks.length}__`;
    protectedChunks.push(match);
    return token;
  });
  const normalized=tokenized.replace(/https?:\/\/[^\s<>"]+/g, (rawUrl)=>{
    const trimmed=rawUrl.replace(/[),.;!?]+$/g, "");
    const suffix=rawUrl.slice(trimmed.length);
    let label="link";
    try{
      const u=new URL(trimmed);
      label=(u.hostname||"").replace(/^www\./i,"") || "link";
    }catch{
      return rawUrl;
    }
    return `[${label}](${trimmed})${suffix}`;
  });
  return normalized.replace(/__MD_LINK_(\d+)__/g, (_, idx)=> protectedChunks[Number(idx)] ?? "");
}
function linkifyNotes(s){
  // Convert URLs to clickable links; keep simple, safe replacement
  return String(s||"").replace(/(https?:\/\/[^\s)]+)(?![^<]*>)/g, '<a href="$1" target="_blank" rel="noopener">$1<\/a>');
}
function inlineMarkdown(text){
  return String(text||"")
    .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
    .replace(/\*([^*]+)\*/g, "<em>$1</em>")
    .replace(/`([^`]+)`/g, "<code>$1</code>")
    .replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
}
function renderMarkdown(source){
  const withImages=sanitizeMarkdownImages(escapeHtml(source||""));
  const lines=withImages.split(/\r?\n/);
  let html="", inList=false, inCode=false;
  for(const rawLine of lines){
    const line=rawLine||"";
    if(line.startsWith("```")){ html += inCode ? "</code></pre>" : "<pre><code>"; inCode=!inCode; continue; }
    if(inCode){ html += `${line}\n`; continue; }
    const li=line.match(/^\s*[-*]\s+(.*)$/);
    if(li){ if(!inList){ html+="<ul>"; inList=true; } html += `<li>${inlineMarkdown(linkifyNotes(li[1]))}</li>`; continue; }
    if(inList){ html+="</ul>"; inList=false; }
    if(/^\s*$/.test(line)) continue;
    if(line.startsWith("### ")){ html += `<p><strong>${inlineMarkdown(linkifyNotes(line.slice(4)))}</strong></p>`; continue; }
    if(line.startsWith("## ")){ html += `<p><strong>${inlineMarkdown(linkifyNotes(line.slice(3)))}</strong></p>`; continue; }
    if(line.startsWith("# ")){ html += `<p><strong>${inlineMarkdown(linkifyNotes(line.slice(2)))}</strong></p>`; continue; }
    html += `<p>${inlineMarkdown(linkifyNotes(line))}</p>`;
  }
  if(inList) html += "</ul>";
  if(inCode) html += "</code></pre>";
  return html;
}
function sanitizeMarkdownImages(s){
  // allow markdown ![alt](data:...) to render as <img> for pasted images only
  return String(s||"").replace(/!\[[^\]]*\]\((data:image\/[a-zA-Z0-9+.-]+;base64,[^\)]+)\)/g, (m,src)=>`<img src="${src}" alt="pasted"/>`);
}
