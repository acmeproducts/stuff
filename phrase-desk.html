<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TalkBridge Curation Desk</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #161616;
            --surface2: #222222;
            --teal: #2E8B8B;
            --teal-bright: #3FC1C1;
            --text: #e8e4df;
            --text-dim: #888888;
            --text-muted: #555555;
            --red: #e74c3c;
            --green: #2ecc71;
            --radius: 14px; 
        }

        body { 
            font-family: "DM Sans", sans-serif; 
            background-color: var(--bg); 
            color: var(--text);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

        .pb-card-wrapper {
            background-color: var(--surface);
            border-radius: var(--radius);
            margin-bottom: 24px; 
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .pb-header {
            background-color: var(--surface2);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .pb-body {
            display: flex;
            padding: 0; 
        }

        .pb-col {
            flex: 1;
            padding: 24px;
            border-right: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
        }
        .pb-col:last-child { border-right: none; }

        .pb-footer {
            background-color: rgba(0,0,0,0.2);
            border-top: 1px solid rgba(255,255,255,0.05);
            padding: 16px 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .pb-input-area {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text);
            font-size: 1.1rem;
            line-height: 1.5;
            resize: none;
            overflow: hidden;
            outline: none;
        }
        .pb-input-area::placeholder { color: var(--text-muted); }

        .input-wrapper {
            transition: background-color 0.2s;
            border-radius: 8px;
            padding: 8px;
            margin: -8px; 
        }
        .input-wrapper:focus-within {
            background-color: rgba(255,255,255,0.03);
        }

        .action-icon {
            color: var(--text-muted);
            cursor: pointer;
            transition: color 0.2s;
            padding: 4px;
        }
        .action-icon:hover { color: var(--teal-bright); }

        .verdict-radio { display: none; }
        .verdict-label {
            cursor: pointer;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            border: 1px solid var(--surface2);
            color: var(--text-dim);
            background: var(--bg);
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex: 1;
        }
        .verdict-label:hover { border-color: var(--text-muted); color: var(--text); }
        .radio-good:checked + .verdict-label { background-color: var(--green); border-color: var(--green); color: #fff; }
        .radio-flag:checked + .verdict-label { background-color: var(--red); border-color: var(--red); color: #fff; }

        .utility-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            background: var(--surface2);
            border: 1px solid transparent;
            border-radius: 99px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text);
            cursor: pointer;
            transition: all 0.2s;
        }
        .utility-chip:hover { border-color: var(--text-muted); }
        .utility-chip.active { border-color: var(--teal-bright); background: var(--bg); }
        
        .badge {
            background: var(--bg);
            color: var(--text-dim);
            padding: 2px 8px;
            border-radius: 99px;
            font-size: 0.75rem;
        }
        .badge.active { background: var(--teal); color: #fff; }

        .drawer {
            border-left: 2px solid var(--surface2);
            margin-left: 12px;
            padding-left: 16px;
            margin-top: 8px;
        }

        .filter-header {
            background: rgba(22, 22, 22, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--surface2);
            position: sticky;
            top: 0;
            z-index: 40;
        }
        .filter-btn {
            background: transparent;
            border: none;
            color: var(--text-dim);
            font-weight: 600;
            font-size: 0.9rem;
            padding: 8px 16px;
            border-bottom: 2px solid transparent;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .filter-btn:hover { color: var(--text); }
        .filter-btn.active { color: var(--teal-bright); border-bottom-color: var(--teal-bright); }

        .save-flash {
            animation: flashSave 1.5s ease-out forwards;
        }
        @keyframes flashSave {
            0% { opacity: 0; color: var(--green); }
            10% { opacity: 1; color: var(--green); }
            100% { opacity: 0; color: var(--text-dim); }
        }
    </style>
</head>
<body>

    <div id="view-setup" class="flex-1 overflow-y-auto p-8 flex items-center justify-center hidden">
        <div class="max-w-xl w-full" style="background: var(--surface); border-radius: var(--radius); padding: 32px;">
            <h1 class="text-2xl font-bold mb-2 flex items-center gap-2" style="color: var(--teal-bright);">
                <i data-lucide="settings"></i> Configuration
            </h1>
            <p class="text-sm mb-6" style="color: var(--text-dim);">Set repository details to generate a session link.</p>
            <div class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="cfg-owner" class="w-full rounded p-3 text-sm focus:outline-none" style="background: var(--bg); color: var(--text);" placeholder="Owner (e.g., acmeproducts)" value="acmeproducts">
                    <input type="text" id="cfg-repo" class="w-full rounded p-3 text-sm focus:outline-none" style="background: var(--bg); color: var(--text);" placeholder="Repo (e.g., stuff)" value="stuff">
                </div>
                <input type="text" id="cfg-source" class="w-full rounded p-3 text-sm focus:outline-none" style="background: var(--bg); color: var(--text);" placeholder="Source JSON Path" value="phrasebook/phrasebook-en-th-default.json">
                <input type="text" id="cfg-target" class="w-full rounded p-3 text-sm focus:outline-none" style="background: var(--bg); color: var(--text);" placeholder="Target JSON Path" value="phrasebook/phrasebook-en-th-v1.json">
                <input type="password" id="cfg-pat" class="w-full rounded p-3 text-sm focus:outline-none" style="background: var(--bg); color: var(--text);" placeholder="Personal Access Token (PAT)">
            </div>
            <button onclick="generateLauncher()" class="w-full mt-6 py-3 rounded font-bold transition-opacity hover:opacity-90" style="background: var(--teal); color: #fff;">
                Generate Link
            </button>
            <div id="launcher-result" class="mt-4 hidden text-center">
                <div id="generated-link" class="p-3 text-xs font-mono break-all rounded mb-4" style="background: var(--bg); color: var(--teal-bright);"></div>
            </div>
        </div>
    </div>

    <div id="view-loading" class="flex-1 flex flex-col items-center justify-center hidden">
        <i data-lucide="loader-2" class="w-12 h-12 animate-spin mb-4" style="color: var(--teal-bright);"></i>
        <h2 id="loading-msg" class="text-xl font-semibold" style="color: var(--text);">Loading...</h2>
    </div>

    <div id="view-app" class="flex-1 flex flex-col hidden">
        
        <div class="filter-header flex justify-between items-center px-8 py-2">
            <div class="flex items-center gap-6">
                <h1 class="font-bold text-lg" style="color: var(--text);">Curation</h1>
                <div class="flex gap-2">
                    <button onclick="filterCards('all')" id="filter-all" class="filter-btn active">
                        All <span class="badge" id="count-total">0</span>
                    </button>
                    <button onclick="filterCards('pending')" id="filter-pending" class="filter-btn">
                        Pending <span class="badge" id="count-pending">0</span>
                    </button>
                    <button onclick="filterCards('good')" id="filter-good" class="filter-btn">
                        Good <span class="badge active" style="background: var(--green);" id="count-good">0</span>
                    </button>
                    <button onclick="filterCards('flag')" id="filter-flag" class="filter-btn">
                        Flagged <span class="badge active" style="background: var(--red);" id="count-flag">0</span>
                    </button>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <span id="sync-status" class="text-sm font-semibold flex items-center gap-2" style="color: var(--text-dim);">
                    <span class="w-2 h-2 rounded-full" style="background: var(--green);"></span> Live
                </span>
                <button onclick="saveToGitHub()" id="btn-save" class="px-4 py-2 rounded text-sm font-bold transition-opacity hover:opacity-90" style="background: var(--teal); color: #fff;">
                    Save to GitHub
                </button>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto px-8 pt-6 pb-24" id="workspace-scroll">
            <div class="max-w-6xl mx-auto">
                
                <div id="welcome-banner" class="mb-8 p-4 rounded relative" style="background: var(--surface2); border-left: 4px solid var(--teal-bright);">
                    <button onclick="document.getElementById('welcome-banner').style.display='none'" class="absolute top-3 right-3 text-gray-500 hover:text-white transition-colors" title="Dismiss">
                        <i data-lucide="x" class="w-4 h-4"></i>
                    </button>
                    <h3 class="font-bold text-sm mb-1" style="color: var(--text);" id="welcome-title">Welcome</h3>
                    <p class="text-sm pr-6" style="color: var(--text-dim);">
                        Review column headings for (i) instructions. Edit source and press Enter to translate.
                    </p>
                </div>

                <div class="flex w-full mb-2 px-6">
                    <div class="w-1/3 pr-6 flex items-center gap-2">
                        <span class="text-xs font-bold uppercase tracking-wider" style="color: var(--teal-bright);">Source</span>
                        <span title="Edit and press Enter to trigger translation pipeline." class="cursor-help"><i data-lucide="info" class="w-3.5 h-3.5" style="color: var(--text-muted);"></i></span>
                    </div>
                    <div class="w-1/3 px-6 flex items-center gap-2">
                        <span class="text-xs font-bold uppercase tracking-wider" style="color: var(--text-dim);">Target</span>
                        <span title="Read-only generated translation." class="cursor-help"><i data-lucide="info" class="w-3.5 h-3.5" style="color: var(--text-muted);"></i></span>
                    </div>
                    <div class="w-1/3 pl-6 flex items-center gap-2">
                        <span class="text-xs font-bold uppercase tracking-wider" style="color: var(--text-dim);">Back-Translate</span>
                        <span title="Review match and cast verdict below." class="cursor-help"><i data-lucide="info" class="w-3.5 h-3.5" style="color: var(--text-muted);"></i></span>
                    </div>
                </div>

                <div id="cards-container">
                    </div>
            </div>
        </div>
    </div>

    <div id="master-footer" style="position: fixed; bottom: 0; width: 100%; text-align: center; padding: 4px; font-size: 10px; color: var(--text-muted); background: var(--bg); z-index: 50;">
        TalkBridge Curation Desk-v1.1-2026-06-12 12:57 AM
    </div>

    <script>
        let appState = {
            config: { owner: '', repo: '', source: '', target: '', pat: '' },
            pbData: null,
            targetSha: null,
            isNewTarget: false,
            langPair: { source: 'en', target: 'th' },
            currentFilter: 'all'
        };

        let debounceTimers = {};

        lucide.createIcons();

        function switchView(viewId) {
            ['view-setup', 'view-loading', 'view-app'].forEach(id => {
                document.getElementById(id).classList.add('hidden');
            });
            document.getElementById(viewId).classList.remove('hidden');
        }

        function init() {
            const params = new URLSearchParams(window.location.search);
            if (params.has('owner') && params.has('pat')) {
                appState.config = {
                    owner: params.get('owner'), repo: params.get('repo'),
                    source: params.get('source'), target: params.get('target'), pat: params.get('pat')
                };
                switchView('view-loading');
                startCurationLifecycle();
            } else {
                switchView('view-setup');
            }
        }

        function generateLauncher() {
            const ids = ['cfg-owner', 'cfg-repo', 'cfg-source', 'cfg-target', 'cfg-pat'];
            let vals = {};
            for(let id of ids) {
                vals[id] = document.getElementById(id).value.trim();
                if(!vals[id]) { alert("All fields required."); return; }
            }

            const url = new URL(window.location.href.split('?')[0]);
            url.searchParams.set('owner', vals['cfg-owner']);
            url.searchParams.set('repo', vals['cfg-repo']);
            url.searchParams.set('source', vals['cfg-source']);
            url.searchParams.set('target', vals['cfg-target']);
            url.searchParams.set('pat', vals['cfg-pat']);

            const linkStr = url.toString();
            document.getElementById('generated-link').innerText = linkStr;
            document.getElementById('launcher-result').classList.remove('hidden');
        }

        function setLoadMsg(msg) { document.getElementById('loading-msg').innerText = msg; }
        function utf8_to_b64(str) { return window.btoa(unescape(encodeURIComponent(str))); }
        function b64_to_utf8(str) { return decodeURIComponent(escape(window.atob(str))); }

        async function ghFetch(path) {
            return await fetch(`https://api.github.com/repos/${appState.config.owner}/${appState.config.repo}/contents/${path}`, {
                headers: { 'Authorization': `token ${appState.config.pat}`, 'Accept': 'application/vnd.github.v3+json' }
            });
        }

        async function startCurationLifecycle() {
            try {
                setLoadMsg("Checking target assignment...");
                let targetRes = await ghFetch(appState.config.target);
                
                if (targetRes.ok) {
                    const data = await targetRes.json();
                    appState.targetSha = data.sha;
                    appState.pbData = JSON.parse(b64_to_utf8(data.content));
                    appState.isNewTarget = false;
                } else if (targetRes.status === 404) {
                    setLoadMsg("Bootstrapping from Source...");
                    let sourceRes = await ghFetch(appState.config.source);
                    if (!sourceRes.ok) throw new Error("Could not find source phrasebook.");
                    const sourceData = await sourceRes.json();
                    appState.pbData = JSON.parse(b64_to_utf8(sourceData.content));
                    appState.isNewTarget = true;
                } else { throw new Error(`API Error: ${targetRes.status}`); }

                if (appState.pbData.cards && appState.pbData.cards.length > 0) {
                    appState.langPair.source = appState.pbData.cards[0].sourceLang || 'en';
                    appState.langPair.target = appState.pbData.cards[0].targetLang || 'th';
                }

                updateWelcomeBanner();
                renderCards();
                updateStats();
                switchView('view-app');
            } catch (err) {
                alert(`Init Failed:\n${err.message}`);
                switchView('view-setup');
            }
        }

        function updateWelcomeBanner() {
            let latestEdit = 0;
            if (appState.pbData.cards) {
                appState.pbData.cards.forEach(c => {
                    if (c.updatedAt && c.updatedAt > latestEdit) latestEdit = c.updatedAt;
                });
            }
            if (latestEdit > 0) {
                const d = new Date(latestEdit);
                document.getElementById('welcome-title').innerText = `Welcome back. Last session: ${d.toLocaleDateString()} at ${d.toLocaleTimeString()}`;
            } else {
                document.getElementById('welcome-title').innerText = `Welcome to a new Curation Session.`;
            }
        }

        async function saveToGitHub() {
            const btn = document.getElementById('btn-save');
            const status = document.getElementById('sync-status');
            btn.innerHTML = `<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> Saving`;
            btn.disabled = true; lucide.createIcons();

            try {
                appState.pbData.version = "1.2-curated";
                const body = {
                    message: `PB Update: ${appState.pbData.cards.length} cards`,
                    content: utf8_to_b64(JSON.stringify(appState.pbData, null, 2)),
                    branch: 'main'
                };
                if (appState.targetSha) body.sha = appState.targetSha;

                const res = await fetch(`https://api.github.com/repos/${appState.config.owner}/${appState.config.repo}/contents/${appState.config.target}`, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${appState.config.pat}`, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });

                if (!res.ok) throw new Error((await res.json()).message || 'Unknown save error');

                appState.targetSha = (await res.json()).content.sha;
                appState.isNewTarget = false;
                status.innerHTML = `<span class="w-2 h-2 rounded-full" style="background: var(--green);"></span> Saved`;
                setTimeout(() => { status.innerHTML = `<span class="w-2 h-2 rounded-full" style="background: var(--green);"></span> Live`; }, 3000);
            } catch (e) {
                alert(`Save failed: ${e.message}`);
                status.innerHTML = `<span class="w-2 h-2 rounded-full" style="background: var(--red);"></span> Error`;
            } finally {
                btn.innerHTML = `Save to GitHub`;
                btn.disabled = false;
            }
        }

        function updateStats() {
            if (!appState.pbData || !appState.pbData.cards) return;
            let good = 0, flag = 0, pending = 0;
            appState.pbData.cards.forEach(c => {
                let v = c.backtranslate ? c.backtranslate.verdict : 'pending';
                if (v === 'good') good++; else if (v === 'flag') flag++; else pending++;
            });
            document.getElementById('count-total').innerText = appState.pbData.cards.length;
            document.getElementById('count-pending').innerText = pending;
            document.getElementById('count-good').innerText = good;
            document.getElementById('count-flag').innerText = flag;
        }

        function filterCards(filterType) {
            appState.currentFilter = filterType;
            document.querySelectorAll('.filter-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(`filter-${filterType}`).classList.add('active');
            
            document.querySelectorAll('.pb-card-wrapper').forEach(cardEl => {
                const status = cardEl.getAttribute('data-status');
                cardEl.style.display = (filterType === 'all' || status === filterType) ? 'flex' : 'none';
            });
        }

        function autoResize(el) {
            el.style.height = 'auto';
            el.style.height = el.scrollHeight + 'px';
        }

        function toggleDrawer(id, drawerName) {
            const el = document.getElementById(`drawer-${drawerName}-${id}`);
            const chip = document.getElementById(`chip-${drawerName}-${id}`);
            if (el.classList.contains('hidden')) {
                el.classList.remove('hidden');
                chip.classList.add('active');
                const ta = document.getElementById(`${drawerName}-${id}`);
                ta.focus();
                autoResize(ta);
            } else { 
                el.classList.add('hidden'); 
                chip.classList.remove('active');
            }
        }

        function playTTS(elementId, langCode) {
            const el = document.getElementById(elementId);
            let text = el ? (el.tagName === 'TEXTAREA' ? el.value : el.innerText) : '';
            if (!text || text === 'Translating...') return;

            let locale = langCode === 'en' ? 'en-US' : langCode === 'th' ? 'th-TH' : langCode;
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = locale;
            window.speechSynthesis.speak(utterance);
        }

        function renderCards() {
            const container = document.getElementById('cards-container');
            container.innerHTML = '';

            appState.pbData.cards.forEach((card) => {
                let tagsArr = card.tags || [];
                let tagList = tagsArr.join(', ');
                let backText = card.backtranslate && card.backtranslate.resultText ? card.backtranslate.resultText : '';
                let verdict = card.backtranslate && card.backtranslate.verdict ? card.backtranslate.verdict : 'pending';
                let notes = card.notes || '';

                const cardHtml = `
                    <div class="pb-card-wrapper" data-status="${verdict}" id="card-${card.id}">
                        
                        <div class="pb-header">
                            <span class="text-xs font-mono" style="color: var(--text-muted);">${card.id}</span>
                        </div>

                        <div class="pb-body">
                            
                            <div class="pb-col">
                                <div class="input-wrapper flex-1">
                                    <textarea rows="1" class="pb-input-area" id="src-${card.id}" 
                                        onfocus="trackTime('${card.id}', 'start')" 
                                        oninput="autoResize(this)" 
                                        onkeydown="handleSourceKeydown(event, '${card.id}')"
                                        placeholder="Enter source phrase...">${card.source || ''}</textarea>
                                </div>
                                <div class="mt-4 flex items-center justify-between">
                                    <i data-lucide="volume-2" class="w-5 h-5 action-icon" onclick="playTTS('src-${card.id}', '${appState.langPair.source}')" title="Listen"></i>
                                </div>
                            </div>
                            
                            <div class="pb-col">
                                <div class="flex-1 text-[17px] font-medium leading-relaxed" id="tgt-${card.id}" style="color: var(--teal-bright);">${card.target || ''}</div>
                                <div class="mt-4 flex items-center justify-start">
                                    <i data-lucide="volume-2" class="w-5 h-5 action-icon" onclick="playTTS('tgt-${card.id}', '${appState.langPair.target}')" title="Listen"></i>
                                </div>
                            </div>
                            
                            <div class="pb-col" style="background: rgba(0,0,0,0.2);">
                                <div class="flex-1 italic text-[16px] leading-relaxed mb-4" id="bck-${card.id}" style="color: var(--text);">${backText}</div>
                                
                                <div class="flex items-center gap-3 mt-auto">
                                    <input type="radio" name="v-${card.id}" id="v-${card.id}-good" class="verdict-radio radio-good" value="good" ${verdict === 'good' ? 'checked' : ''} onchange="handleVerdict('${card.id}', 'good')">
                                    <label for="v-${card.id}-good" class="verdict-label"><i data-lucide="thumbs-up" class="w-4 h-4 mr-2"></i> Good</label>
                                    
                                    <input type="radio" name="v-${card.id}" id="v-${card.id}-flag" class="verdict-radio radio-flag" value="flag" ${verdict === 'flag' ? 'checked' : ''} onchange="handleVerdict('${card.id}', 'flag')">
                                    <label for="v-${card.id}-flag" class="verdict-label"><i data-lucide="flag" class="w-4 h-4 mr-2"></i> Flag</label>
                                </div>
                            </div>

                        </div>

                        <div class="pb-footer">
                            <div class="flex items-center justify-between w-full">
                                <div class="flex items-center gap-3">
                                    <button id="chip-tags-${card.id}" onclick="toggleDrawer('${card.id}', 'tags')" class="utility-chip">
                                        <i data-lucide="tag" class="w-4 h-4"></i> Tags 
                                        <span id="badge-tags-${card.id}" class="badge ${tagsArr.length > 0 ? 'active' : ''}">${tagsArr.length}</span>
                                    </button>
                                    
                                    <button id="chip-notes-${card.id}" onclick="toggleDrawer('${card.id}', 'notes')" class="utility-chip">
                                        <i data-lucide="message-square" class="w-4 h-4"></i> Clarify
                                        <span id="badge-notes-${card.id}" class="badge ${notes.trim().length > 0 ? 'active' : ''}">${notes.trim().length > 0 ? '1' : '0'}</span>
                                    </button>
                                </div>
                                <span id="save-flash-${card.id}" class="text-xs font-bold opacity-0 transition-opacity flex items-center gap-1"><i data-lucide="check" class="w-3.5 h-3.5"></i> Saved</span>
                            </div>
                            
                            <div id="drawer-tags-${card.id}" class="drawer hidden w-2/3">
                                <textarea rows="1" class="pb-input-area font-mono text-sm" id="tags-${card.id}" style="color: var(--teal-bright);"
                                    oninput="autoResize(this); handleDebounceInput('${card.id}', 'tags', this.value)" 
                                    placeholder="Comma separated tags (e.g. context:greeting)">${tagList}</textarea>
                            </div>

                            <div id="drawer-notes-${card.id}" class="drawer hidden w-3/4" style="border-left-color: var(--teal-bright);">
                                <textarea rows="1" class="pb-input-area text-[15px]" id="notes-${card.id}" 
                                    oninput="autoResize(this); handleDebounceInput('${card.id}', 'notes', this.value)" 
                                    placeholder="Add clarification notes. Auto-saves as you type...">${notes}</textarea>
                            </div>
                        </div>
                    </div>
                `;
                
                container.insertAdjacentHTML('beforeend', cardHtml);
            });
            
            lucide.createIcons();
            setTimeout(() => { document.querySelectorAll('textarea.pb-input-area').forEach(el => autoResize(el)); }, 0);
            if(appState.currentFilter !== 'all') filterCards(appState.currentFilter);
        }

        function getCard(id) { return appState.pbData.cards.find(c => c.id === id); }

        function handleSourceKeydown(e, id) {
            if (e.key === 'Enter' && !e.shiftKey) { 
                e.preventDefault(); 
                const el = document.getElementById(`src-${id}`);
                const newVal = el.value.trim();
                el.blur();
                executeTranslationPipeline(id, newVal); 
            }
        }

        function handleDebounceInput(id, field, value) {
            const timerKey = `${field}-${id}`;
            clearTimeout(debounceTimers[timerKey]);
            
            debounceTimers[timerKey] = setTimeout(() => {
                const card = getCard(id);
                if (!card) return;

                if (field === 'tags') {
                    const newTags = value.split(',').map(t => t.trim()).filter(t => t);
                    card.tags = newTags;
                    const badge = document.getElementById(`badge-tags-${id}`);
                    badge.innerText = newTags.length;
                    newTags.length > 0 ? badge.classList.add('active') : badge.classList.remove('active');
                } else if (field === 'notes') {
                    card.notes = value;
                    const badge = document.getElementById(`badge-notes-${id}`);
                    const hasNotes = value.trim().length > 0;
                    badge.innerText = hasNotes ? '1' : '0';
                    hasNotes ? badge.classList.add('active') : badge.classList.remove('active');
                }
                
                card.updatedAt = Date.now();
                flashSaveStatus(id);
            }, 1000);
        }

        function flashSaveStatus(id) {
            const flashEl = document.getElementById(`save-flash-${id}`);
            flashEl.classList.remove('save-flash');
            void flashEl.offsetWidth; 
            flashEl.classList.add('save-flash');
        }

        function trackTime(id, event) {
            const card = getCard(id);
            if (!card) return;
            if (!card.telemetry) card.telemetry = { edits: 0 };
            
            if (event === 'start' && !card.telemetry.currentStart) { 
                card.telemetry.currentStart = Date.now(); 
            } else if (event === 'stop' && card.telemetry.currentStart) {
                card.telemetry.totalTimeMs = (card.telemetry.totalTimeMs || 0) + (Date.now() - card.telemetry.currentStart);
                card.telemetry.edits += 1;
                card.telemetry.lastEditAt = Date.now();
                card.telemetry.currentStart = null;
            }
        }

        function handleVerdict(id, verdictStr) {
            const card = getCard(id);
            if (card) {
                if (!card.backtranslate) card.backtranslate = {};
                card.backtranslate.verdict = verdictStr;
                card.backtranslate.updatedAt = Date.now();
                trackTime(id, 'stop');
                
                document.getElementById(`card-${id}`).setAttribute('data-status', verdictStr);
                updateStats();
                if(appState.currentFilter !== 'all') filterCards(appState.currentFilter); 
            }
        }

        async function translate(text, langPair) {
            if (!text) return "";
            const email = `tb_${Math.floor(Math.random()*10000)}@talkbridge.com`;
            const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${langPair}&de=${encodeURIComponent(email)}`;
            try {
                const res = await fetch(url); const data = await res.json();
                if (data.responseStatus === 200) return data.responseData.translatedText;
                return `[API Error]`;
            } catch (e) { return `[Network Error]`; }
        }

        async function executeTranslationPipeline(id, newSource) {
            const card = getCard(id);
            if (!card || (card.source === newSource && card.target)) return; 
            
            card.source = newSource; card.updatedAt = Date.now();

            const tgtEl = document.getElementById(`tgt-${id}`);
            const bckEl = document.getElementById(`bck-${id}`);
            tgtEl.innerHTML = `<i data-lucide="loader-2" class="w-4 h-4 animate-spin inline mr-2"></i>Translating...`;
            bckEl.innerHTML = `<i data-lucide="loader-2" class="w-4 h-4 animate-spin inline mr-2"></i>Translating...`;
            tgtEl.style.opacity = '0.5'; bckEl.style.opacity = '0.5';
            lucide.createIcons();
            
            if(card.backtranslate) card.backtranslate.verdict = 'pending';
            const goodRad = document.getElementById(`v-${id}-good`), flagRad = document.getElementById(`v-${id}-flag`);
            if(goodRad) goodRad.checked = false; if(flagRad) flagRad.checked = false;
            
            document.getElementById(`card-${id}`).setAttribute('data-status', 'pending');
            updateStats();

            const targetText = await translate(newSource, `${appState.langPair.source}|${appState.langPair.target}`);
            card.target = targetText; 
            tgtEl.innerText = targetText;
            tgtEl.style.opacity = '1';

            const backText = await translate(targetText, `${appState.langPair.target}|${appState.langPair.source}`);
            if(!card.backtranslate) card.backtranslate = {};
            card.backtranslate.resultText = backText; card.backtranslate.inputText = targetText;
            card.backtranslate.contentHash = `${newSource}||${targetText}`;
            bckEl.innerText = backText;
            bckEl.style.opacity = '1';
        }

        init();
    </script>
</body>
</html>
