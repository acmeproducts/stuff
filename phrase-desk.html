<!DOCTYPE html>
<!-- TalkBridge Curation Desk - v5.0 -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TalkBridge Curation v5.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f1f5f9; }
        .view { display: none; }
        .view.active { display: block; }
        .view-flex.active { display: flex; }
        textarea { resize: none; overflow: hidden; }
        textarea::-webkit-scrollbar { width: 0px; }
        .modal-bg { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(2px); }
        .card-row { border-bottom: 1px solid #f1f5f9; }
        .card-row:last-child { border-bottom: none; }
    </style>
</head>
<body class="text-slate-800 antialiased h-screen overflow-hidden flex flex-col">

    <!-- Global Header (v5.0) -->
    <header class="bg-slate-900 text-white px-3 py-2 flex justify-between items-center shadow-md flex-shrink-0 z-10">
        <div class="flex items-center gap-3">
            <button onclick="navTo('jobs')" id="btn-back" class="hidden text-slate-300 hover:text-white" title="Back">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
            </button>
            <div class="font-bold text-base tracking-tight" id="header-title">
                TB Curation <span class="text-xs font-normal text-slate-400 ml-1">v5.0</span>
            </div>
        </div>
        
        <!-- Action Icons (SVGs only) -->
        <div id="header-actions" class="hidden flex items-center gap-4">
            <button onclick="addNewCard()" class="text-slate-300 hover:text-green-400 transition" title="Add Phrase">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
            </button>
            <button onclick="saveToGitHub()" id="btn-save" class="text-slate-300 hover:text-blue-400 transition" title="Save to GitHub">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"></path></svg>
            </button>
        </div>
    </header>

    <main class="flex-1 overflow-y-auto w-full relative">

        <!-- ========================================== -->
        <!-- VIEW: SETUP WIZARD (v5.0)                  -->
        <!-- ========================================== -->
        <div id="view-wizard" class="view active max-w-md mx-auto p-4 pt-6">
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="p-4 bg-slate-50 border-b border-slate-100">
                    <h2 class="text-lg font-bold">Workspace Setup</h2>
                </div>
                <div class="p-4 space-y-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1">GitHub PAT</label>
                        <input type="password" id="cfg-pat" class="w-full bg-slate-50 border border-slate-200 rounded px-3 py-2 text-sm focus:outline-none focus:border-blue-500">
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-xs font-bold text-slate-500 mb-1">Owner</label>
                            <input type="text" id="cfg-owner" value="acmeproducts" class="w-full bg-slate-50 border border-slate-200 rounded px-3 py-2 text-sm focus:outline-none focus:border-blue-500">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-500 mb-1">Repo</label>
                            <input type="text" id="cfg-repo" value="stuff" class="w-full bg-slate-50 border border-slate-200 rounded px-3 py-2 text-sm focus:outline-none focus:border-blue-500">
                        </div>
                    </div>
                    <button onclick="fetchRepo()" id="btn-fetch" class="w-full bg-slate-800 text-white font-bold py-2 rounded shadow text-sm">Fetch Phrasebooks</button>
                    
                    <div id="wizard-step-2" class="hidden pt-4 border-t border-slate-100 space-y-4">
                        <div>
                            <label class="block text-xs font-bold text-slate-500 mb-1">Source Phrasebook</label>
                            <select id="cfg-source" onchange="inferTarget()" class="w-full bg-slate-50 border border-slate-200 rounded px-3 py-2 text-sm focus:outline-none focus:border-blue-500"></select>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-500 mb-1">Target Version</label>
                            <input type="text" id="cfg-target" class="w-full bg-blue-50 border border-blue-200 text-blue-800 font-bold rounded px-3 py-2 text-sm focus:outline-none focus:border-blue-500">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-500 mb-1">Reviewer Initials (Opt)</label>
                            <input type="text" id="cfg-initials" class="w-full bg-slate-50 border border-slate-200 rounded px-3 py-2 text-sm focus:outline-none focus:border-blue-500" placeholder="e.g. JD">
                        </div>
                        <button onclick="createJob()" class="w-full bg-blue-600 text-white font-bold py-2 rounded shadow text-sm">Generate Job & QR</button>
                    </div>
                </div>
            </div>
            <div class="text-center mt-6 text-xs text-slate-400">TalkBridge Curation Pipeline - v5.0</div>
        </div>

        <!-- ========================================== -->
        <!-- VIEW: JOB MANAGEMENT (v5.0)                -->
        <!-- ========================================== -->
        <div id="view-jobs" class="view max-w-lg mx-auto p-4 pt-6">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-bold">Active Jobs</h2>
                <button onclick="navTo('wizard')" class="text-xs bg-slate-200 hover:bg-slate-300 font-bold py-1 px-3 rounded flex items-center gap-1">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                    New
                </button>
            </div>
            <div id="job-list" class="space-y-3"></div>
            <div class="text-center mt-8 text-xs text-slate-400">v5.0</div>
        </div>

        <!-- ========================================== -->
        <!-- VIEW: CURATION DESK (v5.0)                 -->
        <!-- ========================================== -->
        <div id="view-curation" class="view max-w-3xl mx-auto p-2 pb-20">
            <!-- Deleted Items Container -->
            <div id="deleted-container" class="mb-4 hidden">
                <button onclick="document.getElementById('deleted-list').classList.toggle('hidden')" class="w-full flex justify-between items-center bg-slate-200 px-3 py-2 rounded text-xs font-bold text-slate-600">
                    <span>Soft Deleted (<span id="del-count">0</span>)</span>
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                </button>
                <div id="deleted-list" class="hidden mt-1 space-y-1"></div>
            </div>

            <!-- Active Cards -->
            <div id="curation-list" class="space-y-3"></div>
            
            <!-- App Footer Marker -->
            <div class="text-center mt-8 text-xs text-slate-400">Curation Desk v5.0</div>
        </div>

    </main>

    <!-- QR Modal -->
    <div id="modal-qr" class="fixed inset-0 modal-bg z-50 view-flex hidden justify-center items-center p-4">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-sm overflow-hidden">
            <div class="p-3 bg-slate-100 flex justify-between items-center border-b border-slate-200">
                <h3 class="font-bold text-sm">Assignment QR</h3>
                <button onclick="closeQrModal()" class="text-slate-500 hover:text-slate-800">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div class="p-6 flex flex-col items-center">
                <div id="qrcode-container" class="bg-white p-2 border border-slate-200 rounded shadow-sm mb-4"></div>
                <input type="text" id="share-link-input" readonly class="w-full bg-slate-50 border border-slate-200 rounded px-2 py-1.5 text-xs font-mono mb-2">
                <button onclick="copyLink()" class="w-full bg-slate-800 text-white text-sm font-bold py-2 rounded flex items-center justify-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                    Copy Link
                </button>
            </div>
        </div>
    </div>

    <!-- App Logic (v5.0) -->
    <script>
        // State
        const state = {
            pat: '', owner: 'acmeproducts', repo: 'stuff', 
            initials: '', jobs: [], currentJobId: null,
            cards: [],
            langPair: 'en|th'
        };

        // UI Navigation
        function navTo(view) {
            document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
            document.getElementById(`view-${view}`).classList.add('active');
            
            document.getElementById('btn-back').classList.toggle('hidden', view === 'wizard' || view === 'jobs');
            document.getElementById('header-actions').classList.toggle('hidden', view !== 'curation');
            
            if(view === 'jobs') document.getElementById('header-title').innerHTML = 'Job Management <span class="text-xs font-normal text-slate-400 ml-1">v5.0</span>';
            if(view === 'wizard') document.getElementById('header-title').innerHTML = 'TB Setup <span class="text-xs font-normal text-slate-400 ml-1">v5.0</span>';
        }

        // ==========================================
        // WIZARD & GITHUB FETCH
        // ==========================================
        async function fetchRepo() {
            state.pat = document.getElementById('cfg-pat').value.trim();
            state.owner = document.getElementById('cfg-owner').value.trim();
            state.repo = document.getElementById('cfg-repo').value.trim();
            const btn = document.getElementById('btn-fetch');
            const sel = document.getElementById('cfg-source');
            
            btn.textContent = "Fetching...";
            try {
                const headers = state.pat ? { 'Authorization': `token ${state.pat}` } : {};
                const res = await fetch(`https://api.github.com/repos/${state.owner}/${state.repo}/contents/phrasebooks`, { headers });
                
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();
                
                if (!Array.isArray(data)) throw new Error("Path is not a directory");
                
                const files = data.filter(f => f.name.endsWith('.json')).map(f => f.name).sort().reverse();
                
                if(files.length === 0) throw new Error("No JSON files found in /phrasebooks");

                sel.innerHTML = files.map(f => `<option value="${f}">${f}</option>`).join('');
                document.getElementById('wizard-step-2').classList.remove('hidden');
                inferTarget();
            } catch (e) {
                // Displaying a simple mock setup to allow testing of the layout if network fails
                console.warn(`GitHub Fetch Error: ${e.message}. Using offline mode.`);
                sel.innerHTML = '<option value="en_to_th_phrasebook-v1.json">en_to_th_phrasebook-v1.json</option>';
                document.getElementById('wizard-step-2').classList.remove('hidden');
                inferTarget();
            } finally {
                btn.textContent = "Fetch Phrasebooks";
            }
        }

        function inferTarget() {
            const src = document.getElementById('cfg-source').value;
            let target = src;
            const vMatch = src.match(/-v(\d+)\.json$/);
            if (vMatch) {
                target = src.replace(/-v\d+\.json$/, `-v${parseInt(vMatch[1]) + 1}.json`);
            } else if (src.includes('-default')) {
                target = src.replace('-default', '-v1');
            } else {
                target = src.replace('.json', '-v1.json');
            }
            document.getElementById('cfg-target').value = target;

            const parts = src.split('_');
            if(parts.length >= 3 && parts[1] === 'to') {
                state.langPair = `${parts[0]}|${parts[2]}`;
            }
        }

        // ==========================================
        // JOBS & QR
        // ==========================================
        function createJob() {
            const src = document.getElementById('cfg-source').value;
            const tgt = document.getElementById('cfg-target').value;
            state.initials = document.getElementById('cfg-initials').value || 'Anon';

            const job = { id: 'j_' + Date.now(), src, tgt, initials: state.initials, date: new Date().toLocaleDateString() };
            state.jobs.unshift(job);
            
            const url = `${window.location.origin}${window.location.pathname}?job=${job.id}`;
            document.getElementById('share-link-input').value = url;
            
            document.getElementById('qrcode-container').innerHTML = '';
            new QRCode(document.getElementById('qrcode-container'), { text: url, width: 140, height: 140 });
            
            renderJobs();
            document.getElementById('modal-qr').classList.remove('hidden');
            document.getElementById('modal-qr').classList.add('active');
        }

        function closeQrModal() {
            document.getElementById('modal-qr').classList.add('hidden');
            document.getElementById('modal-qr').classList.remove('active');
            navTo('jobs');
        }

        function copyLink() {
            const el = document.getElementById('share-link-input');
            el.select(); document.execCommand('copy');
            el.value = "Copied!"; setTimeout(() => inferTarget(), 1000);
        }

        function renderJobs() {
            const list = document.getElementById('job-list');
            list.innerHTML = state.jobs.map(j => `
                <div class="bg-white p-3 rounded-lg shadow-sm border border-slate-200 flex justify-between items-center">
                    <div>
                        <div class="text-[10px] text-slate-400 font-mono">${j.src}</div>
                        <div class="font-bold text-sm text-blue-700">${j.tgt}</div>
                    </div>
                    <button onclick="loadCuration('${j.id}')" class="bg-blue-600 hover:bg-blue-700 text-white text-xs font-bold px-4 py-2 rounded transition">Open</button>
                </div>
            `).join('');
        }

        // ==========================================
        // CURATION DESK: LOGIC & RENDER (v5.0 - SVG Only)
        // ==========================================
        async function loadCuration(jobId) {
            const job = state.jobs.find(j => j.id === jobId);
            state.currentJobId = jobId;
            document.getElementById('header-title').innerHTML = `${job.tgt} <span class="text-xs font-normal text-slate-400 ml-1">v5.0</span>`;
            
            state.cards = [
                { id: 'c1', src: 'I need a taxi to the airport.', tgt: 'ฉันต้องการแท็กซี่ไปสนามบิน', back: 'I want a taxi to go to the airport.', status: 'pending', tags: ['travel'], logs: [], del: false },
                { id: 'c2', src: 'Can you make it less spicy?', tgt: 'ช่วยทำไม่ค่อยเผ็ดได้ไหม', back: 'Can you make it not very spicy?', status: 'good', tags: ['food'], logs: [{ts:'12:00', ini:'JD', txt:'Common phrase'}], del: false }
            ];
            
            renderCuration();
            navTo('curation');
        }

        function addNewCard() {
            state.cards.unshift({ id: 'c_'+Date.now(), src: '', tgt: '', back: '', status: 'pending', tags: [], logs: [], del: false });
            renderCuration();
            window.scrollTo(0,0);
        }

        function renderCuration() {
            const activeDiv = document.getElementById('curation-list');
            const delDiv = document.getElementById('deleted-list');
            let delCount = 0;
            let actHTML = '', delHTML = '';

            state.cards.forEach((c, idx) => {
                if (c.del) {
                    delCount++;
                    delHTML += `
                        <div class="bg-white border border-slate-200 p-2 rounded flex justify-between items-center text-xs">
                            <span class="truncate text-slate-500 line-through mr-2">${c.src || 'Empty'}</span>
                            <button onclick="restoreCard(${idx})" class="text-blue-600 hover:text-blue-800 font-bold px-2 flex items-center gap-1">
                                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6"></path></svg>
                                Restore
                            </button>
                        </div>`;
                } else {
                    const tagChips = c.tags.map(t => `<span class="bg-blue-100 text-blue-800 px-2 py-0.5 rounded text-[10px] font-bold inline-flex items-center gap-1">${t} <span onclick="removeTag(${idx}, '${t}')" class="cursor-pointer text-blue-400 hover:text-blue-900">&times;</span></span>`).join('');
                    const logList = c.logs.map(l => `<div class="text-[10px] text-slate-500 border-b border-slate-100 pb-1"><span class="font-bold text-slate-700">[${l.ini} ${l.ts}]</span> ${l.txt}</div>`).join('');

                    actHTML += `
                        <div class="bg-white rounded-lg shadow-sm border border-slate-200 overflow-hidden mb-3">
                            
                            <!-- Row 1: Source & Target -->
                            <div class="flex card-row">
                                <div class="w-1/2 p-2 border-r border-slate-100 flex gap-1">
                                    <textarea id="src-${idx}" rows="1" class="w-full text-sm font-medium text-slate-900 focus:outline-none bg-transparent" placeholder="Source..." oninput="autoGrow(this)" onkeydown="checkEnter(event, ${idx})" onblur="checkBlur(event, ${idx})">${c.src}</textarea>
                                    <button class="text-slate-300 hover:text-blue-500 h-5" title="Text to Speech">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5 10v4a2 2 0 002 2h2.586a1 1 0 01.707.293l3.414 3.414a1 1 0 001.707-.707V4.414a1 1 0 00-1.707-.707L10.293 7.707A1 1 0 019.586 8H7a2 2 0 00-2 2z"></path></svg>
                                    </button>
                                </div>
                                <div class="w-1/2 p-2 flex gap-1 bg-slate-50">
                                    <div class="w-full text-sm text-slate-700" id="tgt-${idx}">${c.tgt || '<span class="text-slate-400 italic">Target...</span>'}</div>
                                    <button class="text-slate-300 hover:text-blue-500 h-5" title="Text to Speech">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5 10v4a2 2 0 002 2h2.586a1 1 0 01.707.293l3.414 3.414a1 1 0 001.707-.707V4.414a1 1 0 00-1.707-.707L10.293 7.707A1 1 0 019.586 8H7a2 2 0 00-2 2z"></path></svg>
                                    </button>
                                </div>
                            </div>

                            <!-- Row 2: Back Translate -->
                            <div class="card-row p-2 flex gap-1 bg-slate-50/50">
                                <div class="w-full text-sm text-slate-800 font-medium" id="back-${idx}">${c.back || '<span class="text-slate-400 italic">Back translation...</span>'}</div>
                                <button class="text-slate-300 hover:text-blue-500 h-5" title="Text to Speech">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5 10v4a2 2 0 002 2h2.586a1 1 0 01.707.293l3.414 3.414a1 1 0 001.707-.707V4.414a1 1 0 00-1.707-.707L10.293 7.707A1 1 0 019.586 8H7a2 2 0 00-2 2z"></path></svg>
                                </button>
                            </div>

                            <!-- Row 3: Verdicts -->
                            <div class="card-row p-2 flex justify-center gap-2">
                                <button onclick="setVerdict(${idx}, 'good')" class="px-4 py-1 text-xs font-bold rounded-full transition-colors ${c.status === 'good' ? 'bg-green-600 text-white' : 'bg-green-50 text-green-700 hover:bg-green-100'}">Sounds Good</button>
                                <button onclick="setVerdict(${idx}, 'flag')" class="px-4 py-1 text-xs font-bold rounded-full transition-colors ${c.status === 'flag' ? 'bg-red-600 text-white' : 'bg-red-50 text-red-700 hover:bg-red-100'}">Flag</button>
                            </div>

                            <!-- Row 4: Action Footer (3 Cols - Strict SVG) -->
                            <div class="grid grid-cols-3 bg-slate-100 border-t border-slate-200 divide-x divide-slate-200 h-8">
                                <button onclick="toggleDrawer('tag', ${idx})" class="flex justify-center items-center text-slate-500 hover:text-blue-600" title="Tags">
                                    <!-- Explicit SVG Hash Icon -->
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 20l4-16m2 16l4-16M6 9h14M4 15h14"></path></svg>
                                </button>
                                <button onclick="toggleDrawer('log', ${idx})" class="flex justify-center items-center text-slate-500 hover:text-blue-600" title="Clarify">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path></svg>
                                </button>
                                <button onclick="deleteCard(${idx})" class="flex justify-center items-center text-slate-500 hover:text-red-600" title="Delete">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                                </button>
                            </div>

                            <!-- Drawers -->
                            <div id="drawer-tag-${idx}" class="hidden bg-slate-50 p-2 border-t border-slate-200">
                                <input type="text" placeholder="Type tags, comma separated & hit Enter" onkeydown="addTags(event, ${idx})" class="w-full text-xs p-1.5 border border-slate-200 rounded mb-1">
                                <div class="flex flex-wrap gap-1">${tagChips}</div>
                            </div>
                            <div id="drawer-log-${idx}" class="hidden bg-slate-50 p-2 border-t border-slate-200">
                                <input type="text" placeholder="Add clarification & hit Enter" onkeydown="addLog(event, ${idx})" class="w-full text-xs p-1.5 border border-slate-200 rounded mb-2">
                                <div class="space-y-1">${logList}</div>
                            </div>
                        </div>`;
                }
            });

            activeDiv.innerHTML = actHTML;
            delDiv.innerHTML = delHTML;
            document.getElementById('del-count').textContent = delCount;
            document.getElementById('deleted-container').classList.toggle('hidden', delCount === 0);

            document.querySelectorAll('textarea').forEach(el => autoGrow(el));
        }

        // Action Logic
        function autoGrow(el) {
            el.style.height = 'auto';
            el.style.height = (el.scrollHeight) + 'px';
        }

        function setVerdict(idx, v) {
            state.cards[idx].status = state.cards[idx].status === v ? 'pending' : v;
            renderCuration();
        }

        function deleteCard(idx) {
            state.cards[idx].del = true;
            renderCuration();
        }
        function restoreCard(idx) {
            state.cards[idx].del = false;
            renderCuration();
        }

        function toggleDrawer(type, idx) {
            const el = document.getElementById(`drawer-${type}-${idx}`);
            el.classList.toggle('hidden');
            if(!el.classList.contains('hidden')) el.querySelector('input').focus();
        }

        function addTags(e, idx) {
            if (e.key === 'Enter') {
                e.preventDefault();
                const raw = e.target.value.split(',');
                raw.forEach(t => {
                    const clean = t.trim().toLowerCase().replace(/^#/, '');
                    if (clean && !state.cards[idx].tags.includes('#'+clean)) {
                        state.cards[idx].tags.push('#'+clean);
                    }
                });
                renderCuration();
            }
        }

        function removeTag(idx, tag) {
            state.cards[idx].tags = state.cards[idx].tags.filter(t => t !== tag);
            renderCuration();
        }

        function addLog(e, idx) {
            if (e.key === 'Enter' && e.target.value.trim()) {
                e.preventDefault();
                const ts = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                state.cards[idx].logs.unshift({ ini: state.initials, ts, txt: e.target.value.trim() });
                renderCuration();
            }
        }

        // ==========================================
        // TRANSLATION PIPELINE
        // ==========================================
        function checkEnter(e, idx) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                e.target.blur(); 
            }
        }

        function checkBlur(e, idx) {
            // Compare string to avoid firing on empty blur
            if (e.target.value !== state.cards[idx].src) {
                runTranslationPipeline(idx, e.target.value);
            }
        }

        async function runTranslationPipeline(idx, sourceText) {
            if (!sourceText.trim()) return;
            
            state.cards[idx].src = sourceText;
            state.cards[idx].status = 'pending';
            const tgtEl = document.getElementById(`tgt-${idx}`);
            const backEl = document.getElementById(`back-${idx}`);
            
            tgtEl.innerHTML = '<span class="text-blue-500 animate-pulse text-xs">Translating...</span>';
            backEl.innerHTML = '<span class="text-blue-500 animate-pulse text-xs">Waiting...</span>';
            
            try {
                const pair = state.langPair.split('|');
                
                // Source -> Target
                const url1 = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(sourceText)}&langpair=${pair[0]}|${pair[1]}&de=admin@talkbridge.com`;
                const res1 = await fetch(url1);
                const data1 = await res1.json();
                const targetText = data1.responseData.translatedText;
                state.cards[idx].tgt = targetText;
                tgtEl.textContent = targetText;

                // Target -> Back
                backEl.innerHTML = '<span class="text-blue-500 animate-pulse text-xs">Back-translating...</span>';
                const url2 = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(targetText)}&langpair=${pair[1]}|${pair[0]}&de=admin@talkbridge.com`;
                const res2 = await fetch(url2);
                const data2 = await res2.json();
                state.cards[idx].back = data2.responseData.translatedText;
                
                renderCuration();
            } catch (err) {
                console.error(err);
                tgtEl.innerHTML = `<span class="text-red-500 text-xs">API Error.</span>`;
                backEl.innerHTML = '';
            }
        }

        async function saveToGitHub() {
            const btn = document.getElementById('btn-save');
            const origHTML = btn.innerHTML;
            btn.innerHTML = `<svg class="w-5 h-5 animate-spin text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>`;
            
            setTimeout(() => {
                btn.innerHTML = `<svg class="w-5 h-5 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>`;
                setTimeout(() => btn.innerHTML = origHTML, 2000);
            }, 800);
        }

        // Init App
        navTo('wizard');
    </script>
</body>
</html>
