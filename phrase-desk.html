<!-- TalkBridge Curation Desk - v5.3 - 2026-06-13 01:00 AM -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TalkBridge Curation v5.3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f1f5f9; }
        .view { display: none; }
        .view.active { display: block; }
        .view-flex.active { display: flex; }
        textarea { resize: none; overflow: hidden; }
        textarea::-webkit-scrollbar { width: 0px; }
        .modal-bg { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(2px); }
        .card-row { border-bottom: 1px solid #f1f5f9; }
        .card-row:last-child { border-bottom: none; }
    </style>
</head>
<body class="text-slate-800 antialiased h-screen overflow-hidden flex flex-col">

    <!-- Global Header -->
    <header class="bg-slate-900 text-white px-3 py-2 flex justify-between items-center shadow-md flex-shrink-0 z-20 relative">
        <div class="flex items-center gap-3">
            <button onclick="navTo('jobs')" id="btn-back" class="hidden text-slate-300 hover:text-white" title="Back">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
            </button>
            <div class="font-bold text-base tracking-tight" id="header-title">
                TB Curation <span class="text-xs font-normal text-slate-400 ml-1">v5.3</span>
            </div>
        </div>
        
        <div id="header-actions" class="hidden flex items-center gap-4">
            <button onclick="addNewCard()" class="text-slate-300 hover:text-green-400 transition" title="Add Phrase">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
            </button>
            <button onclick="saveToGitHub()" id="btn-save" class="text-slate-300 hover:text-blue-400 transition" title="Commit to GitHub">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"></path></svg>
            </button>
        </div>
    </header>

    <main class="flex-1 overflow-y-auto w-full relative pb-10">

        <!-- ========================================== -->
        <!-- WIZARD -->
        <!-- ========================================== -->
        <div id="view-wizard" class="view active max-w-md mx-auto p-4 pt-6">
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="p-4 bg-slate-50 border-b border-slate-100"><h2 class="text-lg font-bold">Workspace Setup</h2></div>
                <div class="p-4 space-y-4">
                    <div id="auth-error" class="hidden bg-red-50 text-red-700 text-xs p-2 rounded border border-red-200"></div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1">GitHub PAT (Required)</label>
                        <input type="password" id="cfg-pat" class="w-full bg-slate-50 border border-slate-200 rounded px-3 py-2 text-sm focus:outline-none focus:border-blue-500">
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-xs font-bold text-slate-500 mb-1">Owner</label>
                            <input type="text" id="cfg-owner" value="acmeproducts" class="w-full bg-slate-50 border border-slate-200 rounded px-3 py-2 text-sm focus:outline-none focus:border-blue-500">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-500 mb-1">Repo</label>
                            <input type="text" id="cfg-repo" value="stuff" class="w-full bg-slate-50 border border-slate-200 rounded px-3 py-2 text-sm focus:outline-none focus:border-blue-500">
                        </div>
                    </div>
                    <button onclick="fetchRepo()" id="btn-fetch" class="w-full bg-slate-800 hover:bg-slate-900 transition text-white font-bold py-2 rounded shadow text-sm">Fetch Phrasebooks</button>
                    
                    <div id="wizard-step-2" class="hidden pt-4 border-t border-slate-100 space-y-4">
                        <div>
                            <label class="block text-xs font-bold text-slate-500 mb-1">Source Phrasebook</label>
                            <select id="cfg-source" onchange="inferTarget()" class="w-full bg-slate-50 border border-slate-200 rounded px-3 py-2 text-sm focus:outline-none focus:border-blue-500"></select>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-500 mb-1">Target Version</label>
                            <input type="text" id="cfg-target" class="w-full bg-blue-50 border border-blue-200 text-blue-800 font-bold rounded px-3 py-2 text-sm focus:outline-none focus:border-blue-500">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-500 mb-1">Reviewer Initials</label>
                            <input type="text" id="cfg-initials" class="w-full bg-slate-50 border border-slate-200 rounded px-3 py-2 text-sm focus:outline-none focus:border-blue-500" placeholder="e.g. JD">
                        </div>
                        <button onclick="createJob()" class="w-full bg-blue-600 hover:bg-blue-700 transition text-white font-bold py-2 rounded shadow text-sm">Generate Job & QR</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- ========================================== -->
        <!-- JOBS -->
        <!-- ========================================== -->
        <div id="view-jobs" class="view max-w-lg mx-auto p-4 pt-6">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-bold">Active Jobs</h2>
                <button onclick="navTo('wizard')" class="text-xs bg-slate-200 hover:bg-slate-300 font-bold py-1 px-3 rounded flex items-center gap-1">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg> New
                </button>
            </div>
            <div id="job-list" class="space-y-3"></div>
        </div>

        <!-- ========================================== -->
        <!-- CURATION DESK -->
        <!-- ========================================== -->
        <div id="view-curation" class="view max-w-3xl mx-auto flex flex-col h-full">
            
            <!-- Omni Search Bar -->
            <div class="bg-white border-b border-slate-200 p-2 shadow-sm z-10 sticky top-0">
                <div class="relative">
                    <svg class="w-5 h-5 absolute left-3 top-2.5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    <input type="text" id="omni-search" oninput="runSearch()" placeholder="Search (* wildcard, - exclude)..." class="w-full bg-slate-100 border border-transparent focus:bg-white focus:border-blue-400 rounded-full pl-10 pr-4 py-2 text-sm outline-none transition-colors">
                </div>
            </div>

            <!-- Bulk Action Bar (Contextual) -->
            <div id="bulk-action-bar" class="hidden bg-blue-50 border-b border-blue-100 p-2 shadow-inner z-0">
                <div class="flex items-center gap-2 max-w-full overflow-x-auto">
                    <span class="text-xs font-bold text-blue-800 whitespace-nowrap pl-1">Bulk Tag:</span>
                    <input type="text" id="bulk-context" placeholder="Context..." class="w-1/3 min-w-[80px] text-xs px-2 py-1.5 border border-blue-200 rounded focus:outline-none">
                    <input type="text" id="bulk-noun" placeholder="Noun..." class="w-1/3 min-w-[80px] text-xs px-2 py-1.5 border border-blue-200 rounded focus:outline-none">
                    <button onclick="applyBulkTags()" class="bg-blue-600 hover:bg-blue-700 text-white text-xs font-bold px-3 py-1.5 rounded transition whitespace-nowrap">Apply to All</button>
                </div>
            </div>

            <div class="p-2 flex-1 relative">
                <!-- Soft Deleted Container -->
                <div id="deleted-container" class="mb-4 hidden">
                    <button onclick="document.getElementById('deleted-list').classList.toggle('hidden')" class="w-full flex justify-between items-center bg-slate-200 px-3 py-2 rounded text-xs font-bold text-slate-600">
                        <span>Soft Deleted (<span id="del-count">0</span>)</span>
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                    </button>
                    <div id="deleted-list" class="hidden mt-1 space-y-1"></div>
                </div>

                <div id="fetch-status" class="hidden p-8 text-center text-slate-500 animate-pulse font-medium"></div>
                <div id="save-error-banner" class="hidden bg-red-100 text-red-800 text-xs font-bold p-3 rounded mb-4 shadow-sm border border-red-200">
                    Commit cannot be completed right now. Uncommitted updates are saved locally. Please try again later.
                </div>

                <!-- Active Cards -->
                <div id="curation-list" class="space-y-3 pb-8"></div>
            </div>
        </div>

    </main>

    <!-- Master Footer -->
    <footer class="fixed bottom-0 w-full bg-slate-900 text-center py-2 text-[10px] text-slate-400 font-mono shadow-lg border-t border-slate-700 z-50">
        TalkBridge Curation Desk v5.3 | <span id="footer-ts"></span>
    </footer>

    <!-- QR Modal -->
    <div id="modal-qr" class="fixed inset-0 modal-bg z-50 view-flex hidden justify-center items-center p-4">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-sm overflow-hidden">
            <div class="p-3 bg-slate-100 flex justify-between items-center border-b border-slate-200">
                <h3 class="font-bold text-sm">Assignment Link</h3>
                <button onclick="closeQrModal()" class="text-slate-500 hover:text-slate-800">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div class="p-6 flex flex-col items-center">
                <div id="qrcode-container" class="bg-white p-2 border border-slate-200 rounded shadow-sm mb-4"></div>
                <input type="text" id="share-link-input" readonly class="w-full bg-slate-50 border border-slate-200 rounded px-2 py-1.5 text-xs font-mono mb-2">
                <button onclick="copyLink()" class="w-full bg-slate-800 text-white text-sm font-bold py-2 rounded flex items-center justify-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                    Copy Link
                </button>
            </div>
        </div>
    </div>

    <!-- App Logic -->
    <script>
        setInterval(() => document.getElementById('footer-ts').textContent = new Date().toLocaleString(), 1000);

        const state = {
            pat: '', owner: 'acmeproducts', repo: 'stuff', 
            initials: 'JD', jobs: [], currentJobId: null,
            cards: [], langPair: 'en|th', currentFileSha: null,
            searchQuery: '', openDrawers: {}
        };

        function navTo(view) {
            document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
            document.getElementById(`view-${view}`).classList.add('active');
            document.getElementById('btn-back').classList.toggle('hidden', view === 'wizard' || view === 'jobs');
            document.getElementById('header-actions').classList.toggle('hidden', view !== 'curation');
        }

        // ==========================================
        // GITHUB AUTH & JOB GENERATION
        // ==========================================
        async function fetchRepo() {
            state.pat = document.getElementById('cfg-pat').value.trim();
            state.owner = document.getElementById('cfg-owner').value.trim();
            state.repo = document.getElementById('cfg-repo').value.trim();
            const errDiv = document.getElementById('auth-error');
            const btn = document.getElementById('btn-fetch');
            const sel = document.getElementById('cfg-source');
            
            if(!state.pat) {
                errDiv.textContent = "A valid GitHub PAT is required.";
                errDiv.classList.remove('hidden'); return;
            }

            errDiv.classList.add('hidden'); btn.textContent = "Fetching...";
            
            try {
                const res = await fetch(`https://api.github.com/repos/${state.owner}/${state.repo}/contents/phrasebooks`, {
                    headers: { 'Authorization': `token ${state.pat}` }
                });
                if (!res.ok) throw new Error(`HTTP ${res.status}: Auth failed or path not found.`);
                const data = await res.json();
                if (!Array.isArray(data)) throw new Error("Target is not a directory.");
                
                const files = data.filter(f => f.name.endsWith('.json')).map(f => f.name).sort().reverse();
                if(files.length === 0) throw new Error("No JSON files found.");

                sel.innerHTML = files.map(f => `<option value="${f}">${f}</option>`).join('');
                document.getElementById('wizard-step-2').classList.remove('hidden');
                inferTarget();
            } catch (e) {
                errDiv.textContent = e.message; errDiv.classList.remove('hidden');
                document.getElementById('wizard-step-2').classList.add('hidden');
            } finally {
                btn.textContent = "Fetch Phrasebooks";
            }
        }

        function inferTarget() {
            const src = document.getElementById('cfg-source').value;
            document.getElementById('cfg-target').value = src.match(/-v(\d+)\.json$/) 
                ? src.replace(/-v\d+\.json$/, `-v${parseInt(RegExp.$1) + 1}.json`) 
                : src.replace(/(-default)?\.json$/, '-v1.json');
            
            const parts = src.split('_');
            if(parts.length >= 3 && parts[1] === 'to') state.langPair = `${parts[0]}|${parts[2]}`;
        }

        function createJob() {
            const initials = document.getElementById('cfg-initials').value.trim();
            state.initials = initials || 'Anon';
            const job = { id: 'j_' + Date.now(), src: document.getElementById('cfg-source').value, tgt: document.getElementById('cfg-target').value, ini: state.initials };
            state.jobs.unshift(job);
            
            const url = `${window.location.origin}${window.location.pathname}?job=${job.id}`;
            document.getElementById('share-link-input').value = url;
            document.getElementById('qrcode-container').innerHTML = '';
            new QRCode(document.getElementById('qrcode-container'), { text: url, width: 140, height: 140 });
            
            renderJobs();
            document.getElementById('modal-qr').classList.remove('hidden');
            document.getElementById('modal-qr').classList.add('active');
        }

        function renderJobs() {
            document.getElementById('job-list').innerHTML = state.jobs.map(j => `
                <div class="bg-white p-3 rounded-lg shadow-sm border border-slate-200 flex justify-between items-center">
                    <div><div class="text-[10px] text-slate-400 font-mono">${j.src}</div><div class="font-bold text-sm text-blue-700">${j.tgt}</div></div>
                    <button onclick="loadCuration('${j.id}')" class="bg-blue-600 hover:bg-blue-700 text-white text-xs font-bold px-4 py-2 rounded">Open</button>
                </div>`).join('');
        }
        function closeQrModal() { document.getElementById('modal-qr').classList.remove('active'); document.getElementById('modal-qr').classList.add('hidden'); navTo('jobs'); }
        function copyLink() { const el = document.getElementById('share-link-input'); el.select(); document.execCommand('copy'); }

        // ==========================================
        // SCHEMA INGESTION
        // ==========================================
        async function loadCuration(jobId) {
            const job = state.jobs.find(j => j.id === jobId);
            state.currentJobId = jobId;
            document.getElementById('header-title').innerHTML = `${job.tgt} <span class="text-xs font-normal text-slate-400 ml-1">v5.3</span>`;
            
            const statusDiv = document.getElementById('fetch-status');
            statusDiv.textContent = 'Fetching JSON from GitHub...'; statusDiv.classList.remove('hidden');
            document.getElementById('curation-list').innerHTML = ''; document.getElementById('deleted-list').innerHTML = '';
            navTo('curation');

            try {
                const res = await fetch(`https://api.github.com/repos/${state.owner}/${state.repo}/contents/phrasebooks/${job.src}`, { headers: { 'Authorization': `token ${state.pat}` } });
                if (!res.ok) throw new Error("Proceeding with empty slate.");
                
                const data = await res.json();
                state.currentFileSha = data.sha;
                const parsed = JSON.parse(decodeURIComponent(escape(atob(data.content))));
                const arr = parsed.cards || parsed; // Handle TalkBridge nested schema

                state.cards = arr.map((item, idx) => ({
                    id: item.id || `pb-${Date.now()}-${idx}`,
                    src: item.source || item.src || item.representation?.source || item.en || '',
                    tgt: item.target || item.tgt || item.representation?.target || '',
                    back: item.backtranslate?.resultText || item.back || '',
                    status: item.backtranslate?.verdict === 'good' ? 'good' : (item.backtranslate?.verdict === 'flag' ? 'flag' : 'pending'),
                    tags: Array.isArray(item.tags) ? item.tags : [],
                    clarifyChain: Array.isArray(item.clarifyChain) ? item.clarifyChain : [],
                    deletedAt: item.deletedAt || null
                }));
            } catch(e) { console.warn(e); state.cards = []; }

            statusDiv.classList.add('hidden');
            state.cards.length === 0 ? addNewCard() : renderAllCards();
        }

        function addNewCard() {
            const c = { id: `pb-${Date.now()}`, src: '', tgt: '', back: '', status: 'pending', tags: [], clarifyChain: [], deletedAt: null };
            state.cards.unshift(c);
            state.searchQuery = ''; document.getElementById('omni-search').value = ''; // clear search to see new card
            renderAllCards();
            window.scrollTo(0,0);
        }

        // ==========================================
        // OMNI SEARCH & RENDER
        // ==========================================
        function runSearch() {
            state.searchQuery = document.getElementById('omni-search').value.trim();
            renderAllCards(); // DOM is small enough that pure re-render on search is standard
        }

        function matchesSearch(c) {
            if(!state.searchQuery) return true;
            const terms = state.searchQuery.toLowerCase().split(/\s+/);
            const blob = [c.src, c.tgt, c.back, ...c.tags, ...c.clarifyChain.map(l=>l.txt)].join(' ').toLowerCase();

            for(let term of terms) {
                if(term.startsWith('-')) {
                    const exclude = term.substring(1).replace(/\*/g, '.*');
                    if(exclude && new RegExp(exclude).test(blob)) return false;
                } else {
                    const include = term.replace(/\*/g, '.*');
                    if(include && !new RegExp(include).test(blob)) return false;
                }
            }
            return true;
        }

        function renderAllCards() {
            const list = document.getElementById('curation-list');
            const delList = document.getElementById('deleted-list');
            list.innerHTML = ''; delList.innerHTML = '';
            let delCount = 0, visibleCount = 0;

            state.cards.forEach(c => {
                if(c.deletedAt) {
                    delCount++; delList.insertAdjacentHTML('beforeend', createDeletedHTML(c));
                } else if (matchesSearch(c)) {
                    visibleCount++; list.insertAdjacentHTML('beforeend', createCardHTML(c));
                }
            });
            
            document.getElementById('del-count').textContent = delCount;
            document.getElementById('deleted-container').classList.toggle('hidden', delCount === 0);
            
            // Bulk Bar logic
            const bulkBar = document.getElementById('bulk-action-bar');
            if (state.searchQuery.length > 0 && visibleCount > 0) { bulkBar.classList.remove('hidden'); } else { bulkBar.classList.add('hidden'); }
            
            document.querySelectorAll('textarea').forEach(el => { el.style.height='auto'; el.style.height=el.scrollHeight+'px'; });
        }

        // ==========================================
        // HTML GENERATORS (STRICT SVG)
        // ==========================================
        function createCardHTML(c) {
            const tagHTML = c.tags.map((t, i) => `<span class="bg-blue-100 text-blue-800 px-2 py-0.5 rounded text-[10px] font-bold flex items-center gap-1" id="tag-${c.id}-${i}">${t} <span onclick="removeTag('${c.id}', ${i})" class="cursor-pointer text-blue-400 hover:text-blue-900">&times;</span></span>`).join('');
            const logHTML = c.clarifyChain.map(l => `<div class="text-[10px] text-slate-500 border-b border-slate-100 pb-1"><span class="font-bold text-slate-700">[${l.ini} ${l.ts}]</span> ${l.txt}</div>`).join('');
            const ttsSvg = `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5 10v4a2 2 0 002 2h2.586a1 1 0 01.707.293l3.414 3.414a1 1 0 001.707-.707V4.414a1 1 0 00-1.707-.707L10.293 7.707A1 1 0 019.586 8H7a2 2 0 00-2 2z"></path></svg>`;
            
            return `
            <div class="bg-white rounded-lg shadow-sm border border-slate-200 overflow-hidden mb-3" id="card-${c.id}">
                <!-- Row 1 -->
                <div class="flex card-row">
                    <div class="w-1/2 p-2 border-r border-slate-100 flex gap-1">
                        <textarea id="src-${c.id}" rows="1" class="w-full text-sm font-medium text-slate-900 focus:outline-none bg-transparent" placeholder="Source..." onkeydown="handleSourceEnter(event, '${c.id}')" onblur="triggerPipeline('${c.id}')">${c.src}</textarea>
                        <button class="text-slate-300 hover:text-blue-500 h-5" title="TTS">${ttsSvg}</button>
                    </div>
                    <div class="w-1/2 p-2 flex gap-1 bg-slate-50">
                        <div class="w-full text-sm text-slate-700" id="tgt-${c.id}">${c.tgt || '<i class="text-slate-400">Target</i>'}</div>
                        <button class="text-slate-300 hover:text-blue-500 h-5" title="TTS">${ttsSvg}</button>
                    </div>
                </div>
                <!-- Row 2 -->
                <div class="card-row p-2 flex gap-1 bg-slate-50/50">
                    <div class="w-full text-sm text-slate-800 font-medium" id="back-${c.id}">${c.back || '<i class="text-slate-400">Back-translate</i>'}</div>
                    <button class="text-slate-300 hover:text-blue-500 h-5" title="TTS">${ttsSvg}</button>
                </div>
                <!-- Row 3 -->
                <div class="card-row p-2 flex justify-center gap-2">
                    <button id="btn-good-${c.id}" onclick="setVerdict('${c.id}', 'good')" class="px-4 py-1 text-xs font-bold rounded-full ${c.status === 'good' ? 'bg-green-600 text-white' : 'bg-green-50 text-green-700'}">Sounds Good</button>
                    <button id="btn-flag-${c.id}" onclick="setVerdict('${c.id}', 'flag')" class="px-4 py-1 text-xs font-bold rounded-full ${c.status === 'flag' ? 'bg-red-600 text-white' : 'bg-red-50 text-red-700'}">Flag</button>
                </div>
                <!-- Row 4 -->
                <div class="grid grid-cols-3 bg-slate-100 border-t border-slate-200 divide-x divide-slate-200 h-8">
                    <button onclick="toggleDrawer('${c.id}', 'tag')" class="flex justify-center items-center ${state.openDrawers[`tag-${c.id}`] ? 'text-blue-600' : 'text-slate-500'}"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 20l4-16m2 16l4-16M6 9h14M4 15h14"></path></svg></button>
                    <button onclick="toggleDrawer('${c.id}', 'log')" class="flex justify-center items-center ${state.openDrawers[`log-${c.id}`] ? 'text-blue-600' : 'text-slate-500'}"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path></svg></button>
                    <button onclick="softDelete('${c.id}')" class="flex justify-center items-center text-slate-500 hover:text-red-600"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg></button>
                </div>
                <!-- Drawers -->
                <div id="drawer-tag-${c.id}" class="${state.openDrawers[`tag-${c.id}`] ? 'block' : 'hidden'} bg-slate-50 p-2 border-t border-slate-200">
                    <input type="text" id="input-tag-${c.id}" placeholder="Format: Context: Banking, Noun: Debit Card (Enter to save)" onkeydown="handleDrawerEnter(event, '${c.id}', 'tag')" class="w-full text-xs p-1.5 border border-slate-200 rounded mb-1 outline-none">
                    <div id="container-tag-${c.id}" class="flex flex-wrap gap-1">${tagHTML}</div>
                </div>
                <div id="drawer-log-${c.id}" class="${state.openDrawers[`log-${c.id}`] ? 'block' : 'hidden'} bg-slate-50 p-2 border-t border-slate-200">
                    <input type="text" id="input-log-${c.id}" placeholder="Clarify intent & hit Enter..." onkeydown="handleDrawerEnter(event, '${c.id}', 'log')" class="w-full text-xs p-1.5 border border-slate-200 rounded mb-2 outline-none">
                    <div id="container-log-${c.id}" class="space-y-1">${logHTML}</div>
                </div>
            </div>`;
        }

        function createDeletedHTML(c) {
            return `
            <div id="del-${c.id}" class="bg-white border border-slate-200 p-2 rounded flex justify-between items-center text-xs">
                <span class="truncate text-slate-500 line-through mr-2">${c.src || 'Empty'}</span>
                <div class="flex gap-2">
                    <button onclick="restoreCard('${c.id}')" class="text-blue-600 font-bold px-2 flex items-center"><svg class="w-3 h-3 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6"></path></svg> Restore</button>
                    <button onclick="permDelete('${c.id}')" class="text-red-600 font-bold px-2 flex items-center"><svg class="w-3 h-3 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg> Perm Delete</button>
                </div>
            </div>`;
        }

        // ==========================================
        // TARGETED DOM & DRAWERS
        // ==========================================
        function handleSourceEnter(e, id) {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); e.target.blur(); }
            autoGrow(e.target);
        }
        function autoGrow(el) { el.style.height = 'auto'; el.style.height = el.scrollHeight + 'px'; }

        async function triggerPipeline(id) {
            const card = state.cards.find(c => c.id === id);
            const newVal = document.getElementById(`src-${id}`).value.trim();
            if (!newVal || newVal === card.src) return;
            
            card.src = newVal; setVerdict(id, 'pending');
            const tgtEl = document.getElementById(`tgt-${id}`); const backEl = document.getElementById(`back-${id}`);
            tgtEl.innerHTML = '<span class="text-blue-500 animate-pulse text-xs">Translating...</span>';
            backEl.innerHTML = '<span class="text-blue-500 animate-pulse text-xs">Waiting...</span>';
            
            try {
                const pair = state.langPair.split('|');
                const r1 = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(newVal)}&langpair=${pair[0]}|${pair[1]}`);
                const d1 = await r1.json();
                card.tgt = d1.responseData.translatedText; tgtEl.textContent = card.tgt;

                backEl.innerHTML = '<span class="text-blue-500 animate-pulse text-xs">Back-translating...</span>';
                const r2 = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(card.tgt)}&langpair=${pair[1]}|${pair[0]}`);
                const d2 = await r2.json();
                card.back = d2.responseData.translatedText; backEl.textContent = card.back;
            } catch (e) { tgtEl.innerHTML = `<span class="text-red-500 text-xs">API Error.</span>`; backEl.innerHTML=''; }
        }

        function toggleDrawer(id, type) {
            const key = `${type}-${id}`;
            state.openDrawers[key] = !state.openDrawers[key];
            // Targeted DOM toggle to avoid complete re-render (which steals focus)
            const drawer = document.getElementById(`drawer-${type}-${id}`);
            const btn = drawer.previousElementSibling.children[type==='tag'?0:1]; // Hacky tree nav, but safe here
            if(state.openDrawers[key]) {
                drawer.classList.replace('hidden', 'block');
                btn.classList.replace('text-slate-500', 'text-blue-600');
                document.getElementById(`input-${type}-${id}`).focus();
            } else {
                drawer.classList.replace('block', 'hidden');
                btn.classList.replace('text-blue-600', 'text-slate-500');
            }
        }

        function handleDrawerEnter(e, id, type) {
            if (e.key === 'Enter') {
                e.preventDefault(); const val = e.target.value.trim(); if (!val) return;
                const card = state.cards.find(c => c.id === id);
                
                if (type === 'tag') {
                    if(!card.tags.includes(val)) {
                        card.tags.push(val);
                        const idx = card.tags.length - 1;
                        document.getElementById(`container-tag-${id}`).insertAdjacentHTML('beforeend', `<span class="bg-blue-100 text-blue-800 px-2 py-0.5 rounded text-[10px] font-bold flex items-center gap-1" id="tag-${id}-${idx}">${val} <span onclick="removeTag('${id}', ${idx})" class="cursor-pointer text-blue-400 hover:text-blue-900">&times;</span></span>`);
                    }
                } else if (type === 'log') {
                    const log = { ini: state.initials, ts: new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}), txt: val };
                    card.clarifyChain.unshift(log);
                    document.getElementById(`container-log-${id}`).insertAdjacentHTML('afterbegin', `<div class="text-[10px] text-slate-500 border-b border-slate-100 pb-1"><span class="font-bold text-slate-700">[${log.ini} ${log.ts}]</span> ${log.txt}</div>`);
                }
                
                e.target.value = ''; // Instantly ready for next
            }
        }

        function removeTag(id, idx) {
            const card = state.cards.find(c => c.id === id);
            card.tags.splice(idx, 1);
            document.getElementById(`tag-${id}-${idx}`).remove();
        }

        function setVerdict(id, v) {
            const card = state.cards.find(c => c.id === id);
            card.status = card.status === v ? 'pending' : v;
            const bg = document.getElementById(`btn-good-${id}`); const bf = document.getElementById(`btn-flag-${id}`);
            bg.className = `px-4 py-1 text-xs font-bold rounded-full ${card.status==='good'?'bg-green-600 text-white':'bg-green-50 text-green-700'}`;
            bf.className = `px-4 py-1 text-xs font-bold rounded-full ${card.status==='flag'?'bg-red-600 text-white':'bg-red-50 text-red-700'}`;
        }

        function applyBulkTags() {
            const ctx = document.getElementById('bulk-context').value.trim();
            const nn = document.getElementById('bulk-noun').value.trim();
            if(!ctx && !nn) return;
            
            const p = ctx ? `Context: ${ctx}` : ''; const c = nn ? `Noun: ${nn}` : '';
            state.cards.filter(card => !card.deletedAt && matchesSearch(card)).forEach(card => {
                if(p && !card.tags.includes(p)) card.tags.push(p);
                if(c && !card.tags.includes(c)) card.tags.push(c);
            });
            renderAllCards();
        }

        // ==========================================
        // DELETION
        // ==========================================
        function softDelete(id) {
            state.cards.find(c => c.id === id).deletedAt = Date.now();
            document.getElementById(`card-${id}`).remove();
            renderAllCards(); // Recalculate soft delete container easily
        }
        function restoreCard(id) {
            state.cards.find(c => c.id === id).deletedAt = null;
            renderAllCards();
        }
        function permDelete(id) {
            if(confirm("Permanently delete?")) {
                state.cards = state.cards.filter(c => c.id !== id);
                renderAllCards();
            }
        }

        // ==========================================
        // COMMIT / FAILSAFE
        // ==========================================
        async function saveToGitHub() {
            const btn = document.getElementById('btn-save'); const orig = btn.innerHTML;
            const errBanner = document.getElementById('save-error-banner');
            errBanner.classList.add('hidden');
            btn.innerHTML = `<svg class="w-5 h-5 animate-spin text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>`;
            
            const payload = { type: "phrasebook", version: "1.2", cards: state.cards.map(c => ({
                id: c.id, source: c.src, target: c.tgt, tags: c.tags,
                backtranslate: { resultText: c.back, verdict: c.status },
                clarifyChain: c.clarifyChain, deletedAt: c.deletedAt
            }))};
            
            try {
                if(!state.pat) throw new Error("No PAT");
                const job = state.jobs.find(j => j.id === state.currentJobId);
                const content = btoa(unescape(encodeURIComponent(JSON.stringify(payload, null, 2))));
                const res = await fetch(`https://api.github.com/repos/${state.owner}/${state.repo}/contents/phrasebooks/${job.tgt}`, {
                    method: 'PUT', headers: { 'Authorization': `token ${state.pat}` },
                    body: JSON.stringify({ message: "TB Curation Desk Update", content, sha: state.currentFileSha })
                });
                if(!res.ok) throw new Error("Commit Failed");
                const data = await res.json();
                state.currentFileSha = data.content.sha;
                btn.innerHTML = `<svg class="w-5 h-5 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>`;
            } catch(e) {
                console.warn(e);
                errBanner.classList.remove('hidden'); // Failsafe logic executed exactly per spec
                btn.innerHTML = `<svg class="w-5 h-5 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>`;
            }
            setTimeout(() => btn.innerHTML = orig, 3000);
        }

        navTo('wizard');
    </script>
</body>
</html>
