<!DOCTYPE html>
<!-- talkbridge · 2026-04-21 · ribbon-controls, chat-compose, lang-routing, voice-typing -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<title>TalkBridge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Lora:wght@500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0a0a0a;--surface:#161616;--surface2:#222;
  --teal:#2E8B8B;--teal-bright:#3FC1C1;
  --text:#e8e4df;--text-dim:#888;--text-muted:#555;
  --red:#e74c3c;--green:#2ecc71;
  --radius:14px;
}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:"DM Sans",sans-serif;color:var(--text);}

/* LOBBY */
.lobby{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;z-index:10;background:var(--bg);transition:opacity .3s;overflow-y:auto;}
.lobby.hidden{opacity:0;pointer-events:none;}
.lobby-card{width:min(100%,380px);display:flex;flex-direction:column;gap:16px;}
.lobby-brand{font-family:"Lora",serif;font-size:32px;font-weight:600;color:var(--teal-bright);text-align:center;letter-spacing:-0.5px;}
.lobby-sub{font-size:13px;color:var(--text-dim);text-align:center;margin-top:-8px;}
.lobby-label{font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:-8px;}
.lobby-input{width:100%;background:var(--surface);color:var(--text);border:1.5px solid var(--surface2);border-radius:10px;padding:12px 14px;font-size:15px;font-family:"DM Sans",sans-serif;outline:none;}
.lobby-input:focus{border-color:var(--teal);}
.lobby-input::placeholder{color:var(--text-muted);}
.lobby-select{width:100%;background:var(--surface);color:var(--text);border:1.5px solid var(--surface2);border-radius:10px;padding:12px 14px;font-size:15px;font-family:"DM Sans",sans-serif;outline:none;-webkit-appearance:none;appearance:none;cursor:pointer;}
.lobby-select:focus{border-color:var(--teal);}
.lobby-btn{width:100%;background:var(--teal);color:#fff;border:none;border-radius:12px;padding:14px;font-size:16px;font-weight:600;cursor:pointer;font-family:"DM Sans",sans-serif;transition:opacity .15s;margin-top:4px;}
.lobby-btn:hover{opacity:.85;}
.lobby-btn:disabled{opacity:.4;cursor:default;}
.lobby-btn.secondary{background:var(--surface2);color:var(--text);}
.lobby-btn.secondary:hover{background:var(--teal);color:#fff;opacity:1;}
.lobby-link-box{background:var(--surface);border:1.5px solid var(--surface2);border-radius:10px;padding:12px;word-break:break-all;font-size:11px;color:var(--teal-bright);margin-bottom:12px;cursor:pointer;}
.lobby-link-row{display:flex;gap:8px;}
.lobby-link-btn{flex:1;background:var(--surface2);color:var(--text);border:none;border-radius:10px;padding:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:"DM Sans",sans-serif;}
.lobby-link-btn:hover{background:var(--teal);color:#fff;}
.lobby-preview{width:min(100%,280px);aspect-ratio:16/9;border-radius:var(--radius);overflow:hidden;background:var(--surface);margin:0 auto 8px;}
.lobby-preview video{width:100%;height:100%;object-fit:cover;transform:scaleX(-1);}
.recent-rooms{margin-top:6px;display:flex;flex-direction:column;gap:8px;}
.recent-title{font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.6px;}
.recent-item{background:var(--surface);border:1px solid var(--surface2);border-radius:10px;padding:10px 12px;}
.recent-item-top{display:flex;align-items:center;gap:8px;}
.recent-open{flex:1;min-width:0;background:none;border:none;color:var(--text);text-align:left;cursor:pointer;font:inherit;font-size:14px;font-weight:500;}
.recent-open small{display:block;color:var(--text-dim);font-size:11px;}
.recent-actions{display:flex;gap:6px;margin-top:8px;}
.recent-act{flex:1;background:rgba(255,255,255,.06);color:var(--text-dim);border:none;border-radius:8px;padding:6px;font-size:11px;font-weight:600;cursor:pointer;font-family:"DM Sans",sans-serif;}
.recent-act:hover{background:var(--teal);color:#fff;}
.recent-act.danger{color:var(--red);}
.recent-act.danger:hover{background:var(--red);color:#fff;}
.lobby-footer{display:flex;gap:8px;margin-top:4px;}
.lobby-footer-btn{flex:1;background:none;border:1px solid var(--surface2);border-radius:8px;color:var(--text-dim);padding:8px;font-size:12px;cursor:pointer;font-family:"DM Sans",sans-serif;}
.lobby-footer-btn:hover{background:var(--surface2);color:var(--text);}

/* JOINING */
.joining-screen{position:fixed;inset:0;background:var(--bg);z-index:20;display:none;align-items:center;justify-content:center;flex-direction:column;gap:16px;}
.joining-screen.show{display:flex;}
.joining-spinner{width:40px;height:40px;border:3px solid var(--surface2);border-top-color:var(--teal-bright);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.joining-label{font-size:14px;color:var(--text-dim);}

/* DEBUG LOG overlay */
.log-overlay{position:fixed;inset:0;background:rgba(0,0,0,.96);z-index:50;display:none;flex-direction:column;}
.log-overlay.show{display:flex;}
.log-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--surface2);flex-shrink:0;gap:8px;flex-wrap:wrap;}
.log-title{font-family:"Lora",serif;font-size:17px;color:var(--teal-bright);}
.log-actions{display:flex;gap:6px;flex-wrap:wrap;}
.log-btn{background:var(--surface2);color:var(--text);border:none;border-radius:8px;padding:7px 12px;font-size:12px;font-weight:600;cursor:pointer;font-family:"DM Sans",sans-serif;}
.log-btn:hover{background:var(--teal);color:#fff;}
.log-body{flex:1;overflow-y:auto;padding:10px 16px 20px;font-family:monospace;font-size:11px;line-height:1.7;color:#aaa;}
.log-row{border-bottom:1px solid rgba(255,255,255,.03);padding:1px 0;}
.log-row .ts{color:#555;}.log-row .ev{color:var(--teal-bright);}
.log-row.error .ev{color:#e74c3c;}.log-row.warn .ev{color:#f39c12;}.log-row.ok .ev{color:#2ecc71;}

/* === CALL — 4-row flex: top-ribbon | video | transcript | compose === */
.call{position:fixed;inset:0;background:#000;z-index:5;display:none;flex-direction:column;}
.call.active{display:flex;}

/* TOP RIBBON — flags | room name | controls */
.call-ribbon{display:flex;align-items:center;gap:6px;padding:4px 10px max(4px,env(safe-area-inset-top));background:var(--surface);flex-shrink:0;z-index:6;min-height:44px;}
.ribbon-flags{font-size:18px;flex-shrink:0;letter-spacing:2px;}
.ribbon-room{flex:1;min-width:0;font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:0 6px;}
.ribbon-ctrl{width:36px;height:36px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s,transform .1s;background:rgba(255,255,255,.08);color:#fff;flex-shrink:0;}
.ribbon-ctrl:hover{background:rgba(255,255,255,.16);}
.ribbon-ctrl:active{transform:scale(.92);}
.ribbon-ctrl.off{background:rgba(231,76,60,.15);color:var(--red);}
.ribbon-ctrl.end-call{background:var(--red);color:#fff;border-radius:14px;width:auto;padding:0 14px;font-size:12px;font-weight:700;font-family:"DM Sans",sans-serif;gap:4px;}
.ribbon-ctrl.end-call:hover{background:#c0392b;}
.ribbon-ctrl svg{pointer-events:none;}

.call-videos{position:relative;background:#000;overflow:hidden;flex:1;min-height:0;}
#remote-video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;background:#000;z-index:1;}
#local-video{position:absolute;top:8px;right:8px;width:min(14%,80px);aspect-ratio:9/16;border-radius:8px;object-fit:cover;transform:scaleX(-1);border:2px solid rgba(255,255,255,.2);box-shadow:0 2px 12px rgba(0,0,0,.5);z-index:3;background:var(--surface);}
.no-video-placeholder{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:48px;color:var(--text-muted);z-index:1;}
.solo-banner{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:2;text-align:center;pointer-events:none;}
.solo-banner-text{background:rgba(0,0,0,.6);color:var(--text-dim);font-size:13px;padding:8px 18px;border-radius:20px;backdrop-filter:blur(6px);}
.subtitle-area{position:absolute;bottom:0;left:0;right:0;z-index:4;padding:8px 14px 10px;pointer-events:none;display:flex;flex-direction:column;align-items:center;gap:4px;background:linear-gradient(transparent,rgba(0,0,0,.6) 40%);}
.subtitle-line{max-width:94%;padding:4px 12px;border-radius:6px;font-size:14px;line-height:1.35;text-align:center;word-break:break-word;}
.subtitle-line.partner{background:rgba(0,0,0,.6);color:#fff;}
.subtitle-line.mine{background:rgba(46,139,139,.2);color:rgba(255,255,255,.65);font-size:12px;}
.subtitle-line.translation{background:rgba(63,193,193,.2);color:#fff;font-size:13px;}
.subtitle-line.partner-source{background:rgba(255,255,255,.07);color:rgba(255,255,255,.6);font-size:11px;}
.partner-speaking-indicator{position:absolute;right:12px;bottom:56px;z-index:5;min-width:34px;height:24px;border-radius:999px;background:rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.2);color:#fff;display:none;align-items:center;justify-content:center;font-size:18px;font-weight:700;line-height:1;backdrop-filter:blur(4px);}
.partner-speaking-indicator.show{display:flex;animation:pulseSpeak .9s ease-in-out infinite alternate;}
@keyframes pulseSpeak{from{opacity:.55;transform:scale(.98)}to{opacity:1;transform:scale(1.03)}}

.call-transcript{position:relative;flex:0 0 30%;min-height:0;max-height:40%;overflow-y:auto;background:var(--bg);border-top:1px solid var(--surface2);padding:0 12px;transition:flex-basis .2s ease;}
.call-transcript-header{display:flex;align-items:center;justify-content:flex-start;padding:8px 0;position:sticky;top:0;background:var(--bg);z-index:1;gap:8px;}
.call-transcript-title{font-size:12px;font-weight:700;color:var(--text-dim);letter-spacing:.3px;}
.call-transcript-actions{display:flex;gap:6px;}
.call-transcript-btn{width:24px;height:24px;display:flex;align-items:center;justify-content:center;background:transparent;color:#8f959d;border:1px solid rgba(255,255,255,.18);border-radius:7px;cursor:pointer;padding:0;}
.call-transcript-btn:hover{background:rgba(255,255,255,.06);color:#b6bcc3;border-color:rgba(255,255,255,.26);}
.call-transcript-btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.call.transcript-collapsed .chevron-down{display:none;}
.call:not(.transcript-collapsed) .chevron-right{display:none;}
.transcript-more-indicator{position:absolute;right:6px;top:50%;transform:translateY(-50%);z-index:3;width:22px;height:22px;border-radius:999px;background:rgba(46,139,139,.2);color:var(--teal-bright);border:1px solid rgba(63,193,193,.35);display:none;align-items:center;justify-content:center;font-size:14px;font-weight:700;pointer-events:none;}
.transcript-more-indicator.show{display:flex;}
.call.transcript-collapsed .call-transcript{flex:0 0 32px;max-height:32px;overflow:hidden;}
.call.transcript-collapsed #transcript-body{display:none;}
.call-videos.swapped #remote-video{top:8px;right:8px;left:auto;bottom:auto;width:min(14%,80px);height:auto;aspect-ratio:9/16;border-radius:8px;border:2px solid rgba(255,255,255,.2);box-shadow:0 2px 12px rgba(0,0,0,.5);z-index:3;}
.call-videos.swapped #local-video{inset:0;width:100%;height:100%;border-radius:0;border:none;box-shadow:none;z-index:1;}
.tr-entry{padding:6px 0;}
.tr-bubble{border:1px solid rgba(255,255,255,.14);border-radius:12px;overflow:hidden;background:rgba(255,255,255,.02);}
.tr-head{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:6px 10px;border-bottom:1px solid rgba(255,255,255,.08);font-size:11px;}
.tr-who{font-weight:700;color:var(--text-dim);}
.tr-who.mine{color:var(--teal-bright);}
.tr-time{font-size:10px;color:var(--text-muted);font-variant-numeric:tabular-nums;}
.tr-body{display:grid;grid-template-columns:1fr 1px 1fr;}
.tr-col{padding:8px 10px;display:flex;flex-direction:column;gap:6px;min-width:0;}
.tr-divider{background:rgba(255,255,255,.08);}
.tr-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;color:var(--text-muted);}
.tr-text{font-size:13px;line-height:1.4;color:var(--text);word-break:break-word;}
.tr-col.source .tr-text{color:var(--text-dim);}
.tr-tts{border:none;background:transparent;color:#8f959d;cursor:pointer;padding:0;display:flex;align-items:center;gap:4px;font-size:10px;line-height:1;}
.tr-tts:hover{color:#c4ccd4;}
.tr-tts svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.tr-empty{color:var(--text-muted);font-size:12px;font-style:italic;padding:12px 0;}

/* CHAT COMPOSE STRIP — sticky bottom */
.call-compose{display:flex;align-items:flex-end;gap:8px;padding:6px 10px max(6px,env(safe-area-inset-bottom));background:var(--surface);border-top:1px solid var(--surface2);flex-shrink:0;}
.compose-mic{width:38px;height:38px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;background:rgba(255,255,255,.08);color:var(--text-dim);flex-shrink:0;transition:background .15s,color .15s;}
.compose-mic:hover{background:rgba(255,255,255,.14);color:var(--text);}
.compose-mic.active{background:var(--red);color:#fff;animation:micPulse 1.2s ease-in-out infinite;}
@keyframes micPulse{0%,100%{box-shadow:0 0 0 0 rgba(231,76,60,.4)}50%{box-shadow:0 0 0 8px rgba(231,76,60,0)}}
.compose-wrap{flex:1;position:relative;}
.compose-input{width:100%;background:var(--surface2);color:var(--text);border:1.5px solid rgba(255,255,255,.1);border-radius:20px;padding:8px 14px;font-size:15px;font-family:"DM Sans",sans-serif;outline:none;resize:none;min-height:38px;max-height:100px;line-height:1.4;overflow:hidden;}
.compose-input:focus{border-color:var(--teal);}
.compose-input::placeholder{color:var(--text-muted);}
.compose-send{width:38px;height:38px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;background:var(--teal);color:#fff;flex-shrink:0;transition:opacity .15s;}
.compose-send:disabled{opacity:.3;cursor:default;}

#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(255,255,255,.15);backdrop-filter:blur(12px);color:#fff;font-size:13px;font-weight:600;padding:10px 20px;border-radius:22px;z-index:100;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

@media(min-width:768px){
  .lobby-card{width:420px;}
  #local-video{width:min(18%,160px);}
  .subtitle-line{font-size:16px;max-width:80%;}
  .call-transcript{flex-basis:28%;}
  .call-ribbon{padding:6px 16px;}
  .ribbon-ctrl{width:40px;height:40px;}
  .call-compose{padding:8px 16px max(8px,env(safe-area-inset-bottom));}
}
@media(max-height:500px) and (orientation:landscape){
  .call-transcript{flex-basis:34%;}
  #local-video{width:min(16%,90px);top:6px;right:6px;}
  .subtitle-line{font-size:12px;padding:3px 8px;}
  .call-ribbon{padding:3px 8px;min-height:36px;}
  .ribbon-ctrl{width:30px;height:30px;}
}
</style>
</head>
<body>

<div class="lobby" id="lobby">
  <div class="lobby-card">
    <div class="lobby-brand">TalkBridge</div>
    <div class="lobby-sub">Video call with live subtitles</div>
    <div id="lobby-setup">
      <div style="display:flex;flex-direction:column;gap:12px;">
        <div><div class="lobby-label" style="margin-bottom:6px;">Room name (optional)</div>
        <input class="lobby-input" id="room-name" placeholder="e.g. English ↔ Thai session" maxlength="60"></div>
        <div><div class="lobby-label" style="margin-bottom:6px;">I speak</div>
        <select class="lobby-select" id="my-lang"></select></div>
        <div><div class="lobby-label" style="margin-bottom:6px;">They speak</div>
        <select class="lobby-select" id="their-lang"></select></div>
        <div><div class="lobby-label" style="margin-bottom:6px;">Deepgram API key</div>
        <input class="lobby-input" id="dg-key" type="password" placeholder="Paste key — stored locally" oninput="syncBtn()"></div>
        <button class="lobby-btn" id="create-btn" onclick="createRoom()" disabled>Start a room</button>
      </div>
      <div class="recent-rooms" id="recent-rooms" style="display:none;">
        <div class="recent-title">Recent rooms</div>
        <div id="recent-rooms-list"></div>
      </div>
      <div class="lobby-footer">
        <button class="lobby-footer-btn" onclick="openLog()">🪲 Debug log</button>
      </div>
    </div>
    <div id="lobby-waiting" style="display:none;">
      <div class="lobby-preview"><video id="preview-video" autoplay muted playsinline></video></div>
      <div style="font-size:14px;color:var(--text-dim);text-align:center;margin-bottom:10px;" id="room-name-display"></div>
      <div class="lobby-link-box" id="lobby-link" onclick="copyLink()">—</div>
      <div class="lobby-link-row">
        <button class="lobby-link-btn" onclick="copyLink()">Copy link</button>
        <button class="lobby-link-btn" onclick="shareLink()">Share</button>
      </div>
      <button class="lobby-btn secondary" style="margin-top:8px;" onclick="backToSetup()">← Back</button>
      <div style="margin-top:12px;font-size:12px;color:var(--text-muted);text-align:center;">Or wait for partner to join via link…</div>
    </div>
  </div>
</div>

<div class="joining-screen" id="joining-screen">
  <div class="joining-spinner"></div>
  <div class="joining-label" id="joining-label">Joining call…</div>
</div>

<div class="log-overlay" id="log-overlay">
  <div class="log-header">
    <span class="log-title">🪲 Debug Log</span>
    <div class="log-actions">
      <button class="log-btn" onclick="copyLogText()">Copy</button>
      <button class="log-btn" onclick="clearLogText()">Clear</button>
      <button class="log-btn" onclick="closeLog()">✕ Close</button>
    </div>
  </div>
  <div class="log-body" id="log-body"></div>
</div>

<div class="log-overlay" id="room-tr-overlay">
  <div class="log-header">
    <span class="log-title" id="room-tr-title">Transcript</span>
    <div class="log-actions">
      <button class="log-btn" onclick="copyRoomTr()">Copy</button>
      <button class="log-btn" onclick="closeRoomTr()">✕ Close</button>
    </div>
  </div>
  <div class="log-body" id="room-tr-body" style="font-family:'DM Sans',sans-serif;font-size:13px;"></div>
</div>

<div class="call" id="call-screen">
  <!-- TOP RIBBON: flags | room name | mic cam end -->
  <div class="call-ribbon">
    <span class="ribbon-flags" id="ribbon-flags">🌐 → 🌐</span>
    <span class="ribbon-room" id="ribbon-room">No room</span>
    <button class="ribbon-ctrl" id="mic-btn" onclick="toggleMic()" title="Mute/unmute">
      <svg id="mic-on" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
      <svg id="mic-off" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/><line x1="2" y1="22" x2="22" y2="2" stroke="#e74c3c" stroke-width="2.5"/></svg>
    </button>
    <button class="ribbon-ctrl" id="cam-btn" onclick="toggleCam()" title="Camera">
      <svg id="cam-on" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
      <svg id="cam-off" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/><line x1="2" y1="22" x2="22" y2="2" stroke="#e74c3c" stroke-width="2.5"/></svg>
    </button>
    <button class="ribbon-ctrl end-call" onclick="hangUp()" title="End call">

function $(id){return document.getElementById(id)}

}

/* ═══ LANGUAGE DETECTION — script-range + fastText WASM ═══ */
function detectLangScript(t){
  if(!t)return null;
  if(/[฀-๿]/.test(t))return'th';
  if(/[぀-ヿ]/.test(t))return'ja';
  if(/[一-鿿\u4E00-\u9FFF]/.test(t))return'zh';
  if(/[가-힯]/.test(t))return'ko';
  if(/[؀-ۿ]/.test(t))return'ar';
  if(/[\u0900-\u097F]/.test(t))return'hi';
  if(/[\u0400-\u04FF]/.test(t))return'ru';
  return null;
}

var _ftReady=false,_ftModule=null,_ftLoadFailed=false,_ftPending=[];
var CONFIDENT_THRESHOLD=0.5;

function loadFastText(){
  if(_ftReady||_ftLoadFailed)return;
  var script=document.createElement('script');
  script.src='/fastText/fasttext.js';
  script.onerror=function(){_ftLoadFailed=true;log('ft_load_fail',{},'warn');_ftPending.forEach(function(cb){cb(null)});_ftPending=[]};
  script.onload=function(){
    if(typeof FastText==='undefined'){_ftLoadFailed=true;_ftPending.forEach(function(cb){cb(null)});_ftPending=[];return}
    try{
      var ft=new FastText();
      ft.loadModel('/fastText/models/lid.176.ftz').then(function(){
        _ftModule=ft;_ftReady=true;log('ft_ready',{},'ok');
        _ftPending.forEach(function(cb){cb(ft)});_ftPending=[];
      }).catch(function(){_ftLoadFailed=true;_ftPending.forEach(function(cb){cb(null)});_ftPending=[]});
    }catch(_){_ftLoadFailed=true;_ftPending.forEach(function(cb){cb(null)});_ftPending=[]}
  };
  document.head.appendChild(script);
}

function detectLang(text,fb){
  var t=(text||'').trim();if(!t)return fb||'en';
  var sr=detectLangScript(t);if(sr)return sr;
  if(_ftReady&&_ftModule){
    try{var r=_ftModule.predict(t,1);if(r&&r.length&&(r[0].prob||0)>=CONFIDENT_THRESHOLD){var lang=r[0].label.replace('__label__','');log('ft_detect',{lang:lang,p:r[0].prob.toFixed(2)});return lang||fb||'en'}}catch(_){}
  }
  return fb||'en';
}

function detectLangAsync(text){
  var t=(text||'').trim();if(!t)return Promise.resolve(null);
  var sr=detectLangScript(t);if(sr)return Promise.resolve(sr);
  if(_ftLoadFailed)return Promise.resolve(null);
  if(_ftReady&&_ftModule){
    try{var r=_ftModule.predict(t,1);if(r&&r.length&&(r[0].prob||0)>=CONFIDENT_THRESHOLD)return Promise.resolve(r[0].label.replace('__label__',''))}catch(_){}
    return Promise.resolve(null);
  }
  return new Promise(function(resolve){
    _ftPending.push(function(ft){
      if(!ft){resolve(null);return}
      try{var r=ft.predict(t,1);if(r&&r.length&&(r[0].prob||0)>=CONFIDENT_THRESHOLD){resolve(r[0].label.replace('__label__',''));return}}catch(_){}
      resolve(null);
    });
    if(_ftPending.length===1)loadFastText();
  });
}

function gL(c){c=(c||'').toLowerCase();for(var i=0;i<LANGS.length;i++)if(LANGS[i].code===c)return LANGS[i];return{code:c||'?',label:(c||'?').toUpperCase(),flag:'🌐'}}

function syncTranscriptTtsButton(){var b=$('transcript-tts-toggle');if(!b)return;b.classList.toggle('off',!transcriptTtsOn);b.style.color=transcriptTtsOn?'#b6bcc3':'#8f959d';b.title=transcriptTtsOn?'Transcript TTS on':'Transcript TTS off';b.setAttribute('aria-label',b.title);b.setAttribute('aria-pressed',transcriptTtsOn?'true':'false');var onIcon=b.querySelector('.tts-on'),offIcon=b.querySelector('.tts-off');if(onIcon)onIcon.style.display=transcriptTtsOn?'':'none';if(offIcon)offIcon.style.display=transcriptTtsOn?'none':''}
function toggleTranscriptTts(){transcriptTtsOn=!transcriptTtsOn;syncTranscriptTtsButton();if(!transcriptTtsOn&&window.speechSynthesis)window.speechSynthesis.cancel()}
function speakText(text,lang){text=norm(text);if(!text||!window.speechSynthesis)return;window.speechSynthesis.cancel();var u=new SpeechSynthesisUtterance(text);u.lang=TTS_LOCALE[lang]||lang||TTS_LOCALE[room.myLang]||'en-US';window.speechSynthesis.speak(u)}
function toggleTranscript(){transcriptCollapsed=!transcriptCollapsed;$('call-screen').classList.toggle('transcript-collapsed',transcriptCollapsed);syncTranscriptToggleButton()}
function swapVideos(){document.querySelector('.call-videos').classList.toggle('swapped')}

function translate(text,from,to){
  if(!text||!from||!to||from===to)return Promise.resolve(text);
  var k=from+'|'+to+'|'+text;if(trCache.has(k))return Promise.resolve(trCache.get(k));
  return fetch('https://api.mymemory.translated.net/get?q='+encodeURIComponent(text)+'&langpair='+from+'|'+to)
    .then(function(r){return r.json()}).then(function(d){if(d&&d.responseStatus===200&&d.responseData){var t=d.responseData.translatedText;if(t&&t.indexOf('MYMEMORY')<0){trCache.set(k,t);return t}}return text}).catch(function(){return text});
}

function openLog(){log('log_open',{dev:deviceId,dg:!!localStorage.getItem('tb_dg_key')});$('log-overlay').classList.add('show')}
function closeLog(){$('log-overlay').classList.remove('show')}
function clearLogText(){debugLog=[];$('log-body').innerHTML='';toast('Cleared')}
function copyLogText(){var t=debugLog.map(function(r){return r.ts+' ['+r.ev+'] '+JSON.stringify(r.d)}).join('\n');if(navigator.clipboard)navigator.clipboard.writeText(t).then(function(){toast('Copied')})}

function trKey(id){return TP+(id||room.id)}
function saveTr(){if(room.id)try{localStorage.setItem(trKey(),JSON.stringify(transcript))}catch(_){}}
function loadTr(id){try{var r=localStorage.getItem(trKey(id||room.id));return r?JSON.parse(r):[]}catch(_){return[]}}
function clearTrS(id){try{localStorage.removeItem(trKey(id))}catch(_){}}

function encInv(p){try{return btoa(unescape(encodeURIComponent(JSON.stringify(p)))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'')}catch(_){return''}}
function decInv(s){if(!s)return null;try{var b=s.replace(/-/g,'+').replace(/_/g,'/');while(b.length%4)b+='=';return JSON.parse(decodeURIComponent(escape(atob(b))))}catch(_){return null}}
function invUrl(){var k=($('dg-key')&&$('dg-key').value)||localStorage.getItem('tb_dg_key')||'';return location.href.split('?')[0].split('#')[0]+'#j='+encInv({r:room.id,ml:room.myLang,tl:room.theirLang,n:room.name||'',k:k});}

var LS={setup:'setup',waiting:'waiting',call:'call'};
var lobbyState=LS.setup;
function setLS(s){lobbyState=s;$('lobby-setup').style.display=s===LS.setup?'':'none';$('lobby-waiting').style.display=s===LS.waiting?'block':'none'}
function backToSetup(){if(videoStream){videoStream.getTracks().forEach(function(t){t.stop()});videoStream=null}setLS(LS.setup)}
function getRecent(){try{return JSON.parse(localStorage.getItem(RK)||'[]')}catch(_){return[]}}
function setRecent(r){localStorage.setItem(RK,JSON.stringify(r.slice(0,RL)))}
function saveRecent(){
  if(!room.id)return;var rows=getRecent().filter(function(r){return r.id!==room.id});

function delRecent(id){setRecent(getRecent().filter(function(r){return r.id!==id}));clearTrS(id);renderRecent()}

async function reuseRoom(id){

function viewRoomTr(id){
  var rec=getRecent().find(function(r){return r.id===id});var entries=loadTr(id);viewingRoomId=id;

  var b=$('room-tr-body');
  if(!entries.length){b.innerHTML='<div style="color:var(--text-muted);padding:16px;font-style:italic;">No transcript saved.</div>'}
  else{b.innerHTML=entries.map(function(e){var ts=new Date(e.ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'});var w=e.who==='me'?'You':'Partner';var wc=e.who==='me'?'color:var(--teal-bright)':'color:var(--text-dim)';var s=e.sourceText===e.translatedText;return '<div style="padding:8px 0;border-bottom:1px solid rgba(255,255,255,.05)"><div style="font-size:10px;font-weight:700;text-transform:uppercase;'+wc+'">'+w+' · '+(e.srcLang||'').toUpperCase()+' · '+ts+'</div><div style="color:var(--text-dim);margin-top:2px">'+esc(e.sourceText)+'</div>'+(s?'':'<div style="color:var(--text);margin-top:2px">→ '+esc(e.translatedText)+'</div>')+'</div>'}).join('')}
  $('room-tr-overlay').classList.add('show');
}

function connectRelay(){

  ws=new WebSocket(RELAY_WS+'?app='+encodeURIComponent(RELAY_APP)+'&session='+encodeURIComponent(room.id)+'&client='+encodeURIComponent(deviceId));
  var _ws=ws;
  ws.onopen=function(){log('relay_open',{},'ok');relaySend({type:'hello',lang:room.myLang,targetLang:room.theirLang,role:room.role});startHB();if(room.role==='joiner'&&!pc)setupPC();};
  ws.onmessage=function(e){try{handleRelay(JSON.parse(e.data))}catch(_){}};
  ws.onclose=function(ev){if(ws!==_ws)return;log('relay_close',{code:ev.code},'warn');stopHB();clearTimeout(wsReconnectTimer);if(room.id&&(lobbyState===LS.waiting||lobbyState===LS.call))wsReconnectTimer=setTimeout(function(){wsReconnectTimer=null;if(room.id)connectRelay()},2000)};
  ws.onerror=function(){log('relay_err',{},'error')};
}
function relaySend(m){if(!ws||ws.readyState!==1)return;m.session=room.id;m.from=deviceId;m.ts=Date.now();m.seq=++seq;try{ws.send(JSON.stringify(m))}catch(_){}}

function handleRelay(d){
  if(!d||d.from===deviceId)return;
  if(d.type==='hello'){
    if(lobbyState===LS.waiting){room.solo=false;enterCall();return}
    if(lobbyState===LS.call){room.solo=false;$('solo-banner').style.display='none';if(!pc)setupPC();}
    return;
  }
  if(d.type==='ping'){relaySend({type:'pong',transient:true});return}
  if(d.type==='pong')return;
  if(d.type==='webrtc-signal'){handleSig(d);return}
  if(d.type==='subtitle'){
    markPartnerTalking();
    if(d.text&&d.targetLang===room.myLang)showSub(d.text,'partner');
    addTr('partner',d.sourceText,d.text,d.sourceLang,d.targetLang,d.subtitleSeq);return;
  }
  if(d.type==='subtitle-update'){
    markPartnerTalking();
    if(d.text&&d.targetLang===room.myLang)showSub(d.text,'partner');
    patchTr('partner',d.subtitleSeq,d.text,d.sourceLang,d.targetLang);return;
  }
  if(d.type==='chat-msg'){
    /* Incoming typed chat message from partner */
    markPartnerTalking();
    var srcTxt=d.sourceText||d.text||'';
    var trTxt=d.translatedText||srcTxt;
    if(trTxt)showSub(trTxt,'partner');
    addTr('partner',srcTxt,trTxt,d.sourceLang,d.targetLang,d.subtitleSeq);return;
  }
  if(d.type==='hangup'){toast('Partner left');cleanUp();return}
}

  log('rtc_refresh',{tracks:tracks.map(function(t){return t.kind+':'+t.readyState}).join(',')});
  if(hasRemoteTrack&&rv.srcObject!==remoteStream){rv.srcObject=remoteStream;}

function setupPC(){
  if(pc)return;pc=new RTCPeerConnection({iceServers:[{urls:'stun:stun.l.google.com:19302'}]});
  var emitOffer=async function(){try{makingOffer=true;await pc.setLocalDescription(await pc.createOffer());relaySend({type:'webrtc-signal',transient:true,signal:{description:pc.localDescription}})}catch(_){}finally{makingOffer=false}};
  pc.onnegotiationneeded=emitOffer;
  var localTracks=videoStream?videoStream.getTracks():[];
  localTracks.forEach(function(t){pc.addTrack(t,videoStream)});
  if(localTracks.length&&pc.signalingState==='stable'&&!makingOffer)emitOffer();
  pc.onicecandidate=function(e){if(e.candidate)relaySend({type:'webrtc-signal',transient:true,signal:{candidate:e.candidate}});};
  pc.oniceconnectionstatechange=function(){log('rtc_ice',{s:pc.iceConnectionState},pc.iceConnectionState==='connected'?'ok':'info');};
  pc.onconnectionstatechange=function(){log('rtc_conn',{s:pc.connectionState},pc.connectionState==='connected'?'ok':pc.connectionState==='failed'?'error':'info');};
  pc.ontrack=function(e){log('rtc_track',{kind:e.track.kind,state:e.track.readyState},'ok');
    if(!remoteStream)remoteStream=new MediaStream();
    if(e.streams&&e.streams[0]){e.streams[0].getTracks().forEach(function(track){var hasTrack=remoteStream.getTracks().some(function(existing){return existing.id===track.id});if(!hasTrack)remoteStream.addTrack(track);bindRemoteTrackState(track);});}
    else if(e.track){var exists=remoteStream.getTracks().some(function(track){return track.id===e.track.id});if(!exists)remoteStream.addTrack(e.track);bindRemoteTrackState(e.track);}
    refreshRemoteVideo();
  };
}
async function handleSig(d){
  if(!d.signal)return;if(!pc)setupPC();
  try{
    if(d.signal.description){var desc=d.signal.description,pol=deviceId>d.from;var rdy=!makingOffer&&(pc.signalingState==='stable'||isSettingRemoteAnswerPending);var col=desc.type==='offer'&&!rdy;ignoreOffer=!pol&&col;if(ignoreOffer)return;isSettingRemoteAnswerPending=desc.type==='answer';await pc.setRemoteDescription(desc);isSettingRemoteAnswerPending=false;if(desc.type==='offer'){await pc.setLocalDescription(await pc.createAnswer());relaySend({type:'webrtc-signal',transient:true,signal:{description:pc.localDescription}})}}
    else if(d.signal.candidate){try{await pc.addIceCandidate(d.signal.candidate)}catch(_){}}
  }catch(_){isSettingRemoteAnswerPending=false}
}

/* ═══ DEEPGRAM STT — audio always flows, CC always runs ═══ */
function isCallActive(){return !!(room.id&&$('call-screen').classList.contains('active'))}

function isDupe(text){
  var now=Date.now();recentFinals=recentFinals.filter(function(f){return now-f.t<DEDUP_MS});
  var lo=text.toLowerCase();
  for(var i=0;i<recentFinals.length;i++){var p=recentFinals[i].s;if(p===lo)return true;if(p.length>5&&lo.length>5&&(p.indexOf(lo)>=0||lo.indexOf(p)>=0))return true}
  return false;
}
function recFinal(t){recentFinals.push({s:t.toLowerCase(),t:Date.now()});if(recentFinals.length>DEDUP_MAX)recentFinals.shift()}

function stripDGTags(t){return(t||'').replace(/<[^>]*>/g,'').replace(/\s+/g,' ').trim();}

function onDGFinal(text){
  text=stripDGTags(norm(text));if(!text)return;
  if(isDupe(text)){log('dg_dedup',{t:text.slice(0,40)},'warn');return}
  recFinal(text);log('dg_final',{t:text.slice(0,60)},'ok');
  var src=detectLang(text,room.myLang),tgt=room.theirLang,ss=++localSubSeq;
  showSub(text,'mine');
  relaySend({type:'subtitle',subtitleSeq:ss,text:text,sourceText:text,sourceLang:src,targetLang:tgt,provisional:true});
  addTr('me',text,text,src,tgt,ss);
  translate(text,src,tgt).then(function(tr){tr=norm(tr)||text;if(tr!==text){relaySend({type:'subtitle-update',subtitleSeq:ss,text:tr,sourceText:text,sourceLang:src,targetLang:tgt});patchTr('me',ss,tr,src,tgt)}});
}

function startDeepgram(){
  var key=($('dg-key')&&$('dg-key').value)||localStorage.getItem('tb_dg_key')||'';
  if(!key){toast('Deepgram key missing');return;}
  localStorage.setItem('tb_dg_key',key);
  if(dgActive)return;if(!videoStream){log('dg_no_stream',{},'error');return;}
  var langCode=DG_LANGS[room.myLang]||room.myLang||'en-US';
  var url='wss://api.deepgram.com/v1/listen?model=nova-3&language='+encodeURIComponent(langCode)+'&encoding=linear16&sample_rate=16000&channels=1&interim_results=false&punctuate=true&endpointing=400';
  dgWs=new WebSocket(url,['token',key]);
  dgWs.onopen=function(){
    dgActive=true;log('dg_open',{lang:langCode},'ok');
    try{
      dgAudioCtx=new(window.AudioContext||window.webkitAudioContext)({sampleRate:16000});
      dgSrc=dgAudioCtx.createMediaStreamSource(videoStream);
      dgProc=dgAudioCtx.createScriptProcessor(4096,1,1);
      dgProc.onaudioprocess=function(e){
        if(!dgWs||dgWs.readyState!==1)return;
        var f=e.inputBuffer.getChannelData(0),b=new Int16Array(f.length);
        for(var i=0;i<f.length;i++){var s=Math.max(-1,Math.min(1,f[i]));b[i]=s<0?s*0x8000:s*0x7FFF;}
        dgWs.send(b.buffer);
      };
      dgSrc.connect(dgProc);dgProc.connect(dgAudioCtx.destination);
    }catch(e){log('dg_audio_err',{e:String(e)},'error');}
  };
  dgWs.onmessage=function(e){try{var d=JSON.parse(e.data);var alt=d.channel&&d.channel.alternatives&&d.channel.alternatives[0];if(alt&&alt.transcript&&d.is_final)onDGFinal(alt.transcript)}catch(_){}};
  dgWs.onerror=function(){log('dg_error',{},'error')};
  dgWs.onclose=function(ev){log('dg_close',{code:ev.code},'warn');dgActive=false;stopDGAudio();if(isCallActive())setTimeout(function(){if(isCallActive())startDeepgram()},2000)};
}
function stopDGAudio(){try{if(dgProc)dgProc.disconnect()}catch(_){}try{if(dgSrc)dgSrc.disconnect()}catch(_){}try{if(dgAudioCtx)dgAudioCtx.close()}catch(_){}dgProc=null;dgSrc=null;dgAudioCtx=null;}
function stopDeepgram(){dgActive=false;if(dgWs){try{dgWs.close()}catch(_){}dgWs=null;}stopDGAudio();log('dg_stopped',{});}

function addTr(who,src,tr,sL,tL,ss){
  src=norm(src);tr=norm(tr);if(!src&&!tr)return;if(!tr)tr=src;

  var entry={who:who,sourceText:src,translatedText:tr,srcLang:sL,tgtLang:tL,subtitleSeq:ss||null,ts:Date.now()};
  transcript.push(entry);if(transcript.length>MAX_TR)transcript.splice(0,transcript.length-MAX_TR);
  saveTr();appendTrDom(entry);
  if(transcriptTtsOn&&src)speakText(src,sL||room.myLang);
}
function patchTr(who,ss,newTr,sL,tL){

  for(var i=transcript.length-1;i>=0;i--){if(transcript[i].who===who&&transcript[i].subtitleSeq===ss){if(transcript[i].translatedText===newTr)return;transcript[i].translatedText=newTr;transcript[i].ts=Date.now();saveTr();renderTr();return}}

}

/* ═══ CHAT COMPOSE — with language routing ═══
   Rule: if typed text is NOT in my selected language,
   first translate to my language, then translate to target.
   Audio remains live — mic button does voice-to-text into compose. */

function composeAutoResize(){var el=$('compose-input');if(!el)return;el.style.height='auto';el.style.height=Math.min(el.scrollHeight,100)+'px'}
function composeSyncSend(){var el=$('compose-input'),sb=$('compose-send-btn');if(sb)sb.disabled=!(el&&el.value.trim())}
function composeKeydown(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();composeSend()}}

async function composeSend(){
  var ta=$('compose-input');var text=(ta.value||'').trim();if(!text)return;
  ta.value='';composeAutoResize();composeSyncSend();
  if(vtActive&&vtRecognition)vtRecognition.stop();

  var myLang=room.myLang||'en';
  var theirLang=room.theirLang||'en';

  /* Detect language of typed text */
  var detected=detectLang(text,myLang);
  log('compose_detect',{detected:detected,myLang:myLang});

  var normalizedText=text;

  /* Language routing: if not my language, translate to my language first */
  if(detected!==myLang){
    log('compose_route',{from:detected,to:myLang});
    var intermediate=await translate(text,detected,myLang);
    normalizedText=norm(intermediate)||text;
    log('compose_normalized',{t:normalizedText.slice(0,40)});
  }

  /* Now translate from my language to their language */
  var ss=++localSubSeq;
  showSub(normalizedText,'mine');
  addTr('me',normalizedText,normalizedText,myLang,theirLang,ss);

  /* Send provisional chat message */
  relaySend({type:'chat-msg',subtitleSeq:ss,text:normalizedText,sourceText:normalizedText,sourceLang:myLang,targetLang:theirLang,provisional:true});

  if(myLang===theirLang){
    /* Same language — no translation needed */
    return;
  }

  var translated=await translate(normalizedText,myLang,theirLang);
  translated=norm(translated)||normalizedText;
  if(translated!==normalizedText){
    relaySend({type:'chat-msg',subtitleSeq:ss,text:translated,sourceText:normalizedText,translatedText:translated,sourceLang:myLang,targetLang:theirLang});
    patchTr('me',ss,translated,myLang,theirLang);
  }
}
