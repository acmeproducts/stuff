<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>fastText WASM smoke test</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 2rem; line-height: 1.5; }
    pre { white-space: pre-wrap; padding: 1rem; border: 1px solid #ccc; }
  </style>
</head>
<body>
  <h1>fastText WASM smoke test</h1>
  <pre id="log">Running...</pre>
  <script type="module">

    const logEl = document.getElementById("log");
    const lines = [];

    function log(line) {
      lines.push(line);
      logEl.textContent = lines.join("\n");
      console.log(line);
    }

    function fail(message) {
      document.body.dataset.status = "fail";
      log("FAIL: " + message);
      throw new Error(message);
    }

    function normalizePrediction(result) {
      let label;
      if (result instanceof Map) {
        label = result.keys().next().value;
      } else if (Array.isArray(result)) {
        const first = result[0];
        label = Array.isArray(first) ? first[0] : first && typeof first === "object" ? first.label : first;
      } else if (result && typeof result === "object") {
        label = result.label;
      } else {
        label = result;
      }
      return String(label || "").replace(/^__label__/, "").replace(/^label__/, "");
    }

    const moduleConfig = {
      locateFile(path) {
        if (/\.wasm$/i.test(String(path || ""))) return new URL("./core/fasttext.wasm", window.location.href).href;
        const base = String(path || "").split("/").pop().split("\\").pop();
        return new URL("./" + base, window.location.href).href;
      }
    };
    window.Module = moduleConfig;
    window.FastTextModule = moduleConfig;

    try {
      const wasmUrl = moduleConfig.locateFile("fasttext.wasm");
      const wasmResponse = await fetch(wasmUrl);
      if (!wasmResponse.ok) fail("WASM fetch returned HTTP " + wasmResponse.status);
      const wasmBytes = await wasmResponse.arrayBuffer();
      if (wasmBytes.byteLength <= 0) fail("WASM fetch returned zero bytes");
      log("WASM HTTP 200 and nonzero bytes: " + wasmBytes.byteLength);

      await new Promise((resolve, reject) => {
        const s = document.createElement("script");
        s.src = "./fasttext-wrapper.umd.js";
        s.onload = resolve;
        s.onerror = reject;
        document.head.appendChild(s);
      });
      const ft = new FastText();
      await ft.loadModel(new URL("./model/lid.176.ftz", window.location.href).href);
      log("loadModel resolved");

      const cases = [
        ["hello how are you today", "en"],
        ["hola como estas hoy", "es"],
        ["bonjour comment allez vous", "fr"],
        ["guten morgen wie geht es dir", "de"]
      ];

      for (const [text, expected] of cases) {
        const actual = normalizePrediction(ft.predict(text, 1));
        log(JSON.stringify(text) + " -> " + actual);
        if (actual !== expected) fail(JSON.stringify(text) + " expected " + expected + " but got " + actual);
      }

      document.body.dataset.status = "pass";
      log("PASS");
    } catch (error) {
      document.body.dataset.status = "fail";
      log("ERROR: " + (error && error.stack ? error.stack : error));
      throw error;
    }
  </script>
</body>
</html>
