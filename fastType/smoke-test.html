<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>fastText WASM Smoke Test</title>
</head>
<body>
  <pre id="out">running...</pre>
  <script>
    (async () => {
      const out = document.getElementById('out');
      const base = new URL('./', location.href);
      const cfg = {
        locateFile(path) {
          const low = String(path || '').toLowerCase();
          if (low.endsWith('.wasm')) return new URL('fastText.common.wasm', base).href;
          const name = String(path || '').split('/').pop();
          return new URL(name, base).href;
        }
      };
      window.Module = cfg;
      window.FastTextModule = cfg;

      await new Promise((resolve, reject) => {
        const s = document.createElement('script');
        s.src = new URL('fastText.common.js', base).href;
        s.onload = resolve;
        s.onerror = () => reject(new Error('fastText.common.js failed to load'));
        document.head.appendChild(s);
      });

      const ft = new FastText();
      await ft.loadModel(new URL('lid.176.ftz', base).href);

      const tests = [
        ['hello how are you today', 'en'],
        ['hola como estas hoy', 'es'],
        ['bonjour comment allez vous', 'fr'],
        ['guten morgen wie geht es dir', 'de']
      ];

      const lines = [];
      let pass = 0;
      for (const [text, expected] of tests) {
        const pred = await ft.predict(text, 1);
        const got = String((pred && pred[0] && pred[0].label) || '').replace(/^__label__/, '');
        const ok = got === expected;
        if (ok) pass += 1;
        lines.push(`${ok ? 'PASS' : 'FAIL'} | expected=${expected} got=${got || '(none)'} | ${text}`);
      }
      out.textContent = `model load: ok\n${lines.join('\n')}\nsummary: ${pass}/${tests.length} passed`;
    })().catch((e) => {
      document.getElementById('out').textContent = `error: ${e && e.message ? e.message : e}`;
      console.error(e);
    });
  </script>
</body>
</html>
