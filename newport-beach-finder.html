<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coastal Match Finder</title>
  <style>
    body { margin: 0; font-family: system-ui, sans-serif; background: #eef6ff; color: #10233b; }
    .wrap { max-width: 960px; margin: 0 auto; padding: 24px; }
    .panel { background: #fff; border: 1px solid #cfe0f4; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit,minmax(280px,1fr)); gap: 12px; }
    .card { background: #fff; border: 1px solid #d8e5f3; border-radius: 12px; padding: 14px; }
    .row { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
    .badge { background: #d9f0ff; color: #064e75; border-radius: 999px; font-size: 12px; font-weight: 700; padding: 3px 10px; }
    .meta { color: #4a607a; font-size: 14px; }
    .temps { margin-top: 10px; background: #f7fbff; border-radius: 8px; padding: 8px; font-size: 14px; }
    input[type="date"] { margin-top: 8px; padding: 8px 10px; border-radius: 8px; border: 1px solid #96aac0; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Places Like Newport Beach</h1>
    <p>Choose a date to get similar coastal destinations and estimated temperatures.</p>

    <div class="panel">
      <label for="nbDate"><strong>Date</strong></label><br />
      <input id="nbDate" type="date" />
      <p id="nbStatus" class="meta"></p>
    </div>

    <section id="nbResults" class="grid"></section>
  </div>

  <script>
    (function () {
      const baseline = { high: 73, low: 57 };
      const seasonal = [0, 0, 2, 4, 6, 8, 9, 9, 7, 4, 2, 0];

      const places = [
        { name: 'Laguna Beach, CA', region: 'USA', high: 72, low: 56, humidity: 'medium', vibe: 'Art galleries and Orange County beach lifestyle.' },
        { name: 'Coronado, CA', region: 'USA', high: 71, low: 58, humidity: 'medium', vibe: 'Resort-like beach town with calm coastal weather.' },
        { name: 'Santa Barbara, CA', region: 'USA', high: 72, low: 54, humidity: 'medium', vibe: 'Mediterranean architecture and relaxed shoreline.' },
        { name: 'La Jolla, CA', region: 'USA', high: 70, low: 57, humidity: 'medium', vibe: 'Coastal village with scenic cliffs and dining.' },
        { name: 'Carmel-by-the-Sea, CA', region: 'USA', high: 65, low: 52, humidity: 'medium', vibe: 'Boutique beach town with cool breezes.' },
        { name: 'Cascais, Portugal', region: 'Portugal', high: 72, low: 59, humidity: 'medium', vibe: 'Elegant marina town with sunny promenade.' },
        { name: 'Noosa Heads, Australia', region: 'Australia', high: 78, low: 63, humidity: 'high', vibe: 'Stylish surf town with warm subtropical feel.' },
        { name: 'Biarritz, France', region: 'France', high: 70, low: 56, humidity: 'medium', vibe: 'Classic Atlantic resort known for surfing.' }
      ];

      function getMonth(dateValue) {
        if (!dateValue) return new Date().getMonth();
        return new Date(dateValue + 'T00:00:00').getMonth();
      }

      function getSuggestions(dateValue) {
        const month = getMonth(dateValue);
        const offset = seasonal[month] || 0;

        return places
          .map((p) => {
            const score = 100 - (Math.abs(p.high - baseline.high) * 2 + Math.abs(p.low - baseline.low) * 1.5);
            return {
              ...p,
              score: Math.max(0, Math.round(score)),
              estHigh: p.high + offset,
              estLow: p.low + Math.max(0, offset - 2)
            };
          })
          .sort((a, b) => b.score - a.score)
          .slice(0, 6);
      }

      function render() {
        const input = document.getElementById('nbDate');
        const status = document.getElementById('nbStatus');
        const results = document.getElementById('nbResults');
        if (!input || !status || !results) return;

        const dateValue = input.value;
        status.textContent = dateValue
          ? 'Showing estimates for ' + dateValue + '.'
          : 'No date selected. Showing estimates for the current month.';

        const suggestions = getSuggestions(dateValue);
        results.innerHTML = suggestions.map((p) =>
          '<article class="card">' +
            '<div class="row"><h3>' + p.name + '</h3><span class="badge">Match: ' + p.score + '%</span></div>' +
            '<p class="meta">' + p.region + '</p>' +
            '<p>' + p.vibe + '</p>' +
            '<div class="temps">' +
              '<div><strong>Estimated High:</strong> ' + p.estHigh + '°F</div>' +
              '<div><strong>Estimated Low:</strong> ' + p.estLow + '°F</div>' +
              '<div><strong>Humidity:</strong> ' + p.humidity + '</div>' +
            '</div>' +
          '</article>'
        ).join('');
      }

      function init() {
        const input = document.getElementById('nbDate');
        if (!input) return;
        input.addEventListener('input', render);
        input.addEventListener('change', render);
        render();
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
      } else {
        init();
      }
    })();
  </script>
</body>
</html>
