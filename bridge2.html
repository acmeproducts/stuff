<!DOCTYPE html>
<!-- talkbridge · 2026-04-23 · chat+transcript merge, top controls, auto-scroll -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<title>TalkBridge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Lora:wght@500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0a0a0a;--surface:#161616;--surface2:#222;
  --teal:#2E8B8B;--teal-bright:#3FC1C1;
  --text:#e8e4df;--text-dim:#888;--text-muted:#555;
  --red:#e74c3c;--green:#2ecc71;
  --radius:14px;
}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:"DM Sans",sans-serif;color:var(--text);}
.lobby{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;z-index:10;background:var(--bg);transition:opacity .3s;overflow-y:auto;}
.lobby.hidden{opacity:0;pointer-events:none;}
.lobby-card{width:min(100%,380px);display:flex;flex-direction:column;gap:16px;}
.lobby-brand{font-family:"Lora",serif;font-size:32px;font-weight:600;color:var(--teal-bright);text-align:center;letter-spacing:-0.5px;}
.lobby-sub{font-size:13px;color:var(--text-dim);text-align:center;margin-top:-8px;}
.lobby-label{font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:-8px;}
.lobby-input{width:100%;background:var(--surface);color:var(--text);border:1.5px solid var(--surface2);border-radius:10px;padding:12px 14px;font-size:15px;font-family:"DM Sans",sans-serif;outline:none;}
.lobby-input:focus{border-color:var(--teal);}
.lobby-input::placeholder{color:var(--text-muted);}
.lobby-select{width:100%;background:var(--surface);color:var(--text);border:1.5px solid var(--surface2);border-radius:10px;padding:12px 14px;font-size:15px;font-family:"DM Sans",sans-serif;outline:none;-webkit-appearance:none;appearance:none;cursor:pointer;}
.lobby-select:focus{border-color:var(--teal);}
.lobby-btn{width:100%;background:var(--teal);color:#fff;border:none;border-radius:12px;padding:14px;font-size:16px;font-weight:600;cursor:pointer;font-family:"DM Sans",sans-serif;transition:opacity .15s;margin-top:4px;}
.lobby-btn:hover{opacity:.85;}
.lobby-btn:disabled{opacity:.4;cursor:default;}
.lobby-btn.secondary{background:var(--surface2);color:var(--text);}
.lobby-btn.secondary:hover{background:var(--teal);color:#fff;opacity:1;}
.lobby-link-box{background:var(--surface);border:1.5px solid var(--surface2);border-radius:10px;padding:12px;word-break:break-all;font-size:11px;color:var(--teal-bright);margin-bottom:12px;cursor:pointer;}
.lobby-link-row{display:flex;gap:8px;}
.lobby-link-btn{flex:1;background:var(--surface2);color:var(--text);border:none;border-radius:10px;padding:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:"DM Sans",sans-serif;}
.lobby-link-btn:hover{background:var(--teal);color:#fff;}
.lobby-preview{width:min(100%,280px);aspect-ratio:16/9;border-radius:var(--radius);overflow:hidden;background:var(--surface);margin:0 auto 8px;}
.lobby-preview video{width:100%;height:100%;object-fit:cover;transform:scaleX(-1);}
.recent-rooms{margin-top:6px;display:flex;flex-direction:column;gap:8px;}
.recent-title{font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.6px;}
.recent-item{background:var(--surface);border:1px solid var(--surface2);border-radius:10px;padding:10px 12px;}
.recent-item-top{display:flex;align-items:center;gap:8px;}
.recent-open{flex:1;min-width:0;background:none;border:none;color:var(--text);text-align:left;cursor:pointer;font:inherit;font-size:14px;font-weight:500;}
.recent-open small{display:block;color:var(--text-dim);font-size:11px;}
.recent-actions{display:flex;gap:6px;margin-top:8px;}
.recent-act{flex:1;background:rgba(255,255,255,.06);color:var(--text-dim);border:none;border-radius:8px;padding:6px;font-size:11px;font-weight:600;cursor:pointer;font-family:"DM Sans",sans-serif;}
.recent-act:hover{background:var(--teal);color:#fff;}
.recent-act.danger{color:var(--red);}
.recent-act.danger:hover{background:var(--red);color:#fff;}
.lobby-footer{display:flex;gap:8px;margin-top:4px;}
.lobby-footer-btn{flex:1;background:none;border:1px solid var(--surface2);border-radius:8px;color:var(--text-dim);padding:8px;font-size:12px;cursor:pointer;font-family:"DM Sans",sans-serif;}
.lobby-footer-btn:hover{background:var(--surface2);color:var(--text);}
.joining-screen{position:fixed;inset:0;background:var(--bg);z-index:20;display:none;align-items:center;justify-content:center;flex-direction:column;gap:16px;}
.joining-screen.show{display:flex;}
.joining-spinner{width:40px;height:40px;border:3px solid var(--surface2);border-top-color:var(--teal-bright);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.joining-label{font-size:14px;color:var(--text-dim);}
.log-overlay{position:fixed;inset:0;background:rgba(0,0,0,.96);z-index:50;display:none;flex-direction:column;}
.log-overlay.show{display:flex;}
.log-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--surface2);flex-shrink:0;gap:8px;flex-wrap:wrap;}
.log-title{font-family:"Lora",serif;font-size:17px;color:var(--teal-bright);}
.log-actions{display:flex;gap:6px;flex-wrap:wrap;}
.log-btn{background:var(--surface2);color:var(--text);border:none;border-radius:8px;padding:7px 12px;font-size:12px;font-weight:600;cursor:pointer;font-family:"DM Sans",sans-serif;}
.log-btn:hover{background:var(--teal);color:#fff;}
.log-body{flex:1;overflow-y:auto;padding:10px 16px 20px;font-family:monospace;font-size:11px;line-height:1.7;color:#aaa;}
.log-row{border-bottom:1px solid rgba(255,255,255,.03);padding:1px 0;}
.log-row .ts{color:#555;}.log-row .ev{color:var(--teal-bright);}
.log-row.error .ev{color:#e74c3c;}.log-row.warn .ev{color:#f39c12;}.log-row.ok .ev{color:#2ecc71;}
.call{position:fixed;inset:0;background:#000;z-index:5;display:none;flex-direction:column;}
.call.active{display:flex;}

/* === TOP BAR with controls === */
.call-top-bar{position:absolute;top:0;left:0;right:0;height:40px;background:rgba(0,0,0,.85);backdrop-filter:blur(10px);border-bottom:1px solid rgba(255,255,255,.1);display:flex;align-items:center;padding:0 8px;gap:8px;z-index:10;transition:transform .25s ease;}
.call-top-bar.unpinned{transform:translateY(-100%);}
.call-top-bar.unpinned.show{transform:translateY(0);}
.top-controls{display:flex;gap:4px;}
.top-btn{width:32px;height:32px;border-radius:8px;border:none;background:rgba(255,255,255,.1);color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;}
.top-btn:hover{background:rgba(255,255,255,.18);}
.top-btn.active{background:var(--teal);}
.top-btn.end{background:var(--red);}
.top-btn.end:hover{background:#c0392b;}
.top-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;}
.top-spacer{flex:1;}
.top-room-info{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text-dim);font-weight:500;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.top-lang-pair{display:flex;align-items:center;gap:4px;font-size:16px;}
.top-pin-btn{width:28px;height:28px;border-radius:6px;border:none;background:transparent;color:var(--text-dim);cursor:pointer;display:flex;align-items:center;justify-content:center;}
.top-pin-btn:hover{background:rgba(255,255,255,.1);color:var(--text);}
.top-pin-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;}

.call-videos{position:relative;background:#000;overflow:hidden;flex:1;min-height:0;}
#remote-video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;background:#000;z-index:1;}
#local-video{position:absolute;top:48px;right:8px;width:min(14%,80px);aspect-ratio:9/16;border-radius:8px;object-fit:cover;transform:scaleX(-1);border:2px solid rgba(255,255,255,.2);box-shadow:0 2px 12px rgba(0,0,0,.5);z-index:3;background:var(--surface);}
.no-video-placeholder{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:48px;color:var(--text-muted);z-index:1;}
.solo-banner{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:2;text-align:center;pointer-events:none;}
.solo-banner-text{background:rgba(0,0,0,.6);color:var(--text-dim);font-size:13px;padding:8px 18px;border-radius:20px;backdrop-filter:blur(6px);}
.subtitle-area{position:absolute;bottom:0;left:0;right:0;z-index:4;padding:8px 14px 10px;pointer-events:none;display:flex;flex-direction:column;align-items:center;gap:4px;background:linear-gradient(transparent,rgba(0,0,0,.6) 40%);}
.subtitle-line{max-width:94%;padding:4px 12px;border-radius:6px;font-size:14px;line-height:1.35;text-align:center;word-break:break-word;}
.subtitle-line.partner{background:rgba(0,0,0,.6);color:#fff;}
.subtitle-line.mine{background:rgba(46,139,139,.2);color:rgba(255,255,255,.65);font-size:12px;}
.partner-speaking-indicator{position:absolute;right:12px;bottom:56px;z-index:5;min-width:34px;height:24px;border-radius:999px;background:rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.2);color:#fff;display:none;align-items:center;justify-content:center;font-size:18px;font-weight:700;line-height:1;backdrop-filter:blur(4px);}
.partner-speaking-indicator.show{display:flex;animation:pulseSpeak .9s ease-in-out infinite alternate;}
@keyframes pulseSpeak{from{opacity:.55;transform:scale(.98)}to{opacity:1;transform:scale(1.03)}}

/* === UNIFIED TRANSCRIPT (speech + chat) === */
.call-transcript{position:relative;flex:0 0 30%;min-height:0;max-height:45%;overflow-y:auto;background:var(--bg);border-top:1px solid var(--surface2);padding:0 12px;transition:flex-basis .2s ease;}
.call-transcript-header{display:flex;align-items:center;justify-content:flex-start;padding:8px 0;position:sticky;top:0;background:var(--bg);z-index:1;gap:8px;}
.call-transcript-title{font-size:12px;font-weight:700;color:var(--text-dim);letter-spacing:.3px;}
.call-transcript-actions{display:flex;gap:6px;}
.call-transcript-btn{width:24px;height:24px;display:flex;align-items:center;justify-content:center;background:transparent;color:#8f959d;border:1px solid rgba(255,255,255,.18);border-radius:7px;cursor:pointer;padding:0;}
.call-transcript-btn:hover{background:rgba(255,255,255,.06);color:#b6bcc3;border-color:rgba(255,255,255,.26);}
.call-transcript-btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.call.transcript-collapsed .chevron-down{display:none;}
.call:not(.transcript-collapsed) .chevron-right{display:none;}

/* New message indicator */
.transcript-more-indicator{position:absolute;bottom:calc(env(safe-area-inset-bottom) + 60px);right:50%;transform:translateX(50%);z-index:3;min-width:36px;height:36px;border-radius:999px;background:var(--teal);color:#fff;border:2px solid var(--bg);display:none;align-items:center;justify-content:center;font-size:16px;font-weight:700;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.4);}
.transcript-more-indicator.show{display:flex;}
.transcript-more-indicator:hover{background:var(--teal-bright);}

.call.transcript-collapsed .call-transcript{flex:0 0 32px;max-height:32px;overflow:hidden;}
.call.transcript-collapsed #transcript-body{display:none;}
.call-videos.swapped #remote-video{top:48px;right:8px;left:auto;bottom:auto;width:min(14%,80px);height:auto;aspect-ratio:9/16;border-radius:8px;border:2px solid rgba(255,255,255,.2);box-shadow:0 2px 12px rgba(0,0,0,.5);z-index:3;}
.call-videos.swapped #local-video{position:absolute;inset:0;width:100%;height:100%;aspect-ratio:unset;border-radius:0;border:none;box-shadow:none;z-index:1;}

/* Transcript entry styles */
#transcript-body{padding:8px 0;}
.tr-entry{padding:4px 0;}
.tr-bubble{border:1px solid rgba(255,255,255,.14);border-radius:12px;overflow:hidden;background:rgba(255,255,255,.03);}
.tr-bubble.is-chat{border-color:rgba(63,193,193,.25);background:rgba(46,139,139,.08);}
.tr-head{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:4px 10px;border-bottom:1px solid rgba(255,255,255,.08);font-size:11px;}
.tr-who{font-weight:700;}.tr-who.mine{color:var(--teal-bright);}.tr-time{font-size:10px;color:var(--text-muted);font-variant-numeric:tabular-nums;}
.tr-body{display:grid;grid-template-columns:1fr 1px 1fr;}
.tr-col{padding:7px 10px;font-size:13px;line-height:1.4;color:var(--text);word-break:break-word;min-width:0;position:relative;}
.tr-col.source{color:var(--text-dim);}
.tr-divider{background:rgba(255,255,255,.08);}
.tr-text{margin-bottom:2px;}
.tr-tts{position:absolute;bottom:4px;right:4px;width:20px;height:20px;border:none;background:rgba(255,255,255,.08);border-radius:4px;cursor:pointer;padding:0;display:flex;align-items:center;justify-content:center;opacity:.6;transition:opacity .15s;}
.tr-tts:hover{opacity:1;background:rgba(255,255,255,.14);}
.tr-tts svg{width:11px;height:11px;stroke:var(--text);fill:none;stroke-width:2;}
.tr-empty{color:var(--text-muted);padding:16px;font-style:italic;text-align:center;}

/* === CHAT COMPOSE STRIP === */
.chat-compose-strip{display:flex;align-items:flex-end;gap:8px;padding:8px 12px max(8px,env(safe-area-inset-bottom));background:var(--surface);border-top:1px solid rgba(255,255,255,.1);flex-shrink:0;}
.chat-compose-ta{flex:1;background:rgba(255,255,255,.08);color:var(--text);border:1.5px solid rgba(255,255,255,.15);border-radius:20px;padding:8px 14px;font-size:14px;font-family:"DM Sans",sans-serif;resize:none;outline:none;min-height:38px;max-height:80px;line-height:1.4;-webkit-appearance:none;}
.chat-compose-ta::placeholder{color:var(--text-muted);}
.chat-compose-ta:focus{border-color:var(--teal);}
.chat-send-btn{width:38px;height:38px;border-radius:50%;border:none;background:var(--teal);color:#fff;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:opacity .15s;}
.chat-send-btn:disabled{opacity:.3;cursor:default;}
.chat-send-btn:hover:not(:disabled){opacity:.85;}

@media(min-width:768px){.chat-compose-ta{font-size:15px;}}
@media(max-height:500px) and (orientation:landscape){.chat-compose-strip{padding:5px 10px;}.chat-compose-ta{min-height:32px;font-size:13px;}}
</style>
</head>
<body>

<!-- LOBBY -->
<div class="lobby" id="lobby">
  <div class="lobby-card" id="lobby-setup">
    <div class="lobby-brand">TalkBridge</div>
    <div class="lobby-sub">Real-time translation calls</div>
    <label class="lobby-label">Deepgram API Key</label>
    <input class="lobby-input" id="dg-key" type="password" placeholder="Enter key" oninput="syncBtn()">
    <div id="dg-key-status" style="font-size:11px;margin-top:-12px;"></div>
    <label class="lobby-label">My Language</label>
    <select class="lobby-select" id="my-lang" onchange="syncBtn()"></select>
    <label class="lobby-label">Their Language</label>
    <select class="lobby-select" id="their-lang" onchange="syncBtn()"></select>
    <label class="lobby-label">Room Name (optional)</label>
    <input class="lobby-input" id="room-name" type="text" placeholder="e.g. Team Standup">
    <button class="lobby-btn" id="create-btn" onclick="createRoom()" disabled>Create & Start Call</button>
    <div class="recent-rooms" id="recent-rooms"></div>
    <div class="lobby-footer">
      <button class="lobby-footer-btn" onclick="showLog()">Logs</button>
      <button class="lobby-footer-btn" onclick="showSettings()">Settings</button>
    </div>
  </div>
  <div class="lobby-card" id="lobby-waiting" style="display:none">
    <div class="lobby-brand">TalkBridge</div>
    <div class="lobby-preview"><video id="preview-video" autoplay playsinline muted></video></div>
    <div id="room-name-display" style="text-align:center;font-size:14px;color:var(--text-dim);margin-bottom:4px;"></div>
    <div class="lobby-link-box" id="lobby-link" onclick="copyLink()">Link will appear here</div>
    <div class="lobby-link-row">
      <button class="lobby-link-btn" onclick="copyLink()">Copy</button>
      <button class="lobby-link-btn" onclick="shareNative()">Share</button>
    </div>
    <button class="lobby-btn secondary" onclick="backToSetup()">Cancel</button>
  </div>
</div>

<!-- JOINING SCREEN -->
<div class="joining-screen" id="joining-screen">
  <div class="joining-spinner"></div>
  <div class="joining-label">Joining call...</div>
</div>

<!-- LOG OVERLAY -->
<div class="log-overlay" id="log-overlay">
  <div class="log-header">
    <div class="log-title">Debug Log</div>
    <div class="log-actions">
      <button class="log-btn" onclick="copyLog()">Copy</button>
      <button class="log-btn" onclick="clearLog()">Clear</button>
      <button class="log-btn" onclick="hideLog()">Close</button>
    </div>
  </div>
  <div class="log-body" id="log-body"></div>
</div>

<!-- CALL SCREEN -->
<div class="call" id="call-screen">
  <!-- TOP BAR with controls -->
  <div class="call-top-bar" id="call-top-bar">
    <div class="top-controls">
      <button class="top-btn" id="top-mic-btn" onclick="toggleMic()" title="Microphone">
        <svg id="top-mic-on" viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
        <svg id="top-mic-off" viewBox="0 0 24 24" style="display:none"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/><line x1="2" y1="22" x2="22" y2="2" stroke="#e74c3c" stroke-width="2.5"/></svg>
      </button>
      <button class="top-btn" id="top-cam-btn" onclick="toggleCam()" title="Camera">
        <svg id="top-cam-on" viewBox="0 0 24 24"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
        <svg id="top-cam-off" viewBox="0 0 24 24" style="display:none"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/><line x1="2" y1="22" x2="22" y2="2" stroke="#e74c3c" stroke-width="2.5"/></svg>
      </button>
      <button class="top-btn end" onclick="hangUp()" title="End call">
        <svg viewBox="0 0 24 24" stroke-linecap="round"><path d="M10.68 13.31a16 16 0 0 0 3.41 2.6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6A19.79 19.79 0 0 1 2.12 4.11 2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 2.59 3.4z" transform="rotate(135 12 12)"/></svg>
      </button>
    </div>
    <div class="top-spacer"></div>
    <div class="top-room-info" id="top-room-info"></div>
    <div class="top-lang-pair" id="top-lang-pair"></div>
    <button class="top-pin-btn" id="top-pin-btn" onclick="toggleTopBarPin()" title="Pin controls">
      <svg viewBox="0 0 24 24"><path d="M12 17v5M9 10.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24V16a1 1 0 0 0 1 1h11a1 1 0 0 0 1-1v-.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 14 10.76V6a2 2 0 1 0-4 0z"/></svg>
    </button>
  </div>
  
  <div class="call-videos" id="call-videos" onclick="handleVideoTap(event)">
    <video id="remote-video" autoplay playsinline></video>
    <video id="local-video" autoplay playsinline muted></video>
    <div class="no-video-placeholder" id="no-video-msg">👤</div>
    <div class="solo-banner" id="solo-banner" style="display:none">
      <div class="solo-banner-text">Waiting for partner...</div>
    </div>
    <div class="subtitle-area" id="subtitle-area"></div>
    <div class="partner-speaking-indicator" id="partner-speaking-indicator">🗣️</div>
  </div>
  
  <div class="call-transcript" id="call-transcript">
    <div class="call-transcript-header">
      <div class="call-transcript-actions">
        <button class="call-transcript-btn" id="transcript-toggle-btn" onclick="toggleTranscript()" title="Collapse transcript" aria-label="Collapse transcript" aria-expanded="true">
          <svg class="chevron-down" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>
          <svg class="chevron-right" viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg>
        </button>
        <button class="call-transcript-btn" id="transcript-tts-toggle" onclick="toggleTranscriptTts()" title="Transcript TTS off" aria-pressed="false">

function $(id){return document.getElementById(id)}

var _logRows=[];
function log(ev,d,lvl){

  var b=$('log-body');if(b&&$('log-overlay').classList.contains('show')){
    var c=lvl==='error'?'error':(lvl==='warn'?'warn':(lvl==='ok'?'ok':''));

}

function copyLog(){if(!_logRows.length){toast('No logs');return}var t=_logRows.map(function(r){return r.ts+' '+r.ev+' '+JSON.stringify(r.data)}).join('\n');if(navigator.clipboard)navigator.clipboard.writeText(t).then(function(){toast('Copied')});}

function populateLangs(){

  ml.value='en';tl.value='th';
}

function detectLang(text,fallback){
  if(!text)return fallback||'en';
  var t=text.trim();if(!t)return fallback||'en';
  var ch=t.charCodeAt(0);
  if(ch>=0x0E00&&ch<=0x0E7F)return'th';if(ch>=0x3040&&ch<=0x309F||ch>=0x30A0&&ch<=0x30FF)return'ja';
  if(ch>=0xAC00&&ch<=0xD7AF)return'ko';if(ch>=0x4E00&&ch<=0x9FFF||ch>=0x3400&&ch<=0x4DBF)return'zh';
  if(ch>=0x0600&&ch<=0x06FF||ch>=0xFB50&&ch<=0xFDFF||ch>=0xFE70&&ch<=0xFEFF)return'ar';
  if(ch>=0x0900&&ch<=0x097F)return'hi';if(ch>=0x0400&&ch<=0x04FF)return'ru';
  return fallback||'en';
}

async function translate(text,from,to){
  if(!text||from===to)return text;
  try{
    var url='https://translate.googleapis.com/translate_a/single?client=gtx&sl='+from+'&tl='+to+'&dt=t&q='+encodeURIComponent(text);
    var r=await fetch(url);if(!r.ok)return text;
    var j=await r.json();return j[0].map(function(s){return s[0]}).join('');
  }catch(e){log('translate_err',{from:from,to:to,err:e.message},'error');return text}
}

function syncBtn(){

    var r=await fetch('https://api.deepgram.com/v1/projects',{headers:{'Authorization':'Token '+key}});

    else{_dgValidated=false;setDgKeyStatus('✗ Invalid key','#e74c3c')}
  }catch(_){_dgValidated=false;setDgKeyStatus('✗ Network error','#f39c12')}
}

async function createRoom(){
  var k=($('dg-key')&&$('dg-key').value.trim())||'';if(!k){toast('Key required');return}
  if(!_dgValidated){toast('Verifying key...');await verifyDgKey(k);if(!_dgValidated){toast('Invalid key');return}}
  room.id=uid()+uid();room.myLang=$('my-lang').value;room.theirLang=$('their-lang').value;room.role='creator';room.name=$('room-name').value.trim();
  try{videoStream=await navigator.mediaDevices.getUserMedia({video:true,audio:true});$('preview-video').srcObject=videoStream}catch(e){toast('Camera needed');log('cam_err',{e:e.message},'error');return}
  $('lobby-link').textContent=invUrl();var nd=$('room-name-display');if(nd)nd.textContent=room.name?'📋 '+room.name:'';
  saveRecent();setLS(LS.waiting);

function encInv(p){try{return btoa(unescape(encodeURIComponent(JSON.stringify(p)))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'')}catch(_){return''}}
function decInv(s){if(!s)return null;try{var b=s.replace(/-/g,'+').replace(/_/g,'/');while(b.length%4)b+='=';return JSON.parse(decodeURIComponent(escape(atob(b))))}catch(_){return null}}
function invUrl(){var k=($('dg-key')&&$('dg-key').value)||localStorage.getItem('tb_dg_key')||'';return location.href.split('?')[0].split('#')[0]+'#j='+encInv({r:room.id,ml:room.myLang,tl:room.theirLang,n:room.name||'',k:k})}

function setLS(s){lobbyState=s;$('lobby-setup').style.display=s===LS.setup?'':'none';$('lobby-waiting').style.display=s===LS.waiting?'block':'none'}
function backToSetup(){if(videoStream){videoStream.getTracks().forEach(function(t){t.stop()});videoStream=null}setLS(LS.setup)}
function getRecent(){try{return JSON.parse(localStorage.getItem(RK)||'[]')}catch(_){return[]}}
function setRecent(r){localStorage.setItem(RK,JSON.stringify(r.slice(0,RL)))}
function saveRecent(){
  if(!room.id)return;var rows=getRecent().filter(function(r){return r.id!==room.id});
  rows.unshift({id:room.id,name:room.name||(gL(room.myLang).flag+' ↔ '+gL(room.theirLang).flag),myLang:room.myLang,theirLang:room.theirLang,ts:Date.now()});
  setRecent(rows);renderRecent();
}
function delRecent(id){setRecent(getRecent().filter(function(r){return r.id!==id}));clearTrS(id);renderRecent()}

async function reuseRoom(id){
  var rec=getRecent().find(function(r){return r.id===id});if(!rec)return;
  room.id=rec.id;room.myLang=rec.myLang;room.theirLang=rec.theirLang;room.role='creator';room.name=rec.name||'';
  $('my-lang').value=rec.myLang;$('their-lang').value=rec.theirLang;$('room-name').value=rec.name||'';syncBtn();
  try{videoStream=await navigator.mediaDevices.getUserMedia({video:true,audio:true});$('preview-video').srcObject=videoStream}catch(_){toast('Camera needed');return}
  $('lobby-link').textContent=invUrl();var nd=$('room-name-display');if(nd)nd.textContent=rec.name?'📋 '+rec.name:'';
  saveRecent();enterCall();
}
function viewRoomTr(id){
  var rec=getRecent().find(function(r){return r.id===id});var entries=loadTr(id);viewingRoomId=id;
  toast('View transcript: WIP');
}

function renderRecent(){
  var rows=getRecent();var c=$('recent-rooms');if(!c)return;
  if(!rows.length){c.innerHTML='';return}
  c.innerHTML='<div class="recent-title">Recent Rooms</div>'+rows.map(function(r){
    var ago=Math.floor((Date.now()-r.ts)/60000);var label=ago<1?'Just now':(ago<60?ago+'m ago':(ago<1440?Math.floor(ago/60)+'h ago':Math.floor(ago/1440)+'d ago'));
    return '<div class="recent-item"><div class="recent-item-top"><button class="recent-open" onclick="reuseRoom(\''+r.id+'\')">'+esc(r.name)+'<small>'+label+'</small></button></div><div class="recent-actions"><button class="recent-act" onclick="viewRoomTr(\''+r.id+'\')">Transcript</button><button class="recent-act danger" onclick="delRecent(\''+r.id+'\')">Delete</button></div></div>'
  }).join('');
}

function copyLink(){var l=$('lobby-link');if(!l||!l.textContent)return;if(navigator.clipboard)navigator.clipboard.writeText(l.textContent).then(function(){toast('Link copied')})}
function shareNative(){
  var l=$('lobby-link');if(!l||!l.textContent)return;
  if(navigator.share)navigator.share({title:'Join TalkBridge Call',text:'Join my call',url:l.textContent}).catch(function(){});
  else copyLink();
}
function shareLink(){if(navigator.share)navigator.share({title:'Join TalkBridge Call',url:invUrl()}).catch(function(){});else{if(navigator.clipboard)navigator.clipboard.writeText(invUrl()).then(function(){toast('Link copied')})}}

function handleHash(p){
  if(!p||!p.r)return;
  var k=p.k||localStorage.getItem('tb_dg_key')||'';
  if(!k){toast('Need API key');return}
  room.id=p.r;room.myLang=p.tl||'th';room.theirLang=p.ml||'en';room.role='joiner';room.name=p.n||'';
  $('dg-key').value=k;syncBtn();
  $('joining-screen').classList.add('show');
  navigator.mediaDevices.getUserMedia({video:true,audio:true}).then(function(s){videoStream=s;enterCall()}).catch(function(){toast('Camera needed');$('joining-screen').classList.remove('show')});
}

function enterCall(){
  if(!room.id||!videoStream)return;
  setLS(LS.call);$('lobby').classList.add('hidden');$('joining-screen').classList.remove('show');$('call-screen').classList.add('active');
  $('local-video').srcObject=videoStream;

  var lp=$('top-lang-pair');if(lp)lp.textContent=gL(room.myLang).flag+' → '+gL(room.theirLang).flag;
  loadTr(room.id);renderTr();initPC();connectRelay();startDeepgram();startHB();
  if(!callHistoryPushed){history.pushState(null,'','');callHistoryPushed=true}
}

var hbInt=null;
function startHB(){if(hbInt)return;hbInt=setInterval(function(){relaySend({type:'hb'})},15000)}
function stopHB(){if(hbInt){clearInterval(hbInt);hbInt=null}}

function initPC(){
  pc=new RTCPeerConnection({iceServers:[{urls:'stun:stun.l.google.com:19302'}]});
  videoStream.getTracks().forEach(function(t){pc.addTrack(t,videoStream)});
  pc.ontrack=function(e){
    log('pc_track',{kind:e.track.kind},'ok');
    if(e.track.kind==='video'){$('remote-video').srcObject=e.streams[0];remoteHasVideo=true;refreshRemoteVideo()}
    else{var a=new Audio();a.srcObject=e.streams[0];a.play().catch(function(){});remoteHasAudio=true}
  };
  pc.onicecandidate=function(e){if(e.candidate)relaySend({type:'ice',ice:e.candidate})};
  pc.onnegotiationneeded=async function(){
    if(makingOffer)return;makingOffer=true;
    try{await pc.setLocalDescription();relaySend({type:'offer',sdp:pc.localDescription})}catch(e){log('nego_err',{e:e.message},'error')}
    finally{makingOffer=false}
  };
  pc.onconnectionstatechange=function(){
    log('pc_state',{s:pc.connectionState},'ok');
    if(pc.connectionState==='connected'){room.solo=false;$('solo-banner').style.display='none'}
    else if(pc.connectionState==='disconnected'||pc.connectionState==='failed'){room.solo=true;$('solo-banner').style.display=''}
  };
}

function connectRelay(){
  if(_relayWs)return;
  _relayWs=new WebSocket(RELAY_WS);
  _relayWs.onopen=function(){log('relay_open',{},'ok');relaySend({type:'join',app:RELAY_APP,room:room.id,role:room.role})};
  _relayWs.onmessage=function(e){try{var d=JSON.parse(e.data);handleRelayMsg(d)}catch(_){}};
  _relayWs.onerror=function(){log('relay_err',{},'error')};
  _relayWs.onclose=function(){log('relay_close',{},'warn');_relayWs=null;if(room.id)scheduleReconnect()};
}
function scheduleReconnect(){
  if(wsReconnectTimer)return;
  wsReconnectTimer=setTimeout(function(){wsReconnectTimer=null;connectRelay()},3000);
}
function relaySend(d){if(_relayWs&&_relayWs.readyState===1)try{_relayWs.send(JSON.stringify(d))}catch(_){}}

async function handleRelayMsg(d){
  if(!d||!d.type)return;
  log('relay_rx',{t:d.type},'ok');
  if(d.type==='peer-joined'){room.solo=false;$('solo-banner').style.display='none';return}
  if(d.type==='peer-left'){room.solo=true;$('solo-banner').style.display='';return}
  if(d.type==='chat-msg'){handleChatMsg(d);return}
  if(d.type==='offer'){
    if(makingOffer)return;
    try{await pc.setRemoteDescription(d.sdp);await pc.setLocalDescription();relaySend({type:'answer',sdp:pc.localDescription})}catch(e){log('offer_err',{e:e.message},'error')}
    if(pendingCandidates.length){pendingCandidates.forEach(function(c){pc.addIceCandidate(c).catch(function(){})});pendingCandidates=[]}
    return;
  }
  if(d.type==='answer'){try{await pc.setRemoteDescription(d.sdp)}catch(e){log('answer_err',{e:e.message},'error')}if(pendingCandidates.length){pendingCandidates.forEach(function(c){pc.addIceCandidate(c).catch(function(){})});pendingCandidates=[]}return}
  if(d.type==='ice'){if(pc.remoteDescription)pc.addIceCandidate(d.ice).catch(function(){});else pendingCandidates.push(d.ice);return}
  if(d.type==='subtitle'){showSubtitle(d.text,d.isFinal,false);if(d.isFinal)addTr('partner',d.text,d.translation,d.srcLang,d.tgtLang,d.seq);return}
  if(d.type==='subtitle-patch'){patchTr('partner',d.seq,d.translation,d.srcLang,d.tgtLang);return}
  if(d.type==='hangup'){cleanUp();return}
}

function refreshRemoteVideo(){
  var v=$('remote-video'),msg=$('no-video-msg');
  if(!v||!msg)return;
  if(remoteHasVideo&&v.readyState>=2){msg.style.display='none'}else{msg.style.display=''}
}
function resetRemoteMediaState(){remoteHasVideo=false;remoteHasAudio=false}

function swapVideos(){var v=document.querySelector('.call-videos');if(v)v.classList.toggle('swapped')}

function startDeepgram(){
  if(dgActive||!room.id)return;
  var k=localStorage.getItem('tb_dg_key');if(!k){log('dg_no_key',{},'error');return}
  dgWs=new WebSocket('wss://api.deepgram.com/v1/listen?model=nova-2&language='+room.myLang+'&interim_results=true&utterance_end_ms=1500',['token',k]);
  dgWs.onopen=function(){dgActive=true;log('dg_open',{},'ok');if(videoStream){var ac=new AudioContext(),src=ac.createMediaStreamSource(videoStream),proc=ac.createScriptProcessor(4096,1,1);proc.onaudioprocess=function(e){if(dgActive&&dgWs.readyState===1){var f32=e.inputBuffer.getChannelData(0),i16=new Int16Array(f32.length);for(var i=0;i<f32.length;i++)i16[i]=Math.max(-32768,Math.min(32767,f32[i]*32768));dgWs.send(i16.buffer)}};src.connect(proc);proc.connect(ac.destination)}};
  dgWs.onmessage=function(e){try{var d=JSON.parse(e.data);onDGResult(d)}catch(_){}};
  dgWs.onerror=function(){log('dg_err',{},'error')};
  dgWs.onclose=function(){dgActive=false;log('dg_close',{},'warn')};
}
function stopDeepgram(){if(dgWs){try{dgWs.close()}catch(_){}dgWs=null}dgActive=false}

function onDGResult(d){
  if(!d||!d.channel||!d.channel.alternatives||!d.channel.alternatives.length)return;
  var alt=d.channel.alternatives[0],text=alt.transcript||'';
  if(!text)return;
  var isFinal=d.is_final||false;
  showSubtitle(text,isFinal,true);
  if(isFinal)onDGFinal(text);
}

async function onDGFinal(text){
  text=norm(text);if(!text)return;
  var srcLang=detectLang(text,'');if(!srcLang)srcLang=room.myLang;
  var tgtLang=room.theirLang;
  var tr=text;
  if(srcLang!==tgtLang){try{tr=await translate(text,srcLang,tgtLang)||text}catch(_){tr=text}}
  var ss=uid();
  addTr('me',text,tr,srcLang,tgtLang,ss);
  relaySend({type:'subtitle',text:text,translation:tr,isFinal:true,srcLang:srcLang,tgtLang:tgtLang,seq:ss});
  if(recentFinals.length>=20)recentFinals.shift();
  recentFinals.push({seq:ss,text:text,srcLang:srcLang,tgtLang:tgtLang});
}

function showSubtitle(text,isFinal,isMine){
  var area=$('subtitle-area');if(!area)return;
  var cls=isMine?'mine':'partner';
  if(isMine&&!isFinal){
    var ex=area.querySelector('.subtitle-line.mine');
    if(ex){ex.textContent=text;return}
    var el=document.createElement('div');el.className='subtitle-line '+cls;el.textContent=text;area.appendChild(el);
    return;
  }
  if(isMine&&isFinal){var ex=area.querySelector('.subtitle-line.mine');if(ex)ex.remove()}
  var el=document.createElement('div');el.className='subtitle-line '+cls;el.textContent=text;area.appendChild(el);
  if(!isMine)markPartnerTalking();
  setTimeout(function(){if(el.parentNode)el.remove()},SUB_LINGER);
}

function markPartnerTalking(){
  var ind=$('partner-speaking-indicator');if(!ind)return;
  ind.classList.add('show');clearTimeout(partnerSpeakTimer);
  partnerSpeakTimer=setTimeout(function(){ind.classList.remove('show')},2000);
}

var TRS_PFX='tb_tr_';
function loadTr(rid){
  try{var s=localStorage.getItem(TRS_PFX+rid);return s?JSON.parse(s):[]}catch(_){return[]}
}
function saveTr(){if(!room.id)return;try{localStorage.setItem(TRS_PFX+room.id,JSON.stringify(transcript))}catch(_){}}
function clearTrS(rid){localStorage.removeItem(TRS_PFX+rid)}

function addTr(who,src,tr,sL,tL,ss){
  src=norm(src);tr=norm(tr);if(!src&&!tr)return;if(!tr)tr=src;
  var prev=transcript.length?transcript[transcript.length-1]:null;
  if(prev&&prev.who===who&&prev.sourceText===src&&Date.now()-prev.ts<5000)return;
  var entry={type:'speech',who:who,sourceText:src,translatedText:tr,srcLang:sL,tgtLang:tL,subtitleSeq:ss||null,ts:Date.now()};
  transcript.push(entry);if(transcript.length>MAX_TR)transcript.splice(0,transcript.length-MAX_TR);
  saveTr();appendTrDom(entry);
  if(transcriptTtsOn&&src)speakText(src,sL||room.myLang);
}
function patchTr(who,ss,newTr,sL,tL){
  newTr=norm(newTr);if(!newTr)return;
  for(var i=transcript.length-1;i>=0;i--){if(transcript[i].who===who&&transcript[i].subtitleSeq===ss){if(transcript[i].translatedText===newTr)return;transcript[i].translatedText=newTr;transcript[i].ts=Date.now();saveTr();renderTr();return}}
  addTr(who,newTr,newTr,sL,tL,ss);
}

function trHtml(e){
  var srcLang=e.srcLang||(e.who==='me'?room.myLang:room.theirLang)||'en';
  var tgtLang=e.tgtLang||(e.who==='me'?room.theirLang:room.myLang)||'en';
  var locale=TTS_LOCALE[srcLang]||'en-US';
  var ts=new Date(e.ts).toLocaleTimeString(locale,{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  var speaker=e.who==='me'?'You':'Partner';
  var srcText=e.sourceText||'';var tgtText=e.translatedText||srcText;
  var isMine=e.who==='me';
  var leftText,rightText;
  if(isMine){leftText=srcText;rightText=tgtText}else{leftText=tgtText;rightText=srcText}
  var chatClass=e.type==='chat'?' is-chat':'';
  return '<div class="tr-entry"><div class="tr-bubble'+chatClass+'">'
    +'<div class="tr-head"><div class="tr-who '+(isMine?'mine':'')+'">'+esc(speaker)+'</div><div class="tr-time">'+esc(ts)+'</div></div>'
    +'<div class="tr-body">'
    +'<div class="tr-col"><div class="tr-text">'+esc(leftText)+'</div>'
    +'<button class="tr-tts" type="button" data-tts-text="'+esc(leftText)+'" data-tts-lang="'+(isMine?esc(srcLang):esc(tgtLang))+'" title="Play"><svg viewBox="0 0 24 24"><path d="M4 10h4l5-4v12l-5-4H4z"/><path d="M16 9a4 4 0 0 1 0 6"/></svg></button></div>'
    +'<div class="tr-divider"></div>'
    +'<div class="tr-col source"><div class="tr-text">'+esc(rightText)+'</div>'
    +'<button class="tr-tts" type="button" data-tts-text="'+esc(rightText)+'" data-tts-lang="'+(isMine?esc(tgtLang):esc(srcLang))+'" title="Play"><svg viewBox="0 0 24 24"><path d="M4 10h4l5-4v12l-5-4H4z"/><path d="M16 9a4 4 0 0 1 0 6"/></svg></button></div>'
    +'</div></div></div>';
}

function appendTrDom(entry){
  var b=$('transcript-body');if(!b)return;
  var em=b.querySelector('.tr-empty');if(em)em.remove();
  b.insertAdjacentHTML('afterbegin',trHtml(entry));
  checkAutoScroll();
}
function renderTr(){
  var b=$('transcript-body');if(!b)return;
  if(!transcript.length){b.innerHTML='<div class="tr-empty">Speak or type to see transcript here.</div>';setTranscriptMore(false);return}
  b.innerHTML=transcript.slice(-120).slice().reverse().map(trHtml).join('');
  $('call-transcript').scrollTop=0;setTranscriptMore(false);
}

function checkAutoScroll(){
  var c=$('call-transcript');
  if(transcriptNearBottom()){c.scrollTop=0;setTranscriptMore(false)}
  else{setTranscriptMore(true)}
}
function transcriptNearBottom(){
  var c=$('call-transcript');if(!c)return true;
  return c.scrollTop<100;
}
function setTranscriptMore(show){
  var ind=$('transcript-more-indicator');if(!ind)return;
  if(show)ind.classList.add('show');else ind.classList.remove('show');
}
function scrollToBottom(){
  var c=$('call-transcript');if(c){c.scrollTop=0;setTranscriptMore(false)}
}

function copyTr(){
  if(!transcript.length){toast('No transcript');return}
  var t=transcript.map(function(e){var ts=new Date(e.ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'});return '['+ts+'] '+(e.who==='me'?'You':'Partner')+': '+e.sourceText+(e.translatedText&&e.translatedText!==e.sourceText?' → '+e.translatedText:'')}).join('\n');
  if(navigator.clipboard)navigator.clipboard.writeText(t).then(function(){toast('Copied')});
}
function exportTxt(){
  if(!transcript.length){toast('No transcript');return}
  var t='TalkBridge Transcript\n'+(room.name?room.name+'\n':'')+new Date().toLocaleString()+'\n\n'+transcript.map(function(e){var ts=new Date(e.ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'});return '['+ts+'] '+(e.who==='me'?'You':'Partner')+' ('+((e.srcLang||'?').toUpperCase())+'): '+e.sourceText+(e.translatedText&&e.translatedText!==e.sourceText?'\n → ('+((e.tgtLang||'?').toUpperCase())+'): '+e.translatedText:'')}).join('\n\n');
  var blob=new Blob([t],{type:'text/plain'});var u=URL.createObjectURL(blob);var a=document.createElement('a');a.href=u;a.download='talkbridge-'+new Date().toISOString().slice(0,10)+'.txt';a.click();setTimeout(function(){URL.revokeObjectURL(u)},0);toast('Exported');
}

function speakText(text,lang){
  if(!text||!window.speechSynthesis)return;
  var u=new SpeechSynthesisUtterance(text);u.lang=TTS_LOCALE[lang]||'en-US';u.rate=1;u.pitch=1;
  window.speechSynthesis.cancel();window.speechSynthesis.speak(u);
}

function toggleTranscript(){
  transcriptCollapsed=!transcriptCollapsed;
  $('call-screen').classList.toggle('transcript-collapsed',transcriptCollapsed);
  syncTranscriptToggleButton();
}
function syncTranscriptToggleButton(){
  var btn=$('transcript-toggle-btn');if(!btn)return;
  btn.title=transcriptCollapsed?'Expand transcript':'Collapse transcript';
  btn.setAttribute('aria-expanded',transcriptCollapsed?'false':'true');
}
function toggleTranscriptTts(){
  transcriptTtsOn=!transcriptTtsOn;syncTranscriptTtsButton();
  if(!transcriptTtsOn&&window.speechSynthesis)window.speechSynthesis.cancel();
}
function syncTranscriptTtsButton(){
  var btn=$('transcript-tts-toggle');if(!btn)return;
  var on=btn.querySelector('.tts-on'),off=btn.querySelector('.tts-off');
  if(on)on.style.display=transcriptTtsOn?'':'none';
  if(off)off.style.display=transcriptTtsOn?'none':'';
  btn.title=transcriptTtsOn?'Transcript TTS on':'Transcript TTS off';
  btn.setAttribute('aria-pressed',transcriptTtsOn?'true':'false');
}

/* === FASTTEXT WASM === */
var _ftReady=false,_ftModule=null,_ftLoadFailed=false,_ftPending=[];
var FT_CONF=0.5;
function _loadFastText(){
  if(_ftReady||_ftLoadFailed)return;
  var s=document.createElement('script');s.src='/fastText/fasttext.js';
  s.onerror=function(){_ftLoadFailed=true;_ftPending.forEach(function(cb){cb(null);});_ftPending=[];};
  s.onload=function(){
    if(typeof FastText==='undefined'){_ftLoadFailed=true;_ftPending.forEach(function(cb){cb(null);});_ftPending=[];return;}
    try{
      var ft=new FastText();
      ft.loadModel('/fastText/models/lid.176.ftz').then(function(){
        _ftModule=ft;_ftReady=true;log('ft_ready',{},'ok');
        _ftPending.forEach(function(cb){cb(ft);});_ftPending=[];
      }).catch(function(){_ftLoadFailed=true;_ftPending.forEach(function(cb){cb(null);});_ftPending=[];});
    }catch(_){_ftLoadFailed=true;_ftPending.forEach(function(cb){cb(null);});_ftPending=[];}
  };
  document.head.appendChild(s);
}
function _detectLangAsync(t){
  if(!t||t.length<3)return Promise.resolve(null);
  var quick=detectLang(t,'');if(quick&&quick!=='en')return Promise.resolve(quick);
  return new Promise(function(resolve){
    _ftPending.push(function(ft){
      if(!ft){resolve(null);return;}
      try{var r=ft.predict(t,1);resolve((r&&r.length&&(r[0].prob||0)>=FT_CONF)?r[0].label.replace('__label__',''):null);}catch(_){resolve(null);}
    });
    if(!_ftReady&&!_ftLoadFailed&&_ftPending.length===1)_loadFastText();
  });
}

/* === CHAT === */
var chatMessages=[];

function chatInputEvt(){
  var ta=$('chat-input');if(!ta)return;
  ta.style.height='auto';
  ta.style.height=Math.min(ta.scrollHeight,80)+'px';
  $('chat-send-btn').disabled=!ta.value.trim();
}
function chatKeydown(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendChat();}}

async function sendChat(){
  var ta=$('chat-input');
  var text=(ta&&ta.value||'').trim();if(!text||!room.id)return;
  ta.value='';ta.style.height='';$('chat-send-btn').disabled=true;
  var src=room.myLang,tgt=room.theirLang;
  var srcText=text;
  try{
    var detected=await _detectLangAsync(text);
    if(detected&&detected!==src){
      var normed=await translate(text,detected,src);
      if(normed&&normed!==text)srcText=normed;
    }
  }catch(_){}
  var tgtText=srcText;
  if(src&&tgt&&src!==tgt){
    try{var tr=await translate(srcText,src,tgt);if(tr)tgtText=tr;}catch(_){}
  }
  var id='cm-'+uid();
  var entry={id:id,type:'chat',who:'me',sourceText:srcText,translatedText:tgtText,srcLang:src,tgtLang:tgt,ts:Date.now()};
  transcript.push(entry);saveTr();
  appendTrDom(entry);
  relaySend({type:'chat-msg',chatId:id,srcText:srcText,tgtText:tgtText,srcLang:src,tgtLang:tgt});
  log('chat_sent',{t:srcText.slice(0,40)},'ok');
}

function handleChatMsg(d){
  if(!d)return;
  var entry={
    id:d.chatId||('ci-'+uid()),
    type:'chat',
    who:'partner',
    sourceText:d.srcText||'',
    translatedText:d.tgtText||d.srcText||'',
    srcLang:d.srcLang||room.theirLang,
    tgtLang:d.tgtLang||room.myLang,
    ts:d.ts||Date.now()
  };
  transcript.push(entry);saveTr();
  appendTrDom(entry);
  markPartnerTalking();
  log('chat_rx',{t:(d.srcText||'').slice(0,40)},'ok');
}

function toggleMic(){
  micOn=!micOn;
  if(videoStream)videoStream.getAudioTracks().forEach(function(t){t.enabled=micOn});
  syncMic();
}
function toggleCam(){
  if(!videoStream)return;
  camOn=!camOn;
  videoStream.getVideoTracks().forEach(function(t){t.enabled=camOn});
  syncCam();
}
function syncMic(){
  var on=$('top-mic-on'),off=$('top-mic-off'),btn=$('top-mic-btn');
  if(on)on.style.display=micOn?'':'none';
  if(off)off.style.display=micOn?'none':'';
  if(btn)btn.classList.toggle('active',micOn);
}
function syncCam(){
  var on=$('top-cam-on'),off=$('top-cam-off'),btn=$('top-cam-btn');
  if(on)on.style.display=camOn?'':'none';
  if(off)off.style.display=camOn?'none':'';
  if(btn)btn.classList.toggle('active',camOn);
}

function hangUp(){relaySend({type:'hangup'});cleanUp()}
function cleanUp(){
  saveTr();stopDeepgram();recentFinals=[];pendingCandidates=[];savedOffer=null;chatMessages=[];clearTimeout(wsReconnectTimer);wsReconnectTimer=null;
  if(videoStream){videoStream.getTracks().forEach(function(t){t.stop()});videoStream=null}
  if(pc){pc.close();pc=null}
  room.id=null;room.solo=false;room.role=null;
  stopHB();if(_relayWs)try{_relayWs.close()}catch(_){}
  _relayWs=null;makingOffer=false;
  $('call-screen').classList.remove('active');$('lobby').classList.remove('hidden');setLS(LS.setup);
  $('subtitle-area').innerHTML='';$('no-video-msg').style.display='';
  $('partner-speaking-indicator').classList.remove('show');clearTimeout(partnerSpeakTimer);
  $('call-screen').classList.remove('transcript-collapsed');transcriptCollapsed=false;setTranscriptMore(false);syncTranscriptToggleButton();
  transcriptTtsOn=false;syncTranscriptTtsButton();if(window.speechSynthesis)window.speechSynthesis.cancel();
  document.querySelector('.call-videos').classList.remove('swapped');
  resetRemoteMediaState();
  transcript=[];micOn=true;camOn=true;syncMic();syncCam();callHistoryPushed=false;renderRecent();
  topBarPinned=true;$('call-top-bar').classList.remove('unpinned','show');clearTimeout(topBarHideTimer);
}

if(localStorage.getItem('tb_dg_key')&&$('dg-key')){var _sk=localStorage.getItem('tb_dg_key').trim();$('dg-key').value=_sk;setDgKeyStatus('Verifying saved key…','#f39c12');verifyDgKey(_sk);}
populateLangs();renderRecent();syncMic();syncCam();syncTranscriptToggleButton();syncTranscriptTtsButton();syncBtn();
$('call-transcript').addEventListener('scroll',function(){if(transcriptNearBottom())setTranscriptMore(false)});
$('call-transcript').addEventListener('click',function(ev){var btn=ev.target.closest('.tr-tts');if(!btn)return;speakText(btn.getAttribute('data-tts-text')||'',btn.getAttribute('data-tts-lang')||room.myLang||'en')});
$('local-video').addEventListener('click',swapVideos);
$('remote-video').addEventListener('click',swapVideos);
$('remote-video').addEventListener('loadedmetadata',refreshRemoteVideo);
var hp=new URLSearchParams((location.hash||'').replace(/^#/,''));var inv=hp.get('j');if(inv){var p=decInv(inv);if(p&&p.r)handleHash(p)}
window.addEventListener('popstate',function(){if(lobbyState===LS.call&&room.id){hangUp();return}});
window.addEventListener('visibilitychange',function(){if(!document.hidden&&isCallActive()&&!dgActive)startDeepgram()});
window.addEventListener('pagehide',function(){stopDeepgram();if(room.id){saveTr();relaySend({type:'hangup',reason:'pagehide'})}});
function isCallActive(){return $('call-screen').classList.contains('active')}
