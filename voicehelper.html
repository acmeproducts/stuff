<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SayIt Studio v1</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f4f7fb;
  --surface:#ffffff;
  --surface-2:#f8fafc;
  --surface-3:#eef3f8;
  --border:#d7e0ea;
  --border-2:#bcc9d8;
  --accent:#2563eb;
  --accent-hover:#1d4ed8;
  --ok:#0f9d58;
  --warn:#b7791f;
  --danger:#c53030;
  --text:#16202a;
  --muted:#64748b;
  --placeholder:#fff7ed;
  --placeholder-border:#fdba74;
  --mono:'JetBrains Mono', monospace;
  --sans:'Inter', sans-serif;
  --touch-target:44px;
  --header-height:60px;
  --footer-height:36px;
}

*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--sans);
  font-size:14px;
  height:100vh;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

header{
  height:var(--header-height);
  display:flex;
  align-items:center;
  padding:0 16px;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}

.logo{
  font-size:18px;
  font-weight:700;
  margin-right:32px;
}
.logo span{color:var(--accent)}

.tab-nav{
  display:flex;
  gap:8px;
  height:100%;
  align-items:center;
  overflow-x:auto;
  scrollbar-width:none;
}
.tab-nav::-webkit-scrollbar{display:none}

.tab-btn{
  background:transparent;
  border:none;
  color:var(--muted);
  font-size:14px;
  font-weight:600;
  padding:0 16px;
  height:100%;
  cursor:pointer;
  transition:all .2s;
  white-space:nowrap;
  border-bottom:2px solid transparent;
}
.tab-btn.active{
  color:var(--accent);
  border-bottom-color:var(--accent);
}

.app-container{
  flex:1;
  display:flex;
  overflow:hidden;
  position:relative;
}

.view-section{
  display:none;
  width:100%;
  height:100%;
}
.view-section.active{display:flex}

.sidebar{
  width:290px;
  background:var(--surface);
  border-right:1px solid var(--border);
  display:flex;
  flex-direction:column;
  flex-shrink:0;
}
.sidebar-header{
  padding:16px;
  border-bottom:1px solid var(--border);
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.sidebar-content{
  flex:1;
  overflow-y:auto;
  padding:16px;
}

.main-pane{
  flex:1;
  display:flex;
  flex-direction:column;
  overflow:hidden;
  background:var(--bg);
}
.split-top{
  flex:1;
  overflow-y:auto;
  padding:16px;
  background:var(--surface-2);
}
.split-bottom{
  height:40%;
  min-height:220px;
  overflow-y:auto;
  padding:16px;
  background:var(--bg);
  border-top:1px solid var(--border);
}

.btn{
  background:var(--surface-2);
  border:1px solid var(--border-2);
  color:var(--text);
  border-radius:8px;
  padding:0 12px;
  min-height:36px;
  font-size:12px;
  cursor:pointer;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  transition:background .2s;
}
.btn:hover{background:var(--surface-3)}
.btn-primary{
  background:var(--accent);
  color:#fff;
  border:none;
  font-weight:600;
}
.btn-primary:hover{background:var(--accent-hover)}
.btn-danger{
  color:#fff;
  background:var(--danger);
  border:none;
}
.btn-warn{
  color:#111827;
  background:#fbbf24;
  border:none;
}
.btn-ghost{
  background:transparent;
}

.input-group{margin-bottom:14px}
.input-group label{
  display:block;
  font-size:12px;
  color:var(--muted);
  margin-bottom:6px;
  font-weight:600;
}
.input-control{
  width:100%;
  background:#fff;
  border:1px solid var(--border-2);
  color:var(--text);
  border-radius:8px;
  padding:10px 12px;
  font-family:var(--sans);
  font-size:13px;
  outline:none;
}
.input-control.mono{font-family:var(--mono)}
.input-control:focus{border-color:var(--accent)}

.list-item{
  padding:12px;
  background:#fff;
  border:1px solid var(--border);
  border-radius:8px;
  margin-bottom:8px;
  cursor:pointer;
}
.list-item:hover{border-color:var(--border-2)}
.list-item.selected{
  border-color:var(--accent);
  background:#eff6ff;
}

.tablet-console{
  background:#ffffff;
  color:var(--text);
  font-family:var(--mono);
  font-size:12px;
  padding:12px;
  height:100%;
  overflow-y:auto;
  border-radius:8px;
  border:1px solid var(--border);
  line-height:1.5;
  white-space:pre-wrap;
}

.code-box{
  background:#f8fafc;
  border:1px solid var(--border);
  border-radius:8px;
  padding:12px;
  font-family:var(--mono);
  font-size:12px;
  line-height:1.5;
  white-space:pre-wrap;
  overflow:auto;
}

.section-title{
  font-size:16px;
  font-weight:700;
  margin-bottom:10px;
}

.muted{color:var(--muted)}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.grid-two{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.stack{display:flex;flex-direction:column;gap:12px}

.status-pill{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:6px 10px;
  border-radius:999px;
  border:1px solid var(--border);
  background:#fff;
  font-size:12px;
}
.dot{
  width:8px;
  height:8px;
  border-radius:999px;
  background:var(--muted);
}
.dot.ok{background:var(--ok)}
.dot.warn{background:var(--warn)}
.dot.err{background:var(--danger)}

.placeholder{
  background:var(--placeholder);
  border:1px solid var(--placeholder-border);
  border-left:4px solid var(--placeholder-border);
  padding:12px;
  border-radius:8px;
  font-size:13px;
  line-height:1.5;
}

.small-note{
  font-size:12px;
  color:var(--muted);
  line-height:1.45;
}

.master-footer{
  height:var(--footer-height);
  background:var(--surface);
  border-top:1px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:center;
  color:var(--muted);
  font-size:11px;
  font-family:var(--mono);
  flex-shrink:0;
}

.empty-state{
  display:flex;
  align-items:center;
  justify-content:center;
  height:100%;
  color:var(--muted);
  font-style:italic;
  text-align:center;
  padding:20px;
}

hr.sep{
  border:none;
  border-top:1px solid var(--border);
  margin:14px 0;
}

.kv{
  display:grid;
  grid-template-columns:180px 1fr;
  gap:8px 12px;
}
.kv .key{color:var(--muted);font-size:12px}
.kv .val{font-size:13px}

@media (max-width: 980px){
  .grid-two{grid-template-columns:1fr}
  .sidebar{width:240px}
}
</style>
</head>
<body>

<header>
  <div class="logo">Say<span>It</span> Studio</div>
  <div class="tab-nav">
    <button class="tab-btn active" data-target="view-install">Install</button>
    <button class="tab-btn" data-target="view-config">Config</button>
    <button class="tab-btn" data-target="view-job">Job</button>
    <button class="tab-btn" data-target="view-run">Run</button>
    <button class="tab-btn" data-target="view-logs">Logs</button>
  </div>
</header>

<div class="app-container">

  <!-- INSTALL -->
  <div id="view-install" class="view-section active">
    <div class="sidebar">
      <div class="sidebar-header">
        <span style="font-weight:600;">Install Steps</span>
      </div>
      <div class="sidebar-content" id="installStepList"></div>
    </div>

    <div class="main-pane">
      <div class="split-top" id="installTop"></div>
      <div class="split-bottom" id="installBottom"></div>
    </div>
  </div>

  <!-- CONFIG -->
  <div id="view-config" class="view-section">
    <div class="sidebar">
      <div class="sidebar-header">
        <span style="font-weight:600;">Global Config</span>
      </div>
      <div class="sidebar-content" id="configNavList"></div>
    </div>

    <div class="main-pane">
      <div class="split-top" id="configTop"></div>
      <div class="split-bottom" id="configBottom"></div>
    </div>
  </div>

  <!-- JOB -->
  <div id="view-job" class="view-section">
    <div class="sidebar">
      <div class="sidebar-header">
        <span style="font-weight:600;">Jobs</span>
        <button class="btn btn-primary" id="btnNewJob">New</button>
      </div>
      <div class="sidebar-content" id="jobList"></div>
    </div>

    <div class="main-pane">
      <div class="split-top" id="jobTop"></div>
      <div class="split-bottom" id="jobBottom"></div>
    </div>
  </div>

  <!-- RUN -->
  <div id="view-run" class="view-section">
    <div class="sidebar">
      <div class="sidebar-header">
        <span style="font-weight:600;">Run WF</span>
      </div>
      <div class="sidebar-content" id="runStepList"></div>
    </div>

    <div class="main-pane">
      <div class="split-top" id="runTop"></div>
      <div class="split-bottom" id="runBottom"></div>
    </div>
  </div>

  <!-- LOGS -->
  <div id="view-logs" class="view-section">
    <div class="sidebar">
      <div class="sidebar-header">
        <span style="font-weight:600;">Logs / Diagnostics</span>
      </div>
      <div class="sidebar-content" id="logsNavList"></div>
    </div>

    <div class="main-pane">
      <div class="split-top" id="logsTop"></div>
      <div class="split-bottom" id="logsBottom"></div>
    </div>
  </div>

</div>

<footer class="master-footer" id="footerInfo"></footer>

<script>
const APP_VERSION = "SayIt Studio v1.0.0";
const STORAGE_KEY = "sayit_studio_v1_state";

const DEFAULTS = {
  githubUser: "acmeproducts",
  githubRepo: "dev",
  htmlFile: "sayit-v1.html",
  apkName: "SayIt",
  aiPlatform: "Gemini",
  aiUrl: "https://gemini.google.com",
  pat: "",
  wakeWord: "HEY VOICEHELPER"
};

const INSTALL_STEPS = [
  { id: "project", title: "Step 1: Create AIDE Project", desc: "What to create in AIDE." },
  { id: "manifest", title: "Step 2: AndroidManifest.xml", desc: "Copyable manifest." },
  { id: "java", title: "Step 3: MainActivity.java", desc: "Copyable Java thin client." },
  { id: "build", title: "Step 4: Build + Install", desc: "Build/install checklist." }
];

const CONFIG_SECTIONS = [
  { id: "runtime", title: "Runtime", desc: "AI platform, wake word, active file." },
  { id: "github", title: "GitHub", desc: "User, repo, PAT, computed URLs." },
  { id: "apk", title: "APK", desc: "APK name and install alignment." }
];

const RUN_STEPS = [
  { id: "build", title: "Build", desc: "Generate the initial prompt." },
  { id: "go", title: "Go", desc: "Copy prompt and open AI platform." },
  { id: "capture", title: "Capture", desc: "Read clipboard into response." },
  { id: "deploy", title: "Deploy", desc: "Prepare GitHub deployment." },
  { id: "test", title: "Test", desc: "Open the live URL for the job." },
  { id: "fix", title: "Fix", desc: "Generate remediation prompt." }
];

const LOG_SECTIONS = [
  { id: "events", title: "Event Log", desc: "Commands, events, and errors." },
  { id: "diag", title: "Diagnostics", desc: "Clipboard, helper, runtime state." }
];

let state = loadState();
let currentView = "view-install";
let selectedInstallStep = "project";
let selectedConfigSection = "runtime";
let selectedRunStep = "build";
let selectedLogsSection = "events";

function loadState(){
  const raw = localStorage.getItem(STORAGE_KEY);
  if(!raw){
    return {
      config: { ...DEFAULTS },
      jobs: [],
      selectedJobId: null,
      logs: [],
      diagnostics: {
        helperPresent: !!window.AndroidHelper,
        lastClipboardRead: "",
        lastCommand: "",
        lastEvent: ""
      }
    };
  }
  try{
    const parsed = JSON.parse(raw);
    return {
      config: { ...DEFAULTS, ...(parsed.config || {}) },
      jobs: Array.isArray(parsed.jobs) ? parsed.jobs : [],
      selectedJobId: parsed.selectedJobId || null,
      logs: Array.isArray(parsed.logs) ? parsed.logs : [],
      diagnostics: {
        helperPresent: !!window.AndroidHelper,
        lastClipboardRead: "",
        lastCommand: "",
        lastEvent: "",
        ...(parsed.diagnostics || {})
      }
    };
  }catch{
    localStorage.removeItem(STORAGE_KEY);
    return loadState();
  }
}

function saveState(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  renderAll();
}

function logEvent(type, message, detail=""){
  state.logs.unshift({
    ts: new Date().toLocaleString(),
    type,
    message,
    detail
  });
  if(state.logs.length > 400) state.logs = state.logs.slice(0, 400);
  state.diagnostics.lastEvent = `${type}: ${message}`;
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  renderLogs();
}

function currentJob(){
  return state.jobs.find(j => j.id === state.selectedJobId) || null;
}

function ensureJob(){
  const job = currentJob();
  if(!job){
    alert("Create or select a job first.");
    return null;
  }
  return job;
}

function uid(){
  return Math.random().toString(36).slice(2, 10);
}

function escapeHtml(v){
  return String(v ?? "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;");
}

function repoUrl(){
  return `https://github.com/${state.config.githubUser}/${state.config.githubRepo}`;
}

function liveControlUrl(){
  return `https://${state.config.githubUser}.github.io/${state.config.githubRepo}/${state.config.htmlFile}`;
}

function jobLiveUrl(job){
  return `https://${state.config.githubUser}.github.io/${state.config.githubRepo}/${job.fileName}`;
}

function generatedManifest(){
  return `<manifest xmlns:android="http://schemas.android.com/apk/res/android"
    package="com.acme.sayit">

    <uses-permission android:name="android.permission.INTERNET" />
    <uses-permission android:name="android.permission.RECORD_AUDIO" />

    <application
        android:label="${state.config.apkName}"
        android:usesCleartextTraffic="true">

        <activity
            android:name=".MainActivity"
            android:exported="true">

            <intent-filter>
                <action android:name="android.intent.action.MAIN" />
                <category android:name="android.intent.category.LAUNCHER" />
            </intent-filter>

        </activity>

    </application>
</manifest>`;
}

function generatedJava(){
  return `package com.acme.sayit;

import android.app.Activity;
import android.os.Bundle;
import android.webkit.WebView;
import android.webkit.WebViewClient;
import android.webkit.WebSettings;
import android.webkit.JavascriptInterface;
import android.content.ClipboardManager;
import android.content.ClipData;
import android.content.Context;
import android.content.Intent;
import android.net.Uri;

public class MainActivity extends Activity {

    private WebView webView;

    @Override
    protected void onCreate(Bundle savedInstanceState) {
        super.onCreate(savedInstanceState);

        webView = new WebView(this);
        setContentView(webView);

        WebSettings settings = webView.getSettings();
        settings.setJavaScriptEnabled(true);
        settings.setDomStorageEnabled(true);

        webView.setWebViewClient(new WebViewClient());
        webView.addJavascriptInterface(new AndroidHelper(), "AndroidHelper");

        webView.loadUrl("${liveControlUrl()}");
    }

    public class AndroidHelper {

        @JavascriptInterface
        public void postMessage(String msg) {
            if (msg == null) return;

            if (msg.startsWith("clipboard.write:")) {
                String text = msg.substring("clipboard.write:".length());
                ClipboardManager clipboard = (ClipboardManager) getSystemService(Context.CLIPBOARD_SERVICE);
                clipboard.setPrimaryClip(ClipData.newPlainText("${state.config.apkName}", text));
                return;
            }

            if (msg.equals("clipboard.read")) {
                ClipboardManager clipboard = (ClipboardManager) getSystemService(Context.CLIPBOARD_SERVICE);
                if (clipboard != null && clipboard.hasPrimaryClip()) {
                    CharSequence text = clipboard.getPrimaryClip().getItemAt(0).coerceToText(MainActivity.this);
                    if (text != null) {
                        sendToWeb("clipboard:" + text.toString().replace("'", "\\\\'"));
                    }
                }
                return;
            }

            if (msg.startsWith("openUrl:")) {
                String url = msg.substring("openUrl:".length());
                Intent intent = new Intent(Intent.ACTION_VIEW, Uri.parse(url));
                startActivity(intent);
                return;
            }

            if (msg.equals("ping")) {
                sendToWeb("helper.ready");
            }
        }

        private void sendToWeb(String payload) {
            webView.post(() ->
                webView.evaluateJavascript(
                    "window.receiveEvent && window.receiveEvent('" + payload + "')",
                    null
                )
            );
        }
    }
}`;
}

function copyText(text){
  navigator.clipboard.writeText(text).then(()=>{
    logEvent("event","Copied to clipboard");
  }).catch(()=>{
    logEvent("error","Clipboard copy failed");
  });
}

function openUrl(url){
  state.diagnostics.lastCommand = `openUrl:${url}`;
  if(window.AndroidHelper && typeof window.AndroidHelper.postMessage === "function"){
    window.AndroidHelper.postMessage("openUrl:" + url);
  }else{
    window.open(url, "_blank");
  }
  logEvent("command","Open URL", url);
}

function writeClipboard(text){
  state.diagnostics.lastCommand = "clipboard.write";
  if(window.AndroidHelper && typeof window.AndroidHelper.postMessage === "function"){
    window.AndroidHelper.postMessage("clipboard.write:" + text);
    logEvent("command","Clipboard write via helper");
  }else{
    navigator.clipboard.writeText(text).then(()=>{
      logEvent("command","Clipboard write via browser");
    }).catch(()=>{
      logEvent("error","Clipboard write failed");
    });
  }
}

function readClipboardIntoResponse(){
  const job = ensureJob();
  if(!job) return;
  state.diagnostics.lastCommand = "clipboard.read";
  if(window.AndroidHelper && typeof window.AndroidHelper.postMessage === "function"){
    window.AndroidHelper.postMessage("clipboard.read");
    logEvent("command","Clipboard read via helper");
  }else{
    navigator.clipboard.readText().then(text=>{
      job.response = text;
      state.diagnostics.lastClipboardRead = text;
      logEvent("event","Clipboard captured via browser");
      saveState();
    }).catch(()=>{
      logEvent("error","Clipboard read failed");
    });
  }
}

window.receiveEvent = function(msg){
  if(typeof msg !== "string") return;
  state.diagnostics.lastEvent = msg;
  if(msg === "helper.ready"){
    state.diagnostics.helperPresent = true;
    logEvent("event","Helper ready");
    saveState();
    return;
  }
  if(msg.startsWith("clipboard:")){
    const job = currentJob();
    const text = msg.slice("clipboard:".length);
    state.diagnostics.lastClipboardRead = text;
    if(job){
      job.response = text;
      logEvent("event","Clipboard captured into selected job");
      saveState();
    }else{
      logEvent("warn","Clipboard returned but no selected job");
    }
  }
};

function createJob(){
  const name = prompt("Job/app name?");
  if(!name) return;
  const trimmed = name.trim();
  if(!trimmed) return;
  const fileName = `${trimmed}.html`;
  const job = {
    id: uid(),
    title: trimmed,
    description: "",
    prompt: "",
    response: "",
    issues: "",
    fileName,
    createdAt: new Date().toLocaleString(),
    updatedAt: new Date().toLocaleString()
  };
  state.jobs.unshift(job);
  state.selectedJobId = job.id;
  logEvent("event","Created job", trimmed);
  saveState();
}

function saveSelectedJob(){
  const job = ensureJob();
  if(!job) return;
  job.title = document.getElementById("jobTitleInput").value.trim() || job.title;
  job.description = document.getElementById("jobDescInput").value;
  job.prompt = document.getElementById("jobPromptInput").value;
  job.response = document.getElementById("jobResponseInput").value;
  job.issues = document.getElementById("jobIssuesInput").value;
  job.fileName = (document.getElementById("jobFileInput").value.trim() || job.fileName);
  job.updatedAt = new Date().toLocaleString();
  logEvent("event","Saved selected job", job.title);
  saveState();
}

function compileBuildPrompt(job){
  return `Create a complete self-contained HTML application.

App name: ${job.title}

What it is and what it does:
${job.description || "[DESCRIPTION MISSING - PLACEHOLDER]"}

Requirements:
- single HTML file
- mobile friendly
- no external libraries unless absolutely necessary
- return full HTML only

Filename: ${job.fileName}

GO!`;
}

function compileFixPrompt(job, issueText){
  return `Update the existing ${job.title} application.

Existing functionality must remain intact unless the issue explicitly requires change.

Issue to fix:
${issueText || "[ISSUE MISSING - PLACEHOLDER]"}

Return full updated HTML only.

Filename: ${job.fileName}

GO!`;
}

function runBuild(){
  const job = ensureJob();
  if(!job) return;
  saveSelectedJob();
  job.prompt = compileBuildPrompt(job);
  job.updatedAt = new Date().toLocaleString();
  logEvent("event","Generated BUILD prompt", job.title);
  saveState();
  selectedRunStep = "build";
  renderRun();
}

function runGo(){
  const job = ensureJob();
  if(!job) return;
  saveSelectedJob();
  const prompt = job.prompt || document.getElementById("runPromptArea").value;
  writeClipboard(prompt);
  openUrl(state.config.aiUrl);
  logEvent("event","GO executed", state.config.aiPlatform);
}

function runCapture(){
  saveSelectedJob();
  readClipboardIntoResponse();
}

function runTest(){
  const job = ensureJob();
  if(!job) return;
  openUrl(jobLiveUrl(job));
  logEvent("event","Opened test URL", jobLiveUrl(job));
}

function runFix(){
  const job = ensureJob();
  if(!job) return;
  saveSelectedJob();
  const issueText = document.getElementById("runIssueArea").value || job.issues;
  job.prompt = compileFixPrompt(job, issueText);
  job.updatedAt = new Date().toLocaleString();
  logEvent("event","Generated FIX prompt", job.title);
  saveState();
  selectedRunStep = "fix";
  renderRun();
}

function renderTabs(){
  document.querySelectorAll(".tab-btn").forEach(btn=>{
    btn.classList.toggle("active", btn.dataset.target === currentView);
  });
  document.querySelectorAll(".view-section").forEach(v=>{
    v.classList.toggle("active", v.id === currentView);
  });
}

function renderInstall(){

      <div class="row" style="justify-content:space-between;margin-bottom:10px;">

function saveConfigSection(){
  const get = id => document.getElementById(id);

  if(selectedConfigSection === "runtime"){
    state.config.aiPlatform = get("cfgAiPlatform").value;
    state.config.wakeWord = get("cfgWakeWord").value.trim() || DEFAULTS.wakeWord;
    state.config.aiUrl = get("cfgAiUrl").value.trim() || DEFAULTS.aiUrl;
    logEvent("event","Saved runtime config");
  }

  if(selectedConfigSection === "github"){
    state.config.githubUser = get("cfgGitHubUser").value.trim() || DEFAULTS.githubUser;
    state.config.githubRepo = get("cfgGitHubRepo").value.trim() || DEFAULTS.githubRepo;
    state.config.htmlFile = get("cfgHtmlFile").value.trim() || DEFAULTS.htmlFile;
    state.config.pat = get("cfgPat").value;
    logEvent("event","Saved GitHub config");
  }

  if(selectedConfigSection === "apk"){
    state.config.apkName = get("cfgApkName").value.trim() || DEFAULTS.apkName;
    logEvent("event","Saved APK config");
  }

  saveState();
}

function renderJobs(){
  document.getElementById("jobList").innerHTML = state.jobs.length ? state.jobs.map(job=>`
    <div class="list-item ${state.selectedJobId===job.id?"selected":""}" onclick="selectJob('${job.id}')">

      <div class="small-note">${escapeHtml(job.fileName)}</div>
      <div class="small-note">Updated: ${escapeHtml(job.updatedAt)}</div>
    </div>
  `).join("") : `<div class="empty-state">No jobs yet</div>`;

  const job = currentJob();
  document.getElementById("jobTop").innerHTML = job ? `
    <div class="section-title">Selected Job</div>
    <div class="grid-two">
      <div class="input-group">
        <label>Job Name</label>
        <input id="jobTitleInput" class="input-control" value="${escapeHtml(job.title)}">
      </div>
      <div class="input-group">
        <label>File Name</label>
        <input id="jobFileInput" class="input-control mono" value="${escapeHtml(job.fileName)}">
      </div>
    </div>
    <div class="input-group">
      <label>Description</label>
      <textarea id="jobDescInput" class="input-control">${escapeHtml(job.description)}</textarea>
    </div>
    <div class="input-group">
      <label>Current Prompt</label>
      <textarea id="jobPromptInput" class="input-control mono">${escapeHtml(job.prompt)}</textarea>
    </div>
    <div class="input-group">

  document.getElementById("jobBottom").innerHTML = job ? `

      <div class="key">Updated</div><div class="val">${escapeHtml(job.updatedAt)}</div>
      <div class="key">Live URL</div><div class="val">${escapeHtml(jobLiveUrl(job))}</div>
    </div>
  ` : `<div class="empty-state">No metadata to show</div>`;
}

function selectJob(id){
  state.selectedJobId = id;
  saveState();
}

function deleteSelectedJob(){
  const job = currentJob();
  if(!job) return;
  state.jobs = state.jobs.filter(j => j.id !== job.id);
  state.selectedJobId = state.jobs[0]?.id || null;
  logEvent("event","Deleted job", job.title);
  saveState();
}

function renderRun(){
  document.getElementById("runStepList").innerHTML = RUN_STEPS.map(step=>`
    <div class="list-item ${selectedRunStep===step.id?"selected":""}" onclick="selectedRunStep='${step.id}'; renderRun();">
      <strong>${step.title}</strong>
      <div class="small-note">${step.desc}</div>
    </div>
  `).join("");

  const job = currentJob();
  const top = document.getElementById("runTop");
  const bottom = document.getElementById("runBottom");

  if(!job){
    top.innerHTML = `<div class="empty-state">Create or select a job first</div>`;
    bottom.innerHTML = `<div class="empty-state">Run controls appear when a job is selected</div>`;
    return;
  }

  if(selectedRunStep === "build"){
    top.innerHTML = `
      <div class="section-title">Build Prompt</div>
      <div class="small-note">This generates the initial prompt from the selected job definition.</div>
      <div class="input-group">
        <label>Job</label>
        <input class="input-control" value="${escapeHtml(job.title)}" disabled>
      </div>
      <div class="input-group">
        <label>Description</label>
        <textarea id="runBuildDesc" class="input-control">${escapeHtml(job.description)}</textarea>
      </div>
      <div class="input-group">
        <label>Generated Prompt</label>
        <textarea id="runPromptArea" class="input-control mono">${escapeHtml(job.prompt)}</textarea>
      </div>
    `;
    bottom.innerHTML = `
      <div class="row">
        <button class="btn btn-primary" onclick="saveBuildDescAndGenerate()">Generate BUILD Prompt</button>
        <button class="btn" onclick="copyText(document.getElementById('runPromptArea').value)">Copy Prompt</button>
      </div>
    `;
  }

  if(selectedRunStep === "go"){
    top.innerHTML = `
      <div class="section-title">Go</div>
      <div class="kv">
        <div class="key">AI Platform</div><div class="val">${escapeHtml(state.config.aiPlatform)}</div>
        <div class="key">AI URL</div><div class="val">${escapeHtml(state.config.aiUrl)}</div>
        <div class="key">Selected Job</div><div class="val">${escapeHtml(job.title)}</div>
      </div>
      <hr class="sep">
      <div class="input-group">
        <label>Prompt To Send</label>
        <textarea id="runPromptArea" class="input-control mono">${escapeHtml(job.prompt)}</textarea>
      </div>
    `;
    bottom.innerHTML = `
      <div class="row">
        <button class="btn btn-primary" onclick="savePromptThenGo()">GO: Copy Prompt + Open AI</button>
      </div>
      <div class="small-note" style="margin-top:10px;">This is implemented now. It copies the prompt and opens the configured AI URL through the helper if available, otherwise browser fallback.</div>
    `;
  }

  if(selectedRunStep === "capture"){
    top.innerHTML = `
      <div class="section-title">Capture Response</div>
      <div class="input-group">
        <label>Response</label>
        <textarea id="runResponseArea" class="input-control mono">${escapeHtml(job.response)}</textarea>
      </div>
    `;
    bottom.innerHTML = `
      <div class="row">
        <button class="btn btn-primary" onclick="runCapture()">CAPTURE From Clipboard</button>
        <button class="btn" onclick="saveRunResponse()">Save Response</button>
      </div>
    `;
  }

  if(selectedRunStep === "deploy"){
    top.innerHTML = `
      <div class="section-title">Deploy</div>
      <div class="kv">
        <div class="key">Repo</div><div class="val">${escapeHtml(repoUrl())}</div>
        <div class="key">Target File</div><div class="val">${escapeHtml(job.fileName)}</div>
        <div class="key">Live URL</div><div class="val">${escapeHtml(jobLiveUrl(job))}</div>
      </div>
      <hr class="sep">
      <div class="input-group">
        <label>Artifact To Deploy</label>
        <textarea id="deployArtifactArea" class="input-control mono">${escapeHtml(job.response)}</textarea>
      </div>
    `;
    bottom.innerHTML = `
      <div class="placeholder">
        <strong>Placeholder:</strong> PAT-backed auto deploy is not implemented yet. The PAT is stored and the deploy target is computed, but the actual commit/push step remains manual for now.
      </div>
    `;
  }

  if(selectedRunStep === "test"){
    top.innerHTML = `
      <div class="section-title">Test</div>
      <div class="kv">
        <div class="key">Job</div><div class="val">${escapeHtml(job.title)}</div>
        <div class="key">Live URL</div><div class="val">${escapeHtml(jobLiveUrl(job))}</div>
      </div>
    `;
    bottom.innerHTML = `
      <div class="row">
        <button class="btn btn-primary" onclick="runTest()">Open Live URL</button>
      </div>
    `;
  }

  if(selectedRunStep === "fix"){
    top.innerHTML = `
      <div class="section-title">Fix</div>
      <div class="input-group">
        <label>Issue Summary</label>
        <textarea id="runIssueArea" class="input-control">${escapeHtml(job.issues)}</textarea>
      </div>
      <div class="input-group">
        <label>Generated Fix Prompt</label>
        <textarea id="runPromptArea" class="input-control mono">${escapeHtml(job.prompt)}</textarea>

      </div>

  }

function saveBuildDescAndGenerate(){
  const job = ensureJob();
  if(!job) return;
  job.description = document.getElementById("runBuildDesc").value;
  job.prompt = compileBuildPrompt(job);
  job.updatedAt = new Date().toLocaleString();
  saveState();
}

function savePromptThenGo(){
  const job = ensureJob();
  if(!job) return;
  job.prompt = document.getElementById("runPromptArea").value;
  job.updatedAt = new Date().toLocaleString();
  saveState();
  runGo();
}

function saveRunResponse(){
  const job = ensureJob();
  if(!job) return;
  job.response = document.getElementById("runResponseArea").value;
  job.updatedAt = new Date().toLocaleString();
  logEvent("event","Saved response", job.title);
  saveState();
}

function saveIssueThenFix(){
  const job = ensureJob();
  if(!job) return;
  job.issues = document.getElementById("runIssueArea").value;
  job.prompt = compileFixPrompt(job, job.issues);
  job.updatedAt = new Date().toLocaleString();
  saveState();
}

function renderLogs(){
  document.getElementById("logsNavList").innerHTML = LOG_SECTIONS.map(section=>`
    <div class="list-item ${selectedLogsSection===section.id?"selected":""}" onclick="selectedLogsSection='${section.id}'; renderLogs();">
      <strong>${section.title}</strong>
      <div class="small-note">${section.desc}</div>
    </div>
  `).join("");

  const top = document.getElementById("logsTop");
  const bottom = document.getElementById("logsBottom");

  if(selectedLogsSection === "events"){
    top.innerHTML = `
      <div class="row" style="justify-content:space-between;margin-bottom:10px;">
        <div class="section-title">Event Log</div>
        <div class="row">
          <button class="btn" onclick="copyText(JSON.stringify(state.logs, null, 2))">Copy Logs</button>
          <button class="btn btn-danger" onclick="clearLogs()">Clear Logs</button>
        </div>
      </div>
      <div class="tablet-console">${state.logs.map(l => `[${l.ts}] ${l.type.toUpperCase()} | ${l.message}${l.detail ? " | " + l.detail : ""}`).join("\\n") || "No logs yet."}</div>
    `;
    bottom.innerHTML = `
      <div class="section-title">Current Counts</div>
      <div class="kv">
        <div class="key">Jobs</div><div class="val">${state.jobs.length}</div>

  }

  if(selectedLogsSection === "diag"){
    top.innerHTML = `
      <div class="section-title">Diagnostics</div>
      <div class="kv">
        <div class="key">Helper Present</div><div class="val">${state.diagnostics.helperPresent ? "Yes" : "No"}</div>
        <div class="key">Current AI</div><div class="val">${escapeHtml(state.config.aiPlatform)}</div>
        <div class="key">Current Job</div><div class="val">${escapeHtml(currentJob()?.title || "-")}</div>
        <div class="key">Last Clipboard Read</div><div class="val">${escapeHtml((state.diagnostics.lastClipboardRead || "").slice(0, 120) || "-")}</div>
        <div class="key">Last Command</div><div class="val">${escapeHtml(state.diagnostics.lastCommand || "-")}</div>
        <div class="key">Last Event</div><div class="val">${escapeHtml(state.diagnostics.lastEvent || "-")}</div>
      </div>
    `;
    bottom.innerHTML = `
      <div class="row">
        <button class="btn" onclick="pingHelper()">Ping Helper</button>
        <button class="btn" onclick="readClipboardIntoResponse()">Read Clipboard</button>
      </div>
      <div class="small-note" style="margin-top:10px;">Voice diagnostics are intentionally not presented as implemented. That work is still pending.</div>
    `;
  }
}

function clearLogs(){
  state.logs = [];
  saveState();
}

function pingHelper(){
  state.diagnostics.lastCommand = "ping";
  if(window.AndroidHelper && typeof window.AndroidHelper.postMessage === "function"){
    window.AndroidHelper.postMessage("ping");
    logEvent("command","Sent helper ping");
  }else{
    state.diagnostics.helperPresent = false;
    logEvent("warn","AndroidHelper not present in this runtime");
    saveState();
  }
}

function renderFooter(){
  document.getElementById("footerInfo").textContent =
    `${APP_VERSION} | ${state.config.githubUser}/${state.config.githubRepo}/${state.config.htmlFile} | ${liveControlUrl()}`;
}

function renderAll(){
  renderTabs();
  renderInstall();
  renderConfig();
  renderJobs();
  renderRun();
  renderLogs();
  renderFooter();
}

document.querySelectorAll(".tab-btn").forEach(btn=>{
  btn.addEventListener("click", e=>{
    currentView = e.target.dataset.target;
    renderAll();
  });
});

document.getElementById("btnNewJob").addEventListener("click", createJob);

renderAll();
if(window.AndroidHelper && typeof window.AndroidHelper.postMessage === "function"){
  state.diagnostics.helperPresent = true;
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}
